ained by scouts who listen to the earth through cryo-sensitive ground-spikes. The clan maintains a dual identity — warrior and geologist — that they consider indistinguishable, since understanding the earth's cold is as much a combat skill as any fighting technique.",sigil:"🫀❄️",clanHonor:78},{id:"ice-036",name:"Frostvault",element:"Ice",description:"Frostvault maintains the ice-clans' strategic material reserves with the same implacable certainty that permafrost holds whatever it captures: completely, permanently, and without negotiation. Their vaults are carved into stable glacier bodies at depths where the temperature remains constant year-round, preserving materials — weapons, medicines, provisions, intelligence archives — for periods measured in decades rather than seasons. Frostvault's security doctrine is built on the principle of apparent accessibility: their primary vault location is known, but the approaches are so comprehensively defended — cryo-trap networks, subterranean guard posts, avalanche triggers — that awareness of the location provides no advantage whatsoever. The clan discovered in its third generation that the second-best deterrent to theft, after making theft physically impossible, is making the consequences of the attempt publicly catastrophic. The Frostvault Reckoning of the Year of the Long Dark — when nine armed thieves were sealed inside the outer approach tunnel and left — is taught in security courses throughout the ice federation as a model of deterrence strategy.",sigil:"🏦🏔️❄️",clanHonor:81},{id:"ice-037",name:"Blizzardcrest",element:"Ice",description:"Blizzardcrest occupies the second position in the ice-clan prestige hierarchy — perpetual contenders to Frostcrest's top ranking, deeply respected in their own right, and genuinely competitive in tournament records in ways that make the relationship between the two clans a centuries-long productive rivalry. Their crest — a blizzard spiral in white-on-gray, deliberately simple against the complexity of other clan emblems — represents their philosophy that excellence does not require ornamentation. Blizzardcrest warriors train with unusual versatility, excelling in the three most demanding cryo-disciplines: aerial cryo-combat, sub-zero endurance assault, and precision cold-work at range. The clan has produced seventeen of the ice federation's last forty-two Grand Ice Moot champion warriors, a statistical dominance that Frostcrest acknowledges without admitting its implications. The rivalry extends to civilian arts: Blizzardcrest's ice-sculptors and Frostcrest's crystal-architects compete at every major ice-clan cultural festival in a parallel prestige contest that the two clans take nearly as seriously as the military rankings.",sigil:"🌨️👑",clanHonor:92},{id:"ice-038",name:"Icewarden",element:"Ice",description:`Icewarden is the guardian-focused clan of the ice federation, dedicated entirely to protecting the cryo-sanctuaries — the sacred natural sites where extreme cold concentrates, permanent glaciers form, and the ice-spirits are believed to be most present and powerful. Their warriors are stationed at seven such sanctuaries year-round, living in conditions of perpetual deep cold that would degrade any non-ice-clan fighter's capacity in weeks. The clan has never sought expansion, territory, or political influence; their honor is defined exclusively by what remains standing in their charge and what does not. In the rare event that a cryo-sanctuary is threatened, Icewarden's response is total and immediate — they call in owed favors from every clan they have protected, aided, or sheltered, and the accumulated goodwill routinely produces response forces ten times Icewarden's own strength. The clan's motto is carved in ice above every sanctuary gate they guard, in the old ice-tongue: "We hold this place. We will hold it after you are gone."`,sigil:"🛡️🌨️",clanHonor:89},{id:"ice-039",name:"Glacialmark",element:"Ice",description:"Glacialmark's military historians maintain the ice-federation's comprehensive battle archive — the Glacialmark Ledgers — a collection of fourteen thousand annotated records covering every documented engagement involving cryo-weaponry since the federation's founding. Warriors of the clan are required to demonstrate genuine scholarly understanding of historical tactics before earning a warrior name, producing officers who are as analytically capable as they are physically formidable. The clan's own tactical innovations derive almost entirely from careful study of historical failures: they are specialists in diagnosing why battles were lost and translating those post-mortems into pre-emptive doctrine. Glacialmark also trains the ice federation's most respected embedded historians — scholars who accompany armies on active campaigns, observe operations firsthand, and produce after-action reports that become canon in the Ledgers. The Ledgers are replicated at three secret locations because the clan has calculated that their destruction would remove the federation's institutional memory at a level equivalent to losing any four of its constituent clans.",sigil:"📚❄️",clanHonor:83},{id:"ice-040",name:"Frostsong",element:"Ice",description:"Frostsong is the clan of ice-bards, voice-artists, and aurora-interpreters who hold that the truest knowledge of the cold is carried in sound — in the specific frequencies that glaciers produce as they move, that ice makes as it forms, and that the wind generates crossing the tundra surface at different temperatures. Their warrior-singers have developed a vocal art called the Cold Chorus: sustained tonal frequencies that, at precise pitches in cold air, cause sympathetic resonance in ice structures and can shatter specific crystalline formations, or alternatively consolidate them into greater strength. In combat, Frostsong's Cold Chorus disrupts enemy cryo-armor by inducing resonance fractures — a form of sonic warfare so specific that only ice-crystal-structured materials are affected, leaving allies entirely unharmed. Their aurora-reading is the ice-clans' equivalent of the lightning-clans' storm-omen practice: Frostsong seers interpret the specific color-patterns and movement of the aurora borealis as messages from the ice-spirits, and their counsel on campaign timing has a record of accuracy the federation finds impossible to dismiss. The clan's great festival, the Song of Longest Night, is attended by members of every ice clan and is considered the cultural high point of the federation's annual calendar.",sigil:"🎵❄️🌌",clanHonor:87}],mg=[{id:"MetalClan01",name:"Steel Drake",element:"Metal",description:"The Steel Drake clan traces its lineage to the first drakes that nested within active volcanoes and breathed molten ore instead of fire. Their smiths channel that ancient breath into living steel alloys no ordinary forge can replicate. Blades bearing the Drake sigil are said to hum faintly with dormant heat long after cooling. The clan considers every weapon a descendant of those first volcanic drakes.",sigil:"🐉",clanHonor:88},{id:"MetalClan02",name:"Forge Hawk",element:"Metal",description:"Forge Hawks ride thermal columns above vast smelting pits, scouting ore veins from heights no miner can reach. Their keen eyes can detect the faint shimmer of buried metal through dozens of feet of rock. The clan harvests ore by dropping weighted talons from altitude, cracking the surface and raking out raw material. Every Forge Hawk warrior dons a helmet fashioned from the first ore they personally located.",sigil:"🦅",clanHonor:74},{id:"MetalClan03",name:"Iron Wolf",element:"Metal",description:"Iron Wolf packs hunt not prey but mineral deposits across the frozen tundra of the northern ranges. Their howls resonate at frequencies that cause iron-rich stone to vibrate, revealing hollow pockets filled with raw ore. The pack works as a living furnace: bodies pressed together generate enough heat to smelt crude ingots in the field. Lone Iron Wolf scouts are considered among the most dangerous trackers in all of Aetheria.",sigil:"🐺",clanHonor:82},{id:"MetalClan04",name:"Alloy Bear",element:"Metal",description:"Alloy Bears are master blenders of disparate metals, their shamans capable of intuitively sensing which ores complement one another at the molecular level. Their great halls are stacked floor to ceiling with hundreds of alloy samples, each labeled in a script only Bears can read. A single Alloy Bear ingot commands triple the price of pure steel on any merchant exchange. Their most sacred rite involves bears wrestling in a pit of heated metal shavings to absorb elemental properties through their skin.",sigil:"🐻",clanHonor:77},{id:"MetalClan05",name:"Bronze Serpent",element:"Metal",description:"Bronze Serpents are among the oldest metal clans, predating the Age of Steel by several epochs. Their coiling temple towers are cast entirely from living bronze that slowly shifts and reshapes over centuries. Serpent priests conduct rituals by allowing molten bronze to flow over their bodies, guided by incantations into ornate ritual armor. The clan views bronze not as an inferior metal but as the first truly civilized alloy.",sigil:"🐍",clanHonor:65},{id:"MetalClan06",name:"Copper Raven",element:"Metal",description:"Copper Ravens serve as the premier information traders of the metal clans, exchanging ore maps and metallurgical secrets as currency. Their ravens carry copper-wire messages that only recipients bearing the matching resonance key can decode. The clan finances its operations through a vast network of copper wire communication lines strung between every major settlement. Ravens are trained from birth to memorize the locations of every copper deposit within a hundred leagues.",sigil:"🦅",clanHonor:58},{id:"MetalClan07",name:"Temper Fox",element:"Metal",description:"Temper Foxes specialize in the precise heating and cooling cycles that transform raw steel into hardened legend-grade weapons. Their craftspeople can hear the exact moment a blade must be quenched simply by the pitch of its ring when tapped. The clan keeps massive stone baths of secret quenching fluids whose formulas are passed through oral tradition alone. A Temper Fox-certified blade is the universal standard of quality throughout the merchant kingdoms.",sigil:"🦊",clanHonor:71},{id:"MetalClan08",name:"Anvil Titan",element:"Metal",description:"Anvil Titans are the giants of the metal world, smiths whose physical size allows them to strike with enough force to shape metal that would shatter any normal anvil. Their central forge houses an anvil carved from a single meteorite, anchored so deeply into the mountain it is considered immovable. Each blow from an Anvil Titan smith is said to send ripples through the bedrock for miles. The clan initiates new members by requiring them to lift the great anvil — none have succeeded in living memory.",sigil:"⚓",clanHonor:91},{id:"MetalClan09",name:"Blade Boar",element:"Metal",description:"Blade Boars charge headfirst into combat with full-body plate armor bristling with outward-facing blades. Their smiths design armor as much as a weapon as a defense, every surface angled to cut whatever it contacts. The clan raises war boars sheathed in layered steel hide, creating living battering rams of terrifying force. A Blade Boar charge has been known to breach gates that siege engines could not crack.",sigil:"🐗",clanHonor:79},{id:"MetalClan10",name:"Smelt Wyvern",element:"Metal",description:"Smelt Wyverns bond with fire-breathing wyverns to use their natural flame as the most efficient forge fire in existence. The bond between wyvern and smith is lifelong, each sensing the other's needs across vast distances. A wyvern's flame burns at precise temperatures on command, allowing the smith to achieve conditions impossible in conventional forges. Their bonded blades are called Wyrm-kissed and are believed to carry a faint echo of the wyvern's soul.",sigil:"🐲",clanHonor:86},{id:"MetalClan11",name:"Ironborn",element:"Metal",description:"The Ironborn believe their people were literally forged from ore during the First Smelting and carry metallic traces in their blood that make them supernaturally resistant to cuts and punctures. Clan elders display fine lines of oxidized iron visible beneath their skin after decades of elemental exposure. Their warriors require no armor because their bodies harden under the stress of combat like steel under the hammer. Ironborn are slow to anger but unstoppable once roused.",sigil:"⚙️",clanHonor:84},{id:"MetalClan12",name:"Forgebound",element:"Metal",description:"Forgebound smiths are magically tethered to their personal forge from birth, unable to travel more than a day's ride away without weakening. In exchange, they channel unnatural creative power into everything they craft at that forge. The clan's workshops are considered sacred ground, and visiting another clan's forge without invitation is punishable by exile. Forgebound weapons are coveted precisely because the smith's full power could only ever be poured into that single location.",sigil:"🔗",clanHonor:68},{id:"MetalClan13",name:"Steelfall",element:"Metal",description:"Steelfall warriors are known for an aerial combat doctrine in which armored soldiers are launched from catapults to crash into enemy formations like living meteors. Their armor is engineered specifically to survive the impact and allow the warrior to rise and fight immediately. The sheer psychological terror of a Steelfall bombardment has broken armies before the ground forces even engaged. Clan initiates spend years practicing controlled falls from ever-increasing heights.",sigil:"💫",clanHonor:76},{id:"MetalClan14",name:"Bladecrest",element:"Metal",description:"Bladecrest perches atop a massive mesa whose cliffs are naturally rich with exposed iron ore veins. The clan has built its entire citadel by smelting ore directly from the mesa walls over centuries of patient work. Their crests and banners all feature the sweeping blade silhouette that the mesa's profile forms at sunrise. Every weapon made by Bladecrest is guaranteed to hold its edge through a thousand battles or the clan will reforge it at no cost.",sigil:"🏔️",clanHonor:72},{id:"MetalClan15",name:"Forgepeak",element:"Metal",description:"Forgepeak operates the highest altitude smithy in all of Aetheria, perched above the cloud line where thinner air creates unique combustion conditions. The altitude-forged steel produced there is measurably lighter yet equally strong as lowland equivalents due to the extreme temperature differentials. Forgepeakers train their lungs to work at oxygen-thin elevations from childhood, giving them unusual endurance at sea level. The journey to their forge is itself considered a rite of passage for any serious metallurgist.",sigil:"⛰️",clanHonor:63},{id:"MetalClan16",name:"Ironvault",element:"Metal",description:"Ironvault is the preeminent financial institution of the metal clans, storing precious alloy reserves for dozens of allied groups in vaults cut from solid iron bedrock. Their vaultkeepers are trained in complex encryption and trap-engineering to protect stored assets. The clan's credibility is so absolute that an Ironvault promissory note is accepted as hard currency across three continents. No Ironvault has ever been successfully robbed, though seventeen attempts are documented in their archives.",sigil:"🏦",clanHonor:80},{id:"MetalClan17",name:"Steelpiercer",element:"Metal",description:"Steelpiercers obsess over penetration — crafting the thinnest, hardest tips capable of driving through any known armor configuration. Their needlepoints are made from an alloy so dense that Steelpiercer bolts visibly bend light around their tips during flight. The clan maintains a standing bounty on any material their bolts cannot penetrate, paying handsomely for the opportunity to solve the problem. Steelpiercer crossbow bolts are considered among the most terrifying battlefield projectiles ever devised.",sigil:"🗡️",clanHonor:69},{id:"MetalClan18",name:"Bladewarden",element:"Metal",description:"Bladewardens serve as neutral arbiters in disputes between metal clans, their authority backed by the most comprehensive collection of signed treaty-blades in existence. Each treaty the clan brokers is sealed by both parties forging a shared blade together, which the Wardens then hold in custody. Breaking a blade-treaty is considered the gravest dishonor a metal clan can commit. The Warden vaults contain over two thousand treaty-blades spanning four hundred years of history.",sigil:"⚖️",clanHonor:85},{id:"MetalClan19",name:"Forgestride",element:"Metal",description:"Forgestride smiths travel constantly, carrying portable forge kits on reinforced pack animals and setting up temporary workshops wherever they stop. Their mobility allows them to reach conflict zones and supply armies with freshly crafted weapons mid-campaign. The clan's marching forges are engineering marvels that collapse into a single cart yet expand into a functional smithy in under an hour. Forgestride fees are steep, but their on-demand service has decided the outcome of more than a few wars.",sigil:"🚶",clanHonor:61},{id:"MetalClan20",name:"Ironmark",element:"Metal",description:"Ironmark smiths brand every creation with a unique iron sigil that carries a trace of the smith's elemental essence, allowing any expert to identify the maker centuries later. The clan maintains a master registry of all active marks and charges a substantial authentication fee to verify provenance. Forgery of an Ironmark sigil is among the most severely punished crimes in metal clan law. The eldest Ironmark registrar is believed to be able to read a mark's history simply by touching it.",sigil:"🔖",clanHonor:55},{id:"MetalClan21",name:"Steelgate",element:"Metal",description:"Steelgate guards the primary mountain pass connecting the eastern ore fields to western markets, collecting tolls and ensuring safe passage through hostile territory. Their gatehouse is a masterwork of defensive metallurgy, with walls, gears, and portcullises all crafted by clan smiths over three generations. No army has breached Steelgate in two hundred years of recorded siege attempts. The clan reinvests all toll revenue into fortification improvements, making the gate stronger each decade.",sigil:"🚪",clanHonor:78},{id:"MetalClan22",name:"Bladeborn",element:"Metal",description:"Bladeborn warriors claim to have been born wielding miniature blades, their hands shaped by destiny to hold steel. From infancy, clan children handle progressively larger and sharper training blades, building instinctive muscle memory before conscious thought. A Bladeborn warrior's fighting style appears fluid to the point of improvisation but is in fact thousands of hours of ingrained response. Their blade-dances performed at festivals are breathtaking performances of lethal art.",sigil:"⚔️",clanHonor:83},{id:"MetalClan23",name:"Forgeshaper",element:"Metal",description:"Forgeshaper artisans push the boundary between smithing and sculpture, creating metal constructs of astonishing complexity and beauty. Their most prized works are kinetic sculptures that move in response to heat or vibration, continuously reshaping themselves. The clan is frequently commissioned by wealthy patrons to create elaborate automaton guardians that serve both aesthetic and defensive functions. A Forgeshaper automaton is said to be capable of independent tactical decision-making in battle.",sigil:"🎨",clanHonor:66},{id:"MetalClan24",name:"Ironveil",element:"Metal",description:"Ironveil smiths craft chainmail so fine it resembles woven cloth, offering protection that moves with the body rather than constraining it. The weaving process requires tweezers and magnification tools, with a single vest taking months of meticulous labor. Their veils are so fine that they can be folded into a pocket yet unfold into full-body protection in moments. Warriors wearing Ironveil chainmail have survived injuries that should have been fatal.",sigil:"🕸️",clanHonor:73},{id:"MetalClan25",name:"Steelweave",element:"Metal",description:"Steelweave artisans developed a technique for drawing steel into thread-fine wires that can be woven into textiles combining flexibility with metallic strength. Their woven steel cloth is lighter than linen yet turns arrows and blades that would slice conventional armor. The looms used to weave steel cloth are mechanical marvels requiring three operators working in perfect synchronization. Steelweave garments are the preferred base layer of nobility who wish protection without the weight of traditional plate.",sigil:"🧵",clanHonor:70},{id:"MetalClan26",name:"Bladepeak",element:"Metal",description:"Bladepeak clans occupy a jagged mountain range whose peaks naturally form blade-like silhouettes visible from the surrounding plains. The clan uses the mountain winds howling through razor stone formations to power bellows for their high-altitude forges. Their smiths believe the mountains themselves guide their craft, and each blade made there carries a faint resonance of the stone. Warriors of Bladepeak are said to fight as the mountain itself — immovable in defense and devastating in sudden attack.",sigil:"🏔️",clanHonor:67},{id:"MetalClan27",name:"Forgesong",element:"Metal",description:"Forgesong smiths accompany every stage of the crafting process with specific traditional chants believed to align the metal's crystalline structure with elemental harmonics. Each hammer strike falls in rhythm with the song, a technique that elder smiths claim measurably improves the finished weapon's balance and edge retention. The clan's song-smiths undergo decades of musical training alongside metallurgical apprenticeship. Forgesong blades hum faintly at specific frequencies, a phenomenon no scholar has fully explained.",sigil:"🎵",clanHonor:62},{id:"MetalClan28",name:"Ironharbor",element:"Metal",description:"Ironharbor commands the only deepwater port capable of receiving the massive ore freighters that travel from the northern mining archipelagos. Their dockworkers are heavily armored against the industrial hazards of unloading raw ore, blurring the line between laborer and warrior. The clan controls all iron commodity pricing across the eastern seaboard through their chokehold on import routes. Ironharbor's warehouses are said to contain enough ore to arm every nation in Aetheria twice over.",sigil:"⚓",clanHonor:75},{id:"MetalClan29",name:"Steelstone",element:"Metal",description:"Steelstone monks discovered that certain volcanic stones, when incorporated into steel alloys at precise ratios, grant the resulting metal near-magical hardness properties. Their monasteries are carved directly into volcanic formations, and monks meditate for years to learn the stone's resonance before being permitted to forge. A Steelstone blade is tested by being struck with a sledgehammer — blades that crack are considered failures, while those that ring are consecrated. The monks refuse to mass-produce, limiting output to twelve blades per year.",sigil:"🪨",clanHonor:90},{id:"MetalClan30",name:"Bladecrown",element:"Metal",description:"Bladecrown forges the ceremonial weapons and regalia worn by metal-clan royalty, their creations serving as both political symbols and functional weapons of devastating capability. Each crown they craft contains a concealed blade mechanism operable only by the wearer. The clan's contracts with ruling dynasties span generations, making them privy to the most sensitive political secrets in the realm. A Bladecrown commission requires a full decade of lead time and represents a monarch's lifetime of tribute.",sigil:"👑",clanHonor:93},{id:"MetalClan31",name:"Forgeshroud",element:"Metal",description:"Forgeshroud operates in deliberate secrecy, their forges hidden within networks of mountain tunnels that have never appeared on any official map. Outsiders are blindfolded before being escorted to the clan's workshops, and the blindfolding ritual is considered a form of respect for the clan's privacy. Their weapons appear in markets with no identifying marks, yet experts can recognize Forgeshroud work by its characteristic blade geometry. The clan's secrecy is not paranoia but a philosophical stance that the work must speak alone.",sigil:"🌫️",clanHonor:57},{id:"MetalClan32",name:"Ironvein",element:"Metal",description:"Ironvein miners follow the natural vein networks through the earth with an almost supernatural sensitivity, rarely sinking shafts in locations that do not yield substantial ore. Elder Ironvein geomancers can read the mineral content of soil by pressing their bare hands into it. The clan has never opened a dry mine in two hundred years of recorded extraction. Their ore survey reports are considered more reliable than any magical divination method.",sigil:"🌿",clanHonor:60},{id:"MetalClan33",name:"Blademantle",element:"Metal",description:"Blademantle warriors wear layered mantles of overlapping blade-plates that serve as both armor and offensive weaponry in close-quarters combat. The mantle technique was developed after studying how layered scales protect and arm natural predators. A spinning Blademantle warrior generates a zone of lethal force that is nearly impossible to approach safely. The clan's blade-mantles are individually fitted to each warrior's movement style over months of careful adjustment.",sigil:"🛡️",clanHonor:81},{id:"MetalClan34",name:"Forgecrown",element:"Metal",description:"Forgecrown claims descent from the legendary First Smith who allegedly forged the initial tools that made all subsequent metalworking possible. Their authority within metal-clan councils derives entirely from this lineage claim, which most clans accept as historically legitimate. Forgecrown smiths carry ceremonial first-strike privileges at the beginning of every new forge season. They produce comparatively few weapons but each is treated as a historical artifact from the moment it leaves the fire.",sigil:"👑",clanHonor:89},{id:"MetalClan35",name:"Ironwarden",element:"Metal",description:"Ironwardens are the peacekeeping force of the metal clans, empowered by inter-clan treaty to arrest and judge smiths who violate metallurgical law. Their wardens carry specially marked irons that serve as both weapon and badge of office. The clan maintains a network of iron-barred holding facilities in every major metal-clan settlement. Ironwarden judgment is considered binding by all signatory clans, and defying a warden's ruling means war with the entire coalition.",sigil:"🛡️",clanHonor:87},{id:"MetalClan36",name:"Steelcrest",element:"Metal",description:"Steelcrest is celebrated for the elaborate crests and heraldic metalwork they produce, turning armor and helmets into mobile declarations of lineage and achievement. Their crest-carvers are part historian, part artisan, encoding entire family histories into the bas-reliefs of a single pauldron. Nobles seeking to legitimize newly won titles invariably commission a Steelcrest heraldic suite. The clan can date and authenticate any piece of heraldic metalwork they examine within minutes.",sigil:"🦁",clanHonor:64},{id:"MetalClan37",name:"Bladefall",element:"Metal",description:"Bladefall commemorates the legendary battle in which ten thousand clan warriors simultaneously disarmed their enemies by targeting weapon-hands with coordinated precision strikes. The battle is reenacted annually with blunted blades, and the most precise disarm wins clan honors. Warriors train specifically in blade-deflection techniques that redirect force rather than absorb it. Bladefall's combat philosophy holds that taking an enemy's weapon is more decisive than taking their life.",sigil:"🌧️",clanHonor:73},{id:"MetalClan38",name:"Forgemark",element:"Metal",description:"Forgemark serves as the official registry of all metal-clan genealogies, clan territories, and forge rights across Aetheria. Their archivists use metal-embossed record tablets that are effectively indestructible and immune to tampering. Disputes over mining rights, forge ownership, and clan territory almost always involve a delegation to the Forgemark archive. The clan charges steep documentation fees but is scrupulously neutral in all disputes, making their records universally trusted.",sigil:"📋",clanHonor:56},{id:"MetalClan39",name:"Ironpeak",element:"Metal",description:"Ironpeak occupies the highest iron-ore-bearing mountain in the known world, their altitude granting them both strategic advantage and unparalleled ore quality. The thin air and extreme cold at their elevation produce iron with a fine crystalline grain prized by master smiths everywhere. Ironpeak traders descend to market cities only twice yearly, and their arrival is cause for immediate commerce festivals. The isolation has bred a clan culture of fierce self-reliance and deep technical innovation unconstrained by convention.",sigil:"⛰️",clanHonor:78},{id:"MetalClan40",name:"Tempered Throne",element:"Metal",description:"Tempered Throne smiths created the legendary seat of metal-clan governance — a throne forged from the finest contributions of every allied clan, symbolizing unified strength. The throne itself is considered a living artifact, slowly absorbing ambient elemental energy over centuries. Sitting the throne without clan sanction is said to result in the metal rejecting the usurper with violent force. Tempered Throne serves as the host clan for all grand metal-clan councils, their neutrality enshrined in the founding compact.",sigil:"🏛️",clanHonor:95}],gg=[{id:"WoodClan01",name:"Root Serpent",element:"Wood",description:"Root Serpents navigate the vast underground root networks of ancient forests as easily as others walk roads, using the root channels as highways through the earth. Their shamans commune with the root systems to send messages across hundreds of miles without any visible messenger. The clan believes that every tree is a single branch of one immortal entity connected by the roots beneath. Root Serpent warriors emerge from the ground without warning during battle, striking from below before the enemy can respond.",sigil:"🐍",clanHonor:79},{id:"WoodClan02",name:"Grove Hawk",element:"Wood",description:"Grove Hawks nest in the uppermost canopy of ancient groves, their eyries woven from living branches coaxed into shelter through decades of patient tending. From their heights they observe the forest in its entirety, tracking every creature's movement across their territory. The clan trains hawks to carry seeds to specific locations, gradually expanding the grove's reach in deliberate patterns. Grove Hawks consider the forest their first and only permanent ally.",sigil:"🦅",clanHonor:72},{id:"WoodClan03",name:"Branch Wolf",element:"Wood",description:"Branch Wolves move through the forest canopy at full running speed, leaping between branches with preternatural grace and confidence. Their packs coordinate hunts across different canopy layers simultaneously, driving prey upward or downward to waiting jaws. The clan has mapped every branch road in their territory, memorizing safe paths that can bear weight at speed. Branch Wolf scouts can cross an entire forest faster traveling the canopy than any horse can manage on the ground.",sigil:"🐺",clanHonor:83},{id:"WoodClan04",name:"Leaf Drake",element:"Wood",description:"Leaf Drakes bond with the massive leaf-winged forest drakes that inhabit the deep canopy, riding them in aerial formations above the treetops. Their riders wear armor fashioned from the shed scales of their drake companions, creating a symbiotic visual unity between rider and mount. A formation of Leaf Drakes blocking the sun from below creates a terrifying shadow across any battlefield. The clan's drakes are reportedly capable of understanding spoken commands in multiple languages.",sigil:"🐲",clanHonor:86},{id:"WoodClan05",name:"Bark Bear",element:"Wood",description:"Bark Bears cultivate a form of living armor grown from specially treated tree bark that bonds to the skin and hardens over months of wear. Warriors grow their bark layer over years until it covers every vulnerable surface in overlapping natural plates. The bark is periodically shed and regrown, each cycle producing a slightly denser and more protective layer. Bark Bear elders are so thoroughly armored that their original skin is nearly invisible beneath decades of accumulated growth.",sigil:"🐻",clanHonor:75},{id:"WoodClan06",name:"Vine Raven",element:"Wood",description:"Vine Ravens use the living vine networks of tropical forest regions as communication infrastructure, tuning vines to transmit vibration signals in coded patterns. Their message-ravens carry vine cuttings to establish new communication nodes in distant regions. The clan's intelligence network, maintained through vine-lines and raven relay, is considered the most current and accurate in Aetheria. Vine Raven information brokers command extraordinary fees precisely because their information is rarely stale.",sigil:"🦅",clanHonor:61},{id:"WoodClan07",name:"Seed Fox",element:"Wood",description:"Seed Foxes are master horticulturalists who carry collections of rare seeds capable of rapidly germinating into fortifications, barriers, or shelter on command. Their seed-pouches contain varieties with germination times ranging from hours to decades, giving them tactical flexibility across any timescale. A Seed Fox encampment erects a thorned living palisade within a single day of arrival. The clan holds the largest seed diversity archive in the world, protecting against ecological collapse.",sigil:"🦊",clanHonor:58},{id:"WoodClan08",name:"Canopy Titan",element:"Wood",description:"Canopy Titans are the great architects of the wood clans, designing and building entire city-civilizations within the upper canopy of massive ancient trees. Their engineering uses living wood that continues to grow after construction, with structures designed to accommodate decades of arboreal expansion. A Canopy Titan city can house thousands of residents in interconnected platforms and bridges without a single nail or cut timber. The clan's greatest completed work, the Canopy of Ten Thousands, has been continuously inhabited for six centuries.",sigil:"🌳",clanHonor:91},{id:"WoodClan09",name:"Timber Boar",element:"Wood",description:"Timber Boars are the loggers and heavy-industry wing of the wood clans, managing responsible harvest of timber for use across Aetheria. They balance extraction with replanting at ratios calculated to maintain forest health across multi-generational planning horizons. Their massive boar teams haul timber from deep forest in formations that minimize soil disruption. Timber Boar forestry codes are the legal standard in twenty nations, their practices recognized as the most sustainable in the known world.",sigil:"🐗",clanHonor:67},{id:"WoodClan10",name:"Moss Wyvern",element:"Wood",description:"Moss Wyverns bond with ancient wyverns whose scales have been colonized by rare luminescent moss, creating creatures that glow softly in the dark understory. The moss is not parasitic but mutually beneficial — the wyvern provides warmth and movement while the moss provides camouflage and toxin-filtering. Moss Wyvern riders wear cloaks of the same moss species, allowing them to blend with their mounts into a single organic silhouette. In the deep forest night, a Moss Wyvern formation is visible only as faint drifting light.",sigil:"🐲",clanHonor:78},{id:"WoodClan11",name:"Rootborn",element:"Wood",description:"Rootborn believe their ancestors were literally born from the root systems of the World Tree and carry that arboreal essence in every cell. Rootborn elders can slow their metabolism to near-dormancy during winter, much like a tree entering its resting phase. Their greatest warriors grow root-like protrusions from their feet during combat that anchor them to the ground, making them nearly impossible to knock down. The clan considers cutting a living tree an act equivalent to murder.",sigil:"🌱",clanHonor:84},{id:"WoodClan12",name:"Grovebound",element:"Wood",description:"Grovebound priests are mystically tethered to a specific grove of ancient trees and draw power proportional to their proximity to their sacred anchor point. In exchange for this limitation, Grovebound shamans can command the trees within their grove with a precision no traveling druid can match. Their sacred groves are among the most defended locations in Aetheria, protected by millennia of accumulated plant-growth defensive architecture. Pilgrims travel vast distances to seek healing in a Grovebound sanctuary.",sigil:"🌿",clanHonor:70},{id:"WoodClan13",name:"Leaffall",element:"Wood",description:"Leaffall warriors fight using a technique that mimics the unpredictable swirling descent of falling leaves, making their movement patterns nearly impossible to anticipate. They train by standing in waterfalls for hours, learning to find stability within chaotic force. Their leaf-blade weapons are thin and curved like actual leaves, capable of slicing despite their unconventional shapes. Leaffall fighting exhibitions are considered among the most beautiful martial arts displays in the known world.",sigil:"🍂",clanHonor:65},{id:"WoodClan14",name:"Barkcrest",element:"Wood",description:"Barkcrest artisans carve elaborate heraldic imagery directly into living trees, creating crests that grow and deepen with the tree over decades. Their carvings are considered living documents — as the tree changes, so too does the heraldic record, adding depth and texture that historians can read like annual rings. A Barkcrest commission on a young sapling will produce a masterwork only after the commissioner's grandchildren are grown. The clan's oldest carvings have been growing for over five hundred years.",sigil:"🎨",clanHonor:54},{id:"WoodClan15",name:"Branchpeak",element:"Wood",description:"Branchpeak occupies the highest branches of an impossibly tall tree known as the Worldspine, whose peak extends above the permanent cloud layer. The clan has never descended to ground level in recorded history, their entire civilization existing in the upper atmosphere. They trade with other wood clans through a series of rope elevators descending from the cloud layer, hauling goods up and seeds down. Branchpeak elders are said to speak directly with the weather spirits that drift past their heights.",sigil:"☁️",clanHonor:73},{id:"WoodClan16",name:"Rootvault",element:"Wood",description:"Rootvault maintains living seed banks and genetic archives within specially cultivated root chambers deep underground, preserving plant diversity against catastrophe. Their vault roots are tended by a dedicated priesthood that communicates with the root systems to monitor stored genetic material. The clan has successfully resurrected extinct plant species from millennia-old preserved seeds on twelve separate occasions. Rootvault access is considered one of the most critical resources in any wood-clan alliance negotiation.",sigil:"🏦",clanHonor:80},{id:"WoodClan17",name:"Leafpiercer",element:"Wood",description:"Leafpiercer archers use arrows fletched with specially hardened leaves that maintain their aerodynamic qualities better than conventional feathers across all weather conditions. Their bows are grown — not carved — over years from living saplings bent into shape from the day of planting. A Leafpiercer arrow leaves the bow with barely a sound, the hardened leaf-flights slicing air rather than displacing it. At competition, Leafpiercer archers routinely achieve accuracy that experienced judges initially refuse to believe.",sigil:"🌿",clanHonor:69},{id:"WoodClan18",name:"Barkwarden",element:"Wood",description:"Barkwardens serve as the law enforcement and peacekeeping force of the wood clan coalition, their authority backed by ancient inter-clan agreements sealed into living treaty-trees. Their wardens carry staffs grown from the central treaty-tree, and striking a warden is legally equivalent to attacking the treaty itself. The clan patrols forest boundaries and investigates violations of wood-clan law with impartial thoroughness. Barkwarden judgment trees grow visibly when a fair verdict is rendered, an unexplained phenomenon that nevertheless holds cultural authority.",sigil:"🛡️",clanHonor:87},{id:"WoodClan19",name:"Grovestride",element:"Wood",description:"Grovestride maintains the road network of living tree-bridges that connects every major wood-clan settlement across the forest continent. Their bridge-tenders travel the routes continuously, coaxing living wood to repair and extend the pathways as needed. A Grovestride bridge can support the weight of a laden war elephant while swaying gently in the canopy wind. The clan has never charged toll for bridge use, considering open movement throughout the forest a sacred right.",sigil:"🌉",clanHonor:63},{id:"WoodClan20",name:"Rootmark",element:"Wood",description:"Rootmark keeps the official census and territorial records of all wood clans, encoding information into the pattern of roots grown beneath clan settlements. Reading a Rootmark record requires kneeling in specific positions to feel the root patterns through the soil. Their archive root-networks have been growing and accumulating data for three centuries without requiring a single physical storage medium. Rootmark surveyors are welcomed without question into any wood-clan territory, considered neutral and essential.",sigil:"📋",clanHonor:57},{id:"WoodClan21",name:"Leafgate",element:"Wood",description:"Leafgate controls the primary forest entrance used by outsiders seeking access to wood-clan territories, their living gate a massive archway of interwoven ancient trees. The gate opens only when the guardian trees sense peaceful intention from those seeking entry — a phenomenon observed consistently for four hundred years. Leafgate diplomats receive all foreign dignitaries and determine whether their business warrants access to the inner forest. The clan has turned away armies at the gate through treaty authority alone.",sigil:"🚪",clanHonor:77},{id:"WoodClan22",name:"Barkborn",element:"Wood",description:"Barkborn shamans claim to have emerged from the bark of the World Tree itself, carrying its grain patterns as birthmarks across their bodies. Their connection to living wood is so profound that they can heal damaged trees through sustained physical contact. Barkborn mediators are called upon whenever two clans' forest territories overlap and conflict arises, their judgment accepted because the trees themselves appear to endorse it. The clan produces no weapons, considering the living forest defense enough.",sigil:"🌳",clanHonor:81},{id:"WoodClan23",name:"Groveshaper",element:"Wood",description:"Groveshapers are the master architects of the wood world, sculpting living trees into functional and beautiful structures over years and decades of patient cultivation. Their greatest achievement is the Cathedral Grove, a living structure of interlocked trees shaped over two centuries into a building capable of housing ten thousand. Every Groveshaper student must grow a chair from a sapling before advancing to more complex projects. The clan's living buildings are considered works of art as much as engineering.",sigil:"🎨",clanHonor:66},{id:"WoodClan24",name:"Rootveil",element:"Wood",description:"Rootveil shapers cultivate root networks that grow through soil in near-invisible thread-fine strands, creating subsurface intelligence networks that detect footsteps and sense approaching armies. Their battlefield preparation involves spending weeks planting listening roots before any expected engagement. Enemy commanders have been baffled by Rootveil forces who appeared forewarned of flanking maneuvers that no visible scout could have reported. The clan considers patience a tactical weapon and plans on timescales of years.",sigil:"🕸️",clanHonor:74},{id:"WoodClan25",name:"Leafweave",element:"Wood",description:"Leafweave artisans create textiles from living leaf fibers that maintain their photosynthetic properties after weaving, producing garments that literally breathe and process light. Their woven garments repair small tears autonomously as the living fibers regrow. Leafweave cloth is the most sought-after luxury textile in Aetheria, valued for its beauty, functionality, and the extraordinary craftsmanship required to produce it. A Leafweave ceremonial robe can take five years to complete.",sigil:"🧵",clanHonor:59},{id:"WoodClan26",name:"Barkpeak",element:"Wood",description:"Barkpeak resides at the summit of an ancient tree so tall its upper bark is permanently frosted, creating a unique bark variety with exceptional hardness properties. Their armor is fashioned from this frost-bark, which is as hard as iron yet weighs a fraction as much. The climb to Barkpeak's citadel takes trained climbers two full days of vertical ascent. Barkpeak warriors descend only for war, and their appearance on any battlefield signals that the wood clans are invoking their highest level of commitment.",sigil:"⛰️",clanHonor:85},{id:"WoodClan27",name:"Grovesong",element:"Wood",description:"Grovesong priests maintain the ancient oral tradition of tree-communication through specific song frequencies that resonate with living wood. Their voices can reportedly cause dormant seeds to germinate or dormant trees to wake early from winter rest. Each Grovesong ceremony concludes with the planting of a new tree that will carry the memory of that day's songs in its growth pattern. Scholars who have studied Grovesong timber have found that the growth rings do appear to encode a form of information.",sigil:"🎵",clanHonor:62},{id:"WoodClan28",name:"Rootharbor",element:"Wood",description:"Rootharbor operates at the edge of the great inland sea where massive ancient trees extend their roots into salt water, creating a unique ecosystem unlike any other. Their harbor is entirely living — wharfs and piers grown from root extensions that lift and flex gently with the tide. The clan cultivates sea-resistant tree varieties that extend the forest into coastal zones other wood clans cannot colonize. Rootharbor is the only wood clan with a significant maritime presence.",sigil:"⚓",clanHonor:76},{id:"WoodClan29",name:"Leafstone",element:"Wood",description:"Leafstone monks discovered a process by which certain leaf compounds, when concentrated and crystallized, produce a material with the hardness of stone but the flexibility of living tissue. Their leaf-stone is used primarily in medical applications — bone replacement scaffolding that integrates with living tissue over months. The clan guards the crystallization process as their most valuable secret and has never permitted outside observation of the procedure. Leafstone medical procedures have given mobility back to thousands who would otherwise have remained crippled.",sigil:"🪨",clanHonor:71},{id:"WoodClan30",name:"Barkcrown",element:"Wood",description:"Barkcrown rules the wood-clan council through a combination of ancient lineage claim and genuine diplomatic skill. Their crown is grown — a living circlet of interwoven sapling branches that continues to grow on the wearer's head, shaped by tradition and constant careful tending. A Barkcrown ruler who neglects their crown and allows it to grow wild is considered politically endangered. The clan has produced seventeen wood-clan High Stewards in the last three centuries.",sigil:"👑",clanHonor:92},{id:"WoodClan31",name:"Rootshroud",element:"Wood",description:"Rootshroud shamans specialize in root networks that grow in patterns designed to obscure and confuse, creating labyrinths beneath the soil that redirect underground water and create false trails for those who follow root-reading techniques. Their territory is considered the most difficult in Aetheria to navigate, with even experienced wood-clan travelers requiring a Rootshroud guide. The clan's own members navigate by reading patterns invisible to all outsiders. Rootshroud is the wood clans' first choice for hiding something that must never be found.",sigil:"🌫️",clanHonor:55},{id:"WoodClan32",name:"Leafvein",element:"Wood",description:"Leafvein scholars map the nutritive vein networks of leaves with the same rigor that cartographers map rivers, finding in those patterns principles applicable to city planning, water management, and military logistics. Their city layouts follow leaf-vein geometry, creating distribution networks of remarkable efficiency. The clan consults with urban planners from a dozen nations each year, their organic planning principles producing measurably better resource distribution. Leafvein texts on urban design are studied in every major academy.",sigil:"🌿",clanHonor:60},{id:"WoodClan33",name:"Barkgate",element:"Wood",description:"Barkgate maintains a series of living wooden gates along the forest's outer edge, each a massive arch of ancient intertwined trees that controls access to specific biomes within the greater forest. Their gate-wardens communicate through root systems, allowing the entire gate network to respond to a single threat simultaneously. Unauthorized passage through a Barkgate triggers a response from the trees themselves — rapid growth of blocking branches and rising of root barriers. The clan considers every gate a sacred threshold.",sigil:"🚪",clanHonor:78},{id:"WoodClan34",name:"Groveborn",element:"Wood",description:"Groveborn are the mystic philosophers of the wood world, dedicating themselves entirely to understanding the consciousness they believe exists within ancient grove systems. Their retreats last years or decades, during which they physically merge with ancient trees through meditation and root-communion techniques. Groveborn who return from long retreats speak of having experienced the full span of a tree's memory across centuries. Their insights occasionally reshape wood-clan policy in profound ways that take decades to fully manifest.",sigil:"🌳",clanHonor:88},{id:"WoodClan35",name:"Rootwarden",element:"Wood",description:"Rootwardens are the protectors of the deep root networks that connect the ancient trees of the forest continent, defending the living infrastructure that the entire wood-clan civilization depends on. Their warriors patrol underground through root tunnels, hunting for invasive species or deliberate sabotage of the root communication networks. The clan can detect unauthorized entry into the root network the way a spider senses vibration in its web. Rootwarden response time to a root-network threat averages less than two hours from detection to engagement.",sigil:"🛡️",clanHonor:82},{id:"WoodClan36",name:"Leafcrest",element:"Wood",description:"Leafcrest produces the ceremonial heraldry of the wood clans, their crests grown from living leaves shaped and preserved through techniques that can maintain their color and form for centuries. Their most prestigious commission is the Eternal Leaf — a single living leaf maintained in perfect stasis for as long as the clan it represents remains active. The Leafcrest archive currently maintains forty-three Eternal Leaves, each representing a wood clan that has never died out. Two have wilted in the past century, marking the passing of those clans.",sigil:"🍃",clanHonor:64},{id:"WoodClan37",name:"Barkfall",element:"Wood",description:"Barkfall warriors use a combat technique inspired by the avalanche-like collapse of bark from dying trees, channeling momentum into devastating downward strikes that crush rather than cut. Their weapons are clubs and mallets grown from the densest hardwoods, weighted at the head to maximize impact force. A Barkfall warrior in full combat stance appears almost leisurely until the moment of the strike, which delivers force equivalent to a falling tree. Their battle cry mimics the groaning crack of a tree beginning to fall.",sigil:"🍂",clanHonor:76},{id:"WoodClan38",name:"Grovemark",element:"Wood",description:"Grovemark is responsible for registering and protecting the territorial boundaries of all wood clans, encoding border agreements into living tree barriers that physically mark the agreed lines. Their surveyors plant specific tree species at territorial boundaries, each species indicating a different type of boundary agreement. Over decades the living boundary trees become self-evidently clear, removing ambiguity from land disputes that parchment agreements cannot resolve. Grovemark surveys are considered legally binding in all wood-clan courts.",sigil:"📋",clanHonor:54},{id:"WoodClan39",name:"Rootpeak",element:"Wood",description:"Rootpeak grows the deepest root systems of any wood clan, their trees driving roots down to geological depths that no other arboricultural tradition has achieved. At those depths, the roots tap mineral-rich waters and geothermal heat that produce extraordinary growth rates. Rootpeak trees are notably larger than identical species elsewhere, their above-ground grandeur a reflection of the subterranean investment below. The clan's great achievement — a tree whose roots reach the water table two miles below — is considered the greatest arboricultural feat in history.",sigil:"⛰️",clanHonor:70},{id:"WoodClan40",name:"Leafmantle",element:"Wood",description:"Leafmantle warriors wear cloaks of living leaves maintained in their natural state through body-heat and specially formulated saps, the mantle shifting color with the warrior's surroundings in natural camouflage. The leaves are not armor but sensory extensions — the warrior feels through the mantle as through extra skin, detecting air pressure changes and vibrations invisible to normal senses. A Leafmantle warrior in a forested environment is effectively invisible to all conventional detection. The clan has never lost a member to ambush in recorded history.",sigil:"🍃",clanHonor:88}],fg=[{id:"ShadowClan01",name:"Void Serpent",element:"Shadow",description:"Void Serpents are the preeminent assassin lineage of the shadow world, trained from birth in techniques that make them effectively non-existent to any tracking or detection method. Their kills are so clean that victims appear to have died of natural causes unless examined by an expert who knows what to look for. The clan keeps no written records — all contracts, techniques, and history live in oral tradition passed mind-to-mind. It is not possible to hire a Void Serpent; they find the client, having already decided whether the contract will be fulfilled.",sigil:"🐍",clanHonor:83},{id:"ShadowClan02",name:"Shadow Hawk",element:"Shadow",description:"Shadow Hawks operate the preeminent covert intelligence network in Aetheria, their agents embedded in every major court, guild, and religious institution. Their hawks carry shadow-ink messages that are invisible until activated by a specific reagent known only to the intended recipient. The clan sells intelligence but never exclusively — every client knows their secrets may be in competing hands. Shadow Hawk's neutrality is maintained precisely because every faction fears what they hold against all others.",sigil:"🦅",clanHonor:77},{id:"ShadowClan03",name:"Phantom Wolf",element:"Shadow",description:"Phantom Wolves are void-walkers who have learned to briefly phase between the physical world and the shadow plane, appearing and disappearing without conventional means. Their pack movements are terrifying to witness — a dozen wolves materializing simultaneously from patches of darkness to surround a target before it can react. The technique has a cost: each phasing shortens the practitioner's lifespan by a small but measurable amount. Phantom Wolves accept this bargain without hesitation, considering the capability worth any price.",sigil:"🐺",clanHonor:89},{id:"ShadowClan04",name:"Umbral Bear",element:"Shadow",description:"Umbral Bears are the shock troops of the shadow clans — massive warriors who weaponize the psychological terror of darkness by preceding their charges with waves of supernatural shadow. Enemies facing Umbral Bears experience visual distortions, phantom sounds, and creeping dread before the warriors are even visible. Their size and ferocity are no accident; the clan selects the largest members of each generation for warrior training. An Umbral Bear charge against a prepared line has broken morale before contact was made.",sigil:"🐻",clanHonor:85},{id:"ShadowClan05",name:"Dark Drake",element:"Shadow",description:"Dark Drakes bond with shadow-drake variants that absorb rather than emit light, their scales drinking in illumination and creating zones of absolute darkness around the creature. Riders and mount together form an island of impenetrable shadow moving through the battlefield. The shadow-drakes communicate in subsonic frequencies that human ears cannot detect, coordinating silently over distances. Dark Drake aerial formations are battlefield-decisive tools: a formation passes over an enemy and leaves them temporarily blind.",sigil:"🐲",clanHonor:91},{id:"ShadowClan06",name:"Night Raven",element:"Shadow",description:`Night Ravens maintain a continent-spanning network of nocturnal information brokers, their birds flying only after moonrise to avoid detection. Their ravens have been selectively bred for silence over generations, with wingbeats that produce no audible sound at normal observation distances. Night Raven information commands premium prices because it is exclusively gathered after dark, catching subjects in moments of unguarded honesty. The clan's unofficial motto is: "The night sees everything the day denies."`,sigil:"🦅",clanHonor:66},{id:"ShadowClan07",name:"Eclipse Fox",element:"Shadow",description:"Eclipse Foxes are master illusionists who use shadow manipulation to create perfect false environments that trap targets in convincing fabricated realities. Their technique requires understanding not just how to create shadow but how the mind fills in details it expects to see. An Eclipse Fox illusion is indistinguishable from reality until the target attempts physical interaction with something the shadow cannot replicate. The clan considers a perfect illusion — one where the target never discovers the deception — their highest art form.",sigil:"🦊",clanHonor:72},{id:"ShadowClan08",name:"Shade Titan",element:"Shadow",description:"Shade Titans are enormous warriors who have undergone a ritual merging with concentrated shadow essence, their bodies permanently half-phased between the physical and void realms. They appear to observers as solid darkness given humanoid form, their features visible only as slightly deeper shadows within their silhouette. Shade Titans cannot be harmed by conventional weapons, which pass through their semi-material form, but they in turn struggle to physically interact with the world outside of battle. In combat, they manifest fully enough to strike with devastating force before retreating to invulnerability.",sigil:"👤",clanHonor:94},{id:"ShadowClan09",name:"Dusk Boar",element:"Shadow",description:"Dusk Boars operate at the twilight edge between day and shadow, their timing-based fighting style exploiting the transition moments when eyes are least adapted. They time attacks for the precise minutes of dusk and dawn when daylight defenders and darkness-adapted shadow warriors both struggle with changing light. Dusk Boar war schedules are planned seasons in advance around astronomical tables of twilight timing. Their signature tactic — the Dusk Charge — has never been successfully countered by conventional defensive doctrine.",sigil:"🐗",clanHonor:76},{id:"ShadowClan10",name:"Veil Wyvern",element:"Shadow",description:"Veil Wyverns bond with void-touched wyverns whose bodies emit a reality-thinning aura that makes everything within fifty feet slightly unreal and difficult to perceive clearly. The effect is not invisibility but a persistent mild unreality that causes observers to unconsciously look away and fail to register details. Veil Wyvern riders describe the aura as feeling like existing in the space between thoughts. Their enemies often cannot accurately report how many Veil Wyvern units participated in an engagement.",sigil:"🐲",clanHonor:87},{id:"ShadowClan11",name:"Shadowborn",element:"Shadow",description:"Shadowborn emerged from the void between stars rather than from mortal parents, or so their founding myth claims, and this origin gives them an unsettling connection to absolute darkness. Their children are born without casting shadows — the clan's most recognizable marker in physical space. Shadowborn warriors can fight in perfect darkness not because their eyes adapt but because they navigate by a shadow-sense entirely distinct from vision. In total darkness, a Shadowborn warrior has every advantage.",sigil:"🌑",clanHonor:88},{id:"ShadowClan12",name:"Voidbound",element:"Shadow",description:"Voidbound priests are tethered to specific void anchors — tears in the physical world through which the shadow plane bleeds — drawing enormous power from proximity to their anchor at the cost of being unable to venture far from it. Their anchor sites are among the most protected locations in shadow-clan territory, defended by multiple layers of guardian forces. Voidbound rituals conducted at maximum proximity to the anchor are capable of effects that dwarf any other shadow-clan technique. The greatest Voidbound priests become effectively stationary pillars of shadow power.",sigil:"🔗",clanHonor:73},{id:"ShadowClan13",name:"Phantomfall",element:"Shadow",description:"Phantomfall warriors specialize in falling from great heights while phased into the shadow plane, passing harmlessly through floors and ceilings to emerge inside fortifications that no conventional force could breach. The technique requires absolute calm during the descent — panic causes premature rephasing and potentially fatal results. Phantomfall squads have appeared inside the most secure vaults, treasure rooms, and prison cells in Aetheria. The clan charges extraordinary fees for infiltration contracts, which they have never failed to fulfill.",sigil:"💫",clanHonor:82},{id:"ShadowClan14",name:"Umbralcrest",element:"Shadow",description:"Umbralcrest carries the ceremonial heraldry of the shadow clans, creating sigils and marks that are visible only under specific light conditions or to those with shadow sensitivity. Their crests are the highest status symbol in shadow-clan society precisely because they cannot be observed by outsiders. An Umbralcrest-certified sigil is the proof of legitimate shadow-clan membership accepted at every dark market and void-walker conclave. Forging an Umbralcrest mark carries the death penalty and is somehow always detected.",sigil:"🎨",clanHonor:67},{id:"ShadowClan15",name:"Shadowpeak",element:"Shadow",description:"Shadowpeak occupies a mountain so shrouded in perpetual supernatural darkness that no light source functions within its borders — fire, magical illumination, and even bioluminescence all fail at the threshold. The clan has adapted to this environment over generations, developing a true physical shadow-sense that makes vision entirely redundant for them. Visitors to Shadowpeak are blindfolded not as a security measure but for their own protection — the absolute darkness causes permanent psychological damage in the unadapted. The clan's ability to function normally within their territory gives them an unbreachable home defense.",sigil:"⛰️",clanHonor:79},{id:"ShadowClan16",name:"Voidvault",element:"Shadow",description:"Voidvault stores secrets and treasures in pocket dimensions accessible only through the shadow plane, creating storage that physically does not exist in conventional space. Their vaultkeepers are the only practitioners who know the void-key patterns required to access a given pocket. A Voidvault commission guarantees storage that no physical force can reach — the treasure simply does not exist anywhere that can be robbed. The clan has never lost a stored item in two centuries of operation, their reputation for security absolute.",sigil:"🏦",clanHonor:84},{id:"ShadowClan17",name:"Phantompiercer",element:"Shadow",description:"Phantompiercers craft weapons that exist partially in the shadow plane, allowing their tips to pierce through conventional armor by briefly phasing through the physical material. The technique requires weapons to be quenched in concentrated void essence during crafting, a process that renders them permanently marked by shadow. Phantompiercer blades wound more than the flesh — the void-touch disrupts the healing process, making injuries take three times as long to recover from. Their weapons are prohibited in formal duels by nearly every honorable fighting tradition.",sigil:"🗡️",clanHonor:71},{id:"ShadowClan18",name:"Umbralwarden",element:"Shadow",description:"Umbralwardens enforce shadow-clan law from within the darkness, their authority recognized across every guild, market, and assassin conclave in the shadow world. Their wardens carry shadow-brands — marks burned into the void essence of lawbreakers that follow them into the shadow plane and make them visible to every Umbralwarden who looks. A branded outlaw cannot hide in the shadow world, their only remaining refuge the mundane world of daylight. The clan considers exile from shadow the ultimate punishment.",sigil:"🛡️",clanHonor:86},{id:"ShadowClan19",name:"Shadowstride",element:"Shadow",description:"Shadowstride practitioners move through the shadow plane as their primary mode of travel, emerging in mundane space only when necessary. Their stride technique allows coverage of enormous distances — a day's shadow-stride equals a week of surface travel. The clan has mapped the shadow plane with the same rigor that explorers chart physical geography, their charts the most comprehensive guide to void navigation ever compiled. Shadowstride couriers can deliver messages across continents before conventional messengers have saddled their first horse.",sigil:"🚶",clanHonor:64},{id:"ShadowClan20",name:"Voidmark",element:"Shadow",description:"Voidmark serves as the record-keeping institution of the shadow clans, encoding all contracts, debts, and clan agreements into void-inscriptions that exist in both the physical and shadow planes simultaneously. Their records cannot be altered without leaving traces detectable in the shadow plane, making fraud effectively impossible. Voidmark archivists can read the complete contractual history of any shadow-clan member by examining their void-signature. The clan charges ongoing record-maintenance fees that make them quietly wealthy despite never engaging in direct commerce.",sigil:"📋",clanHonor:58},{id:"ShadowClan21",name:"Phantomgate",element:"Shadow",description:"Phantomgate maintains the primary points of entry between the physical world and the shadow plane, controlling who passes through and imposing tolls on regular travelers. Their gates are invisible to those without shadow sensitivity — ordinary people pass through the gate sites without ever perceiving the threshold. The clan regulates traffic between worlds primarily to prevent the shadow plane from destabilizing under excessive use, a responsibility they take seriously. Phantomgate has closed the gates entirely three times in recorded history, always averting a predicted void collapse.",sigil:"🚪",clanHonor:80},{id:"ShadowClan22",name:"Umbralborn",element:"Shadow",description:"Umbralborn claim their clan was born within the shadow plane itself during the First Void, making them indigenous to darkness rather than adapted to it. Their elders display physical characteristics unlike other shadow clans — skin that appears to absorb light, eyes with no whites, and voices that seem to originate from slightly behind the speaker. Umbralborn combat techniques are alien to conventional martial understanding, drawing on void physics rather than physical mechanics. Even other shadow clans treat Umbralborn with a level of genuine unease.",sigil:"🌑",clanHonor:90},{id:"ShadowClan23",name:"Shadowshaper",element:"Shadow",description:"Shadowshapers are the sculptors of the void, manipulating shadow into three-dimensional forms that possess physical solidity within the shadow plane and temporary partial reality on the physical plane. Their creations range from shadow-bridges across voids to shadow-constructs that serve as temporary guardians. A master Shadowshaper's constructs can maintain physical coherence for days before the shadow matter dissipates. The clan's most coveted service is creating shadow-doubles — perfect replicas of individuals that can mislead enemies for hours.",sigil:"🎨",clanHonor:68},{id:"ShadowClan24",name:"Voidveil",element:"Shadow",description:"Voidveil practitioners weave protective shells of condensed shadow around themselves or clients that deflect both physical and magical attacks by partially phasing the protected subject out of the physical plane. The veil requires constant subtle maintenance and collapses under sustained assault, making it a defense of seconds rather than hours. But those seconds are enough — a Voidveil guard can preserve a VIP through the opening moments of any ambush, buying time for escape. The clan's protective rates are extraordinary and clients consider them worth every coin.",sigil:"🕸️",clanHonor:75},{id:"ShadowClan25",name:"Phantomweave",element:"Shadow",description:"Phantomweave artisans create textiles from solidified shadow-matter — cloth that is effectively invisible in low light, absorbs sound, and muffles the wearer's presence in the shadow plane as well as the physical world. Their garments are standard issue for every elite shadow-clan operative who can afford the extraordinary price. Wearing Phantomweave cloth makes even an untrained person substantially harder to detect. The clan refuses to sell their techniques; every garment is made by their own artisans using processes they have never documented.",sigil:"🧵",clanHonor:69},{id:"ShadowClan26",name:"Umbralpeak",element:"Shadow",description:"Umbralpeak sits at the summit of a mountain whose shadow always falls across the same valley regardless of the sun's position — a physical anomaly that the clan has exploited for centuries as a power amplification site. The perpetual shadow creates a permanent thinning of the barrier between planes, giving resident shadow-clan practitioners access to void power unavailable elsewhere. Umbralpeak initiates spend a year meditating within the perpetual shadow before being considered full clan members. The clan's strongest practitioners rival void-born entities in raw power.",sigil:"⛰️",clanHonor:93},{id:"ShadowClan27",name:"Shadowsong",element:"Shadow",description:"Shadowsong priests use sound frequencies that resonate with the shadow plane, their chants capable of thinning the barrier between worlds or sealing it thicker. Their ceremonies can summon void entities or banish them, making Shadowsong the unchallenged masters of void diplomacy. The clan maintains neutral relationships with shadow-plane intelligences that would otherwise be hostile to physical-world inhabitants. Shadowsong diplomacy has prevented void incursions that could have devastated entire regions on at least four documented occasions.",sigil:"🎵",clanHonor:81},{id:"ShadowClan28",name:"Voidharbor",element:"Shadow",description:"Voidharbor operates the dark markets where goods that cannot be traded in the mundane world change hands — cursed artifacts, void-touched materials, and items whose ownership histories are legally problematic. Their market exists simultaneously in a physical location and its shadow-plane equivalent, with some goods existing only in one version. Voidharbor market security is formidable; the clan makes substantial profit from transaction fees and has no interest in allowing robbery to occur on their premises. More than a few warlords have been quietly resupplied through Voidharbor when conventional supply was impossible.",sigil:"⚓",clanHonor:62},{id:"ShadowClan29",name:"Phantomstone",element:"Shadow",description:"Phantomstone alchemists extract the void-mineral deposits that form at the intersection of physical stone and shadow-plane matter, creating reagents of extraordinary potency. The extraction process requires working simultaneously in both planes, a skill so rare that Phantomstone alchemists command the highest per-hour rates of any shadow-clan specialist. Their void-stones are the primary ingredient in more shadow-clan techniques than any other material. The clan controls roughly eighty percent of all known void-stone deposits by territorial claim.",sigil:"🪨",clanHonor:74},{id:"ShadowClan30",name:"Umbralcrown",element:"Shadow",description:"Umbralcrown rules the shadow-clan coalition through a combination of legitimate lineage, accumulated fear, and genuine competence in navigating the eternally treacherous politics of the void-world. Their crown is a circlet of solidified shadow that only the ruling Umbralcrown can lift — others' hands pass through it as though it were mist. The clan has produced four of the seven recognized Shadow High Rulers in recorded history, each ruling through consensus from the most dangerous power brokers in existence. The current ruler has held the crown for sixty years without a serious challenge.",sigil:"👑",clanHonor:95},{id:"ShadowClan31",name:"Voidshroud",element:"Shadow",description:"Voidshroud morticians prepare the dead of the shadow clans for passage into the void rather than physical burial, ensuring that the departing soul navigates the shadow plane safely. Their death-rites are considered essential — an unprepared shadow-clan soul entering the void unguided risks becoming lost in its infinite darkness. Voidshroud priests occasionally encounter and must deal with souls that have already become lost, guiding them to their proper rest. The clan holds a unique position of honor that no amount of political turbulence has ever threatened.",sigil:"🌫️",clanHonor:78},{id:"ShadowClan32",name:"Phantomvein",element:"Shadow",description:"Phantomvein maps the pathways of void energy that flow through the shadow plane in patterns analogous to blood vessels, identifying power channels that can be tapped or redirected. Their cartography of the void energy network is the most comprehensive ever produced and has informed shadow-clan strategy for generations. Redirecting a void vein can amplify or starve the power available to a specific location, giving Phantomvein enormous strategic leverage. The clan has used this leverage precisely twice in their history, both times to prevent shadow-clan civil war.",sigil:"🌿",clanHonor:70},{id:"ShadowClan33",name:"Umbralgate",element:"Shadow",description:"Umbralgate controls the grandest of the shadow-world's threshold points — the Great Void Door through which all major shadow-plane traffic must pass. Their toll is paid not in coin but in information, meaning Umbralgate accumulates a comprehensive picture of all shadow-clan movement and commerce. The clan uses this information with remarkable restraint, selling nothing and leveraging it only to maintain stability. Umbralgate's willingness to hold secrets without exploiting them has made them perhaps the most genuinely trusted institution in a world built on betrayal.",sigil:"🚪",clanHonor:86},{id:"ShadowClan34",name:"Shadowmantle",element:"Shadow",description:"Shadowmantle warriors wear living shadow as armor — a personal shadow-plane anchor that surrounds the warrior in a layer of condensed void matter that deflects both physical and magical attacks. The mantle requires decades of training to maintain under combat stress; novices lose cohesion the moment adrenaline spikes. A fully trained Shadowmantle warrior is effectively immune to most conventional attack forms. The clan's training regimen is so demanding that fewer than one in ten initiates completes it.",sigil:"🛡️",clanHonor:88},{id:"ShadowClan35",name:"Voidwarden",element:"Shadow",description:"Voidwardens police the shadow plane itself, hunting down void entities that have exceeded their permitted influence in the physical world and shadow-clan practitioners who violate the laws of void engagement. Their authority is the most difficult to enforce in any Aetherian legal tradition — the shadow plane is not cooperating territory. Voidwardens work alone or in very small groups, using tracking techniques that follow void-signatures across both planes. The clan's mortality rate is the highest of any law-enforcement organization in Aetheria.",sigil:"🛡️",clanHonor:85},{id:"ShadowClan36",name:"Phantomcrest",element:"Shadow",description:"Phantomcrest creates the heraldic identifiers of the shadow-clan world — marks that shift and change with light conditions, visible one moment and gone the next. Their crest-makers encode identity information in shadow-reactive inks that respond differently to different light sources, making each crest a layered document readable only to those who know what to look for. A Phantomcrest mark cannot be forged because the void-reactive components are unique to each production. The clan considers identity the most important thing they protect.",sigil:"🎨",clanHonor:63},{id:"ShadowClan37",name:"Umbralfall",element:"Shadow",description:"Umbralfall commemorates the legendary event in which the clan's founders allowed themselves to fall through a void rift to reach the shadow plane, with no guarantee of survival or return. The founding fall is reenacted symbolically during initiation, with new members leaping into a void-touched pool that briefly immerses them in shadow-plane contact. The experience of the initiation plunge permanently alters the initiate's relationship with fear. Umbralfall warriors fight with absolute recklessness because their initiation already proved that the ultimate fall has no power over them.",sigil:"🌧️",clanHonor:76},{id:"ShadowClan38",name:"Shadowmark",element:"Shadow",description:"Shadowmark serves as the authentication authority of the shadow-clan world, validating the identity and standing of practitioners across all dark markets and void conclaves. Their marks are applied in a shadow-plane ceremony that leaves a trace only Shadowmark registrars can read. Presenting a false Shadowmark is impossible in practice — the shadow-plane trace carries information about the actual bearer that cannot be falsified. The clan has never detected an unambiguous forgery in three centuries of operation.",sigil:"🔖",clanHonor:57},{id:"ShadowClan39",name:"Voidpeak",element:"Shadow",description:"Voidpeak sits at the pinnacle of the shadow plane's equivalent of a mountain — a place where void pressure is highest and the barrier to the physical world is at its thinnest from the inside. Their resident practitioners can observe the physical world through the barrier as though through water, making them the preeminent shadow-plane surveillance operation in existence. Voidpeak's information on physical-world events is simultaneously more current and more broadly scoped than any mundane intelligence network. Purchasing access to a Voidpeak observation session requires years of negotiation.",sigil:"⛰️",clanHonor:92},{id:"ShadowClan40",name:"Eclipsecrown",element:"Shadow",description:"Eclipsecrown is the shadow clans' ceremonial ruling council, convened only during actual solar eclipses when the barrier between worlds is at its annual minimum. Their council holds authority to establish or dissolve shadow-clan coalitions, declare void-wars, and adjudicate disputes too large for lesser institutions. The eclipse-timing of their meetings ensures that no council can be called without the event that all shadow-clan members recognize as legitimate. Eclipsecrown decisions are binding for the full year until the next eclipse, whether or not conditions have changed.",sigil:"🌑",clanHonor:95}],pg=[{id:"TimeClan01",name:"Epoc
