t metaphysicists attribute to the pyric essence interacting with the observer's aura rather than any actual thermal emission. Fire-path mage orders treat EmberGlow individuals as natural leaders and high-potential practitioners, extending mentorship and resources that other students must earn through demonstrated performance. Opponents facing EmberGlow mages in combat frequently report losing their focus when those eyes ignite, as the human threat-response system interprets the glow as the prelude to a fire attack regardless of whether the mage is actually drawing on their power. Even allies standing beside an actively channelling EmberGlow mage must deliberately suppress the urge to step back, a reflex that has cost more than one coordinated assault its critical timing."},{id:"TidalShimmer",name:"Tidal Shimmer",element:"Water",color:"#00B4D8",descriptionParagraph1:"TidalShimmer eyes hold within them what Tidecaller theology describes as the First Drop — the essential spiritual residue of the ocean before it was given a name, encoded in the iris of those whose souls have passed through Maren's veil rather than the standard threshold of birth. The irises display a layered, translucent quality under bright light that makes them appear to contain depth beyond what anatomy allows, as though the eye itself is a window into open water. When a water-affinity mage with TidalShimmer eyes channels their element, the iris shifts through a rippling sequence of aquatic tones — turquoise at rest, deepening through teal and then into a resonant bioluminescent blue-green as power increases. At peak channelling the pupils contract to near-invisibility and the remaining eye surface refracts light exactly as a calm ocean surface does at the moment before a wave breaks.",descriptionParagraph2:"Observers who meet TidalShimmer eyes in calm social situations frequently describe feeling momentarily calmed and open, as though they were sitting beside water rather than speaking to another person — a sensation that makes TidalShimmer individuals natural counsellors, confessors, and negotiators. Tidecaller priesthood members respond to TidalShimmer eyes with immediate theological deference, treating their bearer as carrying a form of living proof of Maren's lineage regardless of any other credential or claim. In combat encounters, opponents who meet a TidalShimmer mage's gaze in the moment of channelling sometimes freeze for a critical fraction of a second — not from magical compulsion, scholars clarify, but from the same cognitive short-circuit that a person experiences when unexpectedly confronted with the open sea from a great height. Frostbound Order missionaries who have encountered TidalShimmer eyes in southern territories report a distinctive theological discomfort, feeling that the eyes represent a spiritual wetness that their solar-ice tradition has no framework to adequately categorise or respect."},{id:"StoneGaze",name:"Stone Gaze",element:"Earth",color:"#8B7355",descriptionParagraph1:"StoneGaze irises are the ocular manifestation of the Earth Compact, the spiritual agreement that Aetherian creation mythology describes as the first covenant between humanity and the geological world — a promise that those who served the land would carry the land's own colour within them. The warm brown-tan tone is significantly denser and more opaque than typical eye colouration, giving StoneGaze eyes an impression of physical solidity that observers sometimes describe as looking at polished stone rather than organic tissue. When earth-affinity mages channel through StoneGaze eyes the irises develop a visible grain pattern identical to the striation found in compressed sandstone, and a faint ochre luminescence rises from the depths of the pupil like light filtering through sedimentary layers. At the moment of peak earthwork — lifting stone, commanding terrain — the eyes become completely uniform in tone, with no distinction between iris and pupil, appearing as smooth discs of mineral matter that see rather than eyes that understand.",descriptionParagraph2:"Rural farming communities throughout Aetheria respond to StoneGaze eyes with an immediate, uncalculated trust — the eyes look like the land, and people who work the land their whole lives are conditioned at an almost instinctual level to equate that colour with reliability and permanence. Stonework Guild masters treat StoneGaze engineers and architects with a professional respect that slightly exceeds what their credentials alone would justify, the colour serving as an unofficial endorsement of affinity with the materials the Guild manipulates. Opponents in combat find StoneGaze eyes extremely difficult to read for intent — the lack of pupillary expressiveness in an earth-mage's gaze eliminates many of the micro-signals that trained fighters use to predict strike timing, creating a meaningful tactical advantage for the StoneGaze bearer. Diplomatic representatives who have negotiated with StoneGaze individuals report a consistent experience of feeling that any agreement reached was somehow more binding than paper warranted, an impression that historians of the Solar Compact attributed to the unconscious ancestral association between those eyes and the permanence of geological time."},{id:"BreezeFlicker",name:"Breeze Flicker",element:"Air",color:"#E0F2FE",descriptionParagraph1:"BreezeFlicker irises carry the near-colourlessness of the upper atmosphere, the spiritual domain of the Aerathi Windborn who are described in plateau mythology as beings of breath and moving air who chose to inhabit flesh without ever fully surrendering their elemental nature. The irises are so pale that in direct daylight they appear almost white, with the colour most visible as a blue-tinged shimmer at the iris edge that shifts slightly as the surrounding light changes, mimicking the way clear sky at the horizon is subtly different from the sky directly overhead. When air-affinity mages with BreezeFlicker eyes channel their element, the irises seem to become momentarily transparent, showing what observers describe as movement behind them as though the eye were a window through which wind was visibly passing. At peak channelling a faint luminescence appears not within the eye itself but as a corona around it, a ghostly illumination that moves against the surrounding shadows rather than with them.",descriptionParagraph2:"Observers meeting BreezeFlicker eyes for the first time almost always feel the urge to take a deep breath, a physiological response to the suggestion of open sky that is reflexive enough to have been formally documented by a scholar of the Meridian Sages who studied air-mage social dynamics across three decades. The Conclave of Winds treats BreezeFlicker individuals as inheritors of the Aerathi tradition regardless of their actual lineage, granting them novice status in air-affinity study and access to plateau wind-maps that are otherwise restricted to verified Aerathi descendants. Opponents find BreezeFlicker eyes profoundly disorienting during combat because the near-colourless irises make it extremely difficult to determine where exactly the mage is looking, denying the standard fighter's habit of reading gaze direction to anticipate movement. Ground-bound soldiers with no air-affinity experience consistently rate BreezeFlicker mages as among the most psychologically unnerving opponents they have faced, not for any specific offensive power but for the uncanny wrongness of eyes that look like holes in a human face revealing sky."},{id:"ArcPulse",name:"Arc Pulse",element:"Lightning",color:"#FACC15",descriptionParagraph1:"ArcPulse irises are the most visually dramatic of all elemental eye tints at rest, displaying a vivid yellow that seems to be lit from behind by a light source that cannot be accounted for by reflected ambient illumination. Tempest Weaver records describe this effect as the Stormlight residue — the constant, low-level discharge of lightning-affinity energy that lightning-path mages cannot fully contain within their nervous system, which leaks perpetually through the highest-conductance surface of the body, the eye. When a lightning-affinity mage with ArcPulse eyes channels their element, the irises begin visibly flickering at irregular intervals, like an electrical arc searching for a path to ground, with the flicker rate increasing as more power is drawn until at peak the entire eye surface pulses rapidly between deep yellow and near-white in a rhythm that has been measured as corresponding to the frequency of the lightning being channelled. Even dormant and unpowered, ArcPulse eyes occasionally produce a single intense flash in response to nearby electrical activity — a storm on the horizon, an iron weapon drawn nearby, the discharge of a rival mage — that the wearer cannot control and may not even notice.",descriptionParagraph2:"Bystanders who see an ArcPulse flash in a social setting frequently flinch away from the wearer before conscious thought intervenes, a hardwired avoidance response to the suggestion of lightning strike that is essentially impossible to fully suppress through cultural conditioning. Lightning-path mage orders treat ArcPulse individuals as their highest-tier recruitment priority, allocating the most experienced instructors and the most demanding training programmes because the eyes signal an affinity depth that, properly developed, represents rare strategic value. In combat the flickering glow is a liability and an asset simultaneously — opponents track the flicker rate to estimate when a lightning attack is imminent and adjust accordingly, while allies have learned to use it as a real-time readout of the mage's power level to coordinate spell timing. Military commanders have recorded instances where the sustained flickering of a visible ArcPulse mage's eyes during a siege was sufficient to prevent a counter-assault, with enemy troops simply unwilling to move toward someone whose face was visibly accumulating power."},{id:"FrostLens",name:"Frost Lens",element:"Ice",color:"#93C5FD",descriptionParagraph1:"FrostLens irises are described in the Frostbound Orders' devotional texts as the eyes of those in whom the Glacial Ancestors left not just their mark in pigmentation but the actual ocular structure of the ice-plane, where perception operates through crystalline lattices rather than organic tissue. The pale blue colouration has a faint crystalline quality in strong light — not a shimmer but a structured refraction, as though the iris surface were faceted at the microscopic level like a snowflake rather than smooth like normal eye tissue. When an ice-affinity mage with FrostLens eyes channels their element, the irises develop visible frost patterns at the edges that grow inward as power increases, and in extreme cold-climate channelling the breath of observers near the mage fogs even in warm conditions as the eyes draw thermal energy from their immediate environment. At peak glacial working, the irises become completely opaque — a solid, bright ice-blue disc that reflects its surroundings with mirror-like fidelity rather than the soft absorbent quality of a seeing eye.",descriptionParagraph2:"The Frostbound Orders treat FrostLens individuals with a reverence that borders on the liturgically formal, believing that the structural quality of the iris indicates that the Glacial Ancestors themselves are looking through those eyes at certain moments, and that anything said in front of them is therefore heard by powers far older than the Aetherian age. Northern Highland clans who have coexisted with Frostbound communities for centuries extend a reflexive caution to FrostLens wearers in negotiations, knowing from generational experience that those eyes miss nothing and forget less. Opponents in combat find FrostLens eyes actively psychologically damaging during sustained engagement — the mirror-quality of the fully channelled iris confronts them with a reflection of themselves in a moment when self-examination is the last thing a fighter needs, and more than one duel has been won because an opponent glanced at their own expression of fear looking back at them. In social situations where trust is being built, FrostLens eyes create a paradox: their unblinking, crystalline quality communicates absolute reliability and clarity of purpose while simultaneously preventing the warm micro-expression exchange that normally seals emotional bonds."},{id:"ForgedIris",name:"Forged Iris",element:"Metal",color:"#9CA3AF",descriptionParagraph1:"ForgedIris eyes carry the grey-silver tone of raw worked metal, the colour that metal-affinity tradition associates with the divine smith Kralos who is said to have beaten the first ore into shape using the heat of a captured star and whose fingerprints became the first human smiths. The grey colouration is distinctive for its flatness — ForgedIris eyes seem to absorb light rather than reflect it, giving the face a quality of focused, undecorated purpose that observers often describe as the expression of a well-made tool. When metal-affinity mages with ForgedIris eyes channel their element, the irises take on a polished sheen that moves across the surface as the wearer's gaze shifts, like the moving glint of light on a turning blade, while at peak metal-working the eyes develop a bright mercurial silver that functions as an accurate ambient compass, pointing at nearby ferrous material. In the presence of significant quantities of iron or steel, fully powered ForgedIris eyes occasionally emit a low magnetic hum that is felt rather than heard — a physical vibration that observers describe as feeling in their fillings, in the clasps of their armour, and in the pommels of their swords.",descriptionParagraph2:"The Stonework Guild maintains a separate fast-track guild-entry pathway for ForgedIris individuals that predates most of the Guild's formal scholarship programmes, recognising that those eyes have historically been the marker of the most naturally gifted metalworkers and engineers in their membership rolls. Military armoury commanders give ForgedIris artificers and weaponsmiths priority access to high-grade ore and commission slots, aware that the correlation between those eyes and exceptional output quality is statistically significant enough to be treated as a reliable predictor. In combat, opponents find that ForgedIris eyes give nothing away emotionally — the flat, absorptive quality of the grey allows no pupillary reading and projects a blankness that less experienced fighters interpret as sociopathic coldness, breaking their focus through the suggestion that they are facing someone for whom violence carries no emotional weight. Social encounters with ForgedIris individuals often leave the other party with the distinct impression that they have been assessed with extraordinary precision and that any weakness they carry has been identified, filed away, and will be available for retrieval at the ForgedIris bearer's discretion."},{id:"MossVision",name:"Moss Vision",element:"Wood",color:"#4B7C59",descriptionParagraph1:"MossVision irises carry the green of forest understory, the specific tone of light that has passed through multiple layers of canopy and been stripped of its directional quality, becoming the diffuse, sourceless illumination of deep woodland that makes every object appear to be generating its own gentle light. Wood-affinity tradition holds that MossVision eyes are the gift of the Root, the vast interconnected fungal and root network believed to underlie all of Aetheria's forests and to constitute a distributed intelligence that has been listening to surface events for geological ages. When wood-affinity mages with MossVision eyes channel their element, the green deepens from forest tone to a rich, phosphorescent emerald, and observers nearby sometimes perceive the faint scent of fresh growth — new leaves, rain-damp soil, broken stem — regardless of the actual environment. At peak channelling the pupils of MossVision eyes expand until they fill the iris entirely, turning the eyes to solid deep green that, witnesses report, appears to be looking at something other than the physical world immediately present.",descriptionParagraph2:`Deepwood communities and Thornwood ferals who meet MossVision eyes feel an immediate, wordless recognition — the same instinct that recognises a sound from childhood in an unfamiliar place — and this response consistently overrides normal suspicion of strangers, making MossVision individuals uniquely effective at establishing trust in communities that otherwise reject outsiders. Wood-path mage academies treat MossVision applicants with uncharacteristic sentimentality, referring to the eyes in institutional correspondence as "forest-returned" — a phrase implying that these individuals' souls have already spent significant time within the Root's embrace and are simply finding their way back. Opponents who meet MossVision eyes in full channelling during combat report a sensation of the environment becoming hostile around them — a creeping peripheral impression of vegetation moving, roots rising, bark hardening against them — even in settings where no plant life is present, as though the eyes were broadcasting the memory of a forest that the mage carries inside them. Urban residents who encounter MossVision eyes in city settings experience them as out-of-place in a way they find difficult to articulate, the green belonging so completely to the non-human world that its presence in a human face in a stone-built street produces a low-level cognitive dissonance that manifests as unexplained unease.`},{id:"VoidPeep",name:"Void Peep",element:"Shadow",color:"#7C3AED",descriptionParagraph1:"VoidPeep irises are the colour of the dimensional membrane itself — the purple-indigo tone that Aetherian cosmologists describe as the light emitted when matter from the primary plane is in contact with the nothing that exists at the margins of all realities. Shadow Communion theology describes VoidPeep eyes as windows that open in both directions: those with them see more of the shadow-realm than those without, but the shadow-realm can also see through them into the living world, a bidirectional permeability that the Communion considers both a gift and a grave responsibility. When shadow-affinity mages with VoidPeep eyes channel their element, the purple deepens until it approaches true black at the iris edge while brightening to a violent violet at the pupil, creating an inward radiance that seems to violate normal optics by appearing brightest at the point that should be darkest. In the deepest shadow-working the eyes become briefly indistinguishable from the shadows themselves — not dark but absent, holes in the face through which the room beyond can almost be seen, before the irises reconstitute themselves with a violet flash that observers find deeply difficult to look away from.",descriptionParagraph2:"Shadow Communion members respond to VoidPeep eyes with a form of reverence that their theologians carefully distinguish from worship — these eyes are considered to carry something of the departed dead within them at all times, not as haunting but as companionship, and Communion members feel that speaking to a VoidPeep individual is in some partial sense speaking to those they have lost. Common people across Aetheria respond to VoidPeep eyes with a superstitious avoidance that ranges from polite social distance to openly stated refusal to meet the gaze — the purple has accumulated enough cultural association with death, void, and dimensional danger that the response is conditioned across multiple generations of folklore. In combat, opponents who meet VoidPeep eyes in the moment of channelling sometimes freeze in complete physical paralysis for one to three seconds — a response that medical scholars attribute not to any active magical compulsion but to the brain's threat-assessment system encountering something so outside normal categorisation that it temporarily defaults to total stillness. Diplomatic records of multi-faction summits note that Shadow Communion representatives with VoidPeep eyes consistently cause the most disruption to seating arrangements, as delegates from solar-worship, fire-path, and ice-path traditions all independently request placement that does not require them to face those eyes during extended negotiation sessions."},{id:"TimeSight",name:"Time Sight",element:"Time",color:"#D4A4EB",descriptionParagraph1:"TimeSight irises are the most theologically contested eye tint in Aetheria, because the lavender-rose tone they display does not correspond to any known material, element, or dimensional membrane — it is the colour of light that has been in transit for so long that it has aged, the oldest photons in the universe finally arriving after journeys measured in geological rather than astronomical time. Time-path mage scholarship holds that TimeSight eyes are literally seeing a slightly different moment than the one the body occupies — not precognition, but a perpetual one-to-three-second temporal displacement that makes the wearer's perception of the present moment technically the near-future, a displacement small enough to be invisible in daily life but significant enough to provide a constant, reflexive awareness of events before they fully manifest. When time-affinity mages with TimeSight eyes channel their element, the irises display a slow rotation — not the pupil but the iris itself, like a clock face — that accelerates as more temporal energy is drawn, until at peak channelling the iris is spinning rapidly enough to appear as a solid wheel of light. Observers of deep time-working have reported seeing brief afterimages in the iris — fragmentary images of the near past or near future that appear and dissolve too rapidly to be read consciously but leave an impression of having briefly seen something they weren't meant to see.",descriptionParagraph2:"Every time-path mage institution in Aetheria maintains a priority registration list for TimeSight individuals that supersedes all normal intake processes, because the ocular evidence of temporal displacement suggests these individuals' connection to the Time element has already become physiological rather than merely magical — a developmental stage that normally takes decades of intensive training to achieve. Common people who interact extensively with TimeSight individuals consistently report a peculiar social discomfort they struggle to name — a feeling that the person they are speaking with has already heard what they are about to say, a sense of being slightly anticipated that is deeply unsettling even when the TimeSight bearer is doing nothing unusual. Opponents facing TimeSight mages in combat rapidly learn that attacking based on visible movement cues does not work, since the mage's response consistently arrives at the moment before the physical attack reaches them — an advantage that experienced fighters describe as fighting someone who is half a breath ahead of reality in everything they do. Dimensional scholars who have studied TimeSight eyes under controlled conditions report that the irises appear to be the same age regardless of how old the individual is — showing neither the milky degradation of ageing eyes nor the pristine sharpness of youth, but a permanent, unchanging lavender that seems to exist outside the normal biological timeline altogether."}],Sl=[{id:"ce_fire_001",name:"The Solar Coronation",effect:"Fire bending deals +15% damage and ignition effects last 2 extra turns.",element:"Fire",isActive:!1},{id:"ce_fire_002",name:"The Red Eclipsis",effect:"All Fire benders gain +10% critical strike chance for the duration.",element:"Fire",isActive:!1},{id:"ce_fire_003",name:"Sundering Flare",effect:"Fire attacks bypass 20% of the target's elemental resistance.",element:"Fire",isActive:!0},{id:"ce_fire_004",name:"The Eternal Pyre",effect:"Passive fire auras deal double tick damage to all nearby enemies.",element:"Fire",isActive:!1},{id:"ce_fire_005",name:"Crimson Zenith",effect:"Fire benders regenerate 5% of their maximum health when they land a killing blow with fire.",element:"Fire",isActive:!1},{id:"ce_fire_006",name:"The Smoldering Hour",effect:"All fire-based crafting recipes yield one additional output item.",element:"Fire",isActive:!1},{id:"ce_fire_007",name:"Ashen Crown Rising",effect:"Fire benders gain +8% movement speed while any fire effect is active on the battlefield.",element:"Fire",isActive:!0},{id:"ce_fire_008",name:"The Magma Tide",effect:"Ground-based fire attacks spread to adjacent tiles automatically.",element:"Fire",isActive:!1},{id:"ce_fire_009",name:"Helio's Wrath",effect:"Fire damage dealt outdoors is increased by 25% during daylight hours.",element:"Fire",isActive:!1},{id:"ce_fire_010",name:"The Phoenix Convergence",effect:"Fire benders have a 10% chance to be revived with 30% health upon death once per battle.",element:"Fire",isActive:!0},{id:"ce_water_001",name:"Twin Moon Convergence",effect:"Water bending healing spells restore an additional 20% health.",element:"Water",isActive:!1},{id:"ce_water_002",name:"The Lunar Overflow",effect:"Water attacks have a 15% chance to apply the Drenched status, reducing enemy fire resistance by 30%.",element:"Water",isActive:!0},{id:"ce_water_003",name:"The Tidal Ascension",effect:"Water benders can manipulate water sources up to 50% larger than normal.",element:"Water",isActive:!1},{id:"ce_water_004",name:"Pearl Tide Rising",effect:"Ice and Water benders share a 10% passive damage reduction during this event.",element:"Water",isActive:!1},{id:"ce_water_005",name:"The Deep Resonance",effect:"Underwater combat grants Water benders +30% damage and unlimited breath.",element:"Water",isActive:!1},{id:"ce_water_006",name:"Silver Wake Alignment",effect:"Water projectile spells travel 40% faster and pierce through one enemy.",element:"Water",isActive:!1},{id:"ce_water_007",name:"The Abyssal Mirror",effect:"Water benders can create one perfect water clone that mimics their last used skill.",element:"Water",isActive:!0},{id:"ce_water_008",name:"Moonblood Tide",effect:"Blood-bending techniques cost 50% less stamina and affect larger targets.",element:"Water",isActive:!1},{id:"ce_water_009",name:"The Seafarer's Omen",effect:"Navigation and sea travel speed is doubled, and storms deal no damage to the party.",element:"Water",isActive:!1},{id:"ce_water_010",name:"Celestial Undertow",effect:"Water AoE abilities pull all affected enemies 3 tiles toward the center of impact.",element:"Water",isActive:!1},{id:"ce_earth_001",name:"The Stone Eternal",effect:"Earth benders gain +20% maximum HP and all stone armor bonuses are doubled.",element:"Earth",isActive:!1},{id:"ce_earth_002",name:"Granite Ascension",effect:"Earth walls and barriers have triple durability and block projectiles completely.",element:"Earth",isActive:!1},{id:"ce_earth_003",name:"The Verdant Tremor",effect:"Earth bending attacks cause a minor 2-turn stun on enemies who fail a Fortitude check.",element:"Earth",isActive:!0},{id:"ce_earth_004",name:"Iron Root Conjunction",effect:"Earth benders cannot be knocked back or displaced by any force during this event.",element:"Earth",isActive:!1},{id:"ce_earth_005",name:"The Bedrock Hour",effect:"Seismic attacks deal +25% damage and create permanent terrain changes on the battlefield.",element:"Earth",isActive:!1},{id:"ce_earth_006",name:"Loam Tide Cresting",effect:"Earth benders may instantly reshape any natural terrain within 30 meters without a skill check.",element:"Earth",isActive:!1},{id:"ce_earth_007",name:"The Obsidian Transit",effect:"Metal and Earth abilities can be freely combined, sharing the highest-level mastery bonus.",element:"Earth",isActive:!1},{id:"ce_earth_008",name:"Shale Zenith",effect:"Mining and excavation yields are tripled and rare ore has a 15% chance to spawn.",element:"Earth",isActive:!0},{id:"ce_earth_009",name:"The Tectonic Omen",effect:"Ground-slam attacks generate shockwaves that travel twice the normal distance.",element:"Earth",isActive:!1},{id:"ce_earth_010",name:"The Primal Burial",effect:"Earth benders can entomb enemies, immobilizing them for 3 turns and dealing damage over time.",element:"Earth",isActive:!1},{id:"ce_air_001",name:"Storm Crown Rising",effect:"Air benders gain +25% movement speed and evasion rises by 15%.",element:"Air",isActive:!0},{id:"ce_air_002",name:"The Gale Concordance",effect:"Wind-based projectiles travel at double speed and cannot be deflected.",element:"Air",isActive:!1},{id:"ce_air_003",name:"The Zephyr Coronation",effect:"Air benders may glide indefinitely without stamina cost for the event duration.",element:"Air",isActive:!1},{id:"ce_air_004",name:"Whispering Void Alignment",effect:"Silence and disorientation effects applied by Air benders last 2 additional turns.",element:"Air",isActive:!1},{id:"ce_air_005",name:"The Tempest Hour",effect:"All AoE wind attacks expand their radius by 50% and push enemies to the edge of the effect.",element:"Air",isActive:!1},{id:"ce_air_006",name:"Sirocco's Passage",effect:"Air benders gain immunity to airborne toxins and reduced fall damage by 90%.",element:"Air",isActive:!1},{id:"ce_air_007",name:"The Auroral Jet",effect:"Aerial attacks gain +20% damage, and any Air skill used while airborne costs no stamina.",element:"Air",isActive:!0},{id:"ce_air_008",name:"Cyclone Zenith",effect:"Air benders may summon a sustained cyclone that persists for 5 turns without concentration.",element:"Air",isActive:!1},{id:"ce_air_009",name:"The Breath of Eternity",effect:"Meditation and breath-based abilities restore stamina 100% faster.",element:"Air",isActive:!1},{id:"ce_air_010",name:"The Cloudbreaker Rite",effect:"Air benders can dispel any weather condition and impose their own for 10 turns.",element:"Air",isActive:!1},{id:"ce_lightning_001",name:"The Fractal Storm",effect:"Lightning attacks chain to one additional nearby enemy for 50% of the original damage.",element:"Lightning",isActive:!1},{id:"ce_lightning_002",name:"Thunderhead Ascension",effect:"Lightning benders gain +20% attack speed and skills cast 1 turn faster.",element:"Lightning",isActive:!0},{id:"ce_lightning_003",name:"The Static Coronation",effect:"Enemies hit by Lightning have a 20% chance to drop their held item from electrical shock.",element:"Lightning",isActive:!1},{id:"ce_lightning_004",name:"Volt Tide Convergence",effect:"Lightning damage is increased by 30% against metallic armor and wet enemies.",element:"Lightning",isActive:!1},{id:"ce_lightning_005",name:"The Ionized Hour",effect:"Lightning benders passively stun nearby enemies for 1 turn when struck in melee.",element:"Lightning",isActive:!1},{id:"ce_lightning_006",name:"Spark Zenith",effect:"All Lightning skills cost 25% less chi and generate no self-discharge backlash.",element:"Lightning",isActive:!1},{id:"ce_lightning_007",name:"The Overcharged Omen",effect:"Lightning benders can store excess chi as a charge stack, releasing it as bonus damage.",element:"Lightning",isActive:!0},{id:"ce_lightning_008",name:"The Galvanic Rite",effect:"Redirecting an opponent's lightning attack deals 200% of the original damage.",element:"Lightning",isActive:!1},{id:"ce_lightning_009",name:"Leaping Arc Alignment",effect:"Lightning dash skills teleport the caster instantly instead of traveling through space.",element:"Lightning",isActive:!1},{id:"ce_lightning_010",name:"The Electrum Convergence",effect:"Lightning and Metal benders may fuse their attacks, dealing hybrid elemental damage.",element:"Lightning",isActive:!1},{id:"ce_ice_001",name:"The Pale Conjunction",effect:"Ice attacks apply Frozen status in one fewer hit than usual.",element:"Ice",isActive:!1},{id:"ce_ice_002",name:"Glacial Zenith",effect:"Ice walls and barriers grow to double size and last 3 additional turns.",element:"Ice",isActive:!0},{id:"ce_ice_003",name:"The Frost Coronation",effect:"Ice benders gain cold immunity and deal +15% damage to enemies suffering any cold effect.",element:"Ice",isActive:!1},{id:"ce_ice_004",name:"The Permafrost Hour",effect:"The ground within 20 meters of an Ice bender becomes ice terrain, slowing enemies by 30%.",element:"Ice",isActive:!1},{id:"ce_ice_005",name:"Aurora Veil Rising",effect:"Ice defensive abilities also reflect 25% of absorbed damage back at the attacker.",element:"Ice",isActive:!1},{id:"ce_ice_006",name:"The Shattered Mirror",effect:"Shattering a frozen enemy creates explosive ice shards dealing AoE damage equal to 30% of the freeze hit.",element:"Ice",isActive:!1},{id:"ce_ice_007",name:"Blizzard Tide Alignment",effect:"Ice benders may summon blizzard conditions without requiring an open sky or weather check.",element:"Ice",isActive:!0},{id:"ce_ice_008",name:"The Null Meridian",effect:"Enemies Frozen by Ice benders cannot benefit from any buff or healing for the freeze duration.",element:"Ice",isActive:!1},{id:"ce_ice_009",name:"Crystal Solstice",effect:"Ice crafted items during this event have a permanent +10% quality bonus.",element:"Ice",isActive:!1},{id:"ce_ice_010",name:"The Endless Winter Omen",effect:"Ice benders' stamina does not drain while standing still on ice terrain.",element:"Ice",isActive:!1},{id:"ce_metal_001",name:"The Iron Zenith",effect:"Metal armor passively reflects 10% of physical damage back to attackers.",element:"Metal",isActive:!1},{id:"ce_metal_002",name:"Forge Star Ascending",effect:"All Metal bending projectiles gain +20% armor penetration.",element:"Metal",isActive:!0},{id:"ce_metal_003",name:"The Alloy Convergence",effect:"Metal benders can purify ore directly in the field without a forge.",element:"Metal",isActive:!1},{id:"ce_metal_004",name:"The Tempered Hour",effect:"Weapons and armor crafted during this event gain a permanent +5 durability bonus.",element:"Metal",isActive:!1},{id:"ce_metal_005",name:"Shrapnel Crown Rising",effect:"Metal AoE attacks scatter shards that inflict Bleeding on all struck enemies.",element:"Metal",isActive:!1},{id:"ce_metal_006",name:"The Steel Coronation",effect:"Metal benders gain immunity to disarm and item-loss effects.",element:"Metal",isActive:!1},{id:"ce_metal_007",name:"Ore Tide Alignment",effect:"Metal benders sense all metallic objects within 50 meters without active concentration.",element:"Metal",isActive:!0},{id:"ce_metal_008",name:"The Liquid Iron Omen",effect:"Metal benders can freely reshape liquid metal, allowing them to repair or alter weapons mid-combat.",element:"Metal",isActive:!1},{id:"ce_metal_009",name:"The Anchored Meridian",effect:"Metal cable and chain attacks bind enemies for 2 extra turns before requiring renewal.",element:"Metal",isActive:!1},{id:"ce_metal_010",name:"The Lodestone Eclipse",effect:"Metal benders can magnetically attract or repel any armored enemy regardless of mass.",element:"Metal",isActive:!1},{id:"ce_wood_001",name:"The Verdant Equinox",effect:"Wood bending healing effects restore an additional 15% health per application.",element:"Wood",isActive:!1},{id:"ce_wood_002",name:"Blossom Tide Ascending",effect:"Plant growth abilities manifest in half the usual time and cover double the area.",element:"Wood",isActive:!0},{id:"ce_wood_003",name:"The Living Crown",effect:"Wood benders can animate trees as temporary combat allies with 50% of the bender's stats.",element:"Wood",isActive:!1},{id:"ce_wood_004",name:"Root Zenith Rising",effect:"Root and vine entangle abilities last 3 additional turns and cannot be burned away.",element:"Wood",isActive:!1},{id:"ce_wood_005",name:"The Spore Conjunction",effect:"Wood toxin and spore attacks apply their debuff 1 turn sooner than listed.",element:"Wood",isActive:!1},{id:"ce_wood_006",name:"The Canopy Omen",effect:"Wood benders gain +20% evasion while standing on natural ground or in forested terrain.",element:"Wood",isActive:!0},{id:"ce_wood_007",name:"Seedfire Alignment",effect:"Any destroyed wood terrain spontaneously regenerates after 2 turns during this event.",element:"Wood",isActive:!1},{id:"ce_wood_008",name:"The Heartwood Hour",effect:"Wood-element barriers absorb all poison and disease effects directed at allies inside them.",element:"Wood",isActive:!1},{id:"ce_wood_009",name:"The Amber Meridian",effect:"Herbal alchemy using Wood-element components produces double the quantity of potions.",element:"Wood",isActive:!1},{id:"ce_wood_010",name:"The Forest Coronation",effect:"Wood benders may call upon the forest itself, causing random vines and roots to attack enemies each turn.",element:"Wood",isActive:!1},{id:"ce_shadow_001",name:"The Null Eclipse",effect:"Shadow benders become untargetable by non-Shadow abilities for 2 turns after entering stealth.",element:"Shadow",isActive:!1},{id:"ce_shadow_002",name:"The Dark Meridian",effect:"Shadow attacks reduce the target's vision range by 50% for 3 turns.",element:"Shadow",isActive:!0},{id:"ce_shadow_003",name:"Void Tide Ascending",effect:"Shadow illusions persist for 5 additional turns before dissolving.",element:"Shadow",isActive:!1},{id:"ce_shadow_004",name:"The Shroud Coronation",effect:"Shadow benders deal +30% damage to enemies who have not yet acted in the current turn.",element:"Shadow",isActive:!1},{id:"ce_shadow_005",name:"The Obsidian Hour",effect:"All light sources within 20 meters of a Shadow bender are suppressed by 70%.",element:"Shadow",isActive:!1},{id:"ce_shadow_006",name:"Phantom Crown Rising",effect:"Shadow benders may create 2 shadow clones instead of 1, each dealing 40% real damage.",element:"Shadow",isActive:!1},{id:"ce_shadow_007",name:"The Tenebrous Omen",effect:"Enemies cursed by Shadow abilities have their positive buffs stolen and given to the bender.",element:"Shadow",isActive:!0},{id:"ce_shadow_008",name:"The Maw Alignment",effect:"Shadow portals can be opened silently and without casting glow, removing the usual detection check.",element:"Shadow",isActive:!1},{id:"ce_shadow_009",name:"The Waning Zenith",effect:"Shadow benders regenerate 5% chi per turn while standing in areas of total darkness.",element:"Shadow",isActive:!1},{id:"ce_shadow_010",name:"The Hollow Convergence",effect:"Shadow drain abilities siphon 20% of the target's current buffs as permanent stats for the bender.",element:"Shadow",isActive:!1},{id:"ce_time_001",name:"The Aetherian Solstice",effect:"Time benders may rewind one failed action per encounter without cost.",element:"Time",isActive:!1},{id:"ce_time_002",name:"The Eternal Recursion",effect:"Time slow effects reduce enemy speed by an additional 20% beyond their listed value.",element:"Time",isActive:!0},{id:"ce_time_003",name:"The Convergence of Ages",effect:"Time benders can briefly glimpse the next enemy turn order once per battle.",element:"Time",isActive:!1},{id:"ce_time_004",name:"Hourglass Zenith",effect:"Cooldown timers for Time benders are reduced by 1 turn across all abilities.",element:"Time",isActive:!1},{id:"ce_time_005",name:"The Fractured Epoch",effect:"Time benders may act twice in a single turn once per encounter.",element:"Time",isActive:!1},{id:"ce_time_006",name:"The Meridian Stasis",effect:"Time freeze abilities now affect an additional target within 5 meters of the primary target.",element:"Time",isActive:!1},{id:"ce_time_007",name:"The Pale Loop Ascending",effect:"Time benders can repeat their previous turn's action at 50% cost once per combat.",element:"Time",isActive:!0},{id:"ce_time_008",name:"The Temporal Coronation",effect:"Aging-based debuffs applied by Time benders reduce enemy stats by 10% more than listed.",element:"Time",isActive:!1},{id:"ce_time_009",name:"Chronos Crown Rising",effect:"Allies near a Time bender act before enemies in the initiative order during this event.",element:"Time",isActive:!1},{id:"ce_time_010",name:"The Unraveling Hour",effect:"Time benders can erase one enemy status buff per turn as a free action.",element:"Time",isActive:!1}],Oa=[{id:"sign_serpent",name:"The Coiling Serpent",season:"Late Winter",element:"Water",multipliers:{agility:1.15,perception:1.1,strength:.9},description:"Those born under the Coiling Serpent are fluid and perceptive, reading the currents of fate before others sense the tide turning. They prefer deception and patience over direct confrontation, striking only when the moment is perfectly aligned."},{id:"sign_phoenix",name:"The Risen Phoenix",season:"High Summer",element:"Fire",multipliers:{strength:1.2,charisma:1.1,endurance:.85},description:"The Phoenix-born carry an innate intensity that both attracts allies and intimidates foes, their will to endure hardship seemingly limitless. Their passions burn fiercely but can consume them if left unchecked."},{id:"sign_stoneheart",name:"The Stoneheart",season:"Autumn Equinox",element:"Earth",multipliers:{endurance:1.25,strength:1.1,agility:.8},description:"Individuals born beneath the Stoneheart are immovable in both body and conviction, known for outlasting every storm rather than avoiding it. They are the bedrock of any alliance, slow to anger but devastating when finally roused."},{id:"sign_wandering_wind",name:"The Wandering Wind",season:"Spring",element:"Air",multipliers:{agility:1.2,intelligence:1.1,strength:.85,endurance:.9},description:"Wind-born souls are restless travelers who absorb wisdom from every land they pass through, never content to stay in one place for long. Their intuition borders on precognition, and they often arrive exactly when and where they are needed most."},{id:"sign_stormcaller",name:"The Stormcaller",season:"Monsoon Season",element:"Lightning",multipliers:{intelligence:1.2,agility:1.1,endurance:.85},description:"Born amid rumbling skies, Stormcallers possess minds that race as fast as lightning, processing information and reacting to threats in a fraction of the time others require. Their erratic brilliance is as likely to solve an impossible problem as to create a new one."},{id:"sign_frozen_star",name:"The Frozen Star",season:"Deep Winter",element:"Ice",multipliers:{intelligence:1.15,perception:1.15,charisma:.9},description:"The Frozen Star blesses its children with crystalline clarity of thought and an almost unnerving calm in the face of chaos. They are analytical to a fault, sometimes appearing cold to those who mistake emotional restraint for indifference."},{id:"sign_iron_wolf",name:"The Iron Wolf",season:"Early Autumn",element:"Metal",multipliers:{strength:1.15,endurance:1.15,charisma:.9,agility:.95},description:"Iron Wolves are born hunters and warriors, possessing a relentless drive that keeps them moving forward through injury and exhaustion that would floor lesser fighters. They thrive in a pack and would lay down their life without hesitation for those who have earned their loyalty."},{id:"sign_ancient_grove",name:"The Ancient Grove",season:"Early Spring",element:"Wood",multipliers:{endurance:1.1,charisma:1.2,intelligence:1.05,strength:.85},description:"Children of the Ancient Grove possess a deep, intuitive connection to living things, often understanding the moods of animals and plants before any words are exchanged. Their natural warmth and slow-burning patience make them exceptional healers and leaders of communities."},{id:"sign_shadow_veil",name:"The Shadow Veil",season:"The Long Dark",element:"Shadow",multipliers:{agility:1.2,perception:1.2,strength:.85,charisma:.9},description:"Veiled ones walk between the seen and unseen worlds with an ease that unnerves even seasoned scholars of the arcane. They are drawn to secrets and hidden truths, often knowing things they have no logical means of knowing."},{id:"sign_tide_bearer",name:"The Tide Bearer",season:"Coastal Storm Season",element:"Water",multipliers:{charisma:1.2,endurance:1.1,agility:.9},description:"Tide Bearers carry the weight of others with grace, instinctively understanding the push and pull of social forces the way a sailor reads the sea. They are natural mediators whose presence can calm a tense room before a single word is spoken."},{id:"sign_celestial_forge",name:"The Celestial Forge",season:"The Forge Fires Festival",element:"Fire",multipliers:{intelligence:1.1,strength:1.1,perception:1.1,agility:.8},description:"Those born under the Celestial Forge possess a unique capacity to create, whether that means crafting legendary weapons or constructing intricate plans that account for a dozen contingencies. Their ambition is matched only by their attention to detail."},{id:"sign_empty_throne",name:"The Empty Throne",season:"The Interstitial Week",element:"Time",multipliers:{perception:1.3,intelligence:1.1,strength:.85,endurance:.85},description:"The rarest of signs, appearing only during the uncounted week between calendar cycles, the Empty Throne marks its children as witnesses to possibility rather than fixed fate. They perceive time as fluid, often experiencing déjà vu so vivid it borders on genuine foresight."}],wg=[{id:"ley_embervein",name:"The Embervein",region:"Ignar Dominion",element:"Fire",trainingBonus:20,description:"The Embervein pulses beneath the volcanic highlands of the Ignar Dominion like a river of liquid heat, periodically surging upward through natural vents called Breath Columns. Fire benders who train along its surface can feel their chi ignite in sympathy with the earth's own fury."},{id:"ley_moonthread",name:"The Moonthread",region:"Thalassian Archipelago",element:"Water",trainingBonus:18,description:"Winding beneath the tidal channels of the Thalassian Archipelago, the Moonthread leyline swells and recedes in perfect synchrony with the twin moons above. Water benders who meditate at its coastal emergence points report hearing the deep heartbeat of the ocean itself."},{id:"ley_rootspine",name:"The Rootspine",region:"Verdant Sovereignty",element:"Wood",trainingBonus:15,description:"The Rootspine is an ancient leyline so old that the great forest of the Verdant Sovereignty literally grew around it, with the eldest trees bending their roots toward its warmth. Benders who tap into its energy find their connection to living organisms becoming almost telepathic."},{id:"ley_stonemarrow",name:"The Stonemarrow",region:"Kharan Plateau",element:"Earth",trainingBonus:22,description:"The Stonemarrow runs through the deepest geological strata beneath the Kharan Plateau, a corridor of crystallized chi so dense that unshielded benders sometimes see visions of the world before humans walked it. Earth benders who train here gain an uncanny ability to read the history of stone through touch."},{id:"ley_arc_corridor",name:"The Arc Corridor",region:"Stormreach Reaches",element:"Lightning",trainingBonus:25,description:"During storm season the Arc Corridor becomes visible to the naked eye as a shimmering column of charged air stretching from the tallest peak of the Stormreach Reaches down to the valley floor. Lightning benders who dare to stand within it during a storm emerge with dramatically refined chi sensitivity."},{id:"ley_whiteflow",name:"The Whiteflow",region:"Glacian Expanse",element:"Ice",trainingBonus:17,description:"The Whiteflow is a leyline that has been frozen in place for millennia beneath the Glacian Expanse, its energy locked into the ice in crystalline patterns that glow faintly blue at night. Ice benders who train above it can draw on its stored energy to execute techniques that normally require open water."},{id:"ley_ironblood",name:"The Ironblood",region:"Kessari Forge Cities",element:"Metal",trainingBonus:20,description:"Flowing through a network of ancient ore deposits deep below the Kessari Forge Cities, the Ironblood leyline is saturated with metallic chi so refined that it has turned entire veins of rock to pure resonant ore. Metal benders working above this leyline find that their control over alloys and composite materials becomes effortless."},{id:"ley_shroudpath",name:"The Shroudpath",region:"The Nulllands",element:"Shadow",trainingBonus:14,description:"Unlike other leylines, the Shroudpath actively absorbs ambient light and sound as it courses through the borderlands known as the Nulllands, creating permanent pockets of supernatural darkness around its emergence points. Shadow benders who train here develop an ability to project their consciousness into the dark spaces between things."},{id:"ley_galestream",name:"The Galestream",region:"High Aerie Territories",element:"Air",trainingBonus:16,description:"The Galestream is the only known aerial leyline, flowing through the upper atmosphere above the High Aerie Territories in a constant ribbon of supercharged wind that never touches the ground. Air benders who ascend to its elevation describe a state of chi unity so complete that they briefly lose awareness of their physical body."},{id:"ley_stillpoint",name:"The Stillpoint",region:"The Unmapped Center",element:"Time",trainingBonus:5,description:"The Stillpoint is spoken of only in whispered academic debate, a theoretical nexus in the geographical center of Aetheria where time itself is believed to flow at an infinitesimally slower rate. The few who claim to have found and trained there speak of returning to find days or weeks having passed in the outside world."}],vg=[{id:"art_solarmantle",name:"The Solarmantle",element:"Fire",lastKnownLocation:"The Vault of Helio, Ignar Dominion (now buried under lava flow)",description:"A cloak woven from the shed scales of the mythic Sundrake, the Solarmantle renders its wearer immune to fire and allows them to project solar flame that cannot be extinguished by water or wind. At its full power, wielders have been recorded levitating by riding their own heat convection.",rumor:"A Kessari deep-miner claims to have seen a brilliant orange glow through the newest volcanic vent opened by last year's eruption."},{id:"art_tidecrown",name:"The Tidecrown",element:"Water",lastKnownLocation:"Sunken Temple of the First Tide, Thalassian Deep",description:"A diadem of living coral that grows and shifts based on the emotional state of its wearer, the Tidecrown grants mastery over ocean currents and the ability to breathe underwater indefinitely. Legends hold that its wearer can call a tidal wave from a landlocked lake simply by weeping into it.",rumor:"Fishermen report seeing a crown-shaped bioluminescent glow rising from the Deepmaw Trench each full moon."},{id:"art_rootscepter",name:"The Rootscepter",element:"Wood",lastKnownLocation:"The Hollow Throne, Ancient Verdant Sovereignty",description:"Cut from the heartwood of the First Tree before it fell in the Sundering War, the Rootscepter can cause any seed to germinate instantly and grow to maturity within seconds. Its wielder gains the loyalty of all plant life in sight, which will act to protect them without any bending effort required.",rumor:"Rangers in the deep Verdant have reported a new tree of impossible age appearing overnight at coordinates that match the old maps of the Hollow Throne."},{id:"art_the_unmoving_stone",name:"The Unmoving Stone",element:"Earth",lastKnownLocation:"Beneath the Kharan Colosseum, now sealed",description:"A smooth grey stone no larger than a fist, the Unmoving Stone cannot be lifted, moved, or affected by any force in the universe unless its chosen bearer places their hand upon it. In that bearer's hands, it becomes a weapon of terrifying power capable of reshaping entire mountain ranges.",rumor:"Construction workers excavating the new Kharan Senate building struck an impenetrable floor section that shattered every drill brought against it."},{id:"art_galvanic_gauntlet",name:"The Galvanic Gauntlet",element:"Lightning",lastKnownLocation:"The Spire of Storms, Stormreach Reaches",description:"A single iron gauntlet etched with thousands of micro-fine channels that conduct and amplify chi into devastating lightning, the Galvanic Gauntlet turns its wearer's body into a living storm battery. The last documented user accidentally discharged it and leveled a small fortress before losing consciousness for three days.",rumor:"A traveling scholar swears she purchased an unusual iron glove from a market stall in Stormreach only to have it vanish from her locked chest the following morning."},{id:"art_veil_of_null",name:"The Veil of Null",element:"Shadow",lastKnownLocation:"The Archive of Silence, Nulllands (structure collapsed)",description:"A mask carved from a material that absorbs all light that touches it, the Veil of Null renders its wearer invisible to all forms of detection including magical, mechanical, and spiritual senses. While worn, the wearer also exists outside normal time perception, meaning no one around them forms memories of their presence.",rumor:"The Grand Inquisitor of Kessari has privately commissioned a task force to locate an artifact that he believes allowed an assassin to walk past forty guards and a bonded ward-stone undetected."},{id:"art_glacial_heart",name:"The Glacial Heart",element:"Ice",lastKnownLocation:"The Eternal Winter Shrine, Glacian Expanse",description:"A perfectly translucent sphere of ice that has never melted in recorded history despite being held in bare hands, the Glacial Heart radiates cold so absolute that it freezes time itself in a small radius. Legends claim that looking into its depths shows the beholder a version of the world where everything they feared most already happened.",rumor:"An Ignar merchant claims he lost three fingers to frostbite after merely being in the same room as a sphere a stranger briefly showed him."},{id:"art_resonant_chain",name:"The Resonant Chain",element:"Metal",lastKnownLocation:"The Trophy Hall of the Forge-King, Kessari (looted during the Succession War)",description:"Forged from ore pulled directly from the Ironblood leyline's deepest node, the Resonant Chain is a length of linked metal that can extend or retract at will and bend around any obstacle to reach its target. When it makes contact with a metal bender, it temporarily merges their chi with the wearer's, allowing two-person techniques to be executed by a single bender.",rumor:"A pawnbroker in the capital has a chain in her back room that no one can pick up — but the owner insists it walked itself onto her counter one morning."},{id:"art_windborn_compass",name:"The Windborn Compass",element:"Air",lastKnownLocation:"The High Aerie Observatory, now abandoned",description:"A compass whose needle always points toward wherever the bearer most needs to be rather than magnetic north, the Windborn Compass also grants its carrier perfect knowledge of wind direction, speed, and weather patterns within a 100-kilometer radius. It is said the compass was carved by the first Air Sage and contains a fragment of her final breath.",rumor:"A cartographer in the High Aerie Territories has received three separate letters this season from different explorers all claiming to have found an ancient observatory containing a single glowing compass."},{id:"art_hourglass_of_the_first_age",name:"The Hourglass of the First Age",element:"Time",lastKnownLocation:"Unknown — last seen during the Conclave of Meridians, 300 years ago",description:"An hourglass containing sand that falls upward and downward simultaneously, the Hourglass of the First Age allows its wielder to experience any past moment as a fully embodied observer invisible to those in that time. At full power, scholars believe it can impose its bearer's will on what has already occurred — a power so dangerous that three separate councils have agreed it must never be found.",rumor:"The Empty Throne Astrologers' Society has noted an anomaly in their temporal charts suggesting the Hourglass is active somewhere in the world for the first time in a century."}],bg={Spring:{name:"The Awakening",months:["Seedmonth","Bloommonth","Greenmonth"],element:"Wood",effect:"Wood and Water bending training yields +10% experience; all healing potions restore an additional 10% health; plant-based terrain grows back after being destroyed within 24 hours."},Summer:{name:"The Blazing Reach",months:["Hearthmonth","Firemonth","Highsunmonth"],element:"Fire",effect:"Fire bending deals +10% damage outdoors; endurance checks in hot climates are made at disadvantage for non-Fire benders; daylight hours are extended by 3 hours, reducing the window for Shadow abilities."},Autumn:{name:"The Harvest Dusk",months:["Ambermonth","Ashmonth","Fademonth"],element:"Earth",effect:"Earth and Metal crafting costs are reduced by 15%; foraging yields are tripled; Shadow abilities gain +5% potency as nights lengthen and the boundary between seen and unseen worlds grows thin."},Winter:{name:"The Long Dark",months:["Frostmonth","Deepwintermonth","Stillmonth"],element:"Ice",effect:"Ice bending training yields +15% experience; movement across snow and ice terrain costs no additional stamina for Ice benders; Time abilities gain +5% effectiveness as the world slows and chi becomes more still."}},Cl=[{id:"proph_001",title:"The Ember Throne Foretelling",text:`When fire crowns the seventh peak and ash becomes the morning dew,
A sovereign born of broken chains shall claim what none before them knew,
And all the old fires shall answer — not to conquer, but to renew.`,unlockCondition:"Complete the Ignar Dominion main questline"},{id:"proph_002",title:"The Drowned Voice",text:`The tide shall speak in three descending notes beneath the hollow moon,
A bender who has lost the sea shall find it changed when they return in June,
Two crowns shall sink — and one shall rise to carry what the depths commune.`,unlockCondition:"Discover the Sunken Temple of the First Tide"},{id:"proph_003",title:"The Rootspeaker's Warning",text:`Do not burn the eldest bark, for memory lives within its grain,
The grove that falls in one man's pride takes seven generations to regain,
And when the last First Tree is gone, no bender calls the wood again.`,unlockCondition:"Speak with the Elder of the Ancient Grove at least three times"},{id:"proph_004",title:"The Shaking Word",text:`A tremor born of grief, not force, shall split the Kharan stone,
The one who bends what cannot bend shall stand the field alone,
The mountain's answer comes in full when all other powers have flown.`,unlockCondition:"Reach Master rank in Earth bending"},{id:"proph_005",title:"The Spark Before the Storm",text:`Count the seconds between the flash and the sound and you shall know the distance of fate,
The lightning-born who hesitates shall find their moment arrived too late,
And the sky writes no second draft — it simply opens, and creates.`,unlockCondition:"Successfully redirect an enemy's lightning attack in combat"},{id:"proph_006",title:"The Glass Sky Verse",text:`When the high places are emptied of wind and the eagles refuse to fly,
Look not above for the answer but inward, beneath your own sky,
Breath is the first bending and breath is the last — and between them we live and we die.`,unlockCondition:"Meditate at the top of the Stormreach Spire"},{id:"proph_007",title:"The Hammer That Remembers",text:`Every blade forged in anger holds a sliver of its maker's rage,
The metal recalls each strike and the hand and the heat of the age,
To unmake the weapon of war, unmake first the war that wrote the page.`,unlockCondition:"Forge a legendary-tier weapon at the Kessari Grand Forge"},{id:"proph_008",title:"The Veilspeaker's Riddle",text:`The shadow you cast at noon is the truest portrait of your form,
For darkness does not lie about the shape of what creates the storm,
Know your silhouette before you ask the light what you should be called.`,unlockCondition:"Enter and exit the Nulllands without detection"},{id:"proph_009",title:"The Cold Arithmetic",text:`All things that burn leave a record in the cold of what they were,
The frozen lake remembers the body, the glacier the warrior,
Ask the ice a question honestly and it will not deter.`,unlockCondition:"Spend one full in-game week in the Glacian Expanse"},{id:"proph_010",title:"The Unmeasured Verse",text:`There is a moment between one breath and the next that does not belong to time,
The bender who can live there fully has already crossed the meridian's line,
And what occurs in that still instant echoes forward through every age that follows in rhyme.`,unlockCondition:"Unlock the Empty Throne birth sign and reach level 50"}],ae={Fire:"#FF4500",Water:"#1E90FF",Earth:"#8B6914",Air:"#87CEEB",Lightning:"#FFD700",Ice:"#A8E4F0",Metal:"#708090",Wood:"#228B22",Shadow:"#4B0082",Time:"#9B59B6",Neutral:"#888888"},yr={Common:"#9CA3AF",Uncommon:"#34D399",Rare:"#60A5FA",Legendary:"#FBBF24"},Al=[{id:"Warrior",label:"Warrior",desc:"The Warrior diet is built entirely around peak physical output: dense protein from red meats, marrow broths, and iron-rich organ preparations consumed in disciplined intervals throughout the day. Practitioners rise before dawn to eat their heaviest meal, fueling the long training blocks that follow. The regime demands iron stomach discipline, as portions are calculated to the gram by clan nutritionists who have studied a century of battlefield physiology. Over seasons, adherents develop exceptional muscular density and accelerated wound recovery, though their bodies grow dependent on consistent caloric volume and suffer acutely during periods of siege or famine."},{id:"Monk",label:"Monk",desc:"The Monk diet traces its origins to the temple scholars of the Aetherian highlands, who discovered that emptying the body of excess appetite sharpens the mind to a fine, translucent edge. Meals are small, plant-based, and consumed in ritual silence twice daily — a grain porridge at dawn and a vegetable broth with dried herbs at dusk. The underlying philosophy holds that hunger is a teacher, not an enemy, and that the mild discomfort of restraint trains the will against far greater suffering. Adherents report heightened elemental sensitivity and meditative depth, though they tend toward physical fragility and are ill-suited to sustained heavy combat without supplemental nourishment."},{id:"Merchant",label:"Merchant",desc:"The Merchant diet is deliberately cosmopolitan — a rotating feast of spiced trade-goods, exotic preserved meats from distant regions, honeyed grain cakes, and aged spirits that doubles as a social performance of wealth and cultural literacy. The practitioner dines with guests as often as possible, treating every meal as a negotiation table where trust is built through shared pleasure. This lifestyle produces remarkable social fluency and a constitution accustomed to varied ingredients, though it demands constant coin and a tolerance for irregular meal timing across changing time zones. Long-term practitioners become expert conversationalists with encyclopedic knowledge of regional cuisines, which proves unexpectedly useful in navigating court politics."},{id:"Ascetic",label:"Ascetic",desc:"The Ascetic diet pushes deprivation to its theological extreme: one meal daily, composed only of water, raw root vegetables, and occasionally a fistful of uncooked grain, eaten in total solitude and silence. Practitioners believe that the body is a vessel that accumulates spiritual noise when overfed, and that prolonged dietary restraint allows elemental essence to flow without obstruction. The regime is physically punishing and not recommended outside of structured spiritual retreats, yet those who endure it for seasons report a dreamlike clarity of perception and a resistance to mental manipulation that border on preternatural. The Ascetic body becomes lean to the edge of gaunt, making the practitioner deceptively fast but deeply vulnerable to sustained physical attrition."},{id:"Noble",label:"Noble",desc:"The Noble diet is the art of conspicuous nourishment — multi-course banquets, aged vintages, truffle-dusted delicacies from the continent's wealthiest larders, and hand-crafted confections that take a master chef three days to prepare. Every meal is an event, every ingredient a statement of station, and every invited guest a carefully selected political investment. Practitioners develop an almost instinctual fluency with social hierarchies, reading power through the quality of what others serve and how they serve it. The cost in coin is enormous and the diet does nothing for battlefield endurance, but in courtly settings the Noble practitioner commands an almost gravitational social authority that opens doors no blade ever could."}],kg={Fire:"Fire bending is the art of channeling internal combustion — a discipline born from the volcanic heartlands where early Pyrethian shamans learned to mirror the mountain's rage. Practitioners draw on body heat and emotional intensity as fuel, making the element uniquely tied to willpower and passion rather than external sources. Fire flows fastest in aggression and worst in doubt, punishing hesitation with diminished output and rewarding fearlessness with exponential destructive bursts. Counter-elementally weak against Water's adaptive suppression, Fire benders compensate with overwhelming offensive pressure that leaves opponents no time to exploit this vulnerability.",Water:"Water bending is the most adaptive of the ten elemental disciplines, flowing around resistance rather than through it and turning an opponent's force back upon themselves with eerie efficiency. Practitioners attune to tidal rhythms and lunar cycles, drawing power from any moisture in the environment including the water content of living things when sufficiently advanced. The element rewards patience, observation, and emotional evenness — practitioners who act from anger or fear find their control dissolves along with their composure. Water is counter-elementally vulnerable to Earth's immovability, which can simply absorb its force without redirect, forcing Water benders to rely on creative flanking and environmental manipulation.",Earth:"Earth bending is the element of permanence — slow to initiate, nearly impossible to stop once in motion, and devastatingly effective against anything that lacks the lateral mobility to avoid its crushing geometric force. Practitioners develop an almost geological patience, training for years on basic stance-work before any shaping technique is introduced, because Earth rewards practitioners who have internalized stillness so thoroughly that they become extensions of the terrain itself. The element channels through physical contact with solid ground, making practitioners acutely vulnerable when airborne or at sea. Counter-elementally challenged by Air's refusal to present a surface worth striking, Earth benders have historically compensated by controlling entire combat environments rather than individual opponents.",Air:"Air bending is the element of pure freedom, concerned less with striking than with never being struck — a discipline of absolute mobility, misdirection, and the weaponization of negative space. Practitioners spend more time learning to read wind currents and atmospheric pressure than they do on offensive forms, because an Air bender who must attack has already lost the initiative the element provides. In philosophical terms, Air is the element most closely linked to detachment; its best practitioners are those who have released emotional investment in outcomes and respond to threats with the automatic fluency of weather rather than the calculated response of intellect. Counter-elementally it struggles against Lightning, which travels too fast for evasion to be reliable, forcing Air benders to use predictive deflection rather than reactive movement.",Lightning:"Lightning bending is the rarest and most technically demanding of the elemental disciplines, requiring the practitioner to achieve a near-perfect internal partition between opposing emotional states — the simultaneous holding of intense focus and total calm that generates the electrical potential of a natural storm. Unlike other elements, Lightning cannot be trained incrementally; the body either achieves the neurological threshold required for arc-generation or it does not, making Lightning benders statistically scarce even in nations where the element is culturally central. The element's raw damage output is unmatched at mid-range, capable of incapacitating opponents before they can execute a counter, but the charging window is its fatal flaw. Counter-elementally vulnerable to Ice, which can disrupt the conductive pathways Lightning requires, advanced Lightning benders train specifically against freeze-disruption techniques.",Ice:"Ice bending is Water bending evolved through extreme cold — the discipline of locking motion, crystallizing potential energy into architectural form, and turning the battlefield itself into a weapon of immobilization. Practitioners from Glacimere's permanent winter regions develop an intuitive command of phase-change, shifting between liquid, solid, and vapor with a fluidity that makes their control qualitatively different from inland Water benders. The element excels at crowd control, environmental alteration, and sustained pressure campaigns where opponents are incrementally restricted rather than instantly destroyed. Counter-elementally vulnerable to Fire's raw heat output, Ice benders have developed an entire school of pre-emptive structural enclosure tactics designed to deny Fire practitioners the open air they need for combustion.",Metal:"Metal bending emerged as an advanced Earth bending technique before practitioners discovered that the mineral trace elements within worked metal respond to a fundamentally different vibrational frequency than raw ore — one that allows shape-altering without the brute force Earth bending requires. The discipline rewards fine motor precision over raw power, enabling practitioners to manipulate blade trajectories mid-flight, control armor worn by opponents, and reshape weapons in their own hands during combat. Metal benders are among the most technically educated in Aetheria's elemental hierarchy, as the discipline requires understanding of metallurgical composition to determine which techniques apply to which alloys. Counter-elementally challenged by Fire's ability to superheat metal beyond the practitioner's pain threshold before a technique can complete.",Wood:"Wood bending is the living element — the discipline of accelerating, redirecting, and communicating with the biological systems of plants, from individual root tendrils to continental root networks that older practitioners can access like a biological telegraph system. Unlike other elements, Wood bending grows in power as practitioners remain in one location over time, building a rapport with local flora that eventually produces a symbiotic relationship the forest actively extends. Combat applications are slower than most elements to initiate but geometrically harder to escape, as root entanglement and vine constriction increase in force the longer an opponent struggles. Counter-elementally vulnerable to Metal's ability to sever biological connections instantaneously, forcing Wood benders to maintain redundant root channels that compensate for targeted severance.",Shadow:"Shadow bending is the most philosophically controversial of the elemental disciplines, operating on the manipulation of light-absence as a physical medium — treating darkness not as the mere absence of illumination but as a tangible substance with tensile properties, thermal characteristics, and the capacity to absorb other elemental outputs. Practitioners enter a meditative state that desensitizes them to fear-response, because Shadow bending amplifies the practitioner's own psychological anxieties if performed from a place of unresolved trauma, creating unpredictable feedback loops. The element excels at infiltration, psychological disruption, and attrition through sensory deprivation, making Shadow benders extraordinarily effective in prolonged engagements where patience is the decisive factor. Counter-elementally volatile against Time bending, which can simply replay a Shadow bender's techniques in reverse before they complete.",Time:"Time bending is the rarest discipline in recorded Aetherian history — a practice that operates not on elemental matter but on the temporal substrate beneath it, allowing practitioners to slow, replay, or briefly pause local causality within a defined radius. The neurological toll is severe, as the brain was not designed to process multiple simultaneous timeline perspectives, meaning most Time benders develop extraordinary cognitive resilience alongside chronic dissociation from linear time's social rhythms. Combat applications are overwhelming against any opponent unfamiliar with temporal disruption, as Time benders can preview incoming attacks and rewind failed techniques with casual precision. Counter-elementally vulnerable to Shadow, which operates in a domain outside standard causality and therefore resists temporal manipulation with unusual effectiveness."},jl={DragonClan:{male:["Varathos","Embrath","Cyndrak","Orryn","Ashvael","Pyreon","Dracorth","Ignareth"],female:["Vyreth","Ashara","Cyndera","Embris","Pyreth","Drakenne","Solara","Varethi"]},TideClan:{male:["Coravel","Tidren","Merath","Pelagos","Aquin","Wavren","Deephos","Corvin"],female:["Tidalith","Coraeth","Mereya","Aquara","Wavena","Deepha","Tidreth","Selara"]},StoneClan:{male:["Granik","Stonvar","Terrath","Bedrak","Quarren","Rockval","Dunvar","Geomath"],female:["Grani","Terreth","Bedraka","Stonveth","Quarith","Rockena","Dunvara","Geodra"]},SkyClan:{male:["Zepharon","Altivane","Galevyn","Cloudren","Skyrath","Windor","Tempeth","Aervyn"],female:["Zephara","Altiva","Galeth","Cloudreth","Skyreth","Windera","Tempeth","Aeris"]},ThunderClan:{male:["Voltrek","Stormvael","Arcrath","Thunderos","Zapeth","Galdren","Boltvar","Shockren"],female:["Voltra","Stormara","Arcis","Thunderis","Zapeth","Galdreth","Boltveth","Shocketh"]},FrostClan:{male:["Glaceth","Frostvar","Iceron","Coldrak","Snowren","Blizzeth","Cryvael","Permeth"],female:["Glacis","Frostveth","Icera","Coldrak","Snoweth","Blizzara","Cryeth","Permira"]},IronClan:{male:["Anvrak","Steelvorn","Ironvael","Forgeth","Metalon","Tempran","Ha
