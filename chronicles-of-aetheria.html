s that encourage living coral to form plates of extraordinary hardness over ceramic frames. The resulting armour is lighter than bronze, harder than conventional iron, and resistant to heat-based attacks in ways that make it deeply frustrating for Fire alignment warriors to fight against. Cultivation cycles take eighteen months per suit, making Coralshell armour extraordinarily expensive; it is issued only to elite Water alignment officers and is never sold outside the alignment. The Artisans' growing-rooms are one of the most carefully guarded secrets in Aetheria — the Fire alignment has tried to steal the technique four times, and none of the agents they sent have returned.",sigil:"🐚",clanHonor:78},{id:"AbyssgateWatchers",name:"Abyssgate Watchers",element:"Water",description:"The Abyssgate Watchers guard a single location: the Abyssal Gate, a vast underwater trench at the edge of the continental shelf where the ocean floor simply drops away into a darkness that has never been fully explored. Ancient records describe things that came up from the Gate during the First Age, which is why the Watchers exist and why they have maintained their post without interruption for six hundred years. Their members are volunteers from all Water clans, drawn by genuine belief in the threat and an apparently hereditary willingness to spend decades watching the darkness for movement. Every ten years a Watcher team descends deeper than before — none has ever reported anything, and none has spoken about the descent after returning.",sigil:"👁️",clanHonor:61},{id:"FrostmeltTraders",name:"Frostmelt Traders",element:"Water",description:"The Frostmelt Traders operate in the northern reaches where glaciers calve icebergs into the trading channels — a zone inaccessible for half the year that they alone navigate reliably, having mapped every seasonal ice-shift over twelve generations. Their primary commodity is fresh ice — enormously valuable in the warm southern cities — carved from ancient glaciers and shipped in insulated holds that preserve it for weeks of ocean transit. Frostmelt ships are specially hulled for ice-water operation with reinforced bows for deflecting small bergs, a technology they refuse to license at any price. The clan considers themselves stewards of the northern waters and maintains a strict regulation on how much ice can be harvested per season, a conservation principle that is simultaneously ecological responsibility and market supply management.",sigil:"🧊",clanHonor:69},{id:"PelagicSociety",name:"Pelagic Society",element:"Water",description:"The Pelagic Society are the open-ocean naturalists of the Water alignment — a clan of scholars, ecologists, and deep-sea researchers who spend more time studying the ocean than fighting over it. Their vessels carry laboratory equipment alongside navigation tools, and their publications on marine biology, current mapping, and deep-ocean geology are required reading at every Water alignment military academy because the knowledge of the sea they provide is operationally indispensable. Pelagic Society members are exempt from military service by Water alignment charter in exchange for freely sharing all their research — a deal struck six hundred years ago that the military has never regretted. In emergencies they fight with extraordinary competence, because people who understand the ocean's full power tend to be frightening when motivated.",sigil:"🔭",clanHonor:63},{id:"SeafoamAcolytes",name:"Seafoam Acolytes",element:"Water",description:"The Seafoam Acolytes are a monastic order that considers the ocean's surface — the endlessly moving boundary between sea and sky — to be the most sacred place in existence. They build their monasteries on coastal sea-stacks and tidal islands, places accessible only at certain tidal phases, which provides both spiritual significance and remarkable defensive advantages. Their meditation practice involves floating motionless in open ocean for hours, a feat of physical and psychological control that produces in adepts a distinctive calm that never leaves them even in crisis. Seafoam Acolytes serve as the Water alignment's most trusted negotiators precisely because they seem genuinely incapable of being rattled — a quality that is both admirable and slightly unnerving to sit across a table from.",sigil:"🫧",clanHonor:59},{id:"BrineclawMercenaries",name:"Brineclaw Mercenaries",element:"Water",description:"The Brineclaw Mercenaries are naval guns-for-hire — a fleet of experienced combat sailors who offer their services to any buyer who can meet their price, which is high, and their terms, which are non-negotiable. They are Water-aligned by heritage but politically neutral by profession, a stance that has made them simultaneously indispensable and mildly distrusted by everyone. Brineclaw contracts include a termination clause: if a client asks them to do something they consider contrary to maritime law or naval honour, they return their payment pro-rata and sail away, a clause that has been invoked seven times. They are the best individual ship-fighters in Aetheria, unit for unit, because their survival depends on winning fights that larger organised navies could afford to lose.",sigil:"⚓",clanHonor:74},{id:"ThalassicAcademy",name:"Thalassic Academy",element:"Water",description:"The Thalassic Academy is the Water alignment's premier institution of naval learning — a clan that has defined itself entirely through education, producing the admirals, navigators, engineers, and strategists who lead every other Water clan's military operations. Their campus at the great lighthouse of Meridian Point accepts two hundred students per year from across the Water alignment and turns out approximately one hundred and sixty finished officers — the twenty percent failure rate being considered a feature rather than a flaw. Academy graduates bear a tattoo of a compass rose on their right wrist and are recognised across all naval ports as a mark of assured competence. The Academy formally belongs to no clan and no political faction, but the entirety of the Water alignment's senior leadership having attended creates a cultural cohesion that is functionally equivalent to an alliance.",sigil:"🎓",clanHonor:93},{id:"DrownedKingCult",name:"Drowned King Cult",element:"Water",description:"One of the stranger Water alignment institutions, the Drowned King Cult worships the memory of Aetheria's first great naval king, who drowned at the height of his power during a storm at sea — which the Cult interprets not as tragedy but as apotheosis, the ocean claiming its greatest servant. Their rituals involve ritual drowning and resuscitation, taken to varying depths of literalism depending on which chapter of the Cult is performing them. Drowned King warriors fight without fear of death, which makes them terrifying and tactically unreliable in equal measure — they will take suicidal risks that sometimes work brilliantly and sometimes catastrophically. The Water alignment leadership tolerates the Cult because in siege situations where no one else will volunteer, the Drowned King always does.",sigil:"💀",clanHonor:56},{id:"SaltwardenPatrol",name:"Saltwarden Patrol",element:"Water",description:"The Saltwardens are the coast guard and maritime law enforcement arm of the Water alignment, responsible for suppressing piracy, enforcing fishing rights, intercepting smugglers, and maintaining the safety of the civilian fishing fleets that feed much of Aetheria. They operate in small fast patrol-cutters, two-person crews, maintaining constant coverage of the Water alignment's vast coastal boundary with a rotating schedule that has run continuously for over three hundred years. Saltwardens are permitted to act as judge and summary executioner for piracy-at-sea, a power they exercise more rarely than enemies of the Water alignment would like. Their ships are painted white with a blue stripe — the only ships in Aetheria that both sides in any conflict will typically allow to approach without challenge.",sigil:"🚢",clanHonor:75},{id:"NaiadSisterhoods",name:"Naiad Sisterhoods",element:"Water",description:"The Naiad Sisterhoods are an all-female warrior tradition rooted in the ancient water-goddess cults of the pre-Aetherian coastal peoples, their fighting style blending ceremonial water-dance with devastatingly practical combat techniques. Their initiates undergo the Immersion Trial — seven days alone in the open ocean — before being accepted, a test that selects for both physical capability and psychological resilience with brutal efficiency. Naiad warriors favour a fighting pair: a weighted net and a short coral-bladed sword, the net for capture and control, the blade for the close work that follows. They maintain hereditary control of the great freshwater springs of the southern Water territories, which gives them an economic lever that makes large, violent clans treat them with conspicuous respect.",sigil:"🧜‍♀️",clanHonor:82},{id:"UndercurrentCouncil",name:"Undercurrent Council",element:"Water",description:"The Undercurrent Council is the secret governing body that many in the Water alignment suspect controls more decisions than the official clan councils do — a network of senior figures from across the alignment who meet in rotating underwater locations and reach consensus on major political questions before they are formally debated publicly. Whether the Council actually exists is a matter of genuine uncertainty; no member has ever confirmed it, and those who claim membership are considered either truthful or strategically dishonest with equal probability. The Council is Water-aligned by nature but not by exclusivity — rumours persist of Fire alignment members, which the Water leadership officially finds preposterous and privately finds deeply plausible. Its influence, real or imagined, shapes policy in ways that make denying it somewhat harder every year.",sigil:"🌊",clanHonor:88},{id:"RippleSages",name:"Ripple Sages",element:"Water",description:"The Ripple Sages are mathematicians and physicists who study water dynamics — the behaviour of waves, currents, fluid flow, and pressure — and have derived from this study a set of strategic and social principles called the Water Doctrine that underpins all Water alignment military thinking. Their great work, the Ripple Canon, explains how any force that creates waves inevitably encounters those waves returning; translated militarily, it became the foundation for the Water alignment's doctrine of reactive warfare. Sage-apprentices spend three years doing nothing but observing water in all its forms before they are permitted to write a single theoretical proposition. In debates their opponents find them frustratingly patient — they have learned from their subject that applying pressure at the right moment is always more effective than applying it continuously.",sigil:"📐",clanHonor:70},{id:"TidebornRangers",name:"Tideborn Rangers",element:"Water",description:"Tideborn Rangers operate in the intertidal zones — the vast mudflats, mangrove forests, salt marshes, and tidal channels that cover hundreds of miles of the Water alignment's coastal interior and are impassable to any force that doesn't know them intimately. Rangers grow up in these environments, learning from childhood to read tidal timing with precision that determines the difference between a tactical route and a drowning trap. Their signature ambush tactic — the Tidal Close — involves leading an enemy force into a tidal channel and timing their withdrawal to when the tide turns, leaving pursuers chest-deep in incoming water. The Rangers work closely with the Saltwarden Patrol and the Kelp Sovereignty, sharing environmental intelligence across the coastal management network.",sigil:"🌾",clanHonor:73},{id:"MoonriseFestivants",name:"Moonrise Festivants",element:"Water",description:"The Moonrise Festivants are the cultural ambassadors of the Water alignment — a clan whose members are performing artists, musicians, historians, and diplomats who travel the great festivals of Aetheria maintaining the Water alignment's soft-power presence in neutral and hostile territory alike. Their performances are renowned across the continent, their musicians performing works that audiences from any alignment find moving, their historians telling stories that make the Water alignment's version of events seem both accurate and sympathetic. This is, of course, completely deliberate. Moonrise children are taught music and history alongside navigation and combat, because the clan understands that the best propaganda is art that doesn't feel like propaganda.",sigil:"🌕",clanHonor:67},{id:"SeaspineMariners",name:"Seaspine Mariners",element:"Water",description:"The Seaspine Mariners are the long-haul traders of the Water alignment — the clans whose merchant fleets circle the entire Aetherian continent on annual circuits lasting eight to fourteen months, connecting markets that would otherwise be entirely isolated from each other. Their ships carry spines of structural whalebone that run the full length of the hull, giving them a flexibility in heavy ocean conditions that rigid-hulled vessels cannot match. Seaspine captains are among the most widely travelled people in Aetheria and their intelligence value — knowing what every port is buying, selling, hoarding, and lacking — is recognised by both the Water alignment military and every intelligence service on the continent. They sell this information only to the Water alignment, and the price they charge is not denominated in gold.",sigil:"🧭",clanHonor:76},{id:"UndertideSentinels",name:"Undertide Sentinels",element:"Water",description:"The Undertide Sentinels guard the underwater passes and submerged cave systems that form the Water alignment's hidden military highway — routes invisible to surface observation and usable only by the specially trained marines the Sentinels maintain. Their cave-dive forces can emerge in locations enemies consider logistically impossible, behind fortified lines and inside defended harbours. The Sentinels have invested two centuries in mapping every underwater passage in the alignment's territory and have hidden these maps in a code only Sentinel-trained navigators can read. When asked whether these routes could be used by enemies, Sentinel commanders smile and say the maps are very well hidden.",sigil:"🔱",clanHonor:84},{id:"CoralbeardPirates",name:"Coralbeard Pirates",element:"Water",description:"Officially, the Coralbeard Pirates do not exist — the Water alignment denies any association and the pirates themselves maintain they are independent contractors operating beyond any political jurisdiction. Unofficially, the Coralbeard fleet is the Water alignment's asymmetric naval weapon, operating under cover of plausible deniability to harass, raid, and occasionally sink shipping belonging to the Fire alignment and neutral parties who have annoyed the Water alignment council. Their captains are remarkable sailors and worse human beings — brilliant at sea, problematic at port — and the Water alignment grants them access to their harbour facilities in exchange for taking a third of all prizes. The Coralbeard take what they want and pay the third because the harbour access is worth more than the cut.",sigil:"🏴‍☠️",clanHonor:55},{id:"SaltmarkArchivists",name:"Saltmark Archivists",element:"Water",description:`The Saltmark Archivists maintain the great maritime legal code of Aetheria — a body of sea-law covering trading rights, fishing boundaries, salvage claims, naval engagement rules, and port protocols that has governed the ocean-going world for four hundred years. Their archive, preserved in salt-mineral treated scrolls that survive indefinitely in marine environments, contains the original treaty of every maritime agreement ever formalised. The Archivists serve as the Water alignment's legal representatives in all international disputes and have a reputation for knowing the exact precedent for every possible situation — because they wrote most of them. When a Saltmark Archivist says "actually, under provision seven of the Meridian Compact...", experienced diplomats stop talking and start paying attention.`,sigil:"📜",clanHonor:71},{id:"WavecrestVanguard",name:"Wavecrest Vanguard",element:"Water",description:"The Wavecrest Vanguard is the Water alignment's equivalent of the Crestfire Legion — the joint military force that transcends individual clan loyalty and serves the alignment as a whole. Wavecrest soldiers are drawn from volunteers across all forty Water clans, trained together in the unified doctrine of the Thalassic Academy, and deployed as a coherent force that no individual clan could sustain alone. Their blue-and-silver standard is recognised as a sign of the alignment's full military commitment — when the Vanguard deploys, it means the Water alignment is treating the situation as existential. They have sailed into battle thirty-eight times in their recorded history and have lost four engagements, none of which they consider final because the ocean, they say, always takes back what it is owed.",sigil:"🏳️",clanHonor:95}],hg=[{id:"earth_001",name:"Stone Titan",element:"Earth",description:"The Stone Titan clan traces its lineage to the first giants who wrestled mountains into submission at the dawn of Aetheria. Their warriors don plate armor hewn from a single granite slab, custom-fitted over years of battle service. Each champion trains by hauling boulders up the sheer face of Mount Carrath, emerging with arms like quarry cranes. Opposing armies have broken on their shield-walls more than three hundred times without a single recorded breach.",sigil:"⛰️",clanHonor:92},{id:"earth_002",name:"Bedrock Boar",element:"Earth",description:'Bedrock Boar warriors charge siege lines with the fury of a collapsing mineshaft, driving reinforced tusk-helms into enemy formations. Their ancestral homeland sits atop the Mernath mineral basin, where iron-laced soil has been farmed and mined in tandem for six generations. The clan is renowned for its defensive earthworks — no Bedrock Boar encampment has ever been taken by surprise assault. Their war-cry, "Root and Rush," echoes through enemy ranks before a single blow is struck.',sigil:"🐗",clanHonor:74},{id:"earth_003",name:"Granite Wolf",element:"Earth",description:"Granite Wolf packs hunt the high ridgelines in coordinated formations, using the terrain as a weapon long before swords are drawn. Their pelts are sewn with crushed granite dust, giving their cloaks a shimmering grey that vanishes against cliff faces. The clan breeds a line of stone-grey hounds used to scout collapsed tunnels and hidden cave systems. In open battle they rely on flanking maneuvers, striking from rocky defiles where cavalry cannot follow.",sigil:"🐺",clanHonor:81},{id:"earth_004",name:"Quarry Drake",element:"Earth",description:"The Quarry Drake clan claims the ancient wyrm Karathos as its patron, a creature said to have carved the Vethian canyons by dragging its belly across soft limestone. Their siege engineers are the finest in the eastern provinces, capable of reducing castle walls to rubble within a fortnight. Quarry Drake initiates spend three years learning stonecutting before they are permitted to lift a weapon. The clan's wealth flows from exclusive contracts supplying dressed stone to Aetheria's great cities.",sigil:"🐉",clanHonor:87},{id:"earth_005",name:"Crystal Serpent",element:"Earth",description:"Crystal Serpent mages discovered a vein of resonant quartz deep in the Underfold caverns that amplifies earth-shaping spells to devastating effect. Their warriors wind elongated crystal blades around their forearms like living serpents, striking with a coiling motion that confounds standard parrying technique. The clan hoards its mineral secrets jealously, mapping new veins in cipher and burning the keys before any rival clan can intercept them. Every member bears a gem-inlaid tattoo at the wrist marking their rank within the crystal hierarchy.",sigil:"🐍",clanHonor:78},{id:"earth_006",name:"Ironstone Bear",element:"Earth",description:"Ironstone Bears are the undisputed masters of underground forge-craft, smelting ore pulled fresh from living rock walls while their hammers still ring with the heat of the earth. Their fortress-city of Gorrath is carved entirely from basalt and has never fallen to siege. Clan elders wear crowns of magnetite that pull iron filings into decorative haloes during council sessions. In battle, Ironstone Bear shock troops carry two-handed mauls weighing sixty pounds, which they swing as casually as driftwood.",sigil:"🐻",clanHonor:88},{id:"earth_007",name:"Boulder Ram",element:"Earth",description:'Boulder Ram warriors strap rounded river stones to their forearms and shoulders, using their own bodies as battering rams in close-quarters combat. The clan originated among the highland shepherds of the Crestmere plateau, who first weaponized the terrain by rolling boulders down on raiding parties. Their battle tactic — the "Avalanche Rush" — involves an entire unit charging downhill in a near-uncontrolled sprint, trusting mass and momentum over finesse. Clan rites of passage require a young warrior to stop a rolling boulder with their bare arms.',sigil:"🐏",clanHonor:69},{id:"earth_008",name:"Cavern Fox",element:"Earth",description:"Cavern Foxes are the great spymasters of the subterranean world, threading themselves through cracks and passages no scouting party could map without their guidance. They train from childhood in echolocation, learning to read the subtle reverberations of hollow rock and hidden rooms. Their intelligence networks extend into every major mine and underground city across the Aetherian interior. Cavern Fox agents are often found at court, advising rulers on subterranean threats months before those threats surface.",sigil:"🦊",clanHonor:63},{id:"earth_009",name:"Geode Hawk",element:"Earth",description:"The Geode Hawk clan venerates hollow stones whose crystalline interiors are said to contain trapped whispers from the world's core. Their shamans split geodes during religious ceremonies, interpreting the crystal formations as prophecy for the coming season. Warriors carry a personal geode into battle — to break it willingly is to call upon the earth's final judgment, releasing a concussive burst of earth energy. The clan's aerial scouts, paradoxically for an earth clan, fly trained stone-eagles that nest in cliff-side geode deposits.",sigil:"🦅",clanHonor:72},{id:"earth_010",name:"Dust Wyvern",element:"Earth",description:"Dust Wyvern cavalry ride across the arid badlands of the Drath basin, kicking up choking clouds of mineral dust to blind enemy archers before a charge. Their wyverns are flightless desert variants, low-slung and swift, bred over centuries to navigate loose scree without stumbling. The clan controls the only known pass through the Drath escarpment, collecting tolls that fund the finest mercenary retainers in the province. Dust Wyvern outriders wear goggles of polished obsidian to protect their eyes in their own dust storms.",sigil:"🦎",clanHonor:66},{id:"earth_011",name:"Rockfall",element:"Earth",description:"The Rockfall clan built its martial philosophy entirely around gravity, treating every high ground as a loaded weapon waiting to be discharged. Their engineers spend more time studying slope angles and load-bearing strata than conventional siege machines. During the three-month siege of Vareth Keep, a Rockfall crew destabilized the cliff beneath the walls and simply let the mountain do the work. Warriors learn to fight in tumbling, rolling styles that let them absorb falls from great heights and rise swinging.",sigil:"🪨",clanHonor:75},{id:"earth_012",name:"Siltstride",element:"Earth",description:"Siltstride warriors master the art of movement across unstable ground — marshes, riverbanks, flood plains, and tidal flats are their preferred killing grounds. Their sandals are woven from river reed reinforced with dried clay, providing just enough purchase to run where heavy-armored foes sink to their knees. The clan cultivates rich alluvial farmland along the Ferrath delta, making it one of the wealthiest agrarian powers in the lowland territories. Siltstride diplomats are always welcome at treaty tables because their grain surplus can sustain entire allied armies.",sigil:"👣",clanHonor:58},{id:"earth_013",name:"Deepearth",element:"Earth",description:"Deepearth explorers have descended further into Aetheria's mantle than any other clan, charting abyssal tunnels that glow with bioluminescent fungi and roar with underground rivers. They claim to have spoken with the Underlords — semi-divine entities of condensed mineral consciousness — and bear rune-carved stones as proof of those audiences. Their warriors fight with tools of the deep trade: rock-borers, spelunking picks, and phosphorescent grenades that blind enemies unused to sudden light. The clan holds knowledge of at least three routes through the underdark that no surface army knows exists.",sigil:"🕳️",clanHonor:84},{id:"earth_014",name:"Terravast",element:"Earth",description:"Terravast lords style themselves the true emperors of the earth element, ruling vast underground city-states connected by a network of carved stone highways. Their administrative apparatus is the most sophisticated of any earth clan, running censuses of mineral deposits the way others census populations. Every Terravast structure is built to last ten thousand years — they consider anything less a moral failure of craft. In open war they fight methodically, grinding down opponents with endless supply chains and impenetrable fortifications rather than dramatic battle.",sigil:"🏛️",clanHonor:91},{id:"earth_015",name:"Sandstone",element:"Earth",description:"The Sandstone clan inhabits the desert fringe where stone meets sand, building honeycombed cliff-cities whose warm hues blend seamlessly into the canyon walls. Their masons learned to carve sandstone into aerodynamic shapes that funnel desert winds through the city, keeping interiors cool without magic. Warriors wield curved sandstone-edged blades that shatter on impact, leaving embedded fragments in wounds that are nightmarish to remove. The clan trades rare pigment-rich sandstone used by artists across the continent.",sigil:"🏜️",clanHonor:61},{id:"earth_016",name:"Clayborn",element:"Earth",description:"Clayborn shamans believe the first mortals were shaped from riverbank clay by the earth goddess Morra, and every Clayborn warrior carries a lump of sacred clay into battle. Their earth-mages sculpt combat golems from battlefield mud in minutes, animating them with earth-breath to serve as expendable shock troops. The clan's potters produce ritual vessels traded across Aetheria for use in funerary rites — to own a Clayborn burial urn is considered the highest honor a family can bestow on the dead. In siege situations, Clayborn engineers pack clay into cracks in enemy walls, let it dry, then apply heat to create internal fractures.",sigil:"🏺",clanHonor:67},{id:"earth_017",name:"Basalt Crown",element:"Earth",description:"The Basalt Crown clan rules the volcanic highlands of the Cinders Reach, where rivers of cooled lava form natural castle walls of extraordinary hardness. Their rulers literally wear crowns of basalt, forged in volcanic calderas and shaped by master smiths to fit each successive leader's skull. Basalt Crown armies march in hexagonal formations that mirror the natural column structure of their homeland stone. They are feared for their fire-and-stone sorcerers who call superheated rock from the depths to seal off retreat routes during battle.",sigil:"👑",clanHonor:89},{id:"earth_018",name:"Feldspar",element:"Earth",description:"Feldspar artisans are the continent's foremost experts in mineral identification, able to assess the composition of any rock sample by touch, taste, and smell alone. Their workshops produce ceramic armor fused from crushed feldspar that is lighter than iron but nearly as hard, giving Feldspar warriors a decisive speed advantage in mountain terrain. The clan also maintains the Aetherian Geological Survey, a multi-generational mapping project cataloguing every known mineral deposit across the known world. Their archives are stored in climate-controlled stone vaults sealed with clay-and-silica compounds that resist fire, flood, and magical assault.",sigil:"💎",clanHonor:73},{id:"earth_019",name:"Obsidian",element:"Earth",description:"The Obsidian clan hones volcanic glass to a molecular edge sharper than any forged metal blade, equipping their assassins with weapons that leave wounds surgeons cannot cleanly close. They operate in the shadows of Aetheria's political landscape, trading in secrets and deniable violence while presenting a polished face of mercantile respectability. Their mountain stronghold, Glasskeep, is built from walls of fused obsidian that reflect attacking forces back at themselves in disorienting mirrors. Obsidian blades are ritually broken after each use, preventing the weapon's violent history from accumulating into a dangerous spiritual weight.",sigil:"🖤",clanHonor:82},{id:"earth_020",name:"Shale Throne",element:"Earth",description:"Shale Throne rulers govern from a throne carved from interlocking shale plates that can be disassembled and transported, allowing leadership to project authority even on campaign. Their political theory holds that governance must be as adaptable as sedimentary rock — layered, flexible, and capable of recording the pressures of time. Shale Throne scribes use thin-split shale sheets as writing tablets, producing clan records of extraordinary permanence. In battle their infantry fight in overlapping shield formations mimicking shale's layered structure, presenting a surface that deflects rather than absorbs blows.",sigil:"🪑",clanHonor:76},{id:"earth_021",name:"Schist Lords",element:"Earth",description:"The Schist Lords are an ancient aristocracy whose bloodlines stretch back to the metamorphic age, when the world was still cooling and pressure forged nobility from common stone. Their warriors wear ceremonial armor that has been subjected to decades of geological pressure treatment, emerging denser and harder than standard plate. Schist Lord estates are carved into the foliated hillsides of the Verith range, each terrace representing a generation of the ruling family. Their courts observe an elaborate honor system modeled on crystal lattice geometry — relationships are precisely mapped and any breach of structure is treated as catastrophically as a real geological fault.",sigil:"🏔️",clanHonor:85},{id:"earth_022",name:"Mineward",element:"Earth",description:"Mineward clans-people dedicate their lives to the protection of active mining operations, serving as underground guards, tunnel-fighters, and collapse-rescue specialists. Their narrow-blade fighting style was developed specifically for combat in low-ceiling tunnels where standard sword strokes are impossible. Every Mineward warrior carries a canary in a small stone cage — when the canary falls silent, the warrior knows to retreat immediately. The clan charges steep fees for its protection services but has an unblemished record of never losing a mine under its care to external assault.",sigil:"⛏️",clanHonor:70},{id:"earth_023",name:"Earthbound",element:"Earth",description:"The Earthbound clan practices a martial philosophy rejecting all things elevated — no towers, no cavalry, no aerial scouting — believing that true power comes only from direct contact with the ground beneath one's feet. Their warriors practice a grappling art that uses seismic strikes to vibrate the earth under an enemy's footing, toppling opponents before hands are even joined. Earthbound shamans can sense approaching armies through ground vibrations up to three miles away, giving the clan unparalleled early warning capability. Their underground temples are dug down rather than built up, descending seven stories into the living rock.",sigil:"🌍",clanHonor:68},{id:"earth_024",name:"Quarryheart",element:"Earth",description:"Quarryheart warriors believe the heart of a true fighter is made of stone — not metaphorically, but literally through a ritual calcification meditation practiced over decades. Their inner circle of masters are said to be immune to arrow strikes in vital areas where the calcification has advanced furthest. The clan runs massive open-pit quarries staffed by willing labor drawn from dozens of client families who receive mineral wealth in return for generations of service. Quarryheart stone fetches triple the market price because buyers know it has been extracted under ritual conditions that imbue it with structural luck.",sigil:"❤️‍🔥",clanHonor:79},{id:"earth_025",name:"Dungeonwarden",element:"Earth",description:"Dungeonwarden clans maintain the great prison-complexes carved into the roots of Aetheria's oldest mountains, holding enemies of the state in geological isolation. Their warriors are trained as much in psychology as combat — understanding how darkness, silence, and stone pressure break the will of the incarcerated. The clan holds an unusual dual position in Aetherian society: feared as jailers but respected as the only force capable of safely housing truly dangerous magical criminals. Dungeonwarden engineers have developed lock-systems using mineral crystallization that reset daily, making escape from their facilities effectively impossible without inside knowledge.",sigil:"🔐",clanHonor:77},{id:"earth_026",name:"Gravel Raven",element:"Earth",description:"Gravel Ravens are scavengers of the battlefield and the mine, sifting through debris and rubble to recover weapons, valuables, and intelligence others overlook. They train ravens to carry small pouches of sharp gravel used to distract cavalry horses during charges, the birds diving and releasing their loads in precise coordination with ground troops. The clan's reputation for thoroughness extends to their intelligence work — a Gravel Raven spy leaves a location only after searching every crack, every fallen stone, every upturned shard. Their warriors fight with a loose, unpredictable style that resembles scree shifting on a hillside.",sigil:"🐦‍⬛",clanHonor:55},{id:"earth_027",name:"Landslide",element:"Earth",description:"Landslide warriors study the mathematics of mass movement, applying geological principles to tactical problem-solving with devastating results. Their favored offensive is to undermine hillside positions until a single triggered charge sends thousands of tons of earth cascading over fortified lines. Engineers in the clan can assess a slope's failure potential after a ten-minute survey, a skill that makes them enormously valuable to allied commanders. The clan is controversial in Aetherian military ethics because their tactics frequently cause non-combatant casualties when unstable slopes move unpredictably.",sigil:"🏔️",clanHonor:64},{id:"earth_028",name:"Mudborn",element:"Earth",description:"Mudborn warriors are masters of the wetland battlefield, coating themselves in thick slick mud that causes weapon strikes to slide and arrows to embed shallowly. Their home territory is the vast Morah swamplands where stone outcroppings rise from peat bogs like ancient teeth. The clan cultivates therapeutic muds believed to accelerate healing of wounds, trading these preparations widely as battlefield medicine. Mudborn initiates undergo a ritual submersion in the clan's sacred central bog for three days, emerging changed in ways that outsiders find difficult to articulate but universally find unsettling.",sigil:"🟫",clanHonor:53},{id:"earth_029",name:"Boulderfall",element:"Earth",description:"The Boulderfall clan has perfected a siege technique of rolling massive stones down purpose-built ramps at castle gates, each boulder carved with aerodynamic grooves that maximize destructive momentum. Their workshops continuously cut and test stones, maintaining a ready inventory of siege ammunition in three standard gate-smashing sizes. Boulderfall warriors in direct combat emulate their siege stones — they build momentum through a running approach and deliver a single devastating strike rather than sustained exchange. The clan settlement at Goreth Pass is surrounded by rings of prepared ready-to-roll boulders, giving it an appearance of being perpetually on the verge of unleashing an avalanche.",sigil:"⚫",clanHonor:71},{id:"earth_030",name:"Stonehide",element:"Earth",description:"Stonehide warriors have developed a skin-hardening discipline through decades of exposure to mineral baths and earth-magic that calcifies the outer layers of their dermis. Senior Stonehide fighters can stop crossbow bolts with an outstretched arm, the bolt cracking rather than penetrating. The clan maintains bathhouses of different mineral concentrations across their territory, with the most advanced chambers reserved for proven warriors only. Their healers have developed parallel expertise in reversing the process for wounded fighters, softening skin around deep wounds to allow surgical access.",sigil:"🛡️",clanHonor:86},{id:"earth_031",name:"Cragveil",element:"Earth",description:"Cragveil rangers disappear into cliff-faces like ghosts, wearing mantles of living lichen and stone-colored warpaint that make them effectively invisible against rocky terrain. They specialize in long-duration observation missions, sometimes spending weeks motionless in a rock crevice watching enemy movements below. Their information has decided the outcome of six major engagements in the past century without the Cragveil themselves firing a single arrow. When they do fight, it is always from concealment and at precise moments of maximum enemy vulnerability.",sigil:"🧗",clanHonor:73},{id:"earth_032",name:"Earthshaper",element:"Earth",description:"Earthshaper mages have the most advanced earth-manipulation techniques in Aetheria, capable of raising field fortifications from bare ground in minutes and collapsing them just as quickly when retreating. Their curriculum is the most grueling in any earth-clan school — students spend five years doing nothing but moving stones with their minds before being taught offensive applications. On the battlefield they work in teams, one mage raising barriers while another opens sinkholes under the enemy advance. The clan is technically neutral in most territorial disputes, selling its engineering services to the highest bidder, which makes it politically controversial but financially prosperous.",sigil:"🌋",clanHonor:90},{id:"earth_033",name:"Sinkhole",element:"Earth",description:"Sinkhole warriors are the saboteurs of the earth element, drilling networks of destabilizing shafts beneath enemy positions and triggering collapses at the most catastrophic moment. They study soil composition obsessively, able to identify from surface observation alone where underground voids are most likely to produce catastrophic failure. The clan's own settlement is built on massive stone pillars sunk deep into stable bedrock, immune to the tactics they deploy against others. Sinkhole agents often travel ahead of allied armies, spending months preparing the ground before combat begins.",sigil:"🕳️",clanHonor:65},{id:"earth_034",name:"Dunecrest",element:"Earth",description:"Dunecrest clans-people ride the shifting dune crests of the Aetherian interior desert, using the constantly moving sand as cover and as weapon. They have mastered the science of dune-making — redirecting prevailing winds to build new dunes strategically over enemy supply lines and oases. Dunecrest cavalry trains horses to run across loose sand without sinking, a skill that takes four generations of careful breeding. The clan's fortresses are designed to be disassembled and moved when the dunes shift too dramatically, making them essentially impossible to locate on last season's maps.",sigil:"🏝️",clanHonor:62},{id:"earth_035",name:"Crystalvault",element:"Earth",description:"The Crystalvault clan guards the greatest mineral treasury in Aetheria — a cavern system filled with crystal formations of extraordinary size and magical resonance. Their warriors are less soldiers than curators, trained to defend the vault against extraction rather than to project force externally. Crystalvault mages draw power directly from proximity to the great crystals, meaning their abilities diminish significantly the further they operate from the vault. The clan has survived by making itself indispensable — the crystals amplify the magical output of any school that can negotiate vault-access rights, giving Crystalvault enormous diplomatic leverage.",sigil:"💍",clanHonor:83},{id:"earth_036",name:"Gravelmark",element:"Earth",description:"Gravelmark cartographers have mapped every road, pass, riverbed, and trail across the eastern provinces, and their marked-gravel trail systems have guided armies, merchants, and pilgrims for two centuries. They maintain the marks obsessively — repainting, re-placing, and recalibrating after every storm season. In wartime, Gravelmark guides are worth their weight in iron ore; a single navigator can move an army through terrain that would stall an enemy for weeks. The clan also marks false trails — a parallel network of deliberately misleading gravel signs leading into dead-ends and ambush sites, activated only in time of war.",sigil:"🗺️",clanHonor:60},{id:"earth_037",name:"Bedplate",element:"Earth",description:"Bedplate engineers build on the assumption that any structure is only as permanent as the rock it stands on, and they spend extraordinary effort preparing foundations before laying a single above-ground stone. Their construction projects take three times longer than other clans' work but stand for three times as long, making them the preferred builders of Aetheria's temples and government buildings. Bedplate warriors extend this philosophy to combat — they absorb an opponent's energy before delivering their own strike, functioning as a living foundation that enemy attacks exhaust themselves against. Their fighting style rewards patience above all other virtues.",sigil:"🏗️",clanHonor:70},{id:"earth_038",name:"Dustmantle",element:"Earth",description:"Dustmantle warriors cloak themselves in enchanted mineral dust that swirls around them in combat, obscuring their movements and irritating the eyes and lungs of opponents at close range. Their preparation rituals involve weeks of exposure to specific dust combinations, building a resistance that lets them fight comfortably inside the swirling cloud they generate. The clan cultivates dust-producing minerals in underground chambers, processing them into standardized weapon-grade preparations sold to allied forces. Dustmantle scouts are notoriously difficult to track — they disperse their trail with mineral dust that confuses both hounds and scrying magic.",sigil:"💨",clanHonor:57},{id:"earth_039",name:"Stonepeak",element:"Earth",description:"Stonepeak warriors occupy the literal high ground of the Aetherian mountain range, holding passes and summits that control movement across half the continent. They have held their mountain fastnesses for four hundred years without losing a single strategic position, a record that borders on the supernatural. The clan's endurance fighters are trained at altitude, developing lung capacity that gives them a decisive advantage against lowland troops who tire quickly in thin mountain air. Stonepeak temples mark the highest accessible points of every major peak in their territory, serving simultaneously as religious sites and military observation posts.",sigil:"🗻",clanHonor:93},{id:"earth_040",name:"Ironvein",element:"Earth",description:"The Ironvein clan controls the richest iron deposits in northern Aetheria, making them the ultimate suppliers in any major conflict regardless of which side they officially support. Their smiths work iron ore within hours of extraction, producing weapons of unusual quality because the metal has not had time to develop internal stress fractures. Ironvein warriors wear armor assembled from iron worked in the vein — the freshest possible, with a distinctive reddish tinge from trace minerals that has become their identifying battlefield mark. The clan's prosperity makes them a constant target of political scheming, and they maintain an extensive counterintelligence operation that has thwarted seventeen documented assassination plots against clan leadership.",sigil:"⚙️",clanHonor:88}],cg=[{id:"air_001",name:"Sky Falcon",element:"Air",description:"Sky Falcon riders soar on great-winged falcons bred over twelve generations to carry armored warriors at combat speeds, diving on enemy formations like living thunderbolts from above. Their ancestral eyrie sits atop the Aetherian Spire, a pillar of rock so tall that clouds gather around its base and the summit sees sunrise an hour before the valleys below. Sky Falcon warriors learn to fight while mounted before they can reliably walk on foot, prioritizing aerial superiority above all other skills. The clan's hunting-scream war-call, taught to every falcon, carries for miles and has been known to shatter the morale of infantry columns before a single rider descends.",sigil:"🦅",clanHonor:94},{id:"air_002",name:"Cloud Serpent",element:"Air",description:"Cloud Serpent sky-mages summon great coiling constructs of condensed cloud that serve as mounts, shields, and weapons simultaneously, reshaping them with a thought between breath and blow. The clan believes the sky is a living sea and their serpents are its native predators, expressing a theology that reverses the conventional relationship between earth and sky. Their temples float — genuine sky-structures anchored by wind-spells to mountain peaks but otherwise drifting within a constrained orbit. Cloud Serpent initiates spend their first year of training in silence, learning to hear the sky speak before they are permitted to command it.",sigil:"🐍",clanHonor:87},{id:"air_003",name:"Gale Wyvern",element:"Air",description:"Gale Wyvern riders harness storm-born wyverns whose wingspan can dwarf a city gate, using these creatures as both cavalry and strategic bombers in extended aerial campaigns. Their wyverns are not tamed but partnered — Gale Wyvern belief holds that a true rider and mount share one soul distributed across two bodies. The partnering ritual is extraordinarily dangerous, with a mortality rate of roughly one in three, which keeps Gale Wyvern numbers small but their riders exceptionally elite. When a Gale Wyvern mount dies, the rider is said to lose half their soul and must spend a full year in silent mountain meditation before considering a new partnership.",sigil:"🐲",clanHonor:89},{id:"air_004",name:"Storm Hawk",element:"Air",description:"Storm Hawk warriors deliberately seek out thunderstorm cells as their preferred combat environment, fighting amidst lightning and rain that grounds earth-magic but energizes their own air-techniques. They have developed lightning-rod armor specifically designed to attract controlled strikes that the warrior then redirects into opposing forces. Their forecasters are among Aetheria's finest meteorologists, able to predict storm movements with three-day accuracy and plan campaigns around optimal tempest conditions. Storm Hawk commanders are known for their patience — they will delay an engagement for weeks to ensure it occurs during a storm of their choosing.",sigil:"⛈️",clanHonor:83},{id:"air_005",name:"Wind Drake",element:"Air",description:"Wind Drake riders control lean, wingless draconic creatures that run along wind currents like a ship runs on water, achieving speeds on the open sky that no winged creature can match in a straight pursuit. The clan discovered its draconic partners living in the permanent gale zone above the Aetherian mountain range, creatures so adapted to wind that they had lost the need for wings entirely. Wind Drake warriors race as their primary form of competition, with racing results determining clan hierarchy rather than combat trials. Their route-knowledge of sky-currents makes them unparalleled couriers and the backbone of Aetheria's long-distance messaging network.",sigil:"🌬️",clanHonor:76},{id:"air_006",name:"Zephyr Wolf",element:"Air",description:"Zephyr Wolf packs hunt in coordinated formations using wind-corridors the way land wolves use gullies and treelines, channeling prey into kill-zones through invisible aerial geography. Their wolves are trained from pups to navigate by wind-scent alone, capable of tracking a single individual through a crowd by the specific microtonal signature of their breath. The clan occupies the middle sky — below cloud-ceiling but above mountain-peak — where the gentler zephyrs allow extended gliding on lightweight wing-frames strapped to warriors' arms. Zephyr Wolf diplomacy is famously subtle, their representatives arriving unannounced on silent wind-currents and departing the same way.",sigil:"🐺",clanHonor:72},{id:"air_007",name:"Tempest Raven",element:"Air",description:"Tempest Raven warriors are the great aerial spymasters, dispatching their impossibly intelligent raven familiars to observe, record, and return with intelligence from across Aetheria. Their ravens have been selectively bred for cognitive complexity and are believed to understand language at the level of a young child, processing and prioritizing information rather than simply carrying messages. The clan's intelligence archive, housed in a sky-temple accessible only by flight, contains records of political secrets spanning two centuries. Tempest Raven operatives are distinguished by a subvocal whistle they develop in training that commands their ravens from up to a quarter mile away.",sigil:"🐦‍⬛",clanHonor:80},{id:"air_008",name:"Breeze Crane",element:"Air",description:"Breeze Crane monks practice a martial art of extraordinary elegance, using the lightest possible forces to redirect devastating attacks — a touch that becomes a throw, a breath that becomes a blade. Their monastery clings to a sheer cliff-face by means of architectural wind-sails that keep it aloft during gales and use calm weather for delicate structural adjustment. The crane fighting style takes twenty years to master and cannot be rushed — students spend the first decade learning only to stand in wind without resistance. The clan accepts students from any background but graduates fewer than one in twenty.",sigil:"🦢",clanHonor:85},{id:"air_009",name:"Cyclone Fox",element:"Air",description:"Cyclone Fox tricksters weaponize confusion, creating localized cyclone-vortexes that scramble enemy formations and send projectiles spiraling off-course before darting in to strike through the chaos they manufacture. They are Aetheria's most creative aerial combatants — no Cyclone Fox engagement is ever executed the same way twice. The clan trains its young in improvisational scenarios where every planned approach is taken away, forcing development of instant creative solutions. Other clans find Cyclone Fox allies simultaneously invaluable and maddening, as their unpredictability extends to their own side's battle plans.",sigil:"🌀",clanHonor:68},{id:"air_010",name:"Updraft Bear",element:"Air",description:"Updraft Bears are the heaviest of the air clans, big-bodied warriors who use powerful rising thermals to launch themselves to surprising heights before dropping with devastating aerial strikes. They train on the thermal plains east of the Aetherian peaks, spending hours daily reading the invisible rising columns that will carry their bulk aloft. Updraft Bear aerial strikes combine the weight advantage of an earth-clan warrior with the positional advantage of an air-fighter — a combination opposing commanders find extremely difficult to counter. The clan reveres bears who have fallen into updrafts and been carried away as blessed, believing such creatures achieve a kind of involuntary enlightenment.",sigil:"🐻",clanHonor:74},{id:"air_011",name:"Stormrider",element:"Air",description:"Stormriders are the shock cavalry of the air element, surfing hurricane-speed winds on reinforced glider-frames to achieve charge velocities that exceed any mounted earth-force. Their frames are assembled from treated cloudwood — a high-altitude timber with remarkable flexibility — that can absorb the stress of combat maneuvers at terminal velocity without shattering. Stormrider charges are delivered in tight wedge formations that penetrate defensive lines before any countermeasure can be mounted, the warriors dismounting mid-glide and fighting on foot after the initial penetration. The clan's greatest honor is to complete a storm-charge alone, without formation support, and return alive.",sigil:"⚡",clanHonor:91},{id:"air_012",name:"Skybound",element:"Air",description:"Skybound philosophers hold that the sky is the true homeland of consciousness and that earthbound existence is a temporary descent into density from which all souls eventually escape upward. Their warriors fight with the detached clarity of individuals who genuinely do not fear death — their meditative practices have dissolved the instinctive survival reflex through decades of confrontation with heights and falls. Skybound strategists operate on extremely long time horizons, planning campaign outcomes across decades while opponents plan months. The clan has been known to surrender a battle deliberately because their projection showed the loss would produce a strategic advantage two generations forward.",sigil:"☁️",clanHonor:86},{id:"air_013",name:"Cloudpiercer",element:"Air",description:"Cloudpiercer archers have developed techniques for accurate archery through cloud cover, using wind-sense and trajectory mathematics to place arrows where targets will be rather than where they can be seen. Their bows are built from composite cloud-wood and treated sinew that performs consistently across the full humidity range from desert air to saturated storm cells. Cloudpiercer training ranges simulate cloud cover with smoke screens, training the eye to compute rather than observe targeting solutions. The clan maintains a school of ballistics philosophy that has produced several major advances in projectile theory adopted by armies across Aetheria.",sigil:"🏹",clanHonor:79},{id:"air_014",name:"Windswept",element:"Air",description:"Windswept rangers allow the prevailing winds to determine their patrol routes, developing an intimate knowledge of seasonal and daily wind patterns that lets them move exactly where the air takes them while never becoming truly lost. Their navigation technique — wind-reckoning — uses body sensation and directional memory to maintain positional awareness even in zero-visibility conditions. Windswept couriers can cross the continent in half the time of any earth-route because they exploit jet-stream corridors inaccessible to heavier travelers. The clan holds an annual festival where every member releases their grip on plan and schedule for one full day, going wherever the wind chooses.",sigil:"🍃",clanHonor:63},{id:"air_015",name:"Galestride",element:"Air",description:"Galestride warriors move across the battlefield at speeds approaching the wind itself, their enchanted boots and cloaks reducing air resistance to near zero for brief but explosive sprints. They fight as skirmishers of the most extreme kind — a Galestride unit can engage an enemy, inflict casualties, and withdraw to a safe distance before a conventional unit's reaction time completes. Galestride tactics require constant motion; the clan's fighting philosophy holds that a still warrior is a dead warrior, and their martial art has no defensive stances at all. The physical toll of Galestride service ages warriors rapidly, and most retire at forty with significant joint damage from years of extreme movement.",sigil:"💨",clanHonor:75},{id:"air_016",name:"Aetherwing",element:"Air",description:"Aetherwing mages tap the raw aetheric currents that flow between the sky and the spiritual plane, channeling energies that transcend ordinary air-magic into effects that can reshape weather systems across entire provinces. Their practitioners are among the rarest and most sought-after magic users in Aetheria — governments offer extraordinary inducements to secure even one Aetherwing mage on retainer. The training is so demanding that the clan produces fewer than five new fully qualified mages per decade. Aetherwing senior mages are identifiable by the faint luminescence around their hands and the permanent wind that seems to follow them even into enclosed spaces.",sigil:"✨",clanHonor:95},{id:"air_017",name:"Tempestborn",element:"Air",description:"Tempestborn warriors are deliberately conceived and birthed during great storms, believing the chaotic energy of tempest weather inscribes itself permanently into a child's soul and capacities. Their culture tracks storm-birth heritage for seven generations, and clan hierarchy correlates directly with the intensity of the birth-storm. The most exalted Tempestborn — the Storm-Crowned — are those born inside cyclones, surviving conditions that kill most adults. Their battle-magic channels the specific storm that witnessed their birth, each warrior wielding a uniquely personal thunderhead that no enemy can fully predict.",sigil:"🌩️",clanHonor:88},{id:"air_018",name:"Skyvault",element:"Air",description:"The Skyvault clan maintains a floating archive of every star-chart, weather record, and atmospheric observation ever collected in Aetheria, stored in wind-anchored library platforms above the clouds. Their astronomers have predicted eclipses and comet passages with perfect accuracy for one hundred and sixty years, a record that has given them an almost prophetic reputation among earthbound cultures. Skyvault scholars descend to ground level only for specific information-gathering missions, preferring the clarity of high-altitude observation to the noise of surface life. The clan lends its star-charts to navigators and generals in exchange for fresh observational data from regions outside their own flight range.",sigil:"🔭",clanHonor:82},{id:"air_019",name:"Cloudweave",element:"Air",description:"Cloudweave artisans have mastered the collection and processing of high-altitude ice crystals and condensed water vapor into a textile of extraordinary properties — cloud-cloth — that is simultaneously waterproof, breathable, and nearly weightless. Their garments are prized by every ruling family in Aetheria, worn as both status symbols and functional armor. Cloudweave warriors wear full suits of cloud-cloth that allow them to move in complete silence, even the armor's surface absorbing sound rather than reflecting it. The secret of cloud-cloth weaving is guarded more jealously than any military technique in the clan's history.",sigil:"🧵",clanHonor:77},{id:"air_020",name:"Windwarden",element:"Air",description:"Windwarden rangers protect the great sky-roads — invisible wind-corridor highways used by flying clans — from sabotage, disruption, and unauthorized exploitation. Their jurisdiction is vast and their powers are broadly recognized by treaty among the flying peoples of Aetheria. Windwarden warriors can sense a disruption to a major wind-corridor from fifty miles away and respond with speed that makes them seem to teleport. The clan enforces a strict code of sky-road neutrality — no military force may exploit a sky-road for troop transport without Windwarden approval, a rule that has prevented several wars by denying rapid strategic access.",sigil:"🌐",clanHonor:81},{id:"air_021",name:"Galecrest",element:"Air",description:"Galecrest nobles occupy the social summit of air-clan aristocracy, tracing lineages through the oldest unbroken aerial dynasties and maintaining courts of breathtaking ceremony conducted entirely on floating platforms. Their warriors fight in a style that prioritizes honor and visible display — a Galecrest duel is a spectacle designed to be observed by multiple witnesses and judged as much on form as on outcome. The clan deploys its forces with the precision of a parade, formations geometrically perfect and movements choreographed to project overwhelming psychological authority. Enemies who fight Galecrest forces often report feeling outclassed even in engagements where casualty ratios favor them.",sigil:"🎖️",clanHonor:84},{id:"air_022",name:"Stormpeak",element:"Air",description:"Stormpeak warriors claim the zone where storms are born — the churning altitude where warm updrafts meet cold upper atmosphere and lightning decides which way the sky will go. Their fortress-monastery sits permanently inside an active storm cell that they maintain with continuous magical intervention, giving them a home citadel that no army can approach without the clan's permission. Stormpeak initiates must survive one full night alone within the fortress storm before they are accepted as warriors. The experience transforms survivors irrevocably — they emerge with eyes that flash faintly in darkness and a tendency to anticipate events before they occur.",sigil:"⛰️",clanHonor:90},{id:"air_023",name:"Skytemple",element:"Air",description:"The Skytemple clan operates a network of floating sacred sites connected by aerial pilgrimage routes, serving as the primary religious authority for all air-element worshippers across Aetheria. Their priests serve simultaneously as judges, healers, and weather-controllers, using their divine authority to moderate disputes between clans and seasons between extremes. Skytemple warriors are actually temple guards — a purely defensive force whose mandate is protection of sacred spaces rather than projection of force. They are nevertheless among the most capable individual fighters in the air element because the best warriors in every air clan compete for the honor of temple guard appointment.",sigil:"⛩️",clanHonor:87},{id:"air_024",name:"Cloudmantle",element:"Air",description:"Cloudmantle shapeshifters can redistribute their physical presence across a broad cloud-form, becoming effectively invisible to conventional senses while maintaining full awareness of the area their cloud-self occupies. The technique requires years of progressive dissolution practice and a fundamental philosophical comfort with the boundaries of self becoming unclear. Cloudmantle warriors in combat appear to dissipate before a strike lands and reconstitute behind the attacker, which opponents invariably find deeply disturbing. The clan uses this ability in intelligence work as well, with senior members able to maintain cloud-form for weeks while observing targets who never suspect their presence.",sigil:"🌫️",clanHonor:78},{id:"air_025",name:"Windmark",element:"Air",description:"Windmark navigators have inscribed the invisible wind-landscape of Aetheria as precisely as any cartographer has mapped its physical terrain, creating a parallel atlas of sky-roads, current seasons, storm cycles, and danger zones. Their marked sky-routes are indicated to trained travelers through a system of wind-chimes and aerial markers hung from cliff-faces and mountain peaks. Windmark guides command extraordinary fees but deliver travelers to destinations faster and safer than any ground-route alternative. The clan maintains the marks as a matter of sacred obligation — a broken Windmark is considered a moral catastrophe equivalent to destroying a physical road.",sigil:"🗺️",clanHonor:67},{id:"air_026",name:"Breezefall",element:"Air",description:"Breezefall warriors have mastered a falling technique that uses full-body air-magic to transform any descent, however extreme, into a gentle drift — jumping from a cliff is simply another way to travel for a Breezefall warrior. They conduct warfare by occupying the highest possible points and simply falling on enemies with swords drawn, arriving at combat speed without any of the usual effort of approach. The clan trains by diving from increasingly extreme heights, building reflexive air-manipulation that functions even when the warrior is unconscious. Breezefall elite soldiers are deployed by being dropped from altitude in total darkness and trusted to arrive oriented and combat-ready.",sigil:"🪂",clanHonor:73},{id:"air_027",name:"Aeromancer",element:"Air",description:"Aeromancer sorcerers are the most technically sophisticated air-mages in Aetheria, treating atmospheric manipulation as a precise science of pressure differentials, humidity control, and molecular air composition rather than an art. Their spell-school requires mathematical aptitude as a prerequisite for entrance, weeding out intuitive talents in favor of calculable precision. In combat, Aeromancer effects are extraordinarily targeted — they can suffocate a single enemy in an open field while everyone within arm's reach continues to breathe normally. The clan publishes atmospheric research that benefits weather prediction across the continent, maintaining a reputation for neutral scientific service that gives them diplomatic immunity most warrior clans cannot claim.",sigil:"🔬",clanHonor:92},{id:"air_028",name:"Cycloneborn",element:"Air",description:"Cycloneborn warriors carry a personal cyclone within them — a core of spinning air energy that manifests in their movements, making every punch, kick, and weapon strike a rotational force that drills through conventional armor. The clan believes it is descended from a cyclone deity who took mortal form during a legendary storm three centuries ago. Their martial art spirals through seven concentric rings of technique, each requiring years to master, with the seventh ring accessible only to those who can sustain their personal cyclone visibly around their body during meditation. A Cycloneborn master in full rotation is one of the most visually spectacular and genuinely dangerous sights in Aetherian combat.",sigil:"🌀",clanHonor:85},{id:"air_029",name:"Skyharbor",element:"Air",description:"The Skyharbor clan operates Aetheria's only true aerial port — a network of floating docks, refueling stations, and rest platforms maintained at altitude for use by all flying peoples and creatures. Their harbor-masters coordinate traffic from dozens of clans simultaneously, maintaining safety and order in the sky-lanes the way a port admiral manages maritime channels. Skyharbor warriors are customs enforcers, cargo inspectors, and sky-police, trained in the full spectrum of aerial combat and armed with authority to board any craft transiting their jurisdiction. The clan's revenue from harbor fees makes it wealthy beyond what its modest military strength would suggest, and it uses that wealth to maintain strict neutrality in conflicts between other air clans.",sigil:"⚓",clanHonor:71},{id:"air_030",name:"Galeborn",element:"Air",description:"Galeborn warriors are shaped from birth by relentless wind exposure, living in open-air settlements on exposed ridgelines where the gale never stops and shelter is a philosophical concept rather than a practical amenity. They develop an unconscious constant resistance to wind force that translates into extraordinary physical stability in calm conditions — a Galeborn warrior planted in their fighting stance is effectively unmovable. Their culture celebrates endurance above all other virtues, with the clan's highest honor going to the warrior who survives the most consecutive days of storm exposure without shelter. Galeborn endurance fighters are routinely deployed in conditions that incapacitate opponents from other clans.",sigil:"🌬️",clanHonor:69},{id:"air_031",name:"Cloudgate",element:"Air",description:"Cloudgate mystics maintain the passages between the mortal sky and the cloud-realms where elemental air-spirits dwell, serving as intermediaries in a relationship that has persisted for millennia. Their rituals open literal portals of condensed cloud that, under the right conditions, can transport a warrior across vast distances in moments. The technique is reliable only when wind conditions exactly match the requirements — the clan spends enormous effort monitoring atmospheric conditions to identify windows of portal-opportunity. In non-combat roles Cloudgate priests provide funerary services, escorting the spirits of deceased air-clan warriors through the cloud-gate into their final sky-realm.",sigil:"🌥️",clanHonor:82},{id:"air_032",name:"Windthorn",element:"Air",description:"Windthorn warriors fire needles of compressed air from specially designed arm-gauntlets, weapons that leave no physical projectile to recover and produce wounds that are nearly invisible until they begin to hemorrhage internally. The compressed-air needle technique was developed over fifty years of refinement from a theoretical principle in Aeromancer scholarship, applied to deadly practical use by Windthorn's founding engineer. At close range, Windthorn fighters switch to edge-weapons with blade-profiles optimized to cut by air-pressure rather than physical contact, slicing through non-magical armor with minimal force required. The clan is controversial in Aetherian military circles because their weapons produce suffering that some consider disproportionate to combat norms.",sigil:"🌵",clanHonor:66},{id:"air_033",name:"Stormveil",element:"Air",description:"Stormveil shadow-warriors operate behind curtains of manufactured storm — walls of rain, hail, and wind so intense that conventional observation is impossible — striking out of the chaos and withdrawing back into it without ever being clearly seen. Their veil-generation requires a team of four mages working in concert, making Stormveil units more complex to deploy than most air-clan forces but proportionally more devastating when conditions allow. Enemies of Stormveil forces frequently report fighting invisible opponents, the psychological toll of which accelerates collapse faster than casualties alone. The clan recruits specifically for comfort with operating in near-zero visibility, selecting candidates who demonstrate exceptional spatial awareness independent of sight.",sigil:"🌧️",clanHonor:80},{id:"air_034",name:"Skystone",element:"Air",description:"The paradoxically named Skystone clan harnesses the floating mineral deposits found in Aetheria's high-altitude magnetic anomaly zones — genuine stones that float — building sky-platforms and fortresses from materials that require no conventional support structure. Their engineers are sought by earth and air clans alike, and Skystone construction contracts are the most valuable in Aetheria. Skystone warriors patrol their floating fortress network in lightweight glider-craft, able to respond to any platform under assault in minutes. The clan's founding legend holds that a stone mason looked up and saw a mountain floating above the clouds, which inspired her to spend fifty years learning to make it happen intentionally.",sigil:"🪨",clanHonor:88},{id:"air_035",name:"Galewing",element:"Air",description:"Galewing warriors bond with great migratory birds at birth, growing up alongside their avian partners in a relationship so intimate that the pair shares emotional states and, reportedly, sensory experience. Their fighting style leverages this bond completely — bird and warrior attack as a single organism, the bird disorienting opponents while the warrior strikes through the confusion. Galewing migration routes follow their bonded birds' natural patterns, meaning the clan is never in the same territory for more than three months at a time and cannot be reliably located without tracking both the birds and their riders. Enemy commanders have learned that any campaign against Galewing must be timed to their migration cycle or the clan will simply have moved on.",sigil:"🦤",clanHonor:75},{id:"air_036",name:"Cloudbreak",element:"Air",description:"Cloudbreak war-priests can part cloud cover on command, flooding targets with sudden intense sunlight in regions where cloud-shadow is the norm — a disorienting and occasionally lethal tactic against sun-sensitive opponents. Their ability to control sunlight exposure gives them enormous influence over agriculture in the mountain territories, where a clan that can guarantee sunshine during harvest season becomes effectively indispensable to the local economy. Cloudbreak diplomacy leverages weather control as its primary currency, trading sunshine and rainfall guarantees for political concessions and military non-aggression. Their warriors are trained for rapid sky-clearing missions that strip away the cloud cover other air clans rely on for concealment.",sigil:"☀️",clanHonor:76},{id:"air_037",name:"Windshaper",element:"Air",description:"Windshaper artisans sculpt air itself into persistent forms — wind-walls, air-bridges, pressure domes — that exist as structural elements without any physical material. Their sky-cities are built entirely from shaped air given semi-permanent form through sustained magical investment, requiring constant low-level maintenance from the clan's mage population but producing architecture of extraordinary lightness and flexibility. In combat, Windshaper battle-mages build air-fortifications on the fly that redirect projectiles, channel enemy charges into kill-boxes, and provide cover impossible to damage with conventional weapons. The clan's deepest philosophical challenge is impermanence — nothing they build outlasts the mages who sustain it, which has produced a rich contemplative tradition around creation and loss.",sigil:"🌊",clanHonor:84},{id:"air_038",name:"Stormcrest",element:"Air",description:"Stormcrest generals have won more battles through superior weather forecasting than any other tactical advantage, knowing three days in advance which direction the wind will blow and positioning forces accordingly. Their strategy schools teach meteorology as the primary discipline, with conventional tactics treated as secondary — a commander who cannot read the sky has no business commanding Stormcrest forces. The clan's reputation for campaign success has attracted clients from across Aetheria, and their generals are frequently hired on loan to allied armies during major conflicts. Stormcrest warriors train in the widest range of conditions of any clan, required to demonstrate effectiveness in driving rain, howling gale, and dead-calm air equally.",sigil:"📊",clanHonor:90},{id:"air_039",name:"Airborne",element:"Air",description:"The Airborne clan consists entirely of warriors who never voluntarily touch the ground, conducting all aspects of life — sleeping, eating, training, governing — on floating platforms or wing-frames. They have developed a philosophical position that contact with earth is spiritually contaminating, and their purification rituals for those who must temporarily descend are elaborate and time-consuming. Airborne warriors are the most naturally gifted aerial combatants in Aetheria because flight is genuinely their native state; they fight in three dimensions as intuitively as earth-warriors fight on flat ground. Outsiders who observe an Airborne training exercise often describe it as watching a different species, so completely does the clan's martial art exploit the vertical axis.",sigil:"🛫",clanHonor:93},{id:"air_040",name:"Skyforged",element:"Air",description:"Skyforged smiths have mastered a forge technique using lightning strikes as their heat source, producing weapons of a crystalline metallic structure unobtainable through conventional furnace methods. Their lightning-forged blades hold an edge longer than any earth-forged equivalent and carry a faint electrical charge that numbs the hands of those struck. The forge process requires catching and channeling actual lightning, a working environment that has claimed the lives of a dozen master smiths over the clan's history. Skyforged weapons are among the most coveted in Aetheria — a genuine Skyforged blade identifies its owner as someone of extraordinary wealth or accomplishment, and forgeries are common but detectable to any trained air-mage who senses the difference in the blade's elemental resonance.",sigil:"⚔️",clanHonor:91}],dg=[{id:"lightning-001",name:"Arc Viper",element:"Lightning",description:"The Arc Viper clan traces its origins to a desert canyon where voltaic serpents nest among crackling obsidian spires. Warriors of this clan coat their blades in viper venom that, when charged with arc-energy, becomes a paralyzing conductor capable of stopping a charging rhinolith mid-stride. Their distinctive hood-cloaks flare outward like a cobra's collar when static builds to combat pitch, warning foes of the lethal strike to come. Every initiate must reach bare-handed into a live viper nest and endure the combined toxin and shock to prove their body can harmonize with electric pain. The Arc Vipers are widely feared as assassins and skirmishers, leaving only scorch-trails and paralyzed victims in their wake.",sigil:"⚡🐍",clanHonor:78},{id:"lightning-002",name:"Thunder Drake",element:"Lightning",description:"Thunder Drake clan members ride storm-drakes — massive reptiles whose scales carry a natural piezoelectric charge amplified through generations of selective breeding. The clan originated on the Storm Shelf plateau, where lightning strikes the earth over three hundred days each year, and the drakes evolved alongside the thunder rather than fleeing it. Riders bond to their drakes in a ritual called the Resonance Binding, in which both creature and rider are simultaneously struck by a channeled bolt and survive through mutual will. In battle formations, Thunder Drake cavalry wheel in tight arcs, dragging static corridors that detonate on contact with enemy metal. Their banner, a serpentine drake backlit by a forked bolt, is recognized across twelve provinces as a harbinger of cavalry storms.",sigil:"🐉⚡",clanHonor:91},{id:"lightning-003",name:"Bolt Hawk",element:"Lightning",description:"Bolt Hawk warriors are the preeminent aerial scouts of the lightning clans, trained from childhood to leap between storm-crags using wire-frame gliding wings threaded with conductive filament. The clan inhabits the Aetheric Eyries, vertical towers of magnetite that hum perpetually with trapped charge, and children learn to read the skies before they learn to read text. When a Bolt Hawk dives in combat, she trails a luminous arc-thread behind her that can ignite on command, creating a falling curtain of fire between hawk and earth. The clan's hawks — large raptors with metal-tipped primary feathers — serve as living strike weapons, launched at enemy commanders from altitude. No other lightning clan has mapped the upper storm-bands as precisely, and Bolt Hawk cartographers sell their sky-charts only to those who pass a speed trial across a live arc-field.",sigil:"🦅⚡",clanHonor:84},{id:"lightning-004",name:"Storm Raven",element:"Lightning",description:"Storm Raven is a clan of omen-readers and battle-prophets who believe that every lightning flash is a sentence in the language of the sky-gods. Their seers record each strike pattern in obsidian tablets, cross-referencing branching shapes against a thousand years of accumulated omen-lore. In war, Storm Raven oracles walk the vanguard, calling out the precise moment the storm will favor attack — and their timing record is so accurate that generals pay fortunes to borrow even a single seer for a campaign. Warriors fight with raven-shaped kite-shields that carry a hidden discharge mechanism capable of releasing a stored bolt at point-blank range. The clan's ravens, trained to carry small charge-cells and drop them on enemy formations, have decided more than one siege in Aetheria's history.",sigil:"🦅🌩️",clanHonor:87},{id:"lightning-005",name:"Spark Wolf",element:"Lightning",description:"The Spark Wolf clan runs in packs, adopting coord
