h Serpent",element:"Time",description:"Epoch Serpents are the great historians of the time clans, their memory stretching back through personal experience across multiple lifetimes achieved through controlled temporal loops. Their eldest members have personally witnessed events centuries in the past, making them walking primary sources for historical scholarship. The clan guards against paradox with extraordinary vigilance, knowing their multi-life existence is the most paradox-vulnerable in Aetheria. Epoch Serpent testimony is legally accepted as eyewitness evidence regardless of how long ago the witnessed event occurred.",sigil:"🐍",clanHonor:82},{id:"TimeClan02",name:"Temporal Hawk",element:"Time",description:"Temporal Hawks scout across time as others scout across geography, sending their consciousness briefly forward or backward to observe conditions before committing forces. Their reconnaissance reports contain information about events that have not yet occurred, creating tactical advantages no conventional intelligence can match. The clan trains scouts to maintain emotional detachment from foreknowledge, understanding that observed futures are possibilities not certainties. Temporal Hawk scouts occasionally return from a forward observation visibly aged by the experience.",sigil:"🦅",clanHonor:77},{id:"TimeClan03",name:"Paradox Wolf",element:"Time",description:"Paradox Wolves are the daring risk-takers of the time world, deliberately creating minor temporal paradoxes as tactical weapons that destabilize the timeline around their enemies. The technique is extraordinarily dangerous — every paradox they create risks cascading into world-altering events. Paradox Wolf practitioners are the most carefully monitored members of the time-clan coalition precisely because their preferred tool could affect everyone. The clan accepts their pariah status because the technique is too effective to abandon.",sigil:"🐺",clanHonor:61},{id:"TimeClan04",name:"Chrono Bear",element:"Time",description:"Chrono Bears are the temporal monks of the time world, maintaining enormous libraries that track the branching possibilities of the timeline and preserve knowledge against its potential alteration. Their monasteries exist partially outside normal time, making them immune to most timeline alterations that would affect the surrounding world. When history changes, Chrono Bear archivists remember what it was before and quietly work to assess whether the alteration was sanctioned. They are the time clans' institutional memory when even time itself has forgotten.",sigil:"🐻",clanHonor:89},{id:"TimeClan05",name:"Loop Drake",element:"Time",description:"Loop Drakes are temporal predators who have mastered the art of creating localized time loops that trap prey in repeating moments while the Drake itself moves freely. Their bonded drakes entered a spontaneous loop centuries ago and have emerged as creatures that exist in all iterations of their loop simultaneously. A Loop Drake warrior can fight what appears to be a single enemy but is actually the same enemy in twenty simultaneous moments. Breaking out of a Loop Drake trap requires either extraordinary willpower or the exact moment the Drake chose to anchor the loop.",sigil:"🐲",clanHonor:86},{id:"TimeClan06",name:"Rift Raven",element:"Time",description:"Rift Ravens carry messages through temporal rifts — tears in the timeline that connect different moments — delivering correspondence across years or centuries rather than distances. Their ravens have been selectively bred for temporal tolerance, their bodies capable of surviving rift-travel that would be fatal to ordinary birds. The clan's rift-mail service allows communication with past or future versions of a recipient, a service with extraordinary and ethically complex applications. Rift Ravens are rigorously neutral; they carry the message without judgment.",sigil:"🦅",clanHonor:65},{id:"TimeClan07",name:"Era Fox",element:"Time",description:"Era Foxes are temporal merchants who trade in objects from different eras — artifacts from the deep past or technology from potential futures that are valuable in the present. Their market operates across time as well as space, with some Era Fox merchants maintaining business relationships with clients not yet born. The clan carefully vets every transaction for paradox risk, refusing deals that could create problematic loops. An Era Fox rarity — an object that technically does not yet exist — commands prices that bankrupt kingdoms.",sigil:"🦊",clanHonor:70},{id:"TimeClan08",name:"Timeline Titan",element:"Time",description:"Timeline Titans are the guardians of the primary timeline, enormous warriors who exist simultaneously across multiple points in history and can physically intercept attempts to alter the past. Their bodies have been temporally extended through a ritual that stretched their existence across centuries, giving them both the experience of extreme age and the strength of peak youth simultaneously. A Timeline Titan defending a historical moment is effectively impossible to circumvent because they see the attack coming from any temporal direction. The clan considers the integrity of the timeline more important than any individual outcome.",sigil:"⏱️",clanHonor:93},{id:"TimeClan09",name:"Moment Boar",element:"Time",description:"Moment Boars are combat specialists who compress decades of physical training into single combat moments through temporal manipulation, fighting with the accumulated skill of a lifetime applied instantaneously. Their charging technique delivers a strike that contains the force and precision of thousands of hours of practice experienced in a fraction of a second. Opponents report that fighting a Moment Boar is like facing an enemy who has trained specifically against every technique the opponent knows. The clan's physical practice regimen spans literally centuries of personal subjective time.",sigil:"🐗",clanHonor:80},{id:"TimeClan10",name:"Flux Wyvern",element:"Time",description:"Flux Wyverns bond with temporal wyverns whose bodies exist in a state of constant temporal flux — aging and de-aging in rapid cycles that make them effectively immortal and immune to time-based attacks. The riders synchronize their own temporal state with their mount, sharing the protective flux effect during combat. A Flux Wyvern formation on a battlefield is surrounded by visible temporal distortion that causes equipment, arrows, and spells to age unpredictably mid-flight. The clan's riders age visibly faster than ordinary people due to the accumulated effect of flux-riding.",sigil:"🐲",clanHonor:85},{id:"TimeClan11",name:"Epochborn",element:"Time",description:"Epochborn claim to have been present at the beginning of time itself, their founding members having paradoxically existed before the conditions for their own birth were established. This self-referential origin gives them a unique perspective on causality that other time clans find either profound or exhausting. Epochborn elders speak about events from before recorded history with the casual familiarity of personal memory. The clan's philosophical positions consistently challenge the assumptions that underpin time-clan law.",sigil:"🌅",clanHonor:87},{id:"TimeClan12",name:"Temporalbound",element:"Time",description:"Temporalbound priests are anchored to specific moments in time rather than places, their consciousness always partially present in their anchor moment regardless of where they physically stand. The anchor gives them perfect knowledge of everything that occurred in the moments surrounding their anchor point — a comprehensive if narrow temporal record. Temporalbound stationed at historically significant moments serve as living witnesses whose testimony about those events cannot be challenged. The clan views their binding not as a limitation but as an extraordinary form of specialization.",sigil:"🔗",clanHonor:73},{id:"TimeClan13",name:"Paradoxfall",element:"Time",description:"Paradoxfall commemorates the catastrophic temporal accident that created the clan — an uncontrolled paradox that folded thirty separate timeline branches into a single point, merging the populations of all thirty into one group who simultaneously remembered all thirty histories. The result is a clan of people who each carry memories of dozens of different childhoods, parents, and life trajectories. Paradoxfall warriors are terrifyingly unpredictable because they draw on tactical knowledge from thirty different military traditions in the same body. They have made peace with their impossible origin and consider their multiplicity a gift.",sigil:"💫",clanHonor:69},{id:"TimeClan14",name:"Chronomark",element:"Time",description:"Chronomark serves as the official time-keeper and calendar authority of the time-clan coalition, maintaining accurate records of when temporal events occurred relative to the primary timeline. Their chronometers are the most accurate measuring devices ever created, sensitive to timeline fluctuations invisible to all other instruments. When a timeline alteration occurs, Chronomark registers it and begins the audit process that determines whether the change was authorized. The clan is involved in approximately every significant temporal dispute in Aetheria.",sigil:"📋",clanHonor:76},{id:"TimeClan15",name:"Temporalpeak",element:"Time",description:"Temporalpeak occupies the point in the timeline where temporal energy is most concentrated — not a physical peak but a temporal one, the moment of maximum time-density that the clan calls home. Their settlement exists in this high-energy moment while maintaining physical presence in the conventional world, giving residents access to amplified temporal power at all times. The density of time at Temporalpeak means that events there are always slightly more real than events elsewhere — more vivid, more impactful, and more lasting. Visitors report feeling that every moment spent there counts double.",sigil:"⛰️",clanHonor:81},{id:"TimeClan16",name:"Epochvault",element:"Time",description:"Epochvault stores knowledge and artifacts in temporal stasis — pockets of stopped time that preserve contents in perfect condition across any span of conventional time. Their vaults have been opened after thousands of years of storage to reveal contents in pristine condition. The clan is the safest repository for anything that must survive an uncertain future. Every major civilization in Aetheria maintains an Epochvault deposit as insurance against catastrophic knowledge loss.",sigil:"🏦",clanHonor:84},{id:"TimeClan17",name:"Paradoxpiercer",element:"Time",description:"Paradoxpiercers craft weapons that exist in the moment before and after impact simultaneously, making them impossible to dodge in the conventional sense — they have already hit before the dodge begins. The temporal bifurcation required to maintain such a weapon is incredibly energy-intensive, limiting their use to the most critical engagements. Paradoxpiercer arrows are the only projectile known to reliably strike temporal entities that have phased partially out of the present moment. The clan's weapon-craft is considered the most sophisticated temporal technology ever applied to warfare.",sigil:"🗡️",clanHonor:72},{id:"TimeClan18",name:"Chronowarden",element:"Time",description:"Chronowardens are the law enforcement arm of the time clans, patrolling the timeline for unauthorized alterations and apprehending temporal criminals across any era they flee to. Their wardens carry temporal anchors that allow them to pursue suspects through timeline branches without becoming lost. The clan maintains a wanted registry that spans centuries of historical time, with active warrants pursued regardless of when the crime occurred. A Chronowarden pursuit has been known to span three generations of quarry before final apprehension.",sigil:"🛡️",clanHonor:88},{id:"TimeClan19",name:"Temporalstride",element:"Time",description:"Temporalstride practitioners move through time as their primary mode of travel, covering decades as easily as others cover miles. Their stride technique allows them to arrive at any historical moment within their practiced range, though the return is always to the same present moment they departed from. The clan serves as temporal couriers, consultants, and witnesses — capable of attending an event in the past and returning with a firsthand account the same subjective day. Temporalstride fees are steep because every commission carries paradox risk.",sigil:"🚶",clanHonor:67},{id:"TimeClan20",name:"Epochmark",element:"Time",description:"Epochmark registers the temporal coordinates of all significant historical events, maintaining a master timeline index that serves as the reference standard for all time-clan navigation. Their index is so comprehensive that it includes events not yet known to have occurred, pre-registered based on temporal echo analysis. Every time-clan expedition must log their destination coordinates with Epochmark before departing, allowing recovery expeditions to be dispatched if they do not return. The clan has never lost a registered expedition without eventual recovery.",sigil:"🔖",clanHonor:59},{id:"TimeClan21",name:"Paradoxgate",element:"Time",description:"Paradoxgate maintains the primary temporal transit points through which sanctioned timeline travel passes, ensuring all traffic is logged, inspected, and authorized before crossing. Their gates exist at moments of natural temporal thinness where transit requires the least energy and creates the smallest disturbance. Unauthorized transit through Paradoxgate locations is detectable and traceable — the clan uses this capability extensively in timeline law enforcement. Paradoxgate has denied transit to three would-be temporal tyrants in recorded history, each time preventing catastrophic alteration.",sigil:"🚪",clanHonor:83},{id:"TimeClan22",name:"Chronoborn",element:"Time",description:"Chronoborn practitioners claim to have been born from time itself rather than from parents, their existence a consequence of temporal processes rather than biological ones. This origin — accepted as literal fact by the clan and metaphorical philosophy by skeptics — gives them an intuitive sense of time's flow that no training can replicate. Chronoborn navigators make no errors in temporal calculations that defeat even experienced time-travelers. Their sense of the timeline is so refined that they report feeling nauseous when the timeline is even slightly distorted.",sigil:"⏰",clanHonor:91},{id:"TimeClan23",name:"Temporalshaper",element:"Time",description:"Temporalshapers are the engineers of the time world, designing and building the structures — temporal anchors, flux stabilizers, and paradox containment vessels — that make controlled time manipulation possible. Their technical innovations underpin virtually every time-clan capability, most other clans relying on Temporalshaper infrastructure they could not build themselves. The clan charges licensing fees for their foundational technologies that constitute the largest portion of time-clan coalition revenue. A Temporalshaper engineer is the most sought-after technical talent in Aetheria.",sigil:"⚙️",clanHonor:78},{id:"TimeClan24",name:"Epochveil",element:"Time",description:"Epochveil practitioners wrap subjects in temporal displacement fields that make them appear to exist in a slightly different moment than they actually do — a fraction of a second ahead or behind that makes them impossible to target precisely. The technique is profoundly disorienting for the veiled subject, who experiences the world as perpetually almost-current. Epochveil guards have made their clients functionally invulnerable to assassination for the duration of engagement. The longest sustained Epochveil on record lasted three years, at the end of which the protected subject required months of temporal rehabilitation.",sigil:"🕸️",clanHonor:74},{id:"TimeClan25",name:"Paradoxweave",element:"Time",description:"Paradoxweave artisans create textiles from temporal fibers — threads of time itself extracted at moments of high density and woven into fabric that carries its moment's properties indefinitely. A garment woven from a moment of great victory lends its wearer a subtle but measurable confidence and strength. Paradoxweave cloth degrades if the timeline of its source moment is altered, a characteristic that makes the garments sensitive indicators of temporal disturbance. The clan refuses to weave from moments of catastrophe regardless of the price offered.",sigil:"🧵",clanHonor:68},{id:"TimeClan26",name:"Chronopeak",element:"Time",description:"Chronopeak is the highest point in the timeline itself — the moment of greatest temporal energy density the clan has located and established as a permanent base. From there, they can observe the flow of time in both directions with clarity unavailable from any lower temporal vantage. Chronopeak observers have identified approaching temporal crises centuries before they manifest, giving the time-clan coalition warning and preparation time that has prevented several timeline-threatening events. The clan considers their position a responsibility of the highest order.",sigil:"⛰️",clanHonor:90},{id:"TimeClan27",name:"Temporalsong",element:"Time",description:"Temporalsong priests maintain the harmonic frequencies that keep the timeline flowing smoothly, their chants a form of temporal maintenance that prevents the natural fraying that accumulates from intensive time-clan activity. Without regular Temporalsong ceremonies, the time-clan coalition's activity would produce visible timeline degradation within a generation. The clan conducts their most important ceremonies at temporal nodes, their voices carrying across time as well as space. Other time clans maintain a deeply respectful relationship with Temporalsong, understanding that the coalition's continued existence depends on their work.",sigil:"🎵",clanHonor:85},{id:"TimeClan28",name:"Epochharbor",element:"Time",description:"Epochharbor operates the temporal drydocks where time-traveling vessels are maintained, repaired, and upgraded between expeditions. Their shipwrights work on craft that exist partially outside normal time, requiring tools and techniques that operate across temporal dimensions. An Epochharbor-certified vessel is guaranteed to return to its departure moment within the registered tolerance regardless of how far it travels. The clan's harbor is simultaneously the busiest and the most serene location in the time-clan world — activity everywhere, yet always returning to the same moment.",sigil:"⚓",clanHonor:63},{id:"TimeClan29",name:"Paradoxstone",element:"Time",description:"Paradoxstone alchemists extract temporal minerals from the geological record — physical matter that has existed through so many eras it has become partially temporally conductive. Their reagents are essential components in every significant temporal technology, making them indispensable partners to the engineering clans. The extraction process requires working at geological timescales, aging certain processes through centuries of accelerated time to yield usable quantities of material. Paradoxstone's quarterly output is small enough to fit in a single pack animal's load, yet that amount powers a year of coalition temporal operations.",sigil:"🪨",clanHonor:75},{id:"TimeClan30",name:"Chronocrown",element:"Time",description:`Chronocrown rules the time-clan council from a position of temporal authority — their crown contains a fragment of the First Moment, the beginning of time itself, whose influence lends legitimacy that no political maneuvering can replicate. The crown ages every wearer slightly in the direction of greater wisdom — a side effect considered a benefit by the clan's ruling tradition. Chronocrown has maintained an unbroken ruling lineage for what their records describe as "before time was keeping track," a phrase that other clans find either profound or evasive. Their rule is legitimate, ancient, and largely fair.`,sigil:"👑",clanHonor:94},{id:"TimeClan31",name:"Epochshroud",element:"Time",description:"Epochshroud specialists wrap historical events in temporal obscuration — deliberately making them difficult to observe or access from the timeline — as a preservation technique for preventing unauthorized alteration. The shrouding process makes shrouded events appear as gaps in the timeline, requiring significant skill to locate and navigate. The clan maintains a classified registry of all shrouded events and the reasons for their protection. Epochshroud is the time-clan coalition's primary tool for protecting historical events deemed too important to risk alteration.",sigil:"🌫️",clanHonor:79},{id:"TimeClan32",name:"Paradoxvein",element:"Time",description:"Paradoxvein maps the currents of paradox energy that flow through the timeline, identifying dangerous concentrations and safe channels through the temporal landscape. Their cartography is essential for any time-clan expedition longer than a generation in either direction. Navigating without a Paradoxvein chart through high-paradox-density regions is considered suicidal by experienced temporal travelers. The clan updates their charts continuously, as paradox concentrations shift with every timeline alteration anywhere in the network.",sigil:"🌿",clanHonor:71},{id:"TimeClan33",name:"Chronogate",element:"Time",description:"Chronogate controls the network of authorized transit points through which time-clan members and licensed travelers move through the timeline. Their gate system is the only sanctioned method for crossing more than a decade in either temporal direction, and unlicensed crossing is a serious crime. Chronogate operators are trained to assess paradox risk in real time, closing gates within seconds of detecting dangerous timeline instability. The clan has shut down their entire network four times in history — each time preventing a paradox cascade that would have been globally catastrophic.",sigil:"🚪",clanHonor:82},{id:"TimeClan34",name:"Temporalborn",element:"Time",description:"Temporalborn are children of temporal practitioners who were conceived during a time-traveling expedition, born at a moment different from the one their parents departed from. This unusual circumstance gives them a native relationship with temporal displacement that no training can replicate. Temporalborn individuals experience time non-linearly from birth, seeing their personal timeline as a landscape they move through rather than a river carrying them forward. Their perspective makes them invaluable navigators and catastrophic partners in relationships with conventionally time-experiencing people.",sigil:"⏰",clanHonor:66},{id:"TimeClan35",name:"Epochwarden",element:"Time",description:"Epochwardens are the most senior law enforcement figures in the time-clan world, with authority that spans the entire timeline and jurisdiction over any temporal crime regardless of when or where it was committed. Their warrants are written to cover all points in time simultaneously, ensuring they cannot be escaped by temporal flight alone. Epochwardens operate independently without supervision, their judgment trusted by the coalition because the selection process filters for individuals whose moral compass withstands multi-century scrutiny. There have been only seven Epochwardens in the entire history of the time-clan coalition.",sigil:"🛡️",clanHonor:92},{id:"TimeClan36",name:"Paradoxcrest",element:"Time",description:"Paradoxcrest creates heraldic marks for the time-clan world — sigils encoded with the paradox-signature of their bearer, making them unique and impossible to forge because each paradox-signature is as individual as a fingerprint. Their crest-makers work in multi-temporal space, applying marks in both the past and present simultaneously to create the verification signature. A Paradoxcrest mark authenticates not just the clan but the specific timeline branch the bearer originates from. The clan is the first and last word on temporal identity verification.",sigil:"🎨",clanHonor:64},{id:"TimeClan37",name:"Chronofall",element:"Time",description:"Chronofall commemorates the paradoxical founding of the clan — which their records show occurring after the clan had already existed for a century. The founding event was created by future clan members who went back to establish the origin that had always been in the historical record. This closed causal loop is the clan's philosophical centerpiece: they created themselves, which they consider both deeply humbling and supremely responsible. New members are initiated by being shown the temporal record of their clan's impossible founding and invited to make peace with it.",sigil:"🌧️",clanHonor:74},{id:"TimeClan38",name:"Temporalmark",element:"Time",description:`Temporalmark maintains the official census and genealogical records of all time-clan members across their non-linear lifetimes, a task of extraordinary complexity given that members may exist in multiple moments simultaneously. Their records must account for branches, loops, and paradox events that complicate what "a person's history" means in the time-clan world. Temporalmark archivists are trained to think in multiple temporal dimensions simultaneously, a skill that takes decades to develop and makes them difficult conversationalists for conventionally-experiencing people. Their records have resolved more inheritance disputes than any other institution in Aetheria.`,sigil:"📋",clanHonor:57},{id:"TimeClan39",name:"Epochpeak",element:"Time",description:"Epochpeak occupies the highest temporal vantage available to mortal practitioners — the point from which the entire timeline can be observed simultaneously as a single landscape. The view from Epochpeak is described by those who have reached it as simultaneously the most beautiful and most terrifying experience available to a conscious being. Most who achieve the vantage can only sustain the perspective for moments before the comprehension becomes overwhelming. The clan dedicates itself to developing the mental frameworks necessary to function at this altitude long enough to be useful.",sigil:"⛰️",clanHonor:88},{id:"TimeClan40",name:"Paradoxmantle",element:"Time",description:"Paradoxmantle warriors wear cloaks woven from paradox energy — impossibly real objects that exist before their causes and whose presence destabilizes local causality for enemies while leaving the wearer untouched. Attacks directed at a Paradoxmantle warrior arrive before they were launched, creating response opportunities that seem like supernatural precognition. The mantles are the most sophisticated and dangerous personal temporal artifacts ever created, requiring three time-clan engineers' lifetime work to produce each one. There are currently nine Paradoxmantles in existence, making them among the rarest weapons in Aetheria.",sigil:"🌀",clanHonor:95}],co=[...sg,...lg,...hg,...cg,...dg,...ug,...mg,...gg,...fg,...pg];function yg(e){return co.filter(t=>t.element===e)}const ur=[{id:"TempestCircle",name:"Tempest Circle",element:"Air",celestialEvent:"The Eye of the Grand Cyclone",descriptionParagraph1:"Born in the high plateaus of the Aetherian Windspire Mountains, Tempest Circle was codified by the wandering sage Orryn Vael after decades spent observing how storm eagles hunted inside the eye of monsoons. The philosophy holds that stillness and chaos are not opposites but twin expressions of the same breath, and that a warrior who can embody both simultaneously becomes as unstoppable as a hurricane. Ancient scrolls recovered from the Windspire Monastery describe initiates being blindfolded atop rocky summits and left to feel the air's shifting intentions before they were ever taught a single strike. The style was nearly lost after the Collapse of the Third Aetherian Age, preserved only in fragments smuggled out by a handful of Orryn's last disciples.",descriptionParagraph2:"In practice, Tempest Circle fighters enter a low, rotating stance and generate continuous momentum through sweeping circular motions of the arms and core, allowing them to redirect an opponent's force rather than absorb it. The style excels at crowd control, enabling a single practitioner to deflect and scatter multiple assailants by cycling between explosive outward spirals and tight inward vortices. Its primary weakness lies in sustained one-on-one grappling: the constant motion that is its strength becomes a liability against wrestlers who can interrupt the rotational flow and pin the fighter's center of gravity. Masters of Tempest Circle are said to achieve a trance-like state during combat in which they perceive incoming threats as disturbances in the air pressure long before they arrive.",statBonuses:{agility:7,speed:5,strength:2,defense:1}},{id:"InfernoStrike",name:"Inferno Strike",element:"Fire",celestialEvent:"The Solar Coronation of the Red Giant",descriptionParagraph1:"Inferno Strike traces its lineage to the war-priests of the Emberveil Sanctum, who believed the sun was not merely a celestial body but the exposed fist of a divine warrior eternally punching through the heavens. Their doctrine taught that the highest expression of fire was not destruction but revelation — the burning away of everything false to expose the pure, indestructible core beneath. Novices spent their first year studying the behaviour of different flames: the patient creep of embers, the violent roar of magma vents, the fleeting dance of a candle in wind. This deep catalogue of fire's moods was meant to teach the student that power without control is just a wildfire waiting to consume its own fuel.",descriptionParagraph2:"Technically, Inferno Strike centres on explosive, linear attacks delivered in rapid three-strike bursts — a pattern practitioners call the Kindling, the Catch, and the Conflagration. The first strike tests the opponent's guard, the second exploits the micro-opening created, and the third drives through with full body weight and elemental force channelled into the fist or weapon edge. The style boasts devastating offensive output against static or heavily armoured foes whose bulk makes them slow to reposition. Its critical weakness is endurance: the ferocious energy expenditure means that extended engagements heavily favour opponents who can survive the opening barrage and weather the practitioner into exhaustion.",statBonuses:{strength:8,criticalChance:6,speed:3,defense:-1}},{id:"TidalSurge",name:"Tidal Surge",element:"Water",celestialEvent:"The Convergence of the Twin Moons",descriptionParagraph1:"Tidal Surge emerged from the coastal city-states of the Aetherian Shelvian Reach, where sailors and pearl divers developed a combat tradition that mirrored the behaviour of the ocean itself — yielding to be powerful, advancing in waves rather than single charges, and trusting that persistence erodes even the hardest stone. The style's foundational text, the Aqua Codex, teaches that water has no ego: it takes the shape of whatever contains it and therefore can never truly be stopped, only redirected. Unlike many elemental traditions, Tidal Surge was historically practiced equally by women and men, as it prizes breath control and rhythmic timing over raw physical mass. The style gained widespread respect during the War of the Shallows when a company of Tidal Surge warriors dismantled a mercenary force twice their size without losing a single practitioner.",descriptionParagraph2:"Combat in Tidal Surge unfolds in rhythmic pulses: the fighter advances with a fluid rushing attack, retreats to draw the opponent's counter, and then surges forward again with compounding force — each wave landing harder than the last as the opponent's balance deteriorates. The style is supremely effective against impatient or aggressive fighters whose own momentum can be borrowed and turned against them. Extended engagements suit Tidal Surge practitioners, as their superior breath management and calm temperament allow them to outlast opponents who expend energy in frustrated flurries. The style struggles significantly against defensive fighters who refuse to advance, since the wave-and-withdraw rhythm requires a moving target to function at full effectiveness.",statBonuses:{endurance:7,agility:5,strength:3,vitality:3}},{id:"StoneWall",name:"Stone Wall",element:"Earth",celestialEvent:"The Great Terrestrial Alignment",descriptionParagraph1:"Stone Wall is one of the oldest codified fighting traditions in Aetheria, said to have been developed by the first Dwarven Shield-Lords of the Korrathian Depths during an age when subterranean wars were fought in tunnels so narrow that mobility was impossible and survival demanded absolute solidity. The philosophy is brutally simple: that all offensive force in the universe will eventually exhaust itself against something that simply refuses to move, just as rivers slowly surrender to mountains. Stone Wall masters spend years in meditative exercises designed to eliminate the instinctive flinch response, training themselves to meet incoming strikes with absolute stillness until the moment of perfect counter opportunity arrives. This philosophy extends beyond combat into a broader worldview of patience and permanence that Stone Wall practitioners often carry into every aspect of their lives.",descriptionParagraph2:"A Stone Wall practitioner anchors in a wide, immovable low stance with arms positioned to deflect and absorb rather than evade, presenting the thickest possible defensive profile to the opponent. The style excels in confined spaces and sustained sieges, making it invaluable in dungeon encounters and corridor warfare where the lack of room to manoeuvre strips faster styles of their greatest advantage. Counterattacks are delivered as short, devastating power strikes the moment an opponent's attack cycle completes, exploiting the natural window of vulnerability after a committed blow. Stone Wall's greatest liability is its near-total lack of ranged or mobile options: ranged attackers and fleet-footed fighters who can dictate engagement distance will systematically dismantle a Stone Wall practitioner who cannot force a close-quarters exchange.",statBonuses:{defense:10,vitality:6,strength:4,agility:-2}},{id:"GaleStep",name:"Gale Step",element:"Air",celestialEvent:"The Passing of the Wandering Comet",descriptionParagraph1:"Where Tempest Circle courts the power of the storm, Gale Step honours the wind's most essential quality — its freedom to be anywhere and nowhere simultaneously. The style was developed by the Aetherian courier-monks of the Windthread Order, who travelled vast distances on foot across open plains and needed a combat tradition that could protect them without burdening them with heavy armour or cumbersome weapons. The founding insight came when a young monk named Sifara Olan noticed that a grasshopper consistently escaped predators not by being faster in a straight line, but by changing direction so unpredictably that the predator's mind could not model where it would be next. The style has since been embraced by scouts, assassins, and duellists who prize the ability to dictate the position of an engagement over raw offensive power.",descriptionParagraph2:"Gale Step fighters maintain a constantly shifting weight distribution that allows them to instantaneously redirect movement in any of eight cardinal directions from a single triggering step, making their positioning genuinely difficult to predict or track visually. Strikes are delivered as quick, light combinations whose purpose is as much to create repositioning opportunities as to deal damage, with practitioners often prioritising perfect positioning over heavy single hits. The style is extraordinarily effective against slower or more committed fighting styles, as its evasive capacity allows the Gale Step practitioner to make an opponent feel perpetually off-balance and reactive. It performs poorly against area-of-effect attacks, wide sweeping weapons such as halberds or greataxes, and skilled grapplers who can restrict the space needed for the constant micro-repositioning the style depends upon.",statBonuses:{speed:9,agility:8,evasion:5,strength:1}},{id:"FrostEdge",name:"Frost Edge",element:"Ice",celestialEvent:"The Long Winter Solstice Eclipse",descriptionParagraph1:"Frost Edge was born in the glacial wastes of the Aetherian Boreal Reach, among the Icecaller clans who survived centuries of brutal winters by learning that cold is not an enemy but a teacher of absolute precision. The style's founding masters observed that ice, unlike other materials, preserves rather than destroys: a sword frozen at the moment of perfect extension maintains that perfection forever. This gave rise to the Frost Edge philosophy of the Crystalline Instant — the idea that every exchange contains exactly one moment of perfect technical opportunity, and that all training is directed toward sensing and occupying that moment with surgical accuracy. Frost Edge practitioners traditionally inscribe their weapons with geometric patterns representing the molecular structure of ice crystals, a reminder that the greatest power is found in ordered, deliberate form.",descriptionParagraph2:"Frost Edge technique focuses on extreme economy of motion, delivering blade or palm strikes along a single precisely calculated vector at the exact moment the opponent's guard presents a gap, rather than creating pressure through volume of attack. The style inflicts disproportionate damage per strike relative to its apparent effort, as the theoretical perfection of positioning means each blow lands on undefended or structurally weak points of the body. Frost Edge practitioners also excel at precision-based techniques that slow or stiffen opponents, creating the controlled conditions their style requires to function at peak efficiency. The style performs poorly in chaotic, high-speed exchanges where the calm assessment time needed to identify the Crystalline Instant is denied, making it vulnerable to berserker-class fighters whose sheer unpredictability drowns out the readable patterns Frost Edge masters rely upon.",statBonuses:{precision:8,criticalChance:7,agility:4,vitality:2}},{id:"ThunderFist",name:"Thunder Fist",element:"Lightning",celestialEvent:"The Storm Crown of the Arcing Heavens",descriptionParagraph1:"Thunder Fist was forged in the war colleges of the Aetherian Stormcallers' Guild during a period when lightning elementalism was at its peak influence, and ambitious martial scholars sought to compress the full destructive potential of a lightning bolt into the mechanics of unarmed striking. The style's legendary founder, Garath Voss, reportedly struck a temple bell with such focused elemental force that the concussive shockwave shattered every window in the district — an event now called the First Peal, and considered the birth moment of Thunder Fist as a codified art. The Guild's training manuals describe Thunder Fist not as a fighting style but as a philosophy of conversion: the transformation of patience into kinetic eruption, just as static charge builds invisibly in a stormcloud before releasing in a single blinding instant. The style has been adopted by soldiers and arena champions across Aetheria who need to end encounters before attrition becomes a factor.",descriptionParagraph2:"Thunder Fist technique requires practitioners to build internal elemental charge through a series of flowing preparatory movements, then release the accumulated energy in a single, devastatingly accelerated strike that the eye cannot follow at the speed it travels. The signature technique, the Thunderclap Palm, sends a shockwave through the opponent's body that disrupts both physical integrity and elemental focus simultaneously, making it particularly effective against other elemental-style fighters who rely on maintained concentration. The style is notorious among tournament referees for its tendency to end bouts before audiences feel satisfied, as a single landed Thunder Fist technique can incapacitate even heavily armoured opponents. Its critical weakness is the charge-up period: experienced fighters who recognise the preparatory stance can interrupt the charging sequence or close distance to neutralise the power of the strike before it can fully develop.",statBonuses:{strength:9,speed:6,criticalChance:5,defense:-2}},{id:"IronSkin",name:"Iron Skin",element:"Metal",celestialEvent:"The Passage of the Iron Star",descriptionParagraph1:"Iron Skin was developed in the foundry-cities of the Aetherian Forge Confederacy, where metalworkers who lived daily alongside molten metal and heavy industrial machinery needed a fighting doctrine that treated the body itself as the weapon — dense, unyielding, and resistant to forces that would destroy lesser materials. The style's foundational premise is that conventional armour is a crutch: true protection comes from cultivating the body's own elemental resonance with metal so completely that the distinction between flesh and forged steel begins to dissolve. Masters of Iron Skin are said to achieve a state called the Hardening in which their skin takes on a faint metallic lustre visible to elemental-sensitive observers. The style's training regimen is notoriously brutal, involving years of conditioning exercises designed to desensitise nerve endings and build extraordinary musculoskeletal density.",descriptionParagraph2:"In combat, Iron Skin practitioners absorb strikes with deliberate body positioning that channels incoming force into their reinforced musculature rather than deflecting it, trading damage for positional advantage and the psychological effect of visibly shrugging off blows that would fell normal fighters. The style's offensive components consist of short, heavy strikes from elbows, knees, and reinforced fists designed to maximise structural damage through density and placement rather than speed or technique. Iron Skin excels in wars of attrition, as the practitioner's superior pain tolerance and elemental conditioning allow them to win exchanges that would be losses for any other style. The style's most significant weakness is elemental: lightning-based techniques that conduct through metallic resonance can cause catastrophic internal disruption, and the heavy muscular conditioning that grants such impressive defence also reduces the flexibility and range of motion needed to avoid targeted strikes.",statBonuses:{defense:8,vitality:7,strength:5,agility:-3}},{id:"ShadowStep",name:"Shadow Step",element:"Shadow",celestialEvent:"The Night of the Moonless Conjunction",descriptionParagraph1:"Shadow Step is the oldest of the Umbral Arts, believed to have been first practiced by the Veil Walkers — a society of spies and assassins who served the pre-Collapse Aetherian Council and whose existence was officially denied for three centuries. The philosophical foundation of Shadow Step holds that visibility is the only true vulnerability: that which cannot be seen cannot be targeted, and a fighter who has mastered the art of existing in the spaces between observed positions has achieved a form of functional invincibility. The style's techniques were transmitted orally through generations, never committed to text, because the Veil Walkers understood that a written manual could fall into the wrong hands and create a counter-doctrine. What fragments of their philosophy survive describe shadow not as an absence of light but as a living element — a medium through which a trained consciousness can move with the same fluency that a swimmer moves through water.",descriptionParagraph2:"Shadow Step practitioners exploit peripheral vision's limitations and human pattern-recognition systems to appear to teleport between positions, using a combination of precise timing, counter-intuitive angles of approach, and shadow elemental attunement to minimise the time spent in a target's direct line of sight. Strikes are delivered from unexpected vectors immediately after a repositioning transition, denying the opponent the processing time needed to form an effective defence. The style is devastatingly effective in low-light environments and against opponents who rely heavily on visual tracking, and its practitioners are trained to manipulate torch placement, window angles, and any other environmental light source before an engagement begins. Shadow Step performs significantly worse in uniform high-intensity light, against opponents with non-visual sensing abilities such as tremorsense or elemental attunement, and in wide open spaces where the shadow-geometry that enables its repositioning tricks cannot be constructed.",statBonuses:{agility:7,speed:7,evasion:6,criticalChance:4}},{id:"TimeLock",name:"Time Lock",element:"Time",celestialEvent:"The Stillpoint of the Celestial Meridian",descriptionParagraph1:"Time Lock stands apart from every other fighting tradition in Aetheria in that its creation was not the product of a school, a war, or a single visionary master, but of an accident: a Chronos-attuned scholar named Veyrin Dass was caught in a temporal resonance event during an experiment and, for a subjective duration she could never precisely measure, experienced combat from a perspective in which time had become a navigable dimension rather than a fixed medium. What she returned with was not technique but understanding — the direct experiential knowledge that every fight is determined before its first strike by the intersection of trajectories that can be perceived and therefore altered by a sufficiently attuned mind. The Chronos Conservancy that preserves and teaches Time Lock does so with extraordinary selectivity, accepting fewer than a dozen initiates per generation, as the psychological demands of temporal attunement disqualify most candidates before their training is complete.",descriptionParagraph2:"Time Lock is less a collection of techniques than a perceptual framework: practitioners attune to the temporal flow of an engagement and develop the ability to identify moments where the probability cascade of an opponent's actions narrows to near-certainty, allowing them to position their counter before the triggering action has visibly begun. To an observer, a Time Lock master appears to respond to attacks before they are launched, creating the impression of prescience — which, in the functional sense that matters in combat, is precisely what it is. The style's offensive applications involve briefly anchoring an opponent's local time flow, creating windows of vulnerability that can be exploited with devastating precision. Time Lock is uniquely vulnerable to opponents whose decision-making is genuinely random or who are so consumed by berserker rage that their action patterns generate no readable temporal signature — chaos, in its truest form, is the one force that sits outside the style's predictive framework.",statBonuses:{precision:9,intelligence:7,agility:4,evasion:4}},{id:"BlazePath",name:"Blaze Path",element:"Fire",celestialEvent:"The Perihelion of the Blazing Wanderer",descriptionParagraph1:"Where Inferno Strike channels fire as concentrated, explosive force, Blaze Path honours fire in its most mobile and ungovernable expression — the brushfire, the torch-lit charge, the burning path that moves faster than anything can follow and leaves transformation in its wake. The style was developed by the Crimson Outriders, a cavalry tradition from the Aetherian Ashveld Plains who needed a combat doctrine that could be executed at full gallop, translated into dismounted dueling, and adapted to the psychological reality of warriors who spent their lives moving rather than holding ground. The Outriders' founding philosophy holds that fire's true nature is not heat but direction: a flame always knows where it is going, never hesitates, and cannot be stopped — only redirected or starved. Blaze Path practitioners are taught to embody this forward inevitability in every facet of their movement and mentality.",descriptionParagraph2:"Blaze Path's combat signature is relentless forward aggression executed through a series of directional charges that shift angle unpredictably between advances, preventing opponents from setting a solid defensive line against the incoming pressure. Unlike Inferno Strike's burst-and-recover rhythm, Blaze Path never pauses: the practitioner is always moving, always approaching, always presenting a new angle of threat that forces continuous reactive repositioning from the defender. The style excels against fortified or reactive fighters who prefer to wait for the perfect counter, as the relentless shifting angles deny them the predictable incoming vector they need. Blaze Path practitioners are most vulnerable to opponents who can match or exceed their speed and who have the tactical composure to disengage and re-engage at will, since a fighter who refuses to be cornered can simply let the Blaze Path practitioner exhaust their fuel before striking decisively.",statBonuses:{speed:8,strength:6,agility:5,defense:-1}},{id:"WaveRider",name:"Wave Rider",element:"Water",celestialEvent:"The Rising of the Pelagic Star",descriptionParagraph1:"Wave Rider was born on the open ocean among the Aetherian Sea-Kin, nomadic maritime people who lived aboard vessels in constant motion and developed a fighting philosophy shaped entirely by the reality that nothing in their world was ever still. Where Tidal Surge draws from coastal tidal patterns, Wave Rider draws from the deep ocean — the long, powerful swells that travel thousands of miles without losing force, the unpredictable cross-currents that can overturn even experienced sailors, and the fundamental truth the Sea-Kin called the Oldest Law: that the sea does not fight, it simply continues. Wave Rider masters are identified not by any formal ranking system but by the tattoo of a cresting wave on the inner wrist, which they earn after successfully demonstrating the style's advanced techniques during a storm at sea.",descriptionParagraph2:"The technical core of Wave Rider is the ability to use the body's own rising and falling momentum — the same physical rhythm that keeps a sailor balanced on a moving deck — as the primary power source for both offensive and defensive techniques. Strikes are delivered on the downswing of the body's natural oscillation, adding gravitational force to muscular power in a way that requires significantly less effort than conventional striking. Defensive manoeuvres exploit the same principle in reverse, letting the body's upward rise absorb and redirect incoming force along its natural trajectory. Wave Rider is extraordinarily effective against rigid, structured fighting styles whose power depends on a stable platform, as the practitioner's fluid, constantly shifting base disrupts the mechanical assumptions on which those styles are built. The style struggles in completely enclosed spaces where the wide lateral movements that generate its characteristic swell-momentum are physically impossible to execute.",statBonuses:{agility:6,endurance:6,strength:4,vitality:5}},{id:"QuakeStance",name:"Quake Stance",element:"Earth",celestialEvent:"The Trembling of the World Pillars",descriptionParagraph1:"Quake Stance diverges dramatically from Stone Wall's philosophy of static resistance, instead embracing the earth's most violent and dynamic expression: the earthquake, which does not hold its ground but reshapes it. The style was developed by the Earthshaper covens of the Aetherian Deepwood Ranges, who observed that the most powerful geological events were not caused by the earth resisting pressure but by releasing it all at once in a single cataclysmic discharge. The Earthshapers believed that a warrior's greatest vulnerability was accumulation — the carrying of tension, of unresolved force, of emotional and physical stress that was never fully released — and that Quake Stance was a practice for learning to hold nothing and release everything at the moment of maximum effect. Their training involved extended periods of near-total stillness followed by explosive full-body movements, teaching the nervous system the art of the controlled seismic release.",descriptionParagraph2:"Quake Stance fighters adopt a deep, seismic stance and build pressure through subtle muscular coiling that is invisible to the untrained observer, then discharge accumulated force through devastating ground-oriented techniques: stomps that transmit shockwaves through the terrain, sweeping low strikes that destabilise opponents' footing, and body-weight throws that treat the earth itself as a weapon by returning opponents to it with maximum force. The style is particularly punishing in natural outdoor settings where uneven terrain amplifies its ground-shaking techniques and where the environmental chaos created benefits the practitioner while confusing their opponent. Quake Stance performs poorly against airborne opponents or those with levitation abilities, as the style's dependency on ground contact for its signature techniques renders them entirely ineffective when the opponent simply refuses to stand on the same surface.",statBonuses:{strength:9,defense:5,vitality:5,agility:-2}},{id:"WindDance",name:"Wind Dance",element:"Air",celestialEvent:"The Festival of the Aurora Winds",descriptionParagraph1:"Wind Dance is the most aesthetically refined of all Aetherian fighting traditions, originating in the imperial courts of the Silvane Dynasty where battle-arts and performance art were never considered separate disciplines. The style's founders, the Dancer-Blades of the Aetherian Imperial Guard, were required to be as accomplished in formal court performance as in lethal combat — a requirement that produced a style so visually fluid and graceful that audiences regularly failed to recognise it as a combat discipline until opponents were already defeated. Wind Dance philosophy holds that beauty and effectiveness are not in tension but are expressions of the same underlying truth: that any action executed with perfect efficiency is inherently beautiful, and that a fighter who chases only victory without grace has misunderstood what victory means. The style's practitioners maintain strict aesthetic standards even in life-or-death encounters, a discipline that paradoxically makes them more dangerous, not less, by eliminating all wasteful movement.",descriptionParagraph2:"Wind Dance technique flows between combat positions through sweeping, arc-based movements that look like choreographed performance but function as multi-layered defensive and offensive mechanics simultaneously — a spinning evasion doubles as the windup for a counterattack, a rising arm block creates the leverage for a throw. The style is exceptional at confounding opponents who rely on reading body language for tactical information, as the flowing, dance-like quality of the movements masks intent in a constant stream of seemingly identical graceful motion. Wind Dance practitioners are particularly formidable against aggressive opponents whose berserker energy can be borrowed, redirected, and used against them through the style's intricate deflection and counter mechanics. The style loses much of its effectiveness against patients, methodical fighters who refuse to attack aggressively, since the recycling of opponent momentum is central to its power generation, and a cautious opponent who moves carefully denies the practitioner the raw energy their techniques are designed to redirect.",statBonuses:{agility:8,speed:7,evasion:5,precision:3}},{id:"GlacialGuard",name:"Glacial Guard",element:"Ice",celestialEvent:"The Eternal Frost Conjunction",descriptionParagraph1:"Glacial Guard is the defensive counterpart to Frost Edge's surgical precision, drawing not from ice's cutting quality but from its structural one — the incomprehensible patience of a glacier, which moves too slowly to see yet carves mountains over millennia. The style was developed by the Icewarden Orders of the Aetherian Northern Barrier, soldiers whose duty was to hold mountain passes against invasion for weeks or months without relief, in conditions that would kill a less psychologically and physically conditioned warrior. The Icewardens' founding doctrine teaches that cold is the universe's default state and warmth is merely a temporary local exception: by attuning to the cold, a Glacial Guard practitioner achieves a kind of metaphysical stability that is unaffected by the temporary excitement of combat's heat. This philosophy produces warriors of extraordinary mental resilience who are extraordinarily difficult to unnerve or destabilise through psychological aggression.",descriptionParagraph2:"Glacial Guard practitioners maintain an upright, compressed defensive stance reinforced by ice elemental attunement that gradually increases their physical density and resistance as a combat encounter extends, meaning that attacks which would have been somewhat effective at the start of a fight become less effective the longer the engagement lasts. Offensive techniques are slow, deliberate, and precisely targeted — the practitioner identifies structural weaknesses in the opponent's guard with the patience of erosion and exploits them with measured, irresistible pressure. The style is devastating in sustained encounters against opponents whose own style degrades over time through fatigue or elemental depletion. Glacial Guard is critically weak against high-speed styles that attack faster than the defensive reinforcement can adapt, and against fire-elemental practitioners whose techniques directly counter the cold attunement that the style's defensive integrity depends upon.",statBonuses:{defense:9,vitality:7,endurance:6,speed:-2}},{id:"LightningFlow",name:"Lightning Flow",element:"Lightning",celestialEvent:"The Chain Lightning Cascade of the Storm Sea",descriptionParagraph1:"Lightning Flow was created as a deliberate philosophical response to Thunder Fist by dissident scholars within the Stormcallers' Guild who argued that their parent tradition had misunderstood lightning's true nature. Lightning, they argued, was not about the single explosive strike but about the chain: the way electrical current finds the path of least resistance, branching and flowing through any available conductor in a network that is simultaneously everywhere at once. These scholars, who called themselves the Current Collective, developed Lightning Flow as a style that channelled lightning elementalism not into raw destructive output but into a fluid, continuous current of connected techniques — each strike flowing into the next as naturally as electricity moves through a circuit. The Collective was eventually expelled from the Guild, which only strengthened Lightning Flow's identity as a counterculture tradition embraced by those who found Thunder Fist's single-strike philosophy philosophically inadequate.",descriptionParagraph2:"Lightning Flow technique operates through continuous connected chains of strikes in which the recovery from one blow becomes the initiation of the next, generating a self-perpetuating offensive rhythm that, once established, is extraordinarily difficult to interrupt without accepting damage. The style excels at overwhelming opponents who have strong defences against individual powerful attacks, as the sheer density of the strike chain means some portion of it will always find a path through. Advanced practitioners can simultaneously channel lightning current through their weapon and body, creating electrical conduction effects that compound the damage of the chain beyond the purely physical component of each individual strike. Lightning Flow's greatest tactical weakness is the recovery cost of its chains: if an opponent successfully interrupts or evades a chain at its midpoint, the practitioner is momentarily exposed during the fractional reset period before a new chain can be initiated.",statBonuses:{speed:8,agility:7,strength:4,criticalChance:4}},{id:"MetalForm",name:"Metal Form",element:"Metal",celestialEvent:"The Alignment of the Steel Constellation",descriptionParagraph1:"Metal Form occupies a unique position in Aetherian martial tradition as the only major fighting style co-developed by a human practitioner and a Forge Elemental — a being of living metal named Andresh that had achieved sapience after centuries of existence within the great smelting forges of the Confederacy. Andresh's contribution to Metal Form was the style's central insight: that metal's greatest strength is not its hardness but its formability — the capacity to be precisely shaped under the correct conditions, maintaining that shape with perfect fidelity until deliberately changed again. This principle translated into a fighting philosophy of intentional transitions: Metal Form practitioners do not flow fluidly between states as water-element styles do, but shift deliberately and completely between defined combat configurations — each one as rigid and purposeful as a specific forged tool.",descriptionParagraph2:"Metal Form combat involves the practitioner cycling between a small number of highly specialised stances — each optimised for a specific combat scenario — with deliberately executed transitions that momentarily expose a vulnerability but then snap into the new form with mechanical precision. The style excels at adaptability in a structured way: where fluid styles react intuitively, Metal Form responds with pre-forged solutions to pre-catalogued problems, making it extraordinarily reliable in predictable or well-studied combat scenarios. Advanced practitioners develop a complete Form Library of eighteen to thirty-six configurations, each named after a specific type of forged implement, with the depth of their Form Library being the primary indicator of mastery. Metal Form struggles against genuinely novel or improvised fighting approaches that fall outside the practitioner's catalogued Form responses, as the style's systematic nature can create a decision paralysis when no existing Form precisely addresses the situation encountered.",statBonuses:{defense:7,strength:6,precision:5,vitality:5}},{id:"RootBind",name:"Root Bind",element:"Wood",celestialEvent:"The Great Arboreal Solstice",descriptionParagraph1:"Root Bind is the living tradition of the Aetherian Grovekeeper clans, custodians of the ancient forests who developed a combat philosophy rooted in the understanding that trees are not passive or static but are engaged in constant, slow-motion competition for resources and light — a competition that is utterly ruthless despite its apparent gentleness. The Grovekeepers observed that forests do not fight by striking but by binding: roots entangle and displace competing root systems, canopies close out the light that rivals need, mycorrhizal networks are rewired to starve unwanted species. They translated this into a human-scale combat doctrine that prizes entanglement, control, and the patient redirection of an opponent's resources over direct damage. Root Bind practitioners are trained extensively in improvised restraint techniques using available environmental materials, making them remarkably adaptable to forest and wilderness environments.",descriptionParagraph2:"Root Bind technique focuses on seizing and controlling an opponent's limbs, redirecting their energy into joint locks, throws, and immobilisation holds that progressively restrict their ability to generate effective offensive output — like a tree's roots slowly consuming the ground beneath a competitor until it topples without a single strike. The style is extraordinarily effective at neutralising physically stronger opponents, as its control-based mechanics work with leverage and technique rather than competing directly with the opponent's strength. Root Bind practitioners are also trained to weaponise terrain, using environmental features as anchors, barriers, and natural restraints that extend the style's binding philosophy into the landscape itself. The style's performance degrades sharply against opponents with supernatural strength sufficient to power through conventional joint locks, against those with ranged capabilities that prevent the close clinch range the style requires, and against multiple simultaneous opponents — whom a Root Bind practitioner cannot bind fast enough to prevent being overwhelmed from uncontrolled angles.",statBonuses:{strength:5,endurance:7,vitality:6,precision:5}},{id:"VoidStrike",name:"Void Strike",element:"Shadow",celestialEvent:"The Dark Rift Aperture",descriptionParagraph1:"Void Strike is considered by many Aetherian scholars to be the most philosophically extreme of all elemental fighting traditions, born from the Shadow Nihilist school of the Umbral Academy — a faction that took shadow elementalism not merely as a practical tool but as a metaphysical position. The Nihilists taught that shadow is not the absence of light but the presence of void — the primordial state that existed before light, to which all things will eventually return. Void Strike operationalises this philosophy into a combat doctrine that does not seek to defeat an opponent so much as to erase them: strikes are designed not to damage but to unmake, targeting the elemental bonds that hold a fighter's attunement and physical integrity together rather than simply damaging flesh and bone. The Academy formally distanced itself from the Nihilist faction after the Void Strike technique known as the Umbral Erasure was used to permanently sever a high-ranking Elementalist from their attunement, an act considered by the broader magical community to be a form of spiritual assassination.",descriptionParagraph2:"Void Strike strikes are delivered with a peculiar quality that experienced opponents describe as arriving from a direction that does not exist — the technique exploits shadow elementalism to attack through the spaces between observed positions in a way that is fundamentally different from Shadow Step's repositioning mechanics, targeting the target's elemental awareness itself rather than merely their physical defences. The style is uniquely dangerous against elemental practitioners of all traditions, as its void-based attacks disrupt elemental attunement in ways that conventional fighting styles cannot compensate for. Advanced Void Strike techniques can create sustained debilitation effects that persist after the physical encounter ends, reducing an opponent's elemental effectiveness for hours or days. Void Strike is considerably less effective against non-elemental fighters whose lack of attunement gives the style's anti-elemental mechanics nothing to target, and the deep shadow attunement required leaves practitioners personally vulnerable to high-intensity light-based techniques that can disrupt their own void connection.",statBonuses:{precision:8,criticalChance:7,intelligence:5,defense:-1}},{id:"EternalGaze",name:"Eternal Gaze",element:"Time",celestialEvent:"The Zenith of the Ageless Observatory",descriptionParagraph1:"Eternal Gaze is the rarest and most philosophically mature of all Aetherian fighting traditions — a style so demanding in its temporal requirements that it is said fewer than forty individuals across all of Aetherian recorded history have achieved genuine mastery of its deepest principles. Where Time Lock uses temporal perception to predict and intercept, Eternal Gaze draws from a far more profound time-attunement: the practitioner learns to perceive the entirety of a fight — its beginning, middle, and end — as a single simultaneous event, experiencing combat the way an immortal being might experience a human lifetime, as a unified whole that is neither linear nor subject to surprise. The style's founding philosophy, recorded in the single-volume text called the Chronicle of Still Moments, teaches that victory is not achieved in combat but selected: the Eternal Gaze practitioner, perceiving all possible versions of the fight at once, simply chooses the sequence of actions that corresponds to the timeline in which they are already victorious.",descriptionParagraph2:"In practice, Eternal Gaze manifests as a combat style of extraordinary economy and calm: practitioners often stand with apparent passivity as attacks approach and step aside with minimal movement, strike once with devastating effect at moments that seem impossibly well-timed, and disengage from scenarios that would be lethal with a tranquillity that observers frequently misinterpret as indifference. The style is functionally unmatched against any opponent whose action patterns can be read temporally — which encompasses nearly all conventional and elemental fighting traditions. Eternal Gaze practitioners almost never lose engagements they have chosen to enter, as their temporal perception allows them to identify losing timelines and decline those encounters before they begin. The style's famous weakness is existential: the temporal perception that grants such extraordinary capability also confronts the practitioner with the weight of all possible futures simultaneously, and masters of Eternal Gaze report that the most difficult discipline is not the technique itself but maintaining the will to engage at all when one can already see every possible outcome of every possible choice.",statBonuses:{intelligence:10,precision:8,evasion:6,agility:4}}],mr=[{id:"StarFlame",name:"Star Flame",description:"A vivid seven-pointed star sits at the center of the sternum, its tips trailing into thin, flame-like wisps that curl upward toward the collarbone and downward toward the navel; the mark glows faintly amber in firelight, as though embers smolder beneath the skin. The edges are sharp and symmetrical, with a warm copper hue that deepens to a rich cinnabar at the core, giving the impression that a distant sun has branded its sigil directly onto the bearer's chest. The Solari Covenant treats bearers as living omens of divine favor, granting them free passage through temple districts and an audience with high clerics denied to common folk. In the volcanic highlands of the Ember Reaches, Fire Clan chieftains will not raise a blade against a Star Flame bearer without first consulting their shamans, for legend holds that harming one brings three seasons of ash-blight upon their hearths. Merchants of the Goldspire Trading Company, however, grow quietly uneasy around bearers, believing the mark draws celestial attention and, with it, unpredictable fortune that disrupts their carefully balanced ledgers.",socialModifier:"Revered by Fire Clans",factionReaction:{SolariCovenant:"revere",EmberReachClans:"revere",GoldspireCompany:"distrust",ShadowCourt:"fear",IronForgeGuild:"neutral"}},{id:"TidalCrescent",name:"Tidal Crescent",description:"A perfectly formed crescent moon, wide as a palm, curves across the left shoulder blade, its two horns pointing downward as though cradling an invisible tide; the mark is a deep sea-blue shot through with faint silver lines that mimic the ripple of moving water when the skin flexes. Around its inner curve, a ring of tiny dots — each no larger than a freckle — traces the phases of the moon in precise astronomical order, suggesting a celestial map pressed into flesh. The Tidewarden Clans of the Shattered Coast revere bearers as chosen of the deep, offering them captaincy of any vessel and the right to mediate disputes between rival fishing fleets. In the inland Salteri Empire, where the ocean is mythologized as a god of chaos, courtiers regard the Tidal Crescent with open suspicion, and bearers may find palace gates closed to them without a letter of imperial dispensation. Pirate brotherhoods along the Amber Straits covet the mark intensely — not for reverence, but because ancient charts suggest that only a Tidal Crescent bearer can read the hidden tide-script etched into the Sunken Lighthouse of Mareveth.",socialModifier:"Claimed by the Sea's Own",factionReaction:{TidewardenClans:"revere",SalteriEmpire:"distrust",AmberStraitsBrotherhood:"covet",StormPetrelNavy:"revere",DesertConflux:"neutral"}},{id:"EarthRune",name:"Earth Rune",description:"Three interlocking triangles, each nested inside the last and all pointing downward, sprawl across the back of the right hand from knuckle to wrist; the lines are a rich umber-brown, slightly raised like old scar tissue, and carry the texture of cracked, sun-baked clay under close inspection. Tiny root-like tendrils branch from the outermost triangle, winding up past the wrist along the veins of the forearm before fading into ordinary skin near the elbow. The Stonehaven Druids consider the Earth Rune proof of a covenant with the world's core, and they will teach bearers geomantic rites otherwise withheld for decades of initiation. Mining consortiums throughout the Dwarven Holds believe the mark draws veins of ore to the surface, and will hire bearers at double wages — but they also guard them jealously, sometimes going so far as to forge contracts that border on indentured servitude. Noble families of the Verdant Reach dismiss the Earth Rune as a peasant's mark, a sign of common dirt-magic, and their court etiquette manuals explicitly categorize bearers as unsuitable for marriage alliances, regardless of any other merit.",socialModifier:"Bound to the Stone Covenant",factionReaction:{StonehavenDruids:"revere",DwarvenHoldConsortium:"covet",VerdantReachNobility:"distrust",FarmerCollective:"revere",ShadowCourt:"neutral"}},{id:"WindSpiral",name:"Wind Spiral",description:"An elegant double helix of pale silver-white spirals outward from a central point behind the left ear, sweeping along the jaw and curling to rest just beneath the cheekbone; the mark is barely visible in ordinary light, but in high winds it seems to quicken, the lines sharpening as though the air itself traces them fresh. The spiraling pattern tightens at its origin into a shape eerily reminiscent of a cyclone's eye, and the skin within that innermost curl is always a few degrees cooler than the surrounding flesh. Skyborne nomads of the Caelum Plateau treat Wind Spiral bearers as spirit-speakers capable of calming storm-seasons, and welcome them into their sky-tent councils with offerings of cloud-silk and dried altitude herbs. The Clockwork Protectorate of Velmoor distrusts anything smacking of weather-mysticism — their engineers regard the mark as a badge of superstition and will deny bearers access to the upper research tiers of the Aetheric Institute. Among the mercenary Gale Riders, the Wind Spiral is coveted because battlefield legend insists that bearers can feel the direction of an enemy charge in the shift of the air a full minute before it arrives.",socialModifier:"Speaker of the High Winds",factionReaction:{CaelumNomads:"revere",ClockworkProtectorate:"distrust",GaleRidersMercenaries:"covet",SeafaringGuilds:"revere",DesertConflux:"fear"}},{id:"ThunderBolt",name:"Thunder Bolt",description:"A jagged bolt of lightning — three sharp downward angles, each offset from the last — cleaves diagonally from the right temple to the edge of the jawline, rendered in a stark charcoal-black that stands in high contrast against any skin tone. The surrounding flesh carries a faint, permanent blush of violet, as though a storm's aftermath has stained the cheek, and bearers occasionally report a low electrical hum in their ears during heavy rainfall. Warlords of the Thundermarch Confederacy salute bearers on sight, believing the mark designates a soul touched by the god Vorrath at the moment of a lightning strike — they will not conscript such a person but will eagerly recruit them as battle-shamans. In the Silk Courts of Laventhor, where visible facial marks are associated with the criminal branding practices of three centuries past, ThunderBolt bearers are presumed to be escaped convicts and may be detained for questioning at any checkpoint. The Storm-Witch covens of the Mirethian Marshes covet the mark with an almost obsessive intensity, believing that a bearer's blood mixed with rainwater produces a divination ink of unparalleled clarity.",socialModifier:"Warlord's Omen",factionReaction:{ThundermarchConfederacy:"revere",SilkCourtsLaventhor:"distrust",StormWitchCovens:"covet",SolariCovenant:"fear",IronForgeGuild:"neutral"}},{id:"IceLotus",name:"Ice Lotus",description:"A twelve-petaled lotus blossom rests in perfect bloom across the left side of the neck, each petal rendered in a pale, glacial blue-white with fine crystalline veining that catches light like frost on a windowpane; the flower's center is a deeper cerulean, and the skin there is notably cool to the touch even in summer heat. Where the stem would be, two curved lines descend below the collar to vanish beneath clothing, suggesting the full plant continues unseen, rooted somewhere deeper in the body. The Frostspire Monks of Vaerath regard the Ice Lotus as a mark of spiritual stillness — the highest ideal in their contemplative tradition — and will grant bearers access to the Sealed Archives without the usual decade of novitiate. The Cindral Merchant Republic of the Southern Ports fears the mark, associating it with the legendary Pale Plague that froze entire harbor towns three hundred years ago, and health inspectors there may quarantine a bearer pending a medical review that can last weeks. Among the aristocracy of the Ashen Throne, the Ice Lotus is envied and coveted as an aesthetic symbol of composed power; noble families have been known to commission expensive tattoo-forgeries of it, a practice the bearers themselves find quietly insulting.",socialModifier:"Blessed by the Still Cold",factionReaction:{FrostspireMonks:"revere",CindralMerchantRepublic:"fear",AshenThroneAristocracy:"covet",TidewardenClans:"neutral",DesertConflux:"fear"}},{id:"IronGlyph",name:"Iron Glyph",description:"A dense, angular rune resembling an archaic smithing seal occupies the entire back of the neck, its blocky forms stacking atop one another in a configuration that master metallurgists recognize as a pre-Collapse forging sigil once stamped onto weapons of legendary quality. The mark is a deep iron-grey, borderline metallic in sheen, and the lines are unusually thick — nearly a centimeter wide — giving it the visual weight of something stamped rather than born. The Ironclad Brotherhood of the Dwarven Holds reveres bearers as avatars of the Forge-Father and will offer them journeyman rank in any smithing hall without the standard apprenticeship requirement. In the Mage-Cities of the Aureate Spire, where biological marks are analyzed through an arcane lens, scholars fear the Iron Glyph as evidence of an unauthorized binding ritual and will report bearers to the Compliance Bureau within hours of identification. Among weapons merchants across the continent, the Iron Glyph bearer is coveted as a walking certificate of quality — folk legend holds that any blade touched by a bearer's bare hand holds an edge three times longer than normal.",socialModifier:"Forge-Father's Chosen",factionReaction:{IronForgeGuild:"revere",IroncladBrotherhood:"revere",AureateSpireMages:"fear",WeaponsMerchantsLeague:"covet",SolariCovenant:"neutral"}},{id:"OakLeaf",name:"Oak Leaf",description:"A single oak leaf, rendered in extraordinary anatomical detail — every lobe, every secondary vein, every subtle asymmetry of a real leaf — spreads across the left forearm from inner elbow to wrist, colored in the warm golden-russet of late-autumn foliage. The leaf's veins run true to the bearer's own underlying veins, making the mark appear to be layered beneath rather than upon the skin, as if the body has taken a tree's memory into itself. The Greenward Conclave of forest-dwelling druids treats Oak Leaf bearers as blood-relatives of
