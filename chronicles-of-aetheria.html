 ",o.jsx(xl,{size:15})]})]})]})})}const Sg=[{id:"DragonClan",name:"Clan of the Eternal Dragon",element:"Fire",homeNation:"Ignareth",ancestralFortress:"Cinderkeep",description:`Born from the ashes of the First Conflagration, the Clan of the Eternal Dragon traces its lineage to Varathos the Undying, a warlord who bound himself to a primordial fire-drake through a ritual of mutual immolation. Their bloodline carries the ember-gift — a latent pyromantic resonance that manifests as amber irises and skin that is ever-warm to the touch. For three thousand years they have held dominion over the volcanic highlands of Ignareth, their fortress of Cinderkeep rising from cooled magma flows like a crown of obsidian teeth against the smoldering sky.

The Dragon Clan prizes ferocity tempered by discipline. Their warriors train in the Scalewarden Trials — a grueling rite of passage that sees initiates spend forty days within the caldera of Mount Varath, learning to channel heat rather than flee it. They are conquerors who remember their conquests as debts owed to the flame, and every victory is commemorated with a shard of volcanic glass added to the Clan's great mosaic Wall of Ashes. Their hierarchy is rigid and meritocratic; rank is earned through displays of both martial power and strategic cunning, and those who reach the highest station of Emberlord command not just armies, but the volcanic vents that heat the nation's heartland.`,regionalSphere:"The volcanic highlands of central Ignareth, including the Ashpeak mountain range, the magma-heated trade city of Varathos Prime, and the southern obsidian mining territories.",clanHonor:82,sigil:"🐉",statBonuses:{strength:5,fireResistance:8,health:3,intimidation:4}},{id:"TideClan",name:"Clan of the Abyssal Tide",element:"Water",homeNation:"Marethia",ancestralFortress:"Deepspire Citadel",description:`The Clan of the Abyssal Tide was not founded — it was summoned. According to the sacred tide-scrolls kept in salt-sealed vaults beneath Deepspire Citadel, the clan's matriarch Seralune walked into the ocean during the Night of Ten Moons and returned three days later speaking in the voice of the deep current itself. Her descendants inherited her aquatic communion, manifesting as an uncanny ability to navigate without instruments, to read weather in the taste of sea-spray, and in rare individuals, to breathe salt water for short periods. They have been the masters of Marethia's vast coastline and the archipelago chains beyond it for as long as written records exist.

Tide Clan society is organized around the concept of flow — the idea that true power is not rigid but adaptive, carving new channels when old ones close. Their military doctrine emphasizes encirclement, patience, and the devastating momentum of a breaking wave rather than the straight-line charge favored by land-bound clans. They maintain the largest war-fleet in Aetheria and their navigators are prized across every nation as pilots of incomparable skill. The Clan's internal governance is matrilineal, led by the Tidecaller — a position held exclusively by those who demonstrate the water-sight, the hereditary ability to divine events in still pools.`,regionalSphere:"The entire Marethian coastline, the Sapphire Archipelago, the deep-water trade lanes of the Azure Passage, and the contested Coral Banks fishing territories.",clanHonor:76,sigil:"🌊",statBonuses:{agility:4,waterResistance:8,navigation:6,endurance:3}},{id:"StoneClan",name:"Clan of the Unbroken Stone",element:"Earth",homeNation:"Terragond",ancestralFortress:"Granitehall",description:`There is a saying in Terragond: 'Ask the Stone Clan how old they are, and they will point to the mountains.' The Clan of the Unbroken Stone claims ancestry older than the current age of Aetheria, asserting that their progenitor Durrak the Foundation laid the first stone of civilization itself before the coming of kings. Whether myth or truth, they are unquestionably among the most ancient surviving clans, and their seat of power — the massive subterranean complex of Granitehall — is carved so deeply into the living bedrock that its lowest chambers are warmed by the planet's own heat. Their people tend toward stocky frames, dense musculature, and a deep brown or gray-streaked complexion that locals describe as 'the color of good granite.'

The Stone Clan is the foremost engineering and architectural dynasty in the known world. Their geomancers do not merely reshape earth — they commune with it, listening to the mineral memory stored in deep stone and reading histories no scroll could contain. Their fortifications are considered impregnable, their roads last centuries without repair, and the great aqueducts of Terragond — feeding water to a million souls — are a Stone Clan project maintained with quiet, multigenerational pride. They are a patient people who view haste as a form of arrogance. Disputes are settled in the Chamber of Sediment, where elders argue with geological slowness until consensus calcifies into law.`,regionalSphere:"The Stoneback Mountain range, the underground city-network of Terragond's Deep Quarter, the eastern quarry territories, and the ancient Road of Pillars trade route.",clanHonor:88,sigil:"🗻",statBonuses:{health:10,defense:6,earthResistance:5,strength:2}},{id:"SkyClan",name:"Clan of the Open Sky",element:"Air",homeNation:"Zephyros",ancestralFortress:"Cloudreach Eyrie",description:`The Clan of the Open Sky makes their home where others cannot follow — atop the impossibly tall Stratospire peaks that pierce the cloud layer of Zephyros, in the fortress complex of Cloudreach Eyrie, a structure of wind-carved stone and tensioned silk that has stood for twelve centuries without mortar or nail. Their founders were, according to clan legend, a tribe of nomadic sky-dancers who received the gift of aero-communion from a dying wind-elemental, trading their earthbound nature for an eternal kinship with the upper airs. Sky Clan members are characteristically lean and light-boned, with lung capacities that allow them to function comfortably at altitudes that would leave flatlanders gasping.

Sky Clan warriors are the preeminent aerial combatants of Aetheria. They breed and bond with the great Windmane Raptors — massive soaring predators with twelve-foot wingspans — and their sky-cavalry can strike and withdraw before ground forces even register an engagement has occurred. Their society values freedom of movement above all else; political borders are acknowledged on maps but respected as suggestions rather than absolutes in Sky Clan philosophy. This makes them both valued messengers and neutral parties in inter-clan conflicts, as the Eyrie's air-roads cross every nation's territory without apology. The Clan's Windlord governs through councils of Gust-Speakers, who carry directives on the wind to Sky Clan communities scattered across a dozen mountain ranges.`,regionalSphere:"The Stratospire peaks of Zephyros, the high-altitude trade routes of the Cloud Corridor, the Windmane Raptor breeding grounds of the Upper Reaches, and the sky-dock city of Aethermoor.",clanHonor:71,sigil:"🦅",statBonuses:{agility:7,speed:5,airResistance:6,perception:4}},{id:"ThunderClan",name:"Clan of the Raging Thunder",element:"Lightning",homeNation:"Stormvast",ancestralFortress:"Strikespire",description:`There is no quiet in ThunderClan culture. Their ancestral home of Strikespire was built atop the highest exposed plateau in Stormvast, a region where lightning strikes the ground an average of four hundred times per day during storm season — and the Storm Clan considers this a blessing rather than a hazard. Their progenitor, the legendary Voltara the Unchained, was reportedly struck by lightning seventeen times before she learned to absorb rather than resist the current, emerging from the eighteenth strike crackling with permanent static discharge and the ability to call bolts at will. Her heirs carry a diluted version of this gift: heightened reflexes wired by ambient electroreception, hair that stands on end before a storm, and a nervous system that conducts sensation with unusual acuity.

ThunderClan warriors are the fastest and most relentlessly aggressive in Aetheria. They believe in the philosophy of the first strike — that hesitation is the only true sin, and that victory belongs to whoever commits most completely and most immediately. Their military campaigns are characterized by terrifying speed and overwhelming initial force, an approach they call 'the bolt doctrine.' They are equally passionate in peace, approaching trade negotiations, feast-competitions, and even courtship with the same electric intensity. Strikespire's great Storm Forge, where their master artificers use controlled lightning strikes to temper metal, produces the finest bladed weapons on the continent — blades whose edges hold through a process that mundane metallurgy cannot replicate.`,regionalSphere:"The storm plateau of central Stormvast, the coastal thunder-cliffs, the Storm Forge weapon-trade territories, and the lightning-rail communication network that links the northern nations.",clanHonor:79,sigil:"⚡",statBonuses:{speed:8,strength:4,lightningResistance:7,agility:3}},{id:"FrostClan",name:"Clan of the Eternal Frost",element:"Ice",homeNation:"Glaciara",ancestralFortress:"Frosthold Keep",description:`The northern reaches of Glaciara are a killing ground for the unprepared — nine months of winter that descend with a ferocity that has broken every attempted invasion in the nation's history. The Clan of the Eternal Frost did not merely survive this environment; they became it. Their founders, the twin sorcerers Keldara and Boreal, made a compact with the Glacial Consciousness — the vast semi-sentient ice-mind that underlies the great northern sheet — trading their mortality for a form of distributed immortality. Their clan-members now carry a fragment of that pact in their physiology: lowered core temperature, the ability to slow their metabolism for long periods, and a resistance to cold that borders on immunity. In extreme cases, Frost Clan elders develop the ability to briefly crystallize the moisture in the air around them into defensive formations.

Frost Clan culture revolves around the twin concepts of preservation and patience. They are meticulous keepers of history, maintaining the Grand Glacier Library — a vast archive carved into a stabilized section of the ice sheet where the cold itself acts as a perfect preservative. Texts, artifacts, and even preserved specimens are kept there in immaculate condition. This archival passion extends to their governance: Frost Clan law is the most comprehensive and precisely recorded in Aetheria, with precedent cases going back eighteen hundred years. They are slow to anger but glacially determined when roused, and an alliance with Frosthold is considered among the most reliable guarantees in the known world — they have never once broken a sealed compact.`,regionalSphere:"The northern glacial territories of Glaciara, the Permafrost Shelf, the Grand Glacier Library, the ice-road trade routes to the far northern outposts, and the Coldwater deep-sea fishing zone.",clanHonor:91,sigil:"❄️",statBonuses:{defense:5,coldResistance:10,willpower:4,health:3}},{id:"IronClan",name:"Clan of the Forged Iron",element:"Metal",homeNation:"Ferrath",ancestralFortress:"Irongate Bastion",description:`If the civilizations of Aetheria are built on anything, they are built on Iron Clan steel. The Clan of the Forged Iron controls the richest metal deposits on the continent — the Great Ore Veins of Ferrath that run through the bedrock like a circulatory system of mineral wealth — and they have used this resource base to forge not merely weapons but an industrial empire that touches every nation's economy. Their fortress, Irongate Bastion, is a functional manufacturing complex as much as a military installation, its walls themselves cast from a proprietary alloy so dense and well-fitted that siege engineers have been known to weep at the mathematical precision of its construction. Iron Clan members develop a characteristic density to their builds even without extraordinary training; their bones have a slightly elevated mineral content that gives them a natural weight and durability.

The Iron Clan's philosophy is transactional and unsentimental in the most admirable sense — they believe that honest value clearly exchanged is the highest form of trust between people and nations. They are the preeminent merchants and industrialists of Aetheria, but they are equally formidable soldiers whose heavy infantry, encased in their own proprietary plate mail, have never been broken in a frontal engagement in recorded history. The Clan is led by the Grand Forgemaster, a position that is simultaneously military commander, chief engineer, and trade-guild chairman. Every Iron Clan member learns a craft before they learn a weapon — the belief being that those who understand how things are made will always outlast those who only know how to destroy.`,regionalSphere:"The Great Ore Vein territories of Ferrath, the Irongate manufacturing district, the metal-trade highway network linking all major Aetherian cities, and the southern alloy-research territories.",clanHonor:84,sigil:"⚙️",statBonuses:{defense:7,strength:5,metalResistance:6,crafting:5}},{id:"WoodClan",name:"Clan of the Ancient Wood",element:"Wood",homeNation:"Sylvara",ancestralFortress:"Rootcrown Sanctum",description:`The Rootcrown Sanctum is not a fortress in any conventional sense — it is the living heart of the Verdant Crown, the oldest forest on Aetheria, a cathedral of ancient trees whose canopy forms a continuous roof over three hundred square miles of primary woodland. The Clan of the Ancient Wood does not merely inhabit this forest; they are symbiotic with it in ways that naturalists continue to study and struggle to explain. Their founding matriarch Sylvaine is said to have consumed the heartwood of the First Tree — the eldest organism on Aetheria — and in doing so integrated the forest's root-network consciousness into the clan bloodline. Modern Wood Clan members can communicate through physical contact with trees, sense movement through root vibration, and accelerate plant growth through sustained intent.

Wood Clan society is organized around the growth seasons rather than political calendars, and their governance structure mirrors the layered ecology of the forest itself. The Verdant Council, composed of the eldest living clan members, functions as the canopy — providing overarching direction and shading decisions for those below. Mid-generation warriors and skilled crafters form the understory, while the young and the new form the ground-level community where most daily life unfolds. They are renowned healers whose botanical pharmacopeia is the envy of every court physician in Aetheria, and their rangers — trained from childhood in the Verdant Crown — are the finest trackers and ambush-fighters alive. No army has successfully penetrated the deep forest, and the Wood Clan makes certain that remains true.`,regionalSphere:"The Verdant Crown forest of Sylvara, the Rootcrown Sanctum and surrounding sacred groves, the botanical trade routes, the river-delta wetlands of the eastern canopy, and the contested Clearwood border territories.",clanHonor:77,sigil:"🌳",statBonuses:{agility:4,healing:6,natureResistance:5,perception:5}},{id:"NightClan",name:"Clan of the Endless Night",element:"Shadow",homeNation:"Umbrath",ancestralFortress:"Veilspire",description:`The nation of Umbrath is a place where the sun is a rumor and the stars are the primary source of navigation. Situated in a vast geographic basin surrounded by mountains high enough to block direct sunlight for most of the year, it is a land of perpetual twilight that has shaped its people into creatures of the dark in both body and philosophy. The Clan of the Endless Night rules this place from Veilspire — a fortress that is, strictly speaking, impossible to locate without a guide, as it exists partially in the shadow-fold, a thin dimensional membrane adjacent to the physical world that the clan discovered and mapped over centuries. Their founder Noctara the Unseen taught that darkness was not the absence of light but a substance in its own right — and the clan has treated shadow as a natural resource to be harvested, refined, and weaponized ever since.

Night Clan operatives are the most feared intelligence assets in Aetheria. Their shadow-walkers can move through darkness as if through open air, perceive heat and sound in the total absence of light, and in advanced practitioners, briefly step into the shadow-fold to pass through solid objects. Their political influence operates almost entirely through networks of information — they know secrets about every major clan and nation, and they traffic in this knowledge with a careful economy that ensures everyone remains slightly afraid of what the Night Clan has yet to reveal. Despite this reputation for darkness and intrigue, they maintain a strict internal code of honor. Betrayal within the clan is the only capital crime — without trust among shadow-walkers, the entire network collapses — and they enforce this code with the same ruthless precision they apply to everything else.`,regionalSphere:"The Umbrath basin, the shadow-fold access points across Aetheria, the Veilspire intelligence network, the Starwatch astronomical stations, and the covert trade-in-secrets routes linking every major city.",clanHonor:63,sigil:"🌑",statBonuses:{stealth:9,agility:5,shadowResistance:7,perception:3}},{id:"ChronoClan",name:"Clan of the Unbound Moment",element:"Time",homeNation:"Aeonara",ancestralFortress:"Timewarden Spire",description:`The Clan of the Unbound Moment occupies a category entirely apart from the other Great Clans — because they are, depending on how you count, either the newest clan or the oldest one. Their founding paradox is encoded in their sacred text, the Unwritten Chronicle: their progenitor Chronex did not discover time-magic in some distant past, but rather arrived from the future to seed the conditions for his own clan's existence. Whether this is literal truth or elaborate metaphor, the clan-members who carry his bloodline do exhibit verifiable temporal anomalies: mild precognitive flashes, the ability to briefly accelerate or decelerate their personal experience of time, and a trait called temporal echo, where they occasionally react to events a fraction of a second before they happen. Timewarden Spire, their fortress, sits at a location identified by their scholars as a temporal node — a place where multiple potential futures overlap — and its architecture is designed to be defensible regardless of what direction an attack arrives from.

Chrono Clan culture is deeply philosophical and somewhat unsettling to outsiders, because its members navigate existence with a peculiar serenity about outcomes. They plan with extraordinary depth — their strategists think not in campaign timescales but in generational arcs — while simultaneously treating each individual moment as infinitely precious, since they understand better than anyone how many moments never arrive at all. They are small in number and deliberately so, believing that quality of perception matters more than quantity of force. Their contribution to Aetherian civilization has been primarily intellectual: the Timewarden Academy produces the finest historians, futurists, and strategic advisors on the continent, and no nation that has ignored their counsel has prospered in the long run.`,regionalSphere:"The temporal node territories of Aeonara, the Timewarden Academy and its satellite institutes, the long-memory archives of the Unwritten Chronicle vaults, and advisory presences at the courts of every major nation.",clanHonor:69,sigil:"⏳",statBonuses:{willpower:7,intelligence:6,timeResistance:8,perception:5}}],_t={Fire:"bg-orange-500",Water:"bg-blue-500",Earth:"bg-yellow-700",Air:"bg-sky-400",Lightning:"bg-yellow-400",Ice:"bg-cyan-400",Metal:"bg-gray-400",Wood:"bg-green-600",Shadow:"bg-purple-600",Time:"bg-indigo-500"},M=({title:e,children:t})=>o.jsxs("div",{className:"p-6 space-y-4",children:[o.jsx("h2",{className:"text-2xl font-bold text-yellow-400 border-b border-yellow-400/30 pb-2",children:e}),t]}),ie=({label:e,value:t,max:a=100,color:n})=>{const i=Math.min(100,Math.round(t/a*100));return o.jsxs("div",{className:"space-y-1",children:[o.jsxs("div",{className:"flex justify-between text-sm",children:[o.jsx("span",{className:"text-gray-300",children:e}),o.jsxs("span",{className:"text-white font-semibold",children:[t,o.jsxs("span",{className:"text-gray-500",children:["/",a]})]})]}),o.jsx("div",{className:"h-2 bg-gray-700 rounded-full overflow-hidden",
