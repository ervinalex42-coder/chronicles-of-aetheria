 the Elder Trees, entitling them to sanctuary in any Conclave grove and a seat at the Solstice Council. The lumber and paper barons of the Ashfeld Merchant League grow deeply uncomfortable around bearers — their most profitable contracts involve clear-cutting ancient groves, and a living emblem of the forest watching them negotiate is considered profoundly bad for business, leading many to quietly excuse bearers from trade meetings. Rural communities throughout the continent hold the mark in reverent superstition, believing bearers bring a productive harvest to any field they walk, a belief that causes farmers to invite — and sometimes refuse to let leave — any Oak Leaf bearer passing through town in planting season.",socialModifier:"Elder-Tree Kin",factionReaction:{GreenwarkConclave:"revere",AshfeldMerchantLeague:"distrust",FarmerCollective:"revere",CindralMerchantRepublic:"neutral",IronForgeGuild:"neutral"}},{id:"ShadowEye",name:"Shadow Eye",description:"An open eye, iris and all, stares outward from the palm of the right hand, rendered entirely in gradients of deep indigo and black; the pupil is a true void — a small patch of skin that seems to absorb light rather than reflect it — and the whites of the eye are traced in a faint luminescent silver that becomes more pronounced in darkness. When the hand is closed into a fist, the eye appears to shut, and more than one observer has reported seeing it twitch when they believe themselves unobserved. The Shadow Court — the continent's premier network of spies and information brokers — covets bearers with an intensity that borders on predatory, dispatching agents to recruit them within weeks of any confirmed sighting, offering gold, status, and protection that few can refuse. Common folk across cultures fear the Shadow Eye as a mark of curse-walking — a soul that draws misfortune onto those who stand near it for too long — and innkeepers may quietly refuse service or charge double to dissuade a bearer from lingering. The Solari Covenant, dedicated to the expulsion of shadow-magic, regards bearers as spiritually compromised and will attempt unsolicited cleansing rituals or, in extreme cases, detainment for evaluation by an Inquisitor.",socialModifier:"Watched by the Unseen",factionReaction:{ShadowCourt:"covet",CommonFolk:"fear",SolariCovenant:"fear",ThundermarchConfederacy:"distrust",GaleRidersMercenaries:"distrust"}},{id:"ClockGear",name:"Clock Gear",description:"A precise twelve-toothed gear, its every tooth measured to mathematical exactitude, occupies the inside of the right wrist, rendered in a cool gunmetal grey with faint engraving lines in the spaces between each tooth that suggest micro-script too small to read without magnification. Encircling the gear's outer edge are twenty-four evenly spaced dots — one for each hour — and the mark produces an almost subliminal impression of rotation when the wrist is turned, as though the gear actually moves. The Clockwork Protectorate of Velmoor regards the Clock Gear as a singular blessing, believing bearers are marked by the Mechanist — their patron deity of ordered time — and will fast-track them to senior engineering positions without examination. The CaelumNomads and other spirit-tradition peoples react with unease, seeing the mark as evidence that a soul has been partially claimed by the Grinding Age, a mythological era when machines will replace all living things. Artificers and tinkers across the continent, regardless of national affiliation, are drawn to Clock Gear bearers with a professional fascination that can tip into obsession — many will offer services at cost or free, hoping that close proximity to the mark will inspire their next great invention.",socialModifier:"Touched by Mechanist's Hand",factionReaction:{ClockworkProtectorate:"revere",CaelumNomads:"fear",ArtificersGuild:"covet",GreenwarkConclave:"distrust",StonehavenDruids:"distrust"}},{id:"DragonScale",name:"Dragon Scale",description:"Seven overlapping scales — each the size of a large coin, each perfectly hexagonal at their base and arching outward at the top — run in a sweeping arc from the right shoulder down across the upper chest, colored in a deep arterial crimson that shades to near-black at each scale's center and brightens to scarlet at each raised edge. The scales are slightly three-dimensional, the skin beneath them thickened and subtly iridescent, casting faint red-gold highlights in direct sunlight that make the mark seem almost alive. In the Drakenrath Highlands, where the ancient pact between dragonkind and humanity was supposedly sealed in blood, Dragon Scale bearers are treated as living embodiments of that covenant — given titles, land rights, and absolute right of way on any road within the territory. The Wyrmhunter Guilds operating throughout the continent's border regions view bearers with deep suspicion bordering on hostility, interpreting the mark as evidence of draconic blood-corruption — a condition they exist to contain — and may demand proof of fully human ancestry before allowing passage through their checkpoints. In the markets of the Merchant Principalities, a Dragon Scale bearer negotiating a trade deal is believed to carry inherent leverage, as superstition holds that breaking an agreement with one triggers the enmity of dragons, causing rivals to concede terms they would otherwise contest.",socialModifier:"Dragon-Pact Bearer",factionReaction:{DrakenrathHighlands:"revere",WyrmhunterGuild:"fear",MerchantPrincipalities:"neutral",SolariCovenant:"neutral",EmberReachClans:"covet"}},{id:"SeaShell",name:"Sea Shell",description:`A nautilus shell in precise cross-section spirals outward from the center of the right ear, its chambers rendered in alternating bands of cream-white and deep ocean-teal, tracing the logarithmic curve of the golden spiral along the jawline before ending just past the corner of the mouth. The innermost chamber of the shell, positioned just at the ear's lobe, is filled with a color so intensely aquamarine it appears to glow, and on nights with a strong sea wind bearers report hearing harmonic tones that others nearby cannot perceive. The Pearl Diver Guilds of the Shimmering Lagoons treat Sea Shell bearers as representatives of Merath, the ocean's hidden architect, and will share their most jealously guarded knowledge of underwater geography without payment. In the landlocked Calindra Territories, where all things oceanic are regarded with a mixture of myth and dread, the mark causes considerable social difficulty — tavern owners fear bearing liability for harboring a "sea-touched" individual, citing centuries-old folklore about sea-marks drawing floods inland. Among artifact collectors and historians of the Aureate Spire, the Sea Shell is coveted as a living connection to the Merathian civilization, a pre-Collapse culture whose knowledge of tidal mechanics and deep-sea architecture has never been rediscovered.`,socialModifier:"Merath's Favored",factionReaction:{PearlDiverGuild:"revere",CalindraTerritories:"fear",AureateSpireMages:"covet",TidewardenClans:"revere",DesertConflux:"distrust"}},{id:"MountainPeak",name:"Mountain Peak",description:"Three sharp peaks — the tallest at center, the flanking two at a harmonious two-thirds height — rise from a shared baseline across the back of the left shoulder, outlined in a stark obsidian-black against whatever skin tone the bearer carries, with the interior of each peak filled by a gradient that shifts from stone-grey at the base to brilliant white at the summit, mimicking a snowline with uncanny naturalism. Fine horizontal lines at each peak's midpoint suggest geological strata, and in cold climates the white portions of the mark appear to grow marginally brighter, as though the mountain remembers real altitude. The Stonewatch Order, a militant brotherhood that guards the high mountain passes connecting the continent's northern and southern halves, treats Mountain Peak bearers as kindred spirits — sentinels by birthright — and will grant them free lodging at any of their fortified waypoints and intelligence about road conditions that they would otherwise sell. The Valley Kingdoms below the mountains associate the mark with the feared Avalanche Speakers, mythological figures said to cause mountain collapses through nothing more than their presence, and city guards there will track bearers carefully and ask them to register their comings and goings with municipal offices. Prospectors and geologists across the continent covet the mark because an enduring piece of geological folklore insists that Mountain Peak bearers can sense mineral deposits beneath their feet by standing still for a moment and listening.",socialModifier:"Summit-Sworn Sentinel",factionReaction:{StonewatchOrder:"revere",ValleyKingdoms:"fear",ProspectorsLeague:"covet",StonehavenDruids:"revere",ClockworkProtectorate:"neutral"}},{id:"CloudVeil",name:"Cloud Veil",description:"A gossamer layer of stylized clouds — each rendered with the soft, billowing roundness of summer cumulus — drifts across the upper back from shoulder to shoulder, the forms overlapping in layers that create a convincing illusion of depth, as though one is looking up through a skylight at actual sky. The color is a shifting off-white to pale lavender, and in overcast weather the mark's hue darkens to match the sky above, a mimicry so reliable that some bearers have used it as a weather-reading instrument. The Cloud Shepherd Communes of the Aetherian Highlands, a loose federation of high-altitude farming villages dependent on predictable rainfall, regard Cloud Veil bearers as stewards of the sky and invite them to preside over seasonal rain-calling ceremonies as honored officiants. The Aureate Spire's Meteorological Division neither reveres nor fears the mark but covets it with academic hunger, offering substantial research stipends to bearers willing to submit to observation studies on the mark's apparent climatic responsiveness. In the Sunken City-States of the south, where drought and water scarcity are existential political issues, Cloud Veil bearers are received with an unsettling fervor — leaders may attempt to detain them through manufactured legal pretexts, viewing them as natural resources too valuable to let simply wander away.",socialModifier:"Sky-Shepherd's Chosen",factionReaction:{CloudShepherdCommunes:"revere",AureateSpireMages:"covet",SunkenCityStates:"covet",DesertConflux:"covet",SalteriEmpire:"neutral"}},{id:"StormBird",name:"Storm Bird",description:"A great bird — part eagle, part thunderhawk — spreads across the entirety of the upper back with its wings fully extended, the primary feathers of each wing detailed down to individual barbs in a storm-grey and electric-blue palette that shifts in lightning-like patterns when the bearer is under physical exertion. The bird's head faces left over the bearer's left shoulder, its beak open in a silent cry, and its eye is rendered as a bright amber that several witnesses across different centuries have claimed to have seen blink. The Skyclans of the Windswept Reaches view the StormBird as the earthly shadow of their god Vaereth's personal mount, and bearers are immediately elevated to the rank of Storm-Speaker — a spiritual title that commands silence from an entire village when the bearer wishes to address them. The Merchant Fleets of the Outer Isles fear the mark intensely, their maritime almanacs noting a statistical cluster of violent storms around StormBird-marked sailors — a coincidence their insurers have formalized into explicit surcharges for hiring such individuals. The Thundermarch Confederacy's generals covet StormBird bearers as battlefield omens, believing their presence signals the side with such a marked individual will fight with the ferocity of a tempest — several commanders have been known to pay extraordinary sums to have a bearer simply stand at the back of their formation.",socialModifier:"Vaereth's Earthly Shadow",factionReaction:{SkyclanWindswept:"revere",MerchantFleetsOuterIsles:"fear",ThundermarchConfederacy:"covet",CaelumNomads:"revere",SolariCovenant:"distrust"}},{id:"FrostFern",name:"Frost Fern",description:"A winter fern in full frond, its every pinnule branching in the self-similar geometry of actual ice crystal growth, climbs the right side of the throat from collarbone to jawline; the coloring is a pale, ghostly silver-blue that at first glance reads as an elaborate scar, and only close inspection reveals it to be a natural mark of uncommon botanical precision. In temperatures below freezing the mark becomes slightly luminescent — a soft blue-white glow — and the air immediately around the bearer's neck drops by a perceptible degree, causing exhalations to mist even indoors in winter months. The Frostspire Monks prize the FrostFern above even the IceLotus, regarding it as a mark of active spiritual cold rather than passive stillness, and will offer bearers the rare rank of Winter Anchorite — a teaching position within the Sealed Archives typically reserved for senior elders. Across the tropical Janhari Isles, the mark is regarded with a superstitious terror tied to the legend of the Freeze-Walker — a mythological figure who once turned an entire harbor to solid ice by sneezing — and port authorities there can legally mandate that FrostFern bearers remain on their ships and conduct all business via intermediary. Among alchemists, the FrostFern mark is the most coveted biological phenomenon in their discipline; the scholarly consensus holds that the bearer's blood contains a crystalline compound of extraordinary purity that, if ethically obtained, would advance cold-synthesis chemistry by at least a generation.",socialModifier:"Winter Anchorite's Mark",factionReaction:{FrostspireMonks:"revere",JanhariIsleAuthority:"fear",AlchemistsGuild:"covet",DesertConflux:"fear",CindralMerchantRepublic:"distrust"}},{id:"AnvilMark",name:"Anvil Mark",description:"A squat, powerful anvil — the classic double-horn design, rendered with dimensional depth as if cast in iron and set directly into the skin — occupies the outer right forearm from midpoint to wrist, the top face of the anvil bearing three small circular impressions arranged like the vertices of a triangle, each impression a shade darker than the rest of the mark's deep charcoal tone. The legs of the anvil spread wide and solid, and a faint heat-shimmer effect plays at the mark's edges in warm environments, as though the metal it depicts is freshly cooled. The Ironcallers' Consortium — the most powerful blacksmiths' guild on the continent — takes the Anvil Mark as irrefutable proof of the Forge-Father's blessing, and will induct bearers at the rank of Master Smith regardless of their actual metalworking skill, a gesture of spiritual rather than practical recognition that nevertheless carries enormous social weight. Noble houses who employ private armories will pay lavishly for an Anvil Mark bearer as chief armorer, believing that weapons forged in proximity to the mark hold enchantment more readily — their payments are high enough that legitimate master smiths have started filing formal complaints about unfair competition. In the democratic city-state of Velun, where guild hierarchies are viewed as aristocratic overreach, the mark is seen as a symbol of an entrenched system that gatekeeps labor, and bear-ers can find themselves quietly blacklisted from progressive artisan cooperatives who resent the unearned privilege it conveys.",socialModifier:"Ironcallers' Blessed",factionReaction:{IroncallersConsortium:"revere",IronForgeGuild:"revere",NoblePrivateArmories:"covet",VelunCooperatives:"distrust",StonehavenDruids:"neutral"}},{id:"TridentTree",name:"Trident Tree",description:"From a single thick trunk rooted at the base of the left calf, three equal branches rise upward and curve outward like the prongs of a trident, each branch ending in a spray of seven small leaves — twenty-one leaves total — all rendered in an unusual dual-tone of deep sea-green fading to ocean-blue at each leaf tip, as though the tree grows simultaneously from earth and water. The trunk itself is textured with subtle horizontal banding that suggests both tree-rings and tidal markings, and the mark is widest at mid-calf, tapering elegantly at both ends in a way that draws the eye in a single fluid sweep. The Confluence Faith — a syncretic religion venerating the union of ocean and forest — regards the Trident Tree as their highest sacred symbol and will elevate any bearer to the rank of Living Icon, offering them free service at any Confluence temple and a retinue of two dedicated attendants. Ruling dynasties of the inland Raleth Principalities, who have historically suppressed the Confluence Faith as a political destabilizing force, respond to the mark with open institutional hostility — bearers may have their identity documents questioned and may be refused residency permits under administrative pretexts. On the fishing and logging towns of the Greenwater Delta, where ocean and forest meet and the Confluence Faith was born, a Trident Tree bearer can walk into any establishment and receive service before anyone already seated, a social norm enforced with casual community consensus.",socialModifier:"Living Icon of the Confluence",factionReaction:{ConfluenceFaith:"revere",RalethPrincipalities:"distrust",GreenwaterDelta:"revere",TidewardenClans:"revere",SalteriEmpire:"fear"}},{id:"MoonPhase",name:"Moon Phase",description:"Eight lunar phases — new moon through full and back again — circle the right eye in a perfectly spaced ring, the new moon a flat disc of skin-dark pigment at the outermost corner of the eye and the full moon a bright silver-white circle above the brow, with the waxing and waning crescents distributed between them in precise astronomical sequence. The mark frames the eye like an elaborate celestial monocle, and in moonlight the silver portions brighten to a startling luminescence that causes the bearer's gaze to appear lit from within. The Moonsinger Covens of the Whisperwood hold MoonPhase bearers in the highest possible regard, reserving for them the role of Calendar-Keeper — the individual responsible for determining the timing of every ritual across an entire coven-network — a position of significant practical power. In the Sunfire Imperium, where lunar worship is classified as a form of treason against the state deity of the sun, bearing the MoonPhase mark near any official checkpoint is grounds for immediate detention and theological evaluation by Sunfire Inquisitors, a process that can last months. Healers and midwives across cultures and national boundaries treat MoonPhase bearers with quiet reverence, sharing professional knowledge freely and asking their blessing at births — the mark is the closest thing to a universal cross-cultural medical symbol that exists in the known world.",socialModifier:"Calendar-Keeper of the Covens",factionReaction:{MoonsingerCovens:"revere",SunfireImperium:"fear",HealersMidwivesGuild:"revere",SolariCovenant:"distrust",ShadowCourt:"neutral"}},{id:"SolarCrown",name:"Solar Crown",description:"A radiant crown of twelve sun-rays circles the bearer's forehead like a diadem pressed into skin — each ray rising to a sharp, elongated point — rendered in a blinding warm gold that on the brightest summer days appears almost to shed actual light, though scholars attribute this to a trick of contrast and pupil dilation in observers. Between each ray, in the spaces of the crown's band, are tiny symbolic glyphs in an archaic solar script — twelve distinct characters, one per interval — that priests of the Solari Covenant have independently translated as the twelve holy virtues of the Eternal Flame. The Solari Covenant, the continent's most widespread organized religion, treats SolarCrown bearers as the physical instantiation of prophecy — the arrival of the Undying Sovereign predicted in their core texts — and high priests will defer to a bearer in matters of theological interpretation regardless of the bearer's own beliefs or wishes. The Shadow Court, whose entire operational model depends on working in margins the Solari Covenant does not control, regards SolarCrown bearers as existential threats whose mere presence in a city shrinks the dark spaces they need to operate, and will expend significant resources to see such a bearer discredited, removed, or quietly neutralized. In the neutral merchant republics that deliberately avoid religious entanglement, a SolarCrown bearer is both a commercial nightmare and a windfall — their arrival draws massive pilgrimage traffic that floods local economies, but also Solari Inquisitors, Shadow Court operatives, and every petitioner on the continent with a grievance they think a prophesied sovereign can solve.",socialModifier:"The Undying Sovereign",factionReaction:{SolariCovenant:"revere",ShadowCourt:"fear",MerchantRepublics:"neutral",SunfireImperium:"distrust",ThundermarchConfederacy:"revere"}}],zn=[{id:"ObsidianDagger",name:"Obsidian Dagger",element:"Fire",description:"Knapped from a single shard of volcanic glass harvested at the rim of Mount Cyndrath, the Obsidian Dagger is honed to an edge so fine it can split a falling ember in two. Its crossguard is wrapped in fire-lizard leather dyed crimson, while the pommel is capped with a smooth sphere of hardened magma stone. The blade sits almost weightless in the palm, its natural taper lending exceptional point control that rewards a precision-driven fighting style. Thrust-oriented techniques flow effortlessly from its slender profile, though the brittle nature of volcanic glass demands the wielder avoid lateral parrying forces. Among the Fire nation's elite, the Obsidian Dagger is the mark of a true assassin, carried exclusively by members of the secretive Ember Guard.",statBonuses:{criticalStrikeChance:18,agility:4,fireDamage:8},rarity:"Rare"},{id:"SilverKunai",name:"Silver Kunai",element:"Water",description:"Cast from moonsilver alloy — an amalgam of deep-tide silver and luminite ore gathered only during a lunar eclipse — each Silver Kunai is poured into moulds carved by master smiths of the Tidal Sanctum. The surface shimmers with a pale, rippling iridescence that mirrors moving water, and faint geometric tide-marks are etched along the flat of the blade. Its ring-hole pommel allows for rapid finger-spinning transitions, making the Kunai equally suited to thrown volleys and close slashing in a single fluid motion. The weight distribution sits just forward of centre, shortening release arcs and tightening groupings at range. Tide priests ritually bless each piece before it passes to Water infiltrators, believing the moonsilver preserves a fragment of the ocean's cunning within the steel.",statBonuses:{throwingAccuracy:14,evasion:6},rarity:"Uncommon"},{id:"JadeHook",name:"Jade Hook",element:"Earth",description:"Quarried from jade seams beneath the Verdant Plateau, the Jade Hook is shaped by earth-shapers who grind and polish each piece over many weeks until the stone rings with a clear, mineral tone when struck. A reinforced leather wrap binds the straight handle section, and a small iron ferrule prevents the head from splitting under impact stress. The hook's curve is calibrated so that it catches a limb or weapon with minimal wrist rotation, making it deceptively quick for a stone instrument. Despite weighing nearly twice as much as an iron blade of similar size, its balance point sits squarely in the palm, creating a feeling of planted stability during use. Earth clan merchants carry the Jade Hook as both a trading tool and a self-defence instrument, its dual role reflecting the pragmatic culture of the Verdant Plateau.",statBonuses:{strength:5,carryCapacity:10},rarity:"Common"},{id:"ThunderBlade",name:"Thunder Blade",element:"Lightning",description:"Forged from copper-veined steel smelted in furnaces fed by arc-lightning captured during storm season, the Thunder Blade crackles with residual charge that makes the air around it smell faintly of ozone. Thin copper filaments are hammer-welded into the fuller of the blade, giving it a branching lightning-bolt pattern visible along its length. The handle is wrapped in dry irongrip bark — a natural insulator — so the wielder feels only a low, pleasant vibration rather than the full current in the steel. In combat the blade discharges accumulated static on impact, adding a jarring shock to each strike that can disrupt an enemy's concentration and muscle control. Lightning zealots of the Storm Convocation carry the Thunder Blade as a symbol of their covenant with the electric sky, and its crackling presence on a battlefield heralds the Convocation's judgement.",statBonuses:{lightningDamage:22,attackSpeed:5,stunChance:12},rarity:"Rare"},{id:"FrostPick",name:"Frost Pick",element:"Ice",description:"Carved entirely from the rib bones of the great tundra whale — creatures that spend their lives beneath polar ice sheets — the Frost Pick retains a supernatural chill that never quite fades even in warm climates. Ice shamans of the Permafrost Reaches spend three moon-cycles shaping each pick by hand, etching spiral runes of cold-binding into the bone with a needle of frozen iron. The weapon sits narrow and dense in the grip, demanding a firm wrist to control its forward-heavy pick head, yet that same mass drives the point through thick hides and frozen armour with remarkable authority. Short, driving strikes are the Frost Pick's strength; sweeping or slashing motions waste its momentum and expose the wielder's guard. Traditionally issued to senior shamans as a mark of authority over cold and storm, the Frost Pick is rarely seen outside the tundra communities it was born from.",statBonuses:{iceDamage:16,armorPenetration:9},rarity:"Uncommon"},{id:"IronFlail",name:"Iron Flail",element:"Metal",description:"Constructed from five tempered iron links and a solid iron striking head shaped into a faceted cube, the Iron Flail is an unambiguous instrument of pain designed for guild enforcer work in enclosed corridors and market alleys. The links are heat-treated to resist bending under impact so the full force of each swing transfers cleanly into the target without the chain absorbing momentum. Because the head arrives at an unpredictable angle on the final link's free swing, it is nearly impossible to block with a rigid guard, making it a nightmare for shield-users. The handle is short and wrapped in studded leather for a crushing two-finger grip that limits the swing arc but maximises point-of-impact force. Metal guild enforcers carry the Iron Flail as an emblem of debt-collection authority, its very sight enough to persuade most borrowers to reconsider their repayment schedule.",statBonuses:{strength:7,shieldBreak:15},rarity:"Common"},{id:"ShadowFan",name:"Shadow Fan",element:"Shadow",description:"Constructed from seventeen ink-black feathers harvested from the void-raven — a bird found only in Umbrath's lightless cave systems — each quill is tipped with a razor-thin sliver of shadow-glass that holds a permanent razor edge without any known maintenance. The ribs between feathers are lacquered black silk over iron wire, giving the fan rigidity when snapped open but allowing it to fold silently into a slender profile that conceals in a sleeve or boot. When open, the fan's edges can open flesh in a wide, sweeping arc; when folded, its pointed tip functions as a precise puncturing instrument at close range. Its dual nature as social accessory and lethal tool makes it the favoured weapon of infiltrators who must attend court functions without raising suspicion. Shadow cult operatives consider the fan a sacred instrument of their order, and receiving one signifies full induction into the cult's inner circle of covert executioners.",statBonuses:{evasion:11,criticalStrikeChance:14,shadowDamage:9},rarity:"Rare"},{id:"ChronoStaff",name:"Chrono Staff",element:"Time",description:"At the core of the Chrono Staff sits a temporal crystal — a fragment of crystallised time-scar harvested from a paradox zone — encased in a lattice of pale silver and dark iron that keeps it from destabilising into a loop. The outer shaft is wrapped in rings of alternating metals, each corresponding to one era of Aetherian history according to the Time monks who forge them, making the staff a physical timeline of the world. It responds to the bearer's movements as if anticipating them, subtly adjusting its weight to assist each motion a half-second before it begins. The staff hums at a pitch just below conscious hearing whenever it draws near a paradox zone or a scar in the timeline, serving as the most reliable paradox-detection instrument known to the order. Time monks of the Eternal Fold carry the Chrono Staff as both a focus for their temporal bending and a symbol of their mandate to preserve the integrity of the flow of moments.",statBonuses:{timeDamage:28,paradoxResistance:20,initiative:10},rarity:"Legendary"},{id:"EmeraldSpear",name:"Emerald Spear",element:"Wood",description:"Grown rather than cut, the Emerald Spear's shaft is coaxed into its final shape by a wood-bending druid over a period of years, the ironwood straightening and hardening under sustained channelling until lacquer reveals the grain's deep green lustre. Tiny dormant leaf buds are visible along the shaft, sealed beneath the lacquer until an attuned bender grasps the wood and channels wood-essence into it, at which point the buds unfurl into trailing vines that wind around the wielder's forearm for added control. Its reach and balance make it a natural thrusting weapon, yet the living wood absorbs impact energy better than dead timber, reducing shock on blocked strikes. In attuned hands the shaft is said to subtly guide the tip toward vital points, as though the wood retains memory of every creature the druid has hunted. Wood druids of the Canopy Covenant gift the Emerald Spear only to those who have completed the Rite of Rooting, marking them as full wardens of the living forest.",statBonuses:{woodDamage:19,reach:8,regeneration:5},rarity:"Rare"},{id:"CoralSword",name:"Coral Sword",element:"Water",description:"Harvested from the living deep-coral formations twelve fathoms below Pelagara's harbour, each Coral Sword blank is selected for structural integrity before sea-shapers remove the polyp colonies and heat-treat the skeleton to remove brittleness without sacrificing the material's natural lightness. The finished blade carries a pale rose-orange hue shot through with white seam lines, and its surface retains a microscopic roughness that opens small cuts on unarmoured skin with a mere scraping contact. It handles like a feather compared to iron blades of the same length, allowing rapid redirection and complex combination work that tires opponents before landing the decisive cut. Its only vulnerability is concentrated blunt force, which can crack the coral along natural fault lines; officers compensate with footwork that keeps them out of heavy-weapon range. Aqualis naval commanders carry the Coral Sword as a mark of commissioned rank, and the sword's distinctive silhouette on an officer's hip is recognised across every port in the known seas.",statBonuses:{attackSpeed:12,waterDamage:10},rarity:"Uncommon"},{id:"CinderAxe",name:"Cinder Axe",element:"Fire",description:"Smelted from iron ore mixed with volcanic ash from the beds of Pyrethia's spent lava flows, the Cinder Axe emerges from the forge with a dark, mottled surface that absorbs heat rather than reflecting it, making the head near-impossible to handle bare-handed even hours after leaving the fire. The haft is a short section of fire-hardened ironwood, wrapped in asbestos cord at the grip to protect the wielder's hands from conducted heat during prolonged combat. Its broad bearded head delivers a devastating chopping force that cleaves through light armour and door timbers with equal ease, making it the preferred breaching tool of Pyrethia's border assault companies. Off-axis throws are nearly impossible due to its weight distribution, but short-range overhead strikes arrive with the force of a falling millstone. There is nothing subtle about the Cinder Axe's fighting language; it is a weapon that announces itself and ends confrontations through sheer brutal force, and its blunt reputation perfectly mirrors the unforgiving frontier it was made to defend.",statBonuses:{strength:9,fireDamage:11},rarity:"Common"}],gr=[{id:"WarriorTopknot",name:"Warrior Topknot",descriptionParagraph1:"The Warrior Topknot traces its roots to the Iron Highlands clans of northern Aetheria, where soldiers gathered their hair high before battle as a gesture of defiance against death. Ancient Highland sagas describe the knot as a pact with Kaelthar, the god of honourable combat, binding the warrior's spirit to their blade. Over centuries the style spread south through the Ember Reaches as mercenary culture carried Highland customs across the continent. By the Age of the Fractured Crown it had become standard among regimental officers who wished to project the austere discipline of the north.",descriptionParagraph2:"Citizens of the great trading cities treat the Warrior Topknot as an immediate signal of martial profession, stepping aside in market crowds and showing deference in taverns. Among the knightly orders of the Sunken Vale, the style marks a seasoned campaigner and is quietly expected before a soldier seeks promotion. In combat the tightly bound mass keeps hair clear of visor slits and away from enemy grasping hands, a practical advantage proven over generations of close-quarters warfare. Opponents have noted that the silhouette of the topknot makes its wearer appear taller and broader, lending a subtle psychological edge in intimidation."},{id:"FreeFlow",name:"Free Flow",descriptionParagraph1:"Free Flow emerged from the nomadic Wind-Walkers of the Aerathi Plateau, who believed that confining hair suppressed the breath-spirit dwelling within each person. Their oral histories speak of the First Wanderer descending from the sky with hair streaming behind like a comet's tail, forever setting the ideal of unrestrained locks. As Aerathi traders settled along the Sapphire Coast the style mingled with Coastal Revel culture, becoming associated with artists, poets, and those who prized personal liberty. The Conclave of Winds later formalised it as the ceremonial default for newly initiated air-affinity mages.",descriptionParagraph2:"Across Aetheria Free Flow is read as a statement of independence, and those who wear it in noble courts are often assumed to reject rank and protocol — a perception that can open doors or close them depending on the host's temperament. Faction recruiters for rebel movements favour candidates with this style because it suggests a willingness to operate outside established chains of command. In battle the unbound cascade creates an unexpected visual blur around the head that can momentarily confuse archers tracking a moving target. However seasoned fighters know that opponents can seize loose hair, and wearers learn early to guard against that vulnerability with precise footwork."},{id:"BraidedCrown",name:"Braided Crown",descriptionParagraph1:"The Braided Crown was first recorded in the illuminated manuscripts of the Verdant Queendom, a matriarchal nation that ruled the central heartlands of Aetheria for three centuries before the Sundering. Queens and high priestesses coiled their braids into a circlet as a physical representation of sovereignty intertwined with wisdom. Each individual braid within the crown traditionally represented an oath sworn to a different goddess of the Verdant Pantheon. After the Queendom fell the style was preserved by its diaspora, and today it signals lineage or reverence for that lost civilisation.",descriptionParagraph2:"Surviving Verdant communities recognise the Braided Crown as a sign of respect and sometimes kinship, and its wearers often receive preferential prices in the markets those communities control. In the wider world the elaborate construction signals patience, dexterity, and a meticulous mind, traits that guilds of scribes, diplomats, and surgeons actively seek in recruits. On the battlefield the braids are reinforced with thin copper wire by experienced fighters, transforming the decorative circlet into a modest cushion that distributes impact across the scalp. The style is difficult to maintain under a helmet, however, and soldiers who prize it tend to opt for open-faced helms despite the additional risk."},{id:"CropShear",name:"Crop Shear",descriptionParagraph1:"The Crop Shear originated in the Ashen Wastes where extreme heat and scarce water made long hair a practical burden rather than an adornment. Waste-scavengers used salvaged blades to cut their hair bluntly at jaw level, and the rough, uneven result became a badge of survival among the Ashborn communities. When refugees from the Wastes flooded the coastal cities during the Great Drought, they brought the style with them, and it was quickly adopted by the urban poor as a symbol of resilience. Eventually it crossed class lines when chroniclers and poets romanticised the Ashborn struggle, and today Crop Shear is worn everywhere from refugee camps to fashionable artists' quarters.",descriptionParagraph2:"In working-class neighbourhoods the Crop Shear carries deep solidarity — a wearer is generally assumed to have endured hardship and is granted an implicit social trust among labourers and guildless fighters. Noble houses tend to view it as a deliberate provocation when worn at formal functions, though some rebellious younger heirs adopt it for exactly that reason. In combat the short length eliminates virtually every hair-related liability, allowing wearers to don and remove helmets with ease and eliminating any handle an opponent might grab. Ashborn warriors who retain the style in professional armies often cite it as the single change that most improved their battlefield survivability."},{id:"LorelockDreads",name:"Lorelock Dreads",descriptionParagraph1:"Lorelock Dreads were developed by the scholar-monks of the Obsidian Library, who wove thin strips of vellum inscribed with protective runes directly into their matted locks during years-long study retreats. The technique began as a mnemonic aid — each lock encoded a different branch of knowledge — and evolved into a sacred form of living archive worn on the body. Communities across the Deepwood adopted a non-scholarly version, weaving plant fibres and seeds into the locks as a connection to ancestral forests. The Deepwood Covenant still considers the style sacred enough that cutting another person's Lorelocks without consent is classified as a punishable spiritual offense.",descriptionParagraph2:"To mage-academies and scholarly institutions the Lorelocks communicate intellectual seriousness, and wearers frequently bypass introductory examinations on the assumption that someone so visibly committed to knowledge must already possess its foundations. Common townsfolk in rural Aetheria sometimes regard the style with superstitious unease, believing that the rune-woven locks can trap voices or steal thoughts, an unfounded fear that nonetheless grants wearers an aura of quiet authority. The density and weight of fully formed dreads provide a surprising degree of cushioning against blunt trauma, and practitioners of head-focused wrestling techniques have noted the material advantage. Opponents who attempt to grab the locks, however, find them greasier and more difficult to hold than loose hair, and some Dread-wearers have cultivated that property deliberately."},{id:"RiverBraid",name:"River Braid",descriptionParagraph1:"The River Braid emerged among the ferrywomen and rivermen of the Sunken Vale delta, who needed hair kept securely back during the unpredictable currents and sudden storms of delta crossings. A single thick braid running from crown to lower back — left to sway freely rather than pinned — mimics the motion of the river itself, and delta culture considers it a way of honouring the waterways that sustain their communities. The Tidecaller priestesses of the Vale formalised the style as liturgical dress during the Flood Rites, and the imagery spread through hymnals and devotional woodcuts across coastal Aetheria. Inland cultures borrowed it as a symbol of journeying and homecoming, giving it a secondary meaning of faithful return.",descriptionParagraph2:"Along the coast the River Braid marks someone as sea-worthy or river-tested, and captains hiring crew instinctively regard wearers as more credible candidates than those presenting no such visible signal. In landlocked cities it carries a romantic association with travel and adventure, making it popular among young idealists and those who wish to appear worldly. During combat on ships or near water the single braid is easily tucked into a belt or lashed to the body, preventing it from catching on rigging or oar mechanisms, a habit that has carried into land engagements as disciplined braid-management. Opponents who succeed in seizing the braid gain a significant leverage point against the neck, however, and veteran River Braid wearers train extensively to break such grips before they can be exploited."},{id:"DustSweep",name:"Dust Sweep",descriptionParagraph1:"The Dust Sweep was born in the caravan culture of the Amber Corridor, the great overland trade route that bisects Aetheria from the Cinder Peaks to the Tidal Shelf. Traders and outriders swept their hair to one side and secured it loosely behind one ear, keeping the windward eye clear during the notorious sandstorms that plagued the Corridor's eastern reaches. Guild records from the Amber Merchants' Association depict the style in ledger-margin illustrations as early as the Second Compact Era, suggesting it has been a corridor staple for at least four centuries. The off-centre asymmetry became aesthetically intentional as the style spread to cities, where tailors and jewellers began adorning the swept side with clips and pins as marks of prosperity.",descriptionParagraph2:"Merchants across Aetheria recognise the Dust Sweep as a signal of someone comfortable on the road and accustomed to transactional culture, making it a socially useful style for those who wish to appear commercially savvy. In aristocratic circles the swept style reads as artfully casual, a difficult balance that earns admiration when achieved well and derision when it looks merely unkempt. In fighting situations the one-sided arrangement keeps the dominant eye's peripheral vision clean, a real tactical benefit archers and crossbow-users consistently praise. The loose securing means the style can shake free during intense grappling, leaving the wearer suddenly encumbered with hair across their face at the worst possible moment — a flaw that keeps many fighters from adopting it for serious campaigns."},{id:"StormSilk",name:"Storm Silk",descriptionParagraph1:"Storm Silk is intrinsically linked to the Tempest Weavers, an order of lightning-affinity mages who operated from the Stormspire Citadel before its destruction in the War of Hollow Skies. The order discovered that extremely fine, straight hair left loose but treated with conducting mineral oils channelled ambient static electricity across the scalp, amplifying the mage's sensitivity to approaching storms. Non-mage attendants at the Citadel adopted the look out of admiration, and when the Citadel fell its survivors scattered the style across the continent. Today Storm Silk hair — naturally straight, mirror-sheen, and worn loose to the shoulders — is heavily associated with lightning magic and the memory of the lost order.",descriptionParagraph2:"Lightning-path mages treat wearers of Storm Silk with an instinctive fraternal warmth regardless of whether the wearer has any actual magical ability, and this misidentification can be either a social boon or a dangerous liability depending on circumstances. Rival factions that opposed the Tempest Weavers have long memories, and some older commanders harbour open distrust toward Storm Silk wearers entering their territories. In battle the treated, mineral-oiled hair catches light in a way that creates a faint halo effect around the head, a visual that unnerves the superstitious and has broken more than one charge by making a fighter appear supernaturally touched. The oil treatment is also mildly irritating to mucous membranes, and adversaries who manage close grappling contact sometimes find their eyes watering unexpectedly — a side effect wearers rarely mention."},{id:"Sageknot",name:"Sageknot",descriptionParagraph1:"The Sageknot is the traditional style of the Meridian Sages, itinerant scholars who wandered Aetheria recording its natural and metaphysical phenomena in the centuries following the Sundering. The distinctive low, loose bun secured with a single wooden pin was practical for fieldwork — quick to release for washing in streams and quick to reassemble — and the wooden pin itself was carved from different trees to signal the Sage's specialisation. Mountain Sages used pine, coastal Sages driftwood, and forest Sages carved pins from living branches, creating a subtle but legible taxonomy of expertise. The tradition persists among academics and naturalists who adopt the Sageknot as an homage to those wandering intellectual forebears.",descriptionParagraph2:"Libraries, universities, and research institutions throughout Aetheria extend a small but real measure of professional courtesy to Sageknot wearers, sometimes offering discounted access to restricted archives or introductions to senior scholars. Rural communities remember the Meridian Sages as bringers of useful knowledge and subtle healers, and the style still opens farmhouse doors and earns a free meal in the outer provinces more reliably than a purse of coin. In a fight the wooden pin is the crucial variable — a forgotten pin flying out during a skirmish releases a sudden cascade of hair that can impair vision at a critical moment, a hazard every Sageknot wearer must mentally account for. Those who have field-hardened the style often carry a secondary pin tucked in a collar or cuff so they can restore the knot with one hand if it comes undone mid-encounter."},{id:"TwistPillar",name:"Twist Pillar",descriptionParagraph1:"The Twist Pillar was formalised by the architects and engineers of the Stonework Guilds who constructed the great pillar-cities of the central plains, settlements built vertically rather than outward to conserve the fertile farmland. Guild masters wore their hair twisted into a single tall column as a living echo of the structures they raised, and the style became a mark of professional pride so strong that Guild law once prohibited non-members from wearing it. The prohibition was overturned in the Third Reform but the association persisted, and the Twist Pillar remains closely identified with craftsmanship, precision, and the Stonework tradition. Sculptures from the Guild's Golden Age depict master architects with the Twist Pillar wrapped in gold thread, the height of the column indicating seniority.",descriptionParagraph2:"Guild merchants and suppliers consistently offer better terms to Twist Pillar wearers on the assumption of shared professional affiliation, a social shortcut that canny non-Guild travellers sometimes exploit. In the pillar-cities themselves the style signals a level of civic respectability that eases interactions with guards, inspectors, and landlords who are conditioned to associate it with trustworthy tradespeople. On the battlefield the elevated column of hair creates an obvious and slightly absurd vertical silhouette, making the wearer more identifiable at range — a disadvantage that most fighting Twist Pillar adherents solve by releasing the twist and wearing the hair loose while armoured. The twist structure itself, when wound tightly, can conceal small items such as lock-picks or folded messages, a secondary use that spies and couriers have quietly exploited for generations."},{id:"HalfVeil",name:"Half Veil",descriptionParagraph1:"The Half Veil originates in the funeral customs of the Mourning Cities of the western shore, where the bereaved draped half their hair over one eye as a symbol of the veil between the living world and the realm of the departed. Over time the gesture was adopted by mediums, grief-counsellors, and those who had survived near-death experiences as a permanent reminder of their liminal relationship to mortality. The Shadow Communion, a spiritual order dedicated to honouring the dead, formalised the style as part of their devotional dress in the early Second Compact Era. Its gradual adoption outside funerary contexts by general society was controversial, with some Communion elders still condemning fashion appropriation of what they consider a sacred marker of grief.",descriptionParagraph2:"Across Aetheria's western provinces the Half Veil is immediately legible as grief-adjacent symbolism, and wearers frequently receive unsolicited condolences from strangers who assume they are in mourning — a social dynamic that becomes exhausting quickly for those who chose the style purely for its aesthetic. In the eastern provinces where the Mourning City traditions are less known, the single curtained eye reads as mysterious and deliberate, projecting an air of concealed depth that can be enormously useful in negotiations and social manoeuvring. In combat the curtained eye is the defining liability, reducing peripheral vision on the veiled side and creating a consistent blind angle that experienced opponents will immediately attempt to exploit. Wearers who have fought seriously with this style develop an almost compulsive habit of turning the veiled side toward a wall or obstacle, so that only the open-eye direction faces the threat."},{id:"WildUnbound",name:"Wild Unbound",descriptionParagraph1:"Wild Unbound has no single point of origin — it is, in a sense, the style that predates all others, the natural state of hair before culture imposed structure upon it. In Aetherian mythology the primordial spirit Vael is always depicted with hair cascading in all directions, untouched by human hands, representing the raw creative chaos from which the world was shaped. The Thornwood ferals, communities that retreated from civilisation during the Sundering Wars and never fully returned, maintain the style as a philosophical and spiritual commitment to natural existence. Paradoxically, the Wild Unbound has also been enthusiastically adopted by certain avant-garde urban fashionists who see deliberate disorder as the ultimate sophisticated statement.",descriptionParagraph2:"The style triggers strikingly different social responses depending on context: in urban centres it signals artistic bohemianism or wealth-enabled eccentricity, while in rural and frontier areas it marks someone as either deeply spiritual or dangerously unpredictable, and locals rarely know which until they engage further. Thornwood communities show immediate kinship to wearers and extend the considerable hospitality of their hidden woodland settlements, a social benefit that more than compensates for the raised eyebrows in cities. In battle Wild Unbound is simultaneously a strength and a weakness — the chaotic silhouette makes precise head-targeting difficult for archers, but the volume and weight of uncontrolled hair can obstruct the wearer's own vision during rapid movement, rolls, or when fighting in wind. Elite warriors who genuinely commit to this style train with eyes partially obscured from early instruction, building an environmental awareness that becomes a formidable combat advantage once fully internalised."}],fr=[{id:"CrimsonAsh",name:"Crimson Ash",hex:"#C0392B",descriptionParagraph1:"Crimson Ash hair is believed by Aetherian fire-cult theologians to be a direct genetic echo of the Embertouched — ancient humans who survived the First Conflagration by absorbing Flame directly into their bloodline rather than fleeing it. Hereditary scholars of the Cinder Peaks have documented that Crimson Ash pigmentation appears disproportionately in families with a recorded history of fire-affinity in at least three consecutive generations. Some metaphysical traditions hold that the reddish-ash colouration is the physical residue of the soul's passage through the Flame Threshold before birth, marking the individual as one who has already faced death in a prior existence. Geneticists at the Ivory Collegium dispute the supernatural interpretations but concede that the specific pigment combination is statistically unusual and clusters within identifiable bloodlines.",descriptionParagraph2:"In the Ember Reaches and among fire-affinity mage orders, Crimson Ash hair commands instinctive respect and occasional wariness — its wearers are assumed to carry latent power regardless of demonstrated ability. The Stonework Guild cities of the central plains view the colouration with a more pragmatic eye, associating it simply with highland heritage and the hardy temperament that heritage implies. Shadow Communion members treat Crimson Ash wearers carefully, believing that those close to the Flame in life carry the potential to become powerful revenants in death — a belief that translates into both reverence and a subtle, persistent unease. Northern Highland clans consider Crimson Ash the colour of chiefs and seers, and wearers entering Highland territory uninvited are frequently asked to identify their lineage before being granted passage."},{id:"OceanBlue",name:"Ocean Blue",hex:"#1A6B8A",descriptionParagraph1:"Ocean Blue hair is regarded throughout coastal Aetheria as the most visible sign of the Tidecaller bloodline, a genetic lineage traced to the original priestesses of the sea-goddess Maren who were said to have wept the first ocean into existence from grief. The pigmentation results from an extremely rare expression of the Maren-marker gene, which oceanographers and mages both confirm produces trace amounts of a bioluminescent compound in the hair shaft that makes the colour appear to shift like deep water under certain light. Deepwater communities in the Sunken Vale treat naturally Ocean Blue hair as an omen of extraordinary good fortune for sea voyages, and captains have historically paid significant sums to have such-haired individuals aboard. Inland cultures without maritime traditions often mistake the colour for a dye job, a misidentification that Tidecaller descendants find quietly offensive.",descriptionParagraph2:"The Tidecaller priesthood extends automatic provisional membership to any Ocean Blue individual who presents themselves at a coastal temple, regardless of their magical aptitude or theological knowledge, so powerful is the cultural weight of the colouration. Merchant fleets operating in contested waters have long used Ocean Blue-haired envoys as de facto diplomatic shields, because attacking a vessel carrying someone of that colouration risks the wrath of every coastal community along the trade route. In the landlocked Amber Corridor nations the colour is perceived as exotic and vaguely unsettling — associated with the unpredictable moods of the sea — which gives wearers a reputation for emotional volatility they may not deserve. Ironically, among the Shadow Communion the Ocean Blue is regarded as the hair of those furthest from death, the colour of souls that will linger long in the living world, and Communion members treat its wearers with a complex mixture of fondness and mild theological contempt."},{id:"EarthBrown",name:"Earth Brown",hex:"#7B5D3A",descriptionParagraph1:`Earth Brown is the most common hair colour in Aetheria's heartland populations and carries a spiritual weight precisely because of its ubiquity — the Verdant Queendom's founding texts describe it as the colour of the world's own hair, the shade Aetheria herself wears when she walks the land in human guise. Deepwood communities believe that Earth Brown individuals share a molecular kinship with the soil, giving them an intuitive understanding of growing things and a constitutional resistance to plant-based poisons that herbalists have partially validated. The Meridian Sages recorded in their field journals that Earth Brown hair statistically appears more often in populations that have maintained continuous habitation of a region for five or more generations, suggesting a convergence between human biology and local environment over time. Genetic scholars note that the pigmentation spans an enormous range of warm brown tones, meaning that "Earth Brown" as a cultural category encompasses significant variation that outsiders sometimes fail to appreciate.`,descriptionParagraph2:"Because Earth Brown is so widespread, it carries a foundational social neutrality that more striking colours cannot claim — wearers move through every faction and every class without triggering the assumptions that rarer colours provoke, which is a practical advantage that intelligence agents and diplomats prize highly. In the Stonework Guild cities it is the colour of reliable competence, neither the exotic signal of highland red nor the maritime glamour of ocean blue, but the steady, trustworthy tone of someone who gets things done. The Ashborn communities of the Wastes regard Earth Brown with particular tenderness, because it is the colour of the fertile land they lost, and travellers of this colouration often receive unexpected hospitality in Waste settlements regardless of their actual origins. Elvish remnant communities in the Deepwood, who associate the colour with the mortal-touched nature spirits they revere, extend a cautious spiritual kinship to Earth Brown wearers that can prove invaluable when navigating the forest's more actively hostile zones."},{id:"StormGrey",name:"Storm Grey",hex:"#6B7280",descriptionParagraph1:"Storm Grey hair that appears from birth rather than as a result of ageing is considered in Aetherian spiritual traditions to be the mark of someone who was conceived during a significant storm event — a child of turbulence whose character was shaped by chaotic energy before they drew their first breath. The Tempest Weavers of the Stormspire Citadel maintained extensive genealogical records showing that natural-born Storm Grey individuals produced lightning-affinity mages at three times the baseline population rate, a correlation that made the colour deeply significant to that order before its destruction. Some philosophical schools hold that Storm Grey signals not the presence of power but the capacity to withstand it — these individuals, the theory runs, are natural conductors who pass force through themselves without being consumed by it. In ageing populations Storm Grey is obviously not exceptional, but when it appears in youth the social and spiritual weight it carries is entirely disproportionate to its frequency.",descriptionParagraph2:"In the remnant communities that venerate the Tempest Weavers' memory, natural-born Storm Grey individuals are sought out by surviving scholars and sometimes quietly guided toward lightning-path study regardless of their own inclinations. Military commanders in the highland nations traditionally assign Storm Grey soldiers to the vanguard, believing they carry the storm's favour and that this blessing extends to those who fight alongside them. The Amber Corridor merchant guilds take a more sceptical and commercial view, noting only that Storm Grey wearers attract attention and gossip in ways that can be strategically useful during contract negotiations where mystique is an asset. Shadow Communion elders mark Storm Grey individuals in their death-records with a special annotation indicating that the soul is likely to be volatile in the afterlife, requiring additional ritual preparation of the body — a belief that the Storm Grey communities themselves find morbid and unwelcome."},{id:"IceWhite",name:"Ice White",hex:"#E8F4FD",descriptionParagraph1:"Ice White hair — pure, pigment-free white appearing at birth without the cause of albinism — is the rarest natural colour in Aetheria and is theologically interpreted by the Frostbound Orders of the northern Pale as evidence of the Glacial Ancestors' direct intervention in the bloodline. The Frostbound maintain that the Glacial Ancestors were the first mages to master ice-affinity, and that they chose to mark their descendants not with power but with visibility, so that communities would know to nurture and protect those who carried their spiritual legacy. Academic study of Ice White hair reveals that the shaft structure differs slightly from both naturally white ageing hair and albino hair, containing microscopic air chambers that give it a faint, interior luminosity — particularly visible in moonlight — that communities near the Pale find genuinely eerie. Geneticists suspect a dormant pigment-suppression gene linked to cold-climate adaptation, but the rarity of its expression means the research pool is small and conclusions remain contested.",descriptionParagraph2:"In the Pale and the northern territories the social response to Ice White hair is one of instinctive protective reverence: strangers offer the warmest seat by the fire, the first share of provisions, and the most direct route through dangerous terrain without being asked. Frostbound temple authorities fast-track Ice White individuals through ecclesiastical ranks regardless of demonstrated piety, trusting the colour itself as a form of divine endorsement. Southern nations and desert cultures find Ice White hair deeply unsettling rather than sacred, associating its bloodless pallor with ghosts, the recently dead, and the devouring blizzards that occasionally push south from the Pale and devastate farming communities. In Shadow Communion theology Ice White represents a soul that has already given up much of its vital warmth — these individuals are considered to stand with one foot already through the veil, and Communion members interact with them in a state of constant, quiet expectation of witnessing something extraordinary."},{id:"GoldenAmber",name:"Golden Amber",hex:"#D4A017",descriptionParagraph1:"Golden Amber hair is the colour most closely associated with the Solar Compact, the pan-Aetherian diplomatic federation that maintained peace across the central nations for two centuries before the Fractured Crown war. Compact records show that its founders deliberately chose ambassadors with Golden Amber colouration where possible, believing that the colour's warmth and luminosity made their representatives immediately likeable and trustworthy to strangers of varied backgrounds. Spiritual traditions across the heartland associate Golden Amber with the midday sun, specifically the moment of highest clarity when shadows are shortest and truth is most difficult to conceal, making the colour symbolically linked to honesty and revelation. Some sun-worship traditions hold that Golden Amber individuals attract solar energy in ways that improve the wellbeing of those around them, a belief that is unfounded in rigorous metaphysical study but stubbornly persistent in popular culture.",descriptionParagraph2:"Golden Amber wearers enjoy perhaps the most universally positive social reception of any colour in Aetheria — they are treated as trustworthy, warm, and capable by default across nearly every culture and faction, a privilege that requires conscious effort to recognise and consciously choose not to exploit. Diplomatic guilds and merchant consortiums actively recruit Golden Amber individuals as front-of-house negotiators, knowing that the first impression they create smooths the path for whatever harder bargaining follows. Military units that include Golden Amber individuals report measurably higher morale in sustained campaigns, a correlation that commanders attribute to the colour's solar associations and its effect on how units perceive their own luck and divine favour. The one community that regards Golden Amber with ambivalence is the Shadow Communion, whose members associate solar brightness with the painful exposure of secrets they are sworn to protect — Golden Amber wearers entering Communion territories often find their welcome warm on the surface but guarded underneath."},{id:"ShadowBlack",name:"Shadow Black",hex:"#1C1C2E",descriptionParagraph1:"Shadow Black is one of the most common hair colours in Aetheria's eastern populations and carries an immense spiritual weight in Shadow Communion theology, where it is considered the colour through which the boundary between the living and the dead most easily flows. The Communion's founding texts describe the first medium as a Shadow Black-haired woman who discovered she could see the departed because her hair, the colour of the void between stars, acted as a natural conduit for spirit passage. Secular scholars note that the deepest expression of Shadow Black — the near-purple obsidian tone found in eastern families — contains a unique light-absorption property that makes faces framed by it unusually legible in low-light conditions, a practical benefit that warrior traditions of the east have always valued. The colour is also associated by some alchemists with an unconfirmed but persistent connection to shadow-affinity magic, with more than a third of documented shadow-path mages born with this colouration.",descriptionParagraph2:"Shadow Communion members treat deep Shadow Black individuals with the highest form of spiritual respect within their theology — such individuals are believed to already partially inhabit the realm of the departed and to carry wisdom from both sides of the boundary. Eastern warrior orders specifically recruit Shadow Black individuals into their night-operations units, arguing both the practical advantage of natural camouflage and the cultural advantage of a silhouette that frightens superstitious opponents in the dark. Western nations with stronger solar-worship traditions associate Shadow Black with concealment, deception, and night-danger, which creates persistent social disadvantages for Shadow Black individuals travelling through the Sunken Vale or the Amber Corridor's western terminus. In the Thornwood communities that revere natural states, Shadow Black is understood as the colour of fertile soil and deep root systems — the darkness from which all growing things emerge — giving it a strongly positive spiritual connotation entirely at odds with the fear it generates elsewhere."},{id:"MossGreen",name:"Moss Green",hex:"#4A7C59",descriptionParagraph1:"Moss Green hair is unique among Aetherian natural colours in that its existence is itself a matter of metaphysical controversy — mainstream genetics maintains that no mechanism exists for true green human hair pigmentation, yet Deepwood communities consistently produce individuals whose hair reflects genuine green tones that deepen with proximity to living vegetation. The Verdant Queendom's ancient records describe the Wood-Blessed as individuals so thoroughly interpenetrated with wood-affinity that their very hair expresses chlorophyll resonance, a process the Queendom's mage-biologists described in detail though modern scholars struggle to replicate their findings. Thornwood ferals who carry Moss Green hair are regarded as the most sacred members of their communities, believed to be capable of communicating directly with the old-growth trees that predate human civilisation in Aetheria. Among wood-path mages the colour is considered the physical manifestation of the deepest possible attunement to the Wood element, and its appearance in a new mage is treated as a gift from the forest itself.",descriptionParagraph2:"Deepwood communities show an instinctive deference to Moss Green individuals that overrides normal social hierarchies — even established elders will pause and listen when a Moss Green person speaks, a cultural conditioning so deeply embedded that travellers entering Deepwood territories quickly learn to pay attention to who the locals watch. The Verdant Queendom diaspora communities scattered throughout Aetheria treat Moss Green wearers as bearers of their civilisation's most sacred genes, offering kinship, shelter, and access to cultural knowledge that would otherwise require years of relationship-building. Urban Aetheria responds to Moss Green with a mixture of fascination and practical concern, since the colour is rare enough that most city-dwellers have only encountered it in illustrated herbals and monster-almanacs that associate it with dangerous forest beings. Military commanders who have fought in or near the Deepwood universally instruct their scouts to report any Moss Green-haired individuals encountered because they reliably signal proximity to Thornwood feral territories that require careful diplomatic handling."},{id:"VoidPurple",name:"Void Purple",hex:"#6B21A8",descriptionParagraph1:"Void Purple hair is in Aetherian cosmology the colour of the space between realities, the transitional tone that appears where the material world edges against the dimensional membranes that separate Aetheria from the realms beyond. Time-path and shadow-path mage traditions both claim it as their own — time mages argue it is the colour of temporal distortion visible at the edge of a chrono-shift, while shadow mages maintain it is the colour of the deepest shadow that exists beyond the absence of light. Individuals born with natural Void Purple colouration are extremely rare, appearing most frequently in families with documented dimensional-rift exposure during the Sundering Wars, when the membrane between Aetheria and the outer realms was most severely damaged. The Obsidian Library's genetic archive contains seventeen confirmed bloodlines that carry the Void Purple marker, each traceable to a specific rift-event recorded in the Sundering War chronicles.",descriptionParagraph2:"Both the time-path and shadow-path mage orders extend extraordinary hospitality to Void Purple individuals, competing to attract them to their respective academies and occasionally creating genuinely uncomfortable situations for the individual who must navigate both factions' attentions simultaneously. Common people across Aetheria respond to Void Purple with a superstitious awe that falls just short of fear — the colour is associated with powers that transcend normal limits, and most people prefer to treat Void Purple wearers with careful, performative respect rather than risk offending someone who might have access to abilities they don't fully understand. In the governance structures of the great cities, Void Purple individuals are quietly flagged in administrative records as requiring monitoring — not out of malice but because dimensional-sensitive bloodlines have historically been at the centre of events that required civic emergency response. The Frostbound Orders of the Pale regard Void Purple as the colour farthest from their glacial solar traditions, and their theological texts class it as the pigment of dangerous unpredictability, which has historically made northern territories uncomfortable for Void Purple travellers."},{id:"CoralPink",name:"Coral Pink",hex:"#FF7F7F",descriptionParagraph1:"Coral Pink hair is associated throughout coastal Aetheria with the Dawn-Kissed, a lineage mythology describing individuals whose ancestors were present when the goddess Maren and the sun-deity Soleth briefly merged in the event cosmologists call the First Sunrise. The theology holds that the blended divine essence left its mark in the bloodline as a hair colour that is neither the pure gold of solar lineages nor the deep ocean blue of Tidecaller descent, but the warm fusion shade visible at the exact horizon moment where sea meets sunrise. Genetic study of Coral Pink individuals finds no single gene marker but rather an unusual co-expression of two normally mutually exclusive pigment-production pathways, which some researchers consider biological support for the dual-lineage mythology. The colour is most common in the island chains of the Tidal Shelf where coastal and solar traditions have mingled for centuries, and decreases in frequency as one moves inland.",descriptionParagraph2:"Island communities of the Tidal Shelf treat Coral Pink individuals as natural diplomatic bridges between the Tidecaller and solar-worship traditions, and they are frequently asked to mediate in theological disputes that would otherwise require the intervention of significantly more powerful officials. Mainland coastal cities associate the colour with prosperity and fortunate travel, and ship owners seek Coral Pink crew with the same enthusiasm they show toward Ocean Blue passengers, believing the dual-lineage blessing compounds the standard maritime luck. In purely inland cultures where neither maritime nor strong solar worship traditions dominate, Coral Pink is perceived primarily as unusual and aesthetically striking, generating curiosity rather than reverence — a social dynamic that Coral Pink wearers from coastal backgrounds sometimes find disorienting. The Shadow Communion, whose theology is built around singular, unblended spiritual essences, regards the dual nature implied by Coral Pink with a philosophical discomfort they rarely articulate openly but which nonetheless results in measurably cooler treatment of Coral Pink individuals in Communion spaces."},{id:"VolcanicOrange",name:"Volcanic Orange",hex:"#FF6B35",descriptionParagraph1:"Volcanic Orange is the rarest of the fire-adjacent hair colours and is theologically distinct from Crimson Ash in that it is associated not with the survival of fire but with its active generation — the colour of magma rather than embers. The Molten Covenant, an extremist fire-affinity order that operated in the Cinder Peaks before its dissolution, maintained that Volcanic Orange individuals were literally closer to the planet's interior fire than any other living beings, their very biology a bridge between the surface world and the geological forces beneath it. Pre-Sundering agricultural texts record that communities living near active volcanic formations would seek out Volcanic Orange individuals to serve as ritual mediators with the mountain's fire-spirit before planting seasons, believing their prayers carried directly to the geological powers that determined whether a season would be prosperous or catastrophic. Scientific investigation finds that Volcanic Orange hair, like Moss Green, contains a pigment compound that mainstream genetics cannot fully account for, and it interacts with extremely high-temperature environments in ways that suggest an unusual biological adaptation to heat exposure.",descriptionParagraph2:"Among fire-path mage communities Volcanic Orange is regarded with something approaching awe — it is the colour that even fire-affinity scholars consider to signal the deepest and most potentially dangerous expression of their element, and its wearers are simultaneously recruited aggressively and watched with considerable caution. Cinder Peaks mining communities regard Volcanic Orange individuals as having the mountain's blessing, and they are granted access to the deepest and most profitable ore seams as a form of ritual courtesy that also, the communities acknowledge privately, tends to keep dangerous cave-ins and fire-damp incidents away. Coastal and maritime cultures that fear volcanic activity — particularly those in the Tidal Shelf who have experienced volcanic tsunamis — respond to Volcanic Orange with a deep-rooted unease that manifests as polite avoidance and subtly shorter docking negotiations. The Solar Compact's diplomatic tradition formally classifies Volcanic Orange individuals as requiring sensitive handling in multi-faction negotiations, because their presence simultaneously excites fire-affinity factions and makes earth-affinity and water-affinity representatives instinctively defensive."},{id:"StarSilver",name:"Star Silver",hex:"#C0C0C0",descriptionParagraph1:"Star Silver hair is cosmologically linked to the Astral Cartographers, a vanished order of mage-astronomers who mapped the dimensional currents flowing between Aetheria and the celestial planes before the Sundering severed most of those connections. The order's own records describe Star Silver as the colour of hair that has been exposed to direct astral-plane radiation over multiple generations, the soul's passage through stellar light leaving a permanent trace in the body's pigmentation. Unlike ageing-related silver, Star Silver hair in young individuals displays a faint iridescent shimmer under open sky that responds to stellar positions — subtly brighter during clear nights when the star-field is fully visible and slightly duller under total cloud cover, a property that has been independently verified by multiple scholars. The Obsidian Library maintains a separate genealogical archive for Star Silver bloodlines on the theory that they represent a distinct lineage of human beings whose ancestors were partially remade during the era of free astral-plane commerce.",descriptionParagraph2:"Astronomical institutes and dimensional research bodies across Aetheria compete for Star Silver individuals with the same enthusiasm that fire-path orders show toward Volcanic Orange wearers, funding their education and providing them with research positions in hopes of reactivating the astral-perception faculties their bloodline theoretically contains. Common citizens associate Star Silver with prophecy, stargazing, and the ability to read fate in the night sky — a reputation that earns wearers both genuine consultations in which they are expected to provide cosmic insight and awkward social situations when they must explain they cannot actually read the stars with any supernatural accuracy. The military establishments of the northern Highland clans have historically classified Star Silver individuals as strategic assets to be protected rather than deployed in front-line roles, based on the belief that their bloodline connection to the astral plane gives them advance awareness of dimensional threats that normal scouts would miss entirely. Shadow Communion elders regard Star Silver as a colour that belongs to a different order of existence from the boundary they guard, and their theological texts describe Star Silver souls as ones that, upon death, will travel outward rather than through the veil — making them the one category of individual whose funerary preparation requires entirely different rituals from the Communion's standard rites."}],pr=[{id:"EmberGlow",name:"Ember Glow",element:"Fire",color:"#FF4500",descriptionParagraph1:"EmberGlow irises carry the spiritual imprint of the Flame Threshold, the cosmological boundary through which all fire-affinity souls are believed to pass before incarnating in the mortal world. The orange-red colouration results from an elevated concentration of pyric essence in the ocular fluid, a metaphysical compound that the Molten Covenant's alchemists partially synthesised before their dissolution. When a fire-path mage with EmberGlow eyes channels their element, the irises brighten from smouldering orange to an intense molten core, with thin filaments of light radiating outward like cracks in cooling lava. In moments of extreme channelling the pupils themselves seem to disappear, leaving the eyes as uniform discs of living fire that witnesses invariably describe as simultaneously beautiful and terrifying.",descriptionParagraph2:"Those who see EmberGlow eyes for the first time in a social setting almost universally experience an involuntary surge of warmth — a physical sensation of radiated heat tha
