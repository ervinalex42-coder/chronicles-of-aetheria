birthmark — the ${a.birthmark}. Classmates form a ring, watching expectantly, while the instructor's back is turned.`,choiceText:(e,t,a)=>`Stand firm and unleash a harmless pulse of ${a.element.toLowerCase()} energy — just enough to make the bully flinch — using the first form of ${t.signature}.`,statChanges:{strength:2,charisma:1,wisdom:-1,parentalStanding:-3}},{baseId:"ch-family-feast",label:"Clan Festival Demonstration",narrative:(e,t,a)=>`The ${a.clan} hosts its annual harvest feast near ${e.landmark}. An elder calls for the children to demonstrate their early bending gifts before the assembled families. ${a.name} trembles at the edge of the clearing, the ${a.birthmark} birthmark glowing faintly in the firelight.`,choiceText:(e,t,a)=>`Step forward and perform a modest ${t.schoolTerm} display, dedicating it to the ${a.clan}'s honour.`,statChanges:{charisma:3,reputation:4,parentalStanding:5,elementalProficiency:2}},{baseId:"ch-playtime-accident",label:"Playtime Accident in the Fields",narrative:(e,t,a)=>`Playing near the outskirts of ${e.landmark}, ${a.name} and three friends dare each other to perform the most impressive trick. A game of chase turns disastrous when ${a.name}'s ${a.element.toLowerCase()} power surges without warning — ${t.youngTrick} — injuring a companion.`,choiceText:(e,t,a)=>"Rush to the companion's aid, confessing everything to the local healer even though it means punishment.",statChanges:{wisdom:3,health:-4,parentalStanding:-8,elementalProficiency:1}},{baseId:"ch-elemental-awaken",label:"Elemental Awakening Dream",narrative:(e,t,a)=>`On the night of the harvest moon, ${a.name} wakes screaming — the ${a.birthmark} birthmark ablaze with light and ${t.power} dancing across the bedroom walls. A respected mentor from ${e.institution} arrives before dawn, claiming to have felt the surge from miles away.`,choiceText:(e,t,a)=>`Agree to begin formal ${t.schoolTerm} at ${e.institution}, even though it means leaving home for a semester.`,statChanges:{elementalProficiency:8,wisdom:2,parentalStanding:3,health:-2}},{baseId:"ch-fire-forge",label:"Tempted by the Volcanic Forges",narrative:(e,t,a)=>`The volcanic forges of Embrath are forbidden to children, but the roar of molten ore calls to ${a.name}'s ${a.element} blood like a second heartbeat. A forge-master catches the child sneaking inside, palm pressed against a cooling ingot of obsidian-threaded steel.`,choiceText:(e,t,a)=>"Beg the forge-master for a single lesson in exchange for a week of bellows-pumping duties.",statChanges:{strength:3,elementalProficiency:5,wisdom:-2,parentalStanding:-4},elements:["Fire"],nations:["Pyrethia"]},{baseId:"ch-fire-drill",label:"Industrial Fire Drill Mishap",narrative:(e,t,a)=>`During a mandatory Pyrethian industrial fire drill, ${a.name} panics and releases a burst of uncontrolled flame that scorches the parade banner of the district commander. Officers surround the child, demanding to know which family is responsible for such reckless elemental training.`,choiceText:(e,t,a)=>`Name the ${a.clan} clan proudly and offer to replace the banner by working the forge-bellows for a full moon-cycle.`,statChanges:{charisma:2,reputation:-3,parentalStanding:-5,elementalProficiency:4},elements:["Fire"],nations:["Pyrethia"]},{baseId:"ch-water-tide",label:"Tide-Calling Ceremony Mishap",narrative:(e,t,a)=>`At the Moon Shelf tide-calling ceremony, ${a.name} wades too deep and the sea answers — a wave twice the child's height rises and crashes over the attending elders. The high tide-caller stares in disbelief at the soaked sacred scrolls, then slowly smiles.`,choiceText:(e,t,a)=>"Bow in apology, then redirect the retreating water into an elegant spiral, proving the act was power, not clumsiness.",statChanges:{elementalProficiency:6,charisma:3,reputation:2,parentalStanding:4},elements:["Water"],nations:["Aqualis"]},{baseId:"ch-water-coral",label:"Lost in the Coral Markets",narrative:(e,t,a)=>`${a.name} wanders away from the family stall in the coral markets of Pelagara and falls into one of the flooded market lanes. Beneath the surface, something extraordinary happens — the child breathes the water for a full minute before a merchant-diver pulls them out, wide-eyed and unharmed.`,choiceText:(e,t,a)=>"Beg the merchant-diver to keep the secret and teach you the tidal-flow exercises in exchange for daily errand-running.",statChanges:{survival:4,elementalProficiency:5,parentalStanding:-6,agility:2},elements:["Water"],nations:["Aqualis"]},{baseId:"ch-air-library",label:"Floating Library Shelf Disaster",narrative:(e,t,a)=>`Inside the floating libraries of Altivane, ${a.name} sneezes mid-lesson and gusts half the scrolls off their shelves, sending them spiralling through the open-air reading galleries. Senior archivists spend three hours gathering parchments from the cloud-bridge railings while ${a.name} hides behind a globe.`,choiceText:(e,t,a)=>`Volunteer to copy every scattered scroll from memory — ${a.name} has quietly memorised more than the archivists realise.`,statChanges:{wisdom:5,elementalProficiency:3,parentalStanding:-4,charisma:1},elements:["Air"],nations:["Zephyral"]},{baseId:"ch-air-skysail",label:"Sky-Sailing Trial Gone Awry",narrative:(e,t,a)=>`During junior sky-sailing trials above the Cloudspire, ${a.name}'s board catches an updraft and vanishes into the cloud bank for two terrifying hours. When the child drifts back down, laughing, the instructor is white with rage — and the clan elder is waiting with narrowed eyes.`,choiceText:(e,t,a)=>"Describe every air current and thermal layer encountered up there, turning the ordeal into an unsolicited meteorological report.",statChanges:{agility:4,survival:3,elementalProficiency:4,parentalStanding:-3},elements:["Air"],nations:["Zephyral"]},{baseId:"ch-time-loop",label:"Accidental Afternoon Time Loop",narrative:(e,t,a)=>`${a.name} replays the same five seconds near the Veil Gate over and over — watching a dragonfly land on a reed, again, again, again — until the paradox monks of Ethernost arrive, alarmed. The monks encircle the child, performing paradox-awareness meditations to break the loop before it destabilises the surrounding hour.`,choiceText:(e,t,a)=>"Submit willingly to the monks' guidance and agree to daily paradox-awareness meditation for the rest of the season.",statChanges:{wisdom:6,elementalProficiency:7,health:-3,parentalStanding:2},elements:["Time"],nations:["Chronoveil"]},{baseId:"ch-time-echo",label:"Temporal Echo Frightens Elders",narrative:(e,t,a)=>`During a family dinner, ${a.name} accidentally projects an echo of the meal from two days prior — the family watches ghostly past-selves eat, converse, and laugh for a full minute. When the echo fades, a grandparent weeps and the clan elder sends for a Chronoveil inquisitor by dawn.`,choiceText:(e,t,a)=>"Face the inquisitor with composure and explain the phenomenon as clearly as possible, earning a place at the Ethernost seminary.",statChanges:{wisdom:4,charisma:2,elementalProficiency:6,parentalStanding:5},elements:["Time"],nations:["Chronoveil"]},{baseId:"ch-shadow-blink",label:"Disappeared During Hide and Seek",narrative:(e,t,a)=>`Hiding during a game beneath the Obsidian Labyrinth's outer arcades, ${a.name} blinks entirely out of sight and cannot return for nearly an hour. From inside the void, the child watches frantic searchers' torchlight flicker — and discovers they can also hear whispered secrets across the labyrinth.`,choiceText:(e,t,a)=>"Step back into the light beside the most frightened searcher, resolving never to use the shadow-slip without consent again.",statChanges:{stealth:5,elementalProficiency:5,parentalStanding:-7,wisdom:3},elements:["Shadow"],nations:["Umbrath"]},{baseId:"ch-lightning-lantern",label:"Lanterns Shorted Across the Quarter",narrative:(e,t,a)=>`${a.name} touches an oil lantern in the Thunder Citadel's market quarter and an arc of blue lightning chains across twelve lanterns simultaneously, plunging the lane into darkness. A Stormcaller Barracks sergeant arrives with two recruits, demanding an explanation for the power surge.`,choiceText:(e,t,a)=>"Step forward, confess, and reignite every lantern one by one with carefully controlled sparks to demonstrate the ability is growing, not dangerous.",statChanges:{elementalProficiency:6,charisma:2,reputation:1,parentalStanding:-5},elements:["Lightning"],nations:["Stormreach"]},{baseId:"ch-earth-flagstone",label:"Cracked Courtyard During Tantrum",narrative:(e,t,a)=>`After a disagreement at the Geomancer Halls, ${a.name} stamps a foot in frustration — and a spider-web of cracks races across thirty metres of courtyard flagstones. A stonemason's guild representative presents the clan with a bill that month.`,choiceText:(e,t,a)=>"Offer to mend every crack personally using seismic attunement drills under the stonemason's supervision over the next fortnight.",statChanges:{strength:3,elementalProficiency:5,parentalStanding:-6,wisdom:2},elements:["Earth"],nations:["Terravast"]},{baseId:"ch-ice-rink",label:"Accidental Skating Rink at Dawn",narrative:(e,t,a)=>`On a cold morning near the Glacial Spires, ${a.name} steps across a puddle and freezes the entire courtyard into a gleaming sheet of ice. By the time the Frostveil Academy bell rings, a dozen children are sliding around on it — and the headmaster is not pleased.`,choiceText:(e,t,a)=>"Thaw the ice carefully layer by layer — demonstrating surprising control for a child — and apologise formally to the headmaster.",statChanges:{elementalProficiency:5,agility:2,parentalStanding:-3,charisma:3},elements:["Ice"],nations:["Glacimere"]},{baseId:"ch-metal-spoon",label:"Bent Every Spoon at Dinner",narrative:(e,t,a)=>`During a formal guild dinner at the Ironwright Guildhalls, ${a.name} concentrates too hard on a single spoon and inadvertently bends every piece of cutlery on the table into spirals. The embarrassed parent tries to laugh it off, but the guildmaster leans forward with sudden, intense interest.`,choiceText:(e,t,a)=>"Accept the guildmaster's surprise invitation to visit the ore-sense attunement chambers the following week.",statChanges:{elementalProficiency:6,charisma:2,parentalStanding:5,strength:1},elements:["Metal"],nations:["Ironhold"]},{baseId:"ch-wood-garden",label:"Garden Explodes Overnight",narrative:(e,t,a)=>`${a.name} falls asleep in the family garden and wakes to find every plant has doubled in height, vines threading through the windows, heartwood resin weeping from every trunk. Root-Weavers from Thistlewood arrive by midday, tracing the bloom back to the sleeping child.`,choiceText:(e,t,a)=>"Agree to accompany the Root-Weavers back to Thistlewood for a week of root-communion katas to learn restraint.",statChanges:{elementalProficiency:7,survival:3,parentalStanding:4,wisdom:2},elements:["Wood"],nations:["Sylvara"]}],zm=[{baseId:"ad-military-recruit",label:"Military Recruiter Visits the Clan",narrative:(e,t,a)=>`A uniformed recruiter from ${e.institution} arrives at the ${a.clan} compound, silver-tongued and bearing enlistment papers stamped with the national seal. ${a.name}'s parents exchange a loaded glance across the dinner table as the recruiter speaks of glory, stipends, and early rank.`,choiceText:(e,t,a)=>`Sign the preliminary enlistment pledge and report to ${e.institution} for a three-month trial period.`,statChanges:{strength:4,agility:3,wisdom:-2,parentalStanding:-5,reputation:5}},{baseId:"ad-criminal-tempt",label:"Invitation to the Shadow Market",narrative:(e,t,a)=>`A charismatic stranger approaches ${a.name} near ${e.landmark}, offering coin and connections in exchange for one small job using those ${a.element.toLowerCase()} abilities — no questions asked. The stranger vanishes into an alley before ${a.name} can answer, leaving a token and an address scrawled in ${t.power}-singed ink.`,choiceText:(e,t,a)=>"Pocket the token and seek out the address, telling no one, curious to see what the underworld actually looks like.",statChanges:{wantedLevel:1,shadowReputation:8,stealth:4,parentalStanding:-10,charisma:2}},{baseId:"ad-guild-apprentice",label:"Guild Apprenticeship Offer",narrative:(e,t,a)=>`The most prestigious guild affiliated with ${e.institution} offers ${a.name} a formal apprenticeship — an opportunity most teenagers in ${a.nation} would kill for. The contract is three years, all meals covered, but it means leaving the ${a.clan} compound for the guild dormitories by next week.`,choiceText:(e,t,a)=>"Accept graciously, pack a single travel chest, and report to the guild's initiation hall before sunrise.",statChanges:{wisdom:5,diplomacy:4,elementalProficiency:3,parentalStanding:6,reputation:4}},{baseId:"ad-romance-first",label:"First Romance at the Seasonal Fair",narrative:(e,t,a)=>`At ${a.nation}'s seasonal fair near ${e.landmark}, ${a.name} locks eyes with a merchant's child from a rival clan. A fortnight of stolen meetings follows — sharing ${a.element.toLowerCase()} tricks, secret notes, and one almost-kiss at the edge of ${e.landmark}.`,choiceText:(e,t,a)=>`Confess feelings openly and invite the merchant's child to meet the ${a.clan} elders, however that conversation may go.`,statChanges:{charisma:5,parentalStanding:-4,publicPerception:3,wisdom:2}},{baseId:"ad-bending-advanced",label:"Advanced Bending Training Breakthrough",narrative:(e,t,a)=>`During an advanced session at ${e.institution}, ${a.name} accidentally demonstrates a sub-bending art that the instructors have never witnessed at this age. The hall goes silent. Then the senior master whispers: "That's the ${t.signature}."`,choiceText:(e,t,a)=>`Train the ${t.signature} in secret for a month before revealing its full form to the master class.`,statChanges:{elementalProficiency:10,subBendingArt:8,wisdom:3,health:-5,reputation:6}},{baseId:"ad-fire-academy",label:"Pyrethian War Academy Selection",narrative:(e,t,a)=>`The Pyrethian war academies hold their decennial selection tournament, and ${a.name} has secretly entered — without parental knowledge — drawn by the promise of mastering the Embersurge Strike at its highest form. Thirty-two teenagers compete across the volcanic forges of Embrath; only four are chosen each cycle.`,choiceText:(e,t,a)=>`Fight through every round without using the ${a.sidearm}, relying solely on pyrokinetic drills to prove elemental supremacy.`,statChanges:{elementalProficiency:8,strength:5,agility:4,parentalStanding:7,reputation:8},elements:["Fire"],nations:["Pyrethia"]},{baseId:"ad-fire-arson",label:"Accused of Industrial Sabotage",narrative:(e,t,a)=>`After ${a.name} is seen near the volcanic forges of Embrath at midnight, a district overseer accuses the teenager of sabotaging a rival forge-clan's output. Evidence is circumstantial, but the Pyrethian law matrix moves fast — a tribunal is scheduled for next week.`,choiceText:(e,t,a)=>"Hire a clan-appointed advocate and demand a bending testimony, planning to demonstrate exactly where you were and what you were doing.",statChanges:{wantedLevel:1,reputation:-5,charisma:3,wisdom:4,parentalStanding:-8},elements:["Fire"],nations:["Pyrethia"]},{baseId:"ad-water-navy",label:"Naval Trade Route Recruitment",narrative:(e,t,a)=>`A naval trade-route captain docks at Pelagara and openly recruits ${a.element} benders aged thirteen and above to crew the tide-calling ceremonies aboard long-haul vessels. ${a.name} watches the departing ships from the coral market docks, ${a.sidearm} tucked in a belt, heart hammering.`,choiceText:(e,t,a)=>"Sign on as a junior tide-caller, spending the next four months at sea on the Abyssal Channel trade routes.",statChanges:{survival:6,agility:4,elementalProficiency:5,parentalStanding:-6,reputation:5},elements:["Water"],nations:["Aqualis"]},{baseId:"ad-water-bloodbend",label:"Bloodbending Temptation at Full Moon",narrative:(e,t,a)=>`On a full-moon night near the Moon Shelf, ${a.name} feels the tide-calling surge become something darker — not the ocean's pull, but the pull of every living body nearby. A forbidden manuscript from the Tidal Seminary falls open to a page that has clearly been read many times before.`,choiceText:(e,t,a)=>"Burn the manuscript page and report the feeling to the senior tide-caller at dawn, however shameful the confession.",statChanges:{wisdom:6,mentalFortitude:5,elementalProficiency:2,reputation:3,traumaScore:4},elements:["Water"],nations:["Aqualis"]},{baseId:"ad-air-spy",label:"Sky-Bridge Intelligence Courier",narrative:(e,t,a)=>`The floating libraries of Altivane secretly run a courier network between sky-islands, using teenage air-benders to carry sealed messages the gale-storms prevent by conventional routes. ${a.name} is approached by a hooded librarian and offered a courier badge — no questions, no names.`,choiceText:(e,t,a)=>`Accept the badge and make the first delivery across the gale-shredded sky-bridges with only the ${a.sidearm} for protection.`,statChanges:{agility:6,stealth:5,elementalProficiency:4,wantedLevel:1,charisma:2},elements:["Air"],nations:["Zephyral"]},{baseId:"ad-air-meditation",label:"Cloud Temple Vigil Ordeal",narrative:(e,t,a)=>"The cloud temple above Altivane issues a once-in-a-generation invitation for teenage air-benders to complete the Seven-Day Vigil — seven days alone on the highest platform with no shelter or food. Only those who reach inner stillness before the gale-storms arrive are recognised as breath-form adepts.",choiceText:(e,t,a)=>`Accept the vigil and survive using nothing but breath-form katas and ${a.element.toLowerCase()} shelter-weaving.`,statChanges:{elementalProficiency:9,wisdom:7,survival:5,health:-8,mentalFortitude:6},elements:["Air"],nations:["Zephyral"]},{baseId:"ad-time-paradox",label:"Recruited by the Paradox Monks",narrative:(e,t,a)=>`The paradox monks of Ethernost visit the ${a.clan} household and formally request ${a.name} as a temporal apprentice — a request the monks have not made in over forty years. The head monk explains that a temporal anomaly near the Veil Gate has already started referencing ${a.name} in its echo-loops.`,choiceText:(e,t,a)=>"Accept the apprenticeship and travel to Ethernost before the next fault-moment destabilises the timeline further.",statChanges:{elementalProficiency:10,wisdom:8,subBendingArt:6,parentalStanding:4,reputation:5},elements:["Time"],nations:["Chronoveil"]},{baseId:"ad-time-criminal",label:"Offered a Time-Smuggling Job",narrative:(e,t,a)=>`A caravan merchant near the Veil Gate approaches ${a.name} with a proposition: use temporal slips to slip goods through the customs checkpoints without the timestamp registering. The payment offered would cover the ${a.clan}'s debts for a decade; the risk is a paradox seizure — or worse, an inquisitor's interest.`,choiceText:(e,t,a)=>"Agree to one trial run, using Moment Fracture to stagger the cargo's temporal signature by six seconds.",statChanges:{wantedLevel:2,shadowReputation:10,elementalProficiency:5,wisdom:-3,charisma:2},elements:["Time"],nations:["Chronoveil"]},{baseId:"ad-shadow-conclave",label:"Shadow Conclave Initiation Test",narrative:(e,t,a)=>`The Shadow Conclave of Duskspire issues ${a.name} a Veilwalk initiation challenge: retrieve a sealed scroll from the innermost chamber of the Obsidian Labyrinth beneath Darkfell — without being seen. Failure means exile from the Conclave's protection; success means a rank and a lifelong shadow-network.`,choiceText:(e,t,a)=>"Enter the labyrinth alone at midnight and use Umbral Vanish to slip past the ward-keepers layer by layer.",statChanges:{stealth:9,shadowReputation:12,elementalProficiency:7,wantedLevel:1,agility:3},elements:["Shadow"],nations:["Umbrath"]},{baseId:"ad-lightning-oath",label:"Lightning-Oath Ceremony Candidate",narrative:(e,t,a)=>`${a.name} is nominated by the ${a.clan} to stand as a Lightning-Oath Ceremony candidate at the Thunder Citadel — a honour that demands channelling Heaven's Fang at full charge before the gathered commanders. A misfire could level the ceremony platform. A clean strike earns a garrison rank.`,choiceText:(e,t,a)=>"Stand at the mark, separate the positive and negative charges with charge-separation forms, and fire Heaven's Fang straight and true.",statChanges:{elementalProficiency:9,reputation:10,strength:4,health:-6,charisma:5},elements:["Lightning"],nations:["Stormreach"]},{baseId:"ad-earth-gauntlet",label:"Geomancer Hall Entry Gauntlet",narrative:(e,t,a)=>`The Geomancer Halls of Craghorn hold a teenage entry gauntlet: candidates must walk the Stoneback Ramparts blindfolded and use only seismic sense to navigate the tremor-traps set by senior benders. ${a.name} has trained for this for two years; twenty others are competing for five spots.`,choiceText:(e,t,a)=>"Walk the gauntlet, using Bedrock Shatter selectively to break the largest traps and smooth passage for both speed and safety.",statChanges:{elementalProficiency:8,survival:5,strength:4,agility:3,reputation:7},elements:["Earth"],nations:["Terravast"]},{baseId:"ad-ice-communion",label:"Icebound Communion Ordeal",narrative:(e,t,a)=>`The Icebound Communion requires teenage ice-benders to spend a night in the Shatterwind Pass wearing only ceremonial robes — no permafrost iron, no fire-source. Those who emerge with the frost-pattern of their ${a.birthmark} glowing report visions from the Glacial Spires' oldest memories.`,choiceText:(e,t,a)=>"Enter the pass at dusk and use Glacial Guard to form a body-armour shell of ice that traps body heat inside.",statChanges:{elementalProficiency:8,survival:6,wisdom:4,health:-7,mentalFortitude:5},elements:["Ice"],nations:["Glacimere"]},{baseId:"ad-metal-guild",label:"Ironwright Guild Journeyman Test",narrative:(e,t,a)=>`The Ironwright Guildhalls of Slagmere post the journeyman test: candidates must refine a raw slab of magnetite alloy into a functional weapon using only ore-sense attunement — no tools, no fire, no hammer. ${a.name} has watched the senior smiths' hands for months; this is the moment to prove it was more than observation.`,choiceText:(e,t,a)=>`Step to the anvil-stone and bend the magnetite alloy into a replica of the ${a.sidearm} — from memory, in under an hour.`,statChanges:{elementalProficiency:9,strength:5,subBendingArt:6,reputation:8,parentalStanding:6},elements:["Metal"],nations:["Ironhold"]},{baseId:"ad-wood-blight",label:"Blight Storm Containment Duty",narrative:(e,t,a)=>`A creeping blight storm rolls in from the Thornwood, threatening the Canopy Spires of Verdenmoor. The Root-Weavers summon every trained teenager to form a living root-barrier across the forest's edge. ${a.name} is the youngest bender assigned to the anchor-point — the position of greatest risk if the barrier breaks.`,choiceText:(e,t,a)=>"Hold the anchor-point and drive a Thornwall Eruption deep into the soil, locking the root-barrier against the blight's advance.",statChanges:{elementalProficiency:9,survival:7,strength:4,health:-9,reputation:8},elements:["Wood"],nations:["Sylvara"]}],Mm=[{baseId:"ya-career-establish",label:"Establish a Professional Reputation",narrative:(e,t,a)=>`${a.name} is offered a permanent post at ${e.institution}, signalling the transition from student to professional. The appointment comes with a modest stipend, a private training hall, and the expectation of demonstrating ${t.signature} at the next regional summit.`,choiceText:(e,t,a)=>"Accept the post, negotiate a senior title, and begin building a roster of junior students to teach.",statChanges:{reputation:8,wisdom:4,charisma:4,elementalProficiency:5,royalCourtFavor:3}},{baseId:"ya-political-intrigue",label:"Drawn into Court Conspiracy",narrative:(e,t,a)=>`A noble from ${a.nation}'s royal court contacts ${a.name} privately, citing the ${a.clan}'s unique position near ${e.landmark} as leverage in an ongoing succession dispute. The offer: lend the clan's support and receive a land grant; refuse and risk being quietly blacklisted from national contracts.`,choiceText:(e,t,a)=>"Meet the noble in private, extract as much information as possible abou  */const Xc=Z("Zap",[["polygon",{points:"13 2 3 14 12 14 11 22 21 10 12 10 13 2",key:"45s27k"}]]),In=[{id:"Pyrethia",name:"Pyrethia",element:"Fire",description:"Forged in the shadow of perpetually erupting volcanoes, Pyrethia is a relentless industrial empire where molten rivers power colossal war-foundries and the air shimmers with ash and ambition. Its militaristic legions, clad in heat-tempered obsidian plate, march under the banner of the Eternal Flame — a people who believe conquest is the highest form of worship.",color:"#FF4500",glowColor:"rgba(255, 69, 0, 0.6)",uniqueEvents:["The Ashfall Conscription","Eruption of the Godforge","Pyrethian Iron March","Trial by Magma Rite","The Cinder Throne Succession"],capital:"Embrath",sigil:"🌋"},{id:"Aqualis",name:"Aqualis",element:"Water",description:"Built upon vast coral reefs and submerged limestone plateaus, Aqualis is a sprawling ocean trade empire whose merchant lords command fleets that span every known sea lane. Its citizens dwell in iridescent coral cities that rise from the tidal shallows, negotiating everything from spices to arcane secrets beneath banner-strewn harbor bridges.",color:"#1E90FF",glowColor:"rgba(30, 144, 255, 0.6)",uniqueEvents:["The Tidal Conclave of Lords","Coral Bloom Festival","Storm of the Abyssal Gate","The Grand Maritime Auction","Rite of the Sunken Crown"],capital:"Pelagara",sigil:"🐚"},{id:"Terravast",name:"Terravast",element:"Earth",description:"Terravast is an ancient mountain kingdom whose people have carved their civilization directly into the bones of the world, raising cities from seamless granite and raising generations of stoic stonecrafters who speak more to stone than to strangers. Their culture prizes patience and permanence above all — a kingdom that has outlasted every empire that dared to challenge its peaks.",color:"#8B6914",glowColor:"rgba(139, 105, 20, 0.6)",uniqueEvents:["The Great Stonecarving Conclave","Quake of the Deep Ancestors","Festival of the Living Mountain","The Terravast Summit Accord","Trial of the Unmoved Stone"],capital:"Granitholm",sigil:"⛰️"},{id:"Zephyral",name:"Zephyral",element:"Air",description:"Zephyral is a sky archipelago of floating islands tethered by ancient wind-magic, home to the most celebrated scholars and aerotheorests in all of Aetheria. Bridges of crystallized air connect isle to isle, while its citizens ride thermals on wingsuits and debate celestial mechanics in open-air amphitheaters that drift through clouds.",color:"#87CEEB",glowColor:"rgba(135, 206, 235, 0.6)",uniqueEvents:["The Drifting Isle Symposium","Windshear Examination Trials","Festival of the Ascending Gale","The Great Sky Cartography Race","Collapse of the Anchor Vortex"],capital:"Altivane",sigil:"🌬️"},{id:"Stormreach",name:"Stormreach",element:"Lightning",description:"Stormreach occupies a jagged coastline perpetually lashed by supernatural electric storms, and its zealot warriors believe each lightning strike is a divine decree from their storm-god, Vaelthar. Scarred by the constant tempests and invigorated by them, Stormreach soldiers charge into battle channeling raw electricity through ceremonial iron-tipped spears, making them feared across every neighboring nation.",color:"#FFD700",glowColor:"rgba(255, 215, 0, 0.7)",uniqueEvents:["The Vaelthar Thundercalling Ritual","Storm Surge of the Iron Coast","The Zealot Proving Games","Blackout of the Stormspire","The Lightning Pact of Warchiefs"],capital:"Voltspire",sigil:"⚡"},{id:"Glacimere",name:"Glacimere",element:"Ice",description:"In the frozen north where the sky itself sometimes shatters into sheets of aurora, the clan-based society of Glacimere endures through the wisdom of frost shamans who read the future in glacier fractures and whale-song. Each clan is fiercely autonomous yet bound by the ancient Pact of the First Frost, gathering once each generation on the Grand Ice Plain to settle disputes and trade the rare sunstones mined from beneath the permafrost.",color:"#A8E4F0",glowColor:"rgba(168, 228, 240, 0.65)",uniqueEvents:["The Grand Ice Plain Gathering","Ritual of the Shattered Aurora","Frost Shaman Ascension Rites","The Sunstone Deep Excavation","Blizzard of the Eternal Dark"],capital:"Frostmere Keep",sigil:"❄️"},{id:"Ironhold",name:"Ironhold",element:"Metal",description:"Ironhold is a subterranean civilization of legendary engineers who built an entire empire beneath the earth — interconnected forge-cities lit by geothermal plasma lanterns and connected by pneumatic rail tunnels bored through miles of solid rock. Inspired by dwarven traditions but elevated by arcane metallurgy, Ironhold artisans produce alloys of impossible strength that the surface nations covet and can rarely afford.",color:"#708090",glowColor:"rgba(112, 128, 144, 0.65)",uniqueEvents:["The Grand Forge Convocation","Collapse of Shaft Seven","Ironhold Engineering Exhibition","The Deep Rail Opening Ceremony","Trial of the Master Smelter"],capital:"Anvildeep",sigil:"⚙️"},{id:"Sylvara",name:"Sylvara",element:"Wood",description:"Sylvara is an ancient forest realm where the trees themselves are the architects — druids coax living wood into soaring canopy cathedrals, root-woven bridges, and seed-vault towers that breathe with the seasons. Its people maintain a sacred covenant with the forest, understanding that every structure taken from the land must one day be returned, giving Sylvaran cities an ethereal quality of civilizations caught mid-bloom.",color:"#228B22",glowColor:"rgba(34, 139, 34, 0.6)",uniqueEvents:["The Root-Weaving Concordat","Blight of the Heartwood","Festival of the First Canopy","The Druidic Succession Trial","Great Bloom of the Seed Vault"],capital:"Verdanhall",sigil:"🌿"},{id:"Umbrath",name:"Umbrath",element:"Shadow",description:"Umbrath is a vast underworld empire that exists in the permanent twilight of cavern networks so deep they predate recorded history, governed by shadow guilds who trade in secrets, contracts, and the coveted umbrite gemstones that absorb light itself. Its assassin orders operate on every continent, and its shadow markets are rumored to sell anything — information, identities, even memories — to those who know the right phrase to whisper into the dark.",color:"#4B0082",glowColor:"rgba(75, 0, 130, 0.65)",uniqueEvents:["The Black Conclave of Guilds","Eclipse of the Umbrite Vein","Festival of the Longest Shadow","The Assassination of Dread-Consul Mavar","Opening of the Midnight Market"],capital:"Duskholm",sigil:"🌑"},{id:"Chronoveil",name:"Chronoveil",element:"Time",description:"Chronoveil occupies a region of Aetheria where the fabric of time has been irrevocably torn, creating overlapping temporal strata where past, present, and possible futures bleed into one another in disorienting cascades. Its time-monks have built a philosophy — and an architecture — around navigating paradox, constructing monasteries that exist simultaneously at multiple points in history and training adepts to think in non-linear sequences just to survive daily life.",color:"#9B59B6",glowColor:"rgba(155, 89, 182, 0.65)",uniqueEvents:["The Paradox Convergence Event","Temporal Loop of the Veiled Citadel","Festival of the Unwritten Moment","The Great Chronological Audit","Rift Collapse of Year Zero"],capital:"Ethernost",sigil:"⏳"}],sg=[{id:"EmberFangClan",name:"Ember Fang Clan",element:"Fire",description:'Born in the shadow of the Ashspire Caldera, the Ember Fang warriors coat their blades in volcanic glass harvested from still-cooling lava flows. Their initiation rite demands that each youth plunge a bare hand into a bed of embers and withdraw it without flinching — only then are they deemed worthy of the fang-mark tattoo. For three centuries they have served as the shock cavalry of the Aetherian southern front, riding flame-tempered destriers whose hooves leave scorched prints in sand. Enemy commanders call their charge "the wave that never cools," a tribute paid through gritted teeth.',sigil:"🦷",clanHonor:82},{id:"AshViperClan",name:"Ash Viper Clan",element:"Fire",description:"The Ash Vipers dwell inside the fumarole fields of the Searing Flats, where sulphur vents hiss through cracked earth like the breath of buried gods. Their assassins are legendary for delivering poisons suspended in crystallised volcanic ash — a single pinch dissolves in body heat and leaves no trace. Clan elders wear cloaks woven from shed serpent skins treated with volcanic minerals, shimmering grey-gold in firelight. They maintain a strict oral tradition: their histories are never written, only whispered, ensuring that secrets die with oath-breakers.",sigil:"🐍",clanHonor:74},{id:"CinderWolfClan",name:"Cinder Wolf Clan",element:"Fire",description:"Cinder Wolves roam the burnt-pine forests at the base of Mount Pyreth, where forest fires have raged so long that the treeline has permanently retreated, leaving a landscape of black spires and red soil. They run in loose packs of seven — considered sacred — and communicate across great distances using a system of controlled signal-fires that can relay complex battlefield orders in minutes. Their warriors bind their forearms in linen soaked in fire-resist resin before any engagement, allowing them to fight through walls of flame their enemies cannot cross. No Cinder Wolf has ever surrendered in recorded history; they call it a foreign concept, like snow in summer.",sigil:"🐺",clanHonor:88},{id:"ForgeTitanClan",name:"Forge Titan Clan",element:"Fire",description:"The Forge Titans are the master smiths of Aetheria, their foundries carved directly into the magma-warmed belly of the Irondeep Mountains. Every great weapon in the realm — from the Sundering Axe of General Morath to the Silver-Flame Spear of Queen Vaela — was hammered on a Forge Titan anvil. Apprentices work their first decade in silence, forbidden speech so they learn to read the colour and sound of metal rather than ask. Their clan crest, a fist closed around a lightning bolt, is stamped inside the pommel of every weapon they make — a guarantee more trusted than any royal seal.",sigil:"⚒️",clanHonor:91},{id:"SmokeSerpentClan",name:"Smoke Serpent Clan",element:"Fire",description:"Smoke Serpents are the spymasters and diviners of the Fire territories, reading omens in the coiling shapes of smoke columns above ritual pyres. Their encampments are permanent clouds of controlled smoke, making visual surveillance nearly impossible and confusing beast-scouts that rely on scent. Clan initiates learn to walk through dense smoke without coughing — a skill achieved through years of painful conditioning — before they are trusted with any mission. Their oracle-priests claim that every fire leaves a memory in its smoke, and that those who know how to listen can hear the last words spoken beside any extinguished flame.",sigil:"🌫️",clanHonor:67},{id:"FlameHawkClan",name:"Flame Hawk Clan",element:"Fire",description:"The Flame Hawks are aerial skirmishers who have domesticated the giant cinderhawks of the Char Peaks, riding them in hit-and-fade raids that have never once been successfully countered with ground troops alone. Their riders wear no armour heavier than treated leather — weight is the enemy of the sky — and rely on speed, incendiary payloads, and the hawk's own fire-breath to devastate formations below. Clans of the ground call the Flame Hawks cowards; the Flame Hawks call them envious. They hold the distinction of having never lost a rider to enemy hands — they always recover their own, dead or alive.",sigil:"🦅",clanHonor:79},{id:"LavaDrakeClan",name:"Lava Drake Clan",element:"Fire",description:"Lava Drakes trace their bloodline to the first humans who built settlements on the rim of active shield volcanoes, surviving eruptions that wiped out neighbouring peoples by learning to predict lava flow using star positions. They worship a minor deity called the Slow Serpent — the lava itself — believing it to be a living creature of geological patience. Clan warriors fight with weapons made from cooled lava stone called pahoehoe blades, impossibly sharp and lighter than iron. An old clan proverb holds that lava never retreats; it is merely waiting for a new path.",sigil:"🐉",clanHonor:85},{id:"ScorchBearClan",name:"Scorch Bear Clan",element:"Fire",description:"Scorch Bears are the berserker shock-troops of the Fire alignment, enormous warriors who drink a fermented draught of capsaicin root and volcanic mineral water before battle, inducing a fever-state that dulls pain and heightens aggression. Their totem animal — the firecoat bear of the Northern Ridges — is known to sleep in the warming vents of geysers, emerging in winter coated in mineral deposits that make its hide hard as stone. Scorch Bear warriors emulate this by packing volcanic mud into their wounds mid-battle rather than retreating for healing. Enemies have reported Scorch Bear warriors continuing to fight with injuries that would kill most men.",sigil:"🐻",clanHonor:86},{id:"BlazeWyvernClan",name:"Blaze Wyvern Clan",element:"Fire",description:"Blaze Wyvern nobles consider themselves the oldest clan in Aetheria, their genealogical scrolls stretching back past the First Ignition into mythological time. They rule the southern trade routes with an iron grip, levying tolls on all caravans that pass through the Wyvern's Throat canyon and enforcing payment with a small retinue of heat-armoured knights. Their court is elaborate and formal, obsessed with precedent and title, standing in sharp contrast to the rough pragmatism of most Fire clans. Despite their aristocratic bearing, Blaze Wyvern soldiers are among the most disciplined in any campaign — because they have been trained since childhood to understand that reputation is the only inheritance worth protecting.",sigil:"🔥",clanHonor:90},{id:"CharPhoenixClan",name:"Char Phoenix Clan",element:"Fire",description:'The Char Phoenix are a clan born from catastrophe: their original settlement was destroyed in the Ashfall of the Second Age, and they were rebuilt entirely by survivors who swore to never again be caught unprepared. They maintain a philosophy they call "second birth" — the idea that any person, plan, or clan can be remade stronger after destruction. Every year they burn their oldest possessions in a ritual pyre, forcing themselves to rebuild without the comfort of the past. Their fighters are the hardest to break psychologically, because they have already rehearsed loss.',sigil:"🦜",clanHonor:77},{id:"MoltenRamClan",name:"Molten Ram Clan",element:"Fire",description:"Molten Rams are siege specialists who construct enormous battering engines sheathed in enchanted iron that retains volcanic heat for hours, allowing them to melt through fortified gates no conventional ram could breach. Their engineers are stolen from other clans and given a choice: swear loyalty and receive the greatest education in destructive architecture Aetheria offers, or return home with no memory of what they saw. Most stay. The clan maintains no permanent fortress of their own — they argue philosophically that building walls is an admission you expect to lose.",sigil:"🐏",clanHonor:73},{id:"SootRavenClan",name:"Soot Raven Clan",element:"Fire",description:"Soot Ravens are the intelligence network of the Fire territories — thin, quiet scholars who dress in ash-grey and are often mistaken for wandering monks. They maintain a vast archive called the Black Library in an obsidian tower at the heart of the Cinder Wastes, cataloguing every battle, treaty, betrayal, and power shift in living and written memory. Their currency is information, traded as carefully as gold. If a Soot Raven sits down beside you uninvited, experienced Aetherian politicians know to pay close attention — it means someone is about to be informed of something they will not enjoy hearing.",sigil:"🐦‍⬛",clanHonor:65},{id:"BrandLionClan",name:"Brand Lion Clan",element:"Fire",description:"Brand Lions are the pride warriors of the open fire-plains, their culture built around honour contests, formal challenges, and a rigid code that forbids attacking an enemy from behind or striking a fallen foe. They brand their clan mark into their own skin at the age of twelve — a searing iron pressed to the left forearm — and consider the scar a lifelong reminder of commitment. Their war-songs are famous throughout Aetheria, bellowed in deep unison before charges, and there are accounts of enemy soldiers breaking formation simply from the sound before anyone came near them. Brand Lion mediators are prized as the most neutral arbiters in any inter-clan dispute, because their code demands honesty above all other virtues.",sigil:"🦁",clanHonor:84},{id:"PyrexStagClan",name:"Pyrex Stag Clan",element:"Fire",description:"The Pyrex Stag are the swift outriders of the fire territories, their antler-crested helms visible at the vanguard of every major campaign. They breed the fastest horses on the continent, their herds kept in volcanic highland meadows where mineral-rich grass produces animals with denser muscle and higher heat tolerance. Clan law prohibits riding the same horse two days in a row, ensuring their mounts are always fresh while enemies exhaust theirs. Pyrex Stag scouts have been credited with saving entire armies by returning with intelligence just hours before catastrophic ambushes.",sigil:"🦌",clanHonor:76},{id:"InfernoOxClan",name:"Inferno Ox Clan",element:"Fire",description:"Inferno Ox are the stubborn, immovable defenders of the Fire alignment — heavy infantry who plant their shield-wall and simply refuse to yield, no matter what force is brought against them. Their training regimen is brutal even by Fire standards: initiates carry loaded ox-yokes up volcanic slopes daily for two years before they are permitted to hold a weapon. In battle they form the tortoise-shell — interlocking shields treated with fire-retardant resin, nearly impenetrable even to flame-based assault. An old General's saying holds that if you need ground held, you send Inferno Ox; if you need ground taken, you send someone else first.",sigil:"🐂",clanHonor:80},{id:"CrestSalamanderClan",name:"Crest Salamander Clan",element:"Fire",description:"Crest Salamanders are a clan of fire-monks and healers who believe the salamander spirit absorbs flame and converts it to life rather than destruction. They maintain healing sanctuaries inside dormant lava tubes, where the steady warmth accelerates recovery from injuries — a secret kept carefully from enemies who might otherwise target the facilities. Their apothecaries use volcanic mineral compounds unknown to outside herbalists, achieving healing outcomes that border on miraculous. The clan accepts refugees from any alignment during wartime, a policy that has earned them both profound respect and deep suspicion depending on which side is bleeding.",sigil:"🦎",clanHonor:61},{id:"SmeltFoxClan",name:"Smelt Fox Clan",element:"Fire",description:"Smelt Foxes are the traders and alchemists of the Fire territories, equally comfortable at a forge negotiation or a shadow-market in the neutral cities. They deal primarily in refined volcanic metals, having developed proprietary smelting techniques that produce alloys no one else has replicated despite centuries of trying. Their clan members are identifiable by rust-red hair — a trait attributed to generations of exposure to iron-heavy volcanic spring water — and their quick, darting conversational style that wrong-foots slower negotiators. They have a reputation for honouring contracts precisely to the letter, which means reading their contracts very carefully before signing.",sigil:"🦊",clanHonor:68},{id:"MagmaBoarClan",name:"Magma Boar Clan",element:"Fire",description:"The Magma Boar clan erupted from the tribal wars of the Pyremark lowlands, forged in generations of bitter feuds that made them the most tenacious ground-fighters in the region. They charge with a signature weapon — the tusk-spear, a double-pronged lance designed to hook shields and tear formations apart — which requires unusual strength and courage to wield in close quarters. Their tusked bone-helms are carved from the remains of the great heat-boars that once ranged the magma flats, now extinct partly because of how many the clan hunted. Magma Boar feuds with its neighbours are legendary for lasting generations; they have a saying that a grudge is a fire that feeds itself.",sigil:"🐗",clanHonor:72},{id:"SeracBatClan",name:"Serac Bat Clan",element:"Fire",description:"A clan of paradoxes, the Serac Bats are Fire-aligned warriors who spend much of their lives in darkness — the great thermally-heated cave systems beneath the Pyremark plateau. They navigate without light using a trained echolocation whistle system that most outsiders find unsettling to witness. Their raids are always nocturnal, dropping from concealed cave exits above enemy positions and withdrawing before dawn. The Serac Bat clan knows every underground passage between the Fire territories and the northern neutral zones, making them indispensable smugglers, guides, and infiltrators.",sigil:"🦇",clanHonor:63},{id:"IgniteCraneClan",name:"Ignite Crane Clan",element:"Fire",description:"Ignite Cranes are the diplomats and courtiers of the Fire alignment, their elegant manners and controlled bearing making them the ideal ambassadors to neutral and hostile territories alike. They practice a martial art based on crane-style movement — all reach, patience, and precise single strikes — that looks ceremonial to outsiders until someone ends up on the ground. Their ambassador-warriors carry ornate fire-staves that function as both symbol of office and lethal weapon, and every Ignite Crane envoy is expected to be capable of fighting their way out of a failed negotiation unaided. Clan children are taught etiquette, three languages, and bladework simultaneously from the age of six.",sigil:"🦢",clanHonor:70},{id:"TorchTigerClan",name:"Torch Tiger Clan",element:"Fire",description:"Torch Tigers are the night-hunters of the fire regions — their territory is a stretch of dark volcanic jungle perpetually wreathed in methane fog, where torchlight makes moving targets out of anyone who uses it. They learned to fight in near-total darkness centuries ago and consider it an advantage so profound that they sometimes prefer overcast or moonless nights for open-field battles. Their ritual face-paint uses phosphorescent volcanic mineral paste that only the enemy can see — clan members learn to never look at their own side in darkness so the glow doesn't spoil their vision. Torch Tiger patience is legendary: they will trail a target for weeks before striking.",sigil:"🐯",clanHonor:83},{id:"CharBadgerClan",name:"Char Badger Clan",element:"Fire",description:`Nobody wants to fight the Char Badgers, and nobody who has ever had to fight them a second time wanted to do it again. They are a clan of ferocious, compact fighters who specialise in tunnel-warfare, mine-shaft ambushes, and the kind of underground attrition that wears out larger, faster enemies. Their tunnel-diggers can compromise a castle foundation in three nights of silent work, a capability that has given them strategic leverage far beyond their modest numbers. The clan's unofficial motto — scratched into the walls of every tunnel they dig — is "We go through."`,sigil:"🦡",clanHonor:75},{id:"FlareKiteClan",name:"Flare Kite Clan",element:"Fire",description:"Flare Kites are signal-warriors and communication specialists, maintaining the famous Fire Signal Network — a chain of mountaintop beacons stretching across six mountain ranges that can relay a military alert from the southern coast to the northern passes in under an hour. In battle they deploy enormous fighting kites tethered above formations, the trailing ribbons carrying incendiary payloads that ignite on target impact. Clan members are trained in a simplified signal-code from childhood and can communicate complex messages using only body position, hand movements, and a small mirror. The Flare Kite network has turned the tide of three major wars simply by ensuring information arrived in time.",sigil:"🪁",clanHonor:64},{id:"HearthIbexClan",name:"Hearth Ibex Clan",element:"Fire",description:"The Hearth Ibex are the pastoral peacekeepers of the Fire territories — a clan whose power comes not from war but from controlling the great highland pastures where the fire-goat herds graze. Their animals produce flame-resistant wool and a concentrated milk that is the primary source of nutrition for half a dozen other Fire clans, giving the Hearth Ibex enormous economic leverage without ever needing to draw a weapon. Their clan elders act as the primary mediators in Fire-alignment internal disputes, a role they have held for so long that challenging their neutrality is considered a profound social transgression. In the rare cases where Hearth Ibex do go to war, the rest of the Fire territories tends to go very quiet.",sigil:"🐐",clanHonor:58},{id:"CinderMantisHouse",name:"Cinder Mantis House",element:"Fire",description:'A secretive society more than a conventional clan, the Cinder Mantis House trains assassins in the ancient killing-art of Still Flame — the ability to remain motionless in extreme heat long enough that enemies assume the figure is a statue. Their practitioners have ended the lives of three Aetherian warlords and one queen, events officially listed as "accidents" in the historical record. The House accepts one new member per year and publishes no records of membership — the only way to know if someone is a Cinder Mantis adept is to watch how they hold their hands when startled. Clan honour operates on a scale outsiders cannot access: they consider themselves neither good nor evil, only precise.',sigil:"🦗",clanHonor:71},{id:"BlisterHeronOrder",name:"Blister Heron Order",element:"Fire",description:"The Blister Heron Order are the flame-priests of the southern Fire territories, tending the Eternal Fumaroles — vents believed to connect directly to the underworld — in elaborate daily ceremonies that have not changed in eight hundred years. They serve as the judiciary of the Fire alignment, their rulings carrying the weight of divine authority because no one has yet successfully argued that a god was wrong. Blister Heron priests walk through the scalding steam vents barefoot as proof of their faith, and the blistered, calloused feet are worn as a mark of status. In matters of law they are scrupulously fair; in matters of religion, absolutely inflexible.",sigil:"🕊️",clanHonor:66},{id:"RageLizardClan",name:"Rage Lizard Clan",element:"Fire",description:"Rage Lizards are the mercenaries of the Fire alignment — a clan with no permanent territory, no political allegiances, and a simple price list for any military service from bodyguard to full battlefield brigade. They get their name from the great gila monitors of the Scorch Flats, cold-blooded predators renowned for attacking creatures ten times their size and hanging on until something gives way. Rage Lizard warriors fight in the same spirit: they do not fight to win elegantly, they fight to still be standing when everything else has stopped. Their services cost more than most clans can afford, and clients who try to negotiate are politely shown the door.",sigil:"🦖",clanHonor:69},{id:"VortexSparkBrotherhood",name:"Vortex Spark Brotherhood",element:"Fire",description:"The Vortex Spark Brotherhood are weather-warriors who have learned to harness fire-whirls — the spinning columns of flame that form in extreme heat conditions — as weapons of battlefield control. Their shamans can sustain and direct a fire-whirl for up to twenty minutes, long enough to reshape the flow of any ground engagement. New members undergo a rite in which they stand at the centre of a controlled fire-whirl for sixty seconds — those who emerge with their skin intact are considered touched by the storm-flame and destined for leadership. The Brotherhood maintains no formal military hierarchy; authority belongs to whoever can produce the largest fire-whirl on demand.",sigil:"🌀",clanHonor:78},{id:"CinderfallenRemnant",name:"Cinderfall Remnant",element:"Fire",description:"The Cinderfall Remnant is all that survived of five once-great clans destroyed in the Ashfall Catastrophe of the Third Age, their survivors merging out of necessity and maintaining a collective grief-culture that shapes every aspect of clan life. They build nothing permanent — all structures are designed to be struck and moved in under an hour — because they believe permanence invites the catastrophe of loss. Their warriors are motivated not by glory but by a fierce, cold determination to ensure that what happened to their ancestors never happens again. The Remnant maintains the most complete historical archive of the Ashfall era and will trade almost anything for new information about what caused it.",sigil:"🌋",clanHonor:60},{id:"AshpeakMonastery",name:"Ashpeak Monastery",element:"Fire",description:'The Ashpeak Monastery sits at 14,000 feet above the fire plains, accessible only through a single path that becomes impassable six months of the year. The monks who live there have achieved a state of fire-communion — a meditative technique that allows them to lower their body temperature and enter volcanic hot springs without harm. Their written philosophical works are considered some of the finest in Aetheria, regularly plagiarised by academics who hope no one checks citations. The Monastery trains no soldiers, but has produced every significant Fire alignment strategist in the past two centuries: their course on "The Geometry of Destruction" is required reading for any officer with ambitions.',sigil:"⛰️",clanHonor:59},{id:"EmberveilSorority",name:"Emberveil Sorority",element:"Fire",description:"The Emberveil Sorority is an all-female warrior society that predates the formation of the Fire alignment itself, their traditions rooted in the ancient fire-goddess cults of the pre-Aetherian era. Their signature weapon — the emberveil, a length of heat-treated chain mesh that can be ignited and used as a whip, net, or close-range incendiary — is so difficult to master that initiates train for five years before using it in any real engagement. The Sorority controls all access to the rare star-ember mineral deposits in the eastern ridge and charges what the market will bear. Clan law permits members to marry outside the Sorority but requires that all children, regardless of gender, be offered to the clan for assessment at age five.",sigil:"🔗",clanHonor:81},{id:"PyrecloakInquisition",name:"Pyrecloak Inquisition",element:"Fire",description:"The Pyrecloak Inquisition functions as the internal affairs and loyalty-enforcement arm of the Fire alignment, investigating suspected traitors, spies, and clan-oath breakers with methodical thoroughness. Their investigators wear long flame-red cloaks that make them instantly recognisable — this is deliberate, a visible deterrent to anyone contemplating betrayal. Their interrogation techniques are considered uniquely effective, combining thermal stress environments with psychological methods developed over generations of practice. No one willingly becomes the subject of a Pyrecloak investigation; half of those investigated are ultimately exonerated, which is considered surprisingly merciful by those who feared the alternative.",sigil:"🧥",clanHonor:62},{id:"SolarflareVanguard",name:"Solarflare Vanguard",element:"Fire",description:"Solarflare warriors fight only in full daylight, at midday when possible, using polished shield-mirrors to direct concentrated solar reflection into enemy eyes as a blinding weapon before charging. They are desert-born, from the Pyremark interior where the sun is an active combatant in any engagement, and have spent centuries learning to make it fight for them. Their solar-bronze armour is alloyed to be a near-perfect heat reflector, keeping the wearer cool while radiating intense heat outward — standing within ten feet of a formed Solarflare unit in high summer is physically painful. Enemy commanders who attempt to delay engagement until dusk find that Solarflare warriors simply do not fight in shadow and will wait, provisioned, until the sun rises again.",sigil:"☀️",clanHonor:87},{id:"FlamecrestDynasty",name:"Flamecrest Dynasty",element:"Fire",description:'The Flamecrest Dynasty ruled the entire Fire alignment for two hundred years before a succession crisis fragmented their empire into the current clan system — a fact they have not entirely accepted. They retain the most elaborate court ceremonial in the Fire territories and refer to all other clan leaders as "provincial governors," a habit that has started several wars and ended zero negotiations successfully. Their armies are the best-equipped and worst-commanded in the alignment, because Flamecrest generals are appointed by bloodline rather than competence. Despite this structural weakness, the sheer weight of their resources and the loyalty of their household troops makes them a force no other Fire clan can ignore.',sigil:"👑",clanHonor:89},{id:"ScaldvaneFlotilla",name:"Scaldvane Flotilla",element:"Fire",description:"An unexpected clan for a fire alignment — the Scaldvane Flotilla operates on the volcanic lakes of the Pyremark interior, where geothermal heating keeps water scalding hot year-round and conventional naval forces cannot operate. Their steam-hulled vessels run on captured volcanic vent pressure and carry incendiary payloads that function as floating fire-bombs against any enemy foolish enough to try crossing the lakes. Scaldvane captains hold military rank equivalent to general in the Fire alignment command structure, a recognition that the inland waterways they control are critical supply arteries. Their most feared weapon is the Scald-shot — pressurised steam vented sideways at enemy vessels, boiling anyone caught on an open deck.",sigil:"⛵",clanHonor:73},{id:"BurnmarkSentinels",name:"Burnmark Sentinels",element:"Fire",description:"The Burnmark Sentinels are the border guardians of the Fire territories — a clan whose entire identity is built around holding the frontier against encroachment. They maintain a chain of watchtowers along the Char Ridge, each staffed permanently and connected by the Burnmark Signal Fire relay, which has never gone dark in four hundred years. Their warriors serve ten-year frontier rotations before returning to the clan heartland, emerging changed by solitude, wind, and the constant presence of danger. The Sentinels have repelled 71 major incursions in their recorded history; they track the number the way other clans track battle honours, with equal pride.",sigil:"🗼",clanHonor:76},{id:"AshforgeGuild",name:"Ashforge Guild",element:"Fire",description:"Where the Forge Titans build the great weapons, the Ashforge Guild builds everything else — the armour, the tools, the civic ironwork, the hinges and the hooks and the surgical instruments that keep the Fire alignment functioning between wars. Their guild hall in the city of Pyremark Prime covers three acres and employs over a thousand smiths at any given time. Guild membership is purchased, not inherited, making the Ashforge the most meritocratic institution in the Fire territories and a perennial source of social tension with the hereditary warrior clans. They have funded and armed three successful clan rebellions in the past century, always ensuring the winning side owed them something.",sigil:"🔨",clanHonor:71},{id:"RadiantthornArchers",name:"Radiantthorn Archers",element:"Fire",description:"The Radiantthorn are the finest archers in the Fire alignment, their composite bows made from volcanic horn layered with heat-resistant resin producing a range and penetration that makes their salvoes devastating at distances other archers consider impossible. Their arrows are tipped with a mineral called radiantite — found only in certain lava flows — which glows orange-white in flight, giving their volleys the visual effect of a swarm of tiny meteors descending. Radiantthorn training begins at age four and is never truly finished — veterans continue drilling alongside initiates every morning as long as they can draw a bow. A Radiantthorn at 60 years old is more dangerous with a bow than most archers half their age.",sigil:"🏹",clanHonor:83},{id:"EmbershroudCovenant",name:"Embershroud Covenant",element:"Fire",description:"The Embershroud Covenant are the death-rites keepers and funeral shamans of the Fire alignment, tending to the passage of clan souls into the afterflame with rituals that have remained unchanged for over a millennium. They believe that the soul exists as heat within the body and must be properly released at death; improper burial rites trap the heat, creating vengeful spirits called cold-ones that haunt the living with misfortune. Their shamans are invited to every major battle to be ready, a morbid necessity that has given the Embershroud intimate knowledge of how wars are actually fought and lost. They have never taken a side in any political dispute, but their knowledge of who died where and of what cause gives them leverage no one discusses openly.",sigil:"🕯️",clanHonor:55},{id:"CrestfireLegion",name:"Crestfire Legion",element:"Fire",description:"The Crestfire Legion is the joint military force of the Fire alignment — not a clan by birth but by oath, accepting veterans from any Fire clan who meet its physical and loyalty standards. They are the standing army that holds the Fire territories together when individual clans quarrel, and their red-and-black standards are one of the few symbols all Fire-born respect regardless of clan origin. Legionnaires renounce their birth clan upon joining and take the Legion as their only family, a sacrifice that creates soldiers of extraordinary cohesion and discipline. Three times in Aetherian history, the Crestfire Legion has refused orders from a Fire clan ruler it judged to be acting against the alignment's interests — and three times, the ruler in question was subsequently removed.",sigil:"⚔️",clanHonor:93}],lg=[{id:"TidalSerpentClan",name:"Tidal Serpent Clan",element:"Water",description:"Tidal Serpents are the coastal raiders of the Water alignment, their long-hulled serpent-prowed ships appearing out of sea-mist and vanishing before any defence can be mounted. They navigate entirely by tide-reckoning and star position — charts, they say, are for people who have not yet learned to read the sea. Each ship carries a clan navigator called a Tidecaller who holds the entire coastal geography of known Aetheria in memorised detail, a feat that takes twelve years of apprenticeship to achieve. Tidal Serpent warriors fight with hooked boarding-chains and short salting-blades designed for the cramped violence of ship-deck combat, techniques that are deeply uncomfortable for land-trained opponents.",sigil:"🐍",clanHonor:80},{id:"DeepMantaClan",name:"Deep Manta Clan",element:"Water",description:"The Deep Manta are the silent divers of the abyssal coastal shelves — free-divers who can reach depths that should be physiologically impossible, the result of generations of selective breeding and a closely guarded breathing technique called the Long Still. They harvest rare minerals, sunken cargo, and intelligence from the deep-water wrecks of Aetheria's naval history, knowing the seafloor better than any map that has ever been drawn. Their underwater communication system — a series of struck resonating shells — carries for miles in clear water and is completely unintelligible to anyone outside the clan. Deep Manta children are submerged in sea-pools from birth to acclimate their lungs to pressure, a tradition outsiders find alarming and insist on calling cruel.",sigil:"🦩",clanHonor:74},{id:"CoralThroneKingdom",name:"Coral Throne Kingdom",element:"Water",description:"The Coral Throne is the oldest continuously governed state in the Water alignment, a monarchy that has held its royal line unbroken for twenty-seven generations and maintains elaborate marine-temple complexes built from living coral on the great atoll reefs. Their rulers are called Reef-Kings and wear crowns of white living coral that must be removed when the wearer sleeps — a tradition designed to remind them that their authority is temporary and organic, not permanent or inert. Coral Throne artisans produce the finest aquatic architecture in Aetheria, their reef-citadels simultaneously a navy base, a city, and a religious site. The Kingdom is wealthy, cautious, and profoundly difficult to invade — three things that have made them peaceful by strategic preference rather than pacifist conviction.",sigil:"🪸",clanHonor:91},{id:"AbyssEelGuild",name:"Abyss Eel Guild",element:"Water",description:"The Abyss Eel Guild are the smugglers, fence-men, and black-market operators of the Water alignment, their network of underwater cave caches and hidden tidal channels forming a shadow economy that moves goods no legitimate shipper will touch. They take their name from the deep-water eels that navigate subterranean ocean passages no surface creature can follow, and their operatives are expected to know at least one underwater escape route from every port city in Aetheria. Guild law is simple: contracts are honoured absolutely, information about clients is never sold, and anyone who brings heat down on the organisation loses their hands — then their life if they argue about it. The Guild has no political opinions; it has financial interests, which is more reliable anyway.",sigil:"🐍",clanHonor:62},{id:"StormPetrelBrotherhood",name:"Storm Petrel Brotherhood",element:"Water",description:"Storm Petrels are the weather-warriors of the Water alignment, trained to read and navigate the extreme storm systems that shred conventional navies, using the storms themselves as cover and weapon. Their war-shamans can predict weather shifts twelve to eighteen hours ahead with a reliability that seems supernatural to outsiders — it is actually the product of a sensory training programme that begins in infancy, teaching children to feel barometric change and interpret cloud structure. In full storm conditions they attack; their ships are built to function in seas that would founder anything else afloat. Enemy admirals have a saying: if the sky is blue, watch for the Storm Petrels; if the sky turns black, they're already here.",sigil:"⛈️",clanHonor:85},{id:"KelpSovereignty",name:"Kelp Sovereignty",element:"Water",description:"The Kelp Sovereignty controls the great kelp forests of the northern coastal shelf — vast underwater jungles that filter light, conceal movement, and serve as the primary nursery for the fish stocks that feed half the Water alignment. They harvest kelp for food, medicine, rope, armour-padding, and the remarkable kelp-iron compound that serves as their primary trade good. Kelp Sovereignty soldiers fight in the kelp forests with terrifying effectiveness, their camouflage suits and knowledge of the terrain making them nearly invisible in the underwater environment where they prefer to settle disputes. They consider the kelp forests sacred and have declared three wars in the past century over proposed environmental damage — all three times, they won.",sigil:"🌿",clanHonor:76},{id:"BrineWolfPack",name:"Brine Wolf Pack",element:"Water",description:"The Brine Wolves hunt in coordinated naval wolf-packs — groups of five to nine small fast ships that swarm larger vessels, never attacking directly but circling, harassing, and waiting for the moment the prey separates from its escorts. Their tactics are borrowed directly from the behaviour of deep-sea pack predators, studied for centuries by clan naturalists who believed that nature had already solved all problems of naval warfare. Each ship in a Brine Wolf pack has a role — biter, flanker, herder, finisher, retreat-cover — and drills endlessly to execute these roles without spoken command. When a Brine Wolf pack signals engagement, naval commanders know to cut their losses and run because the alternative has historically been worse.",sigil:"🐺",clanHonor:83},{id:"WaveDancerSociety",name:"Wave Dancer Society",element:"Water",description:"The Wave Dancer Society began as a ceremonial performance tradition and became, over four centuries, one of the most effective light-infantry forces in the Water alignment — because the movement vocabulary of wave-dancing turned out to be an ideal base for fluid, unpredictable combat. Their fighters move in constant flowing motion, never presenting a static target, switching weapons and directions in rhythms that mirror breaking waves and confuse opponents trained to fight linear threats. Performances at Water alignment festivals are simultaneously cultural events and public demonstrations of military capability, leaving audiences both enchanted and quietly uncomfortable. The Society accepts students from all Water clans, teaching both the art and the violence with equal seriousness.",sigil:"💃",clanHonor:70},{id:"CurrentHawkNavy",name:"Current Hawk Navy",element:"Water",description:"The Current Hawk Navy is the formal deep-water military force of the Water alignment — the fleet that fights open-ocean engagements while smaller clans handle coastal raiding and river operations. Their officers are trained in the great naval academy at Port Saltion, the only institution in Aetheria that teaches three-dimensional naval tactics accounting for current, wind, depth, and tide simultaneously. Current Hawk warships are the largest in known Aetheria, carrying up to three hundred sailors and a full company of marines, powered by enchanted current-sails that can tack against the wind. Promotion in the Current Hawk is entirely merit-based, which is why their senior officers tend to be exceptional and their ranks are quietly envied by every hereditary military tradition on the continent.",sigil:"🦅",clanHonor:92},{id:"PearlDiverClan",name:"Pearl Diver Clan",element:"Water",description:"Pearl Divers have built a mercantile empire on the great oyster beds of the southern atoll chains, their pearls commanding prices in every market from the Fire capital to the distant northern kingdoms. Beneath the merchant surface runs a current of fierce territorial protectiveness — the Pearl Diver clan has defended their oyster beds with military force seven times, and the sunken wrecks of those who tried to poach serve as reef structures for new oyster growth, which the clan considers a poetic justice. Their divers are the second-best free-divers in the Water alignment after the Deep Manta, and serve as marines in times of war. Every Pearl Diver child is given their first pearl at birth, kept until death — a symbol that something of value grows in the hardest places.",sigil:"🪨",clanHonor:77},{id:"RiverOtterClan",name:"River Otter Clan",element:"Water",description:"The River Otters control the great inland river networks of Aetheria's western basin, their flat-bottomed river barges carrying more freight annually than all the coastal trade routes combined. They are river engineers of genius — their clan has straightened channels, built locks, constructed weirs, and redirected entire tributaries over the centuries, reshaping the hydrology of a continent to maximise commerce and military mobility. In conflict they release controlled floods that turn battlefields to bogs, a tactic that relies on the same engineering knowledge that makes them indispensable in peacetime. River Otter negotiators are easy to underestimate: slow-speaking, unhurried, and apparently unconcerned with your offer — right up until they explain, gently, exactly how dependent on their goodwill your supply lines are.",sigil:"🦦",clanHonor:72},{id:"MoonwhaleCongregation",name:"Moonwhale Congregation",element:"Water",description:"The Moonwhale Congregation are the deep-sea priests and mystics of the Water alignment, their religion centred on the great moon-whales — ancient, enormously intelligent cetaceans that migrate through the deep ocean on cycles that perfectly track the lunar calendar. Congregation shamans can communicate with the moon-whales through a specialised tonal chanting that reaches subsonic registers, receiving in return what they describe as visions of the ocean's emotional state — happiness, sorrow, warning. Whether this is divination or elaborate ecological signal-reading, the practical results are accurate enough that the Water alignment's naval high command officially employs three Congregation shamans as strategic advisors. The Congregation asks for nothing in return — only that the great whales be left alone.",sigil:"🐋",clanHonor:65},{id:"SiltFoxExpedition",name:"Silt Fox Expedition",element:"Water",description:"The Silt Fox are the cartographers and explorers of the Water alignment, their obsession with mapping unknown coastlines, river deltas, and underwater geography having produced the most comprehensive maritime charts in Aetheria. They maintain a fleet of survey vessels that carry no weapons — only scientific instruments — relying on their neutrality and a widely observed maritime tradition of protecting cartographers to keep them safe in hostile waters. The Silt Fox archive in Port Saltion contains the only known maps of the Far Reaches, acquired over thirty expeditions at the cost of four ships and thirty-two lives. They sell map copies to all buyers regardless of alignment, a policy that makes them wealthy and occasionally controversial.",sigil:"🗺️",clanHonor:68},{id:"UndertowAssassins",name:"Undertow Assassins",element:"Water",description:"The Undertow are the Water alignment's shadow-arm — killers who operate in port cities, river towns, and coastal settlements, using the busy anonymity of maritime commerce as their cover. They specialise in drowning, which they consider a philosophically appropriate method, believing that returning a soul to water completes a natural cycle. Their assassins breathe water for extended periods using a technique involving modified gill-membrane extracts — a closely guarded clan secret — allowing them to wait underwater near docks, ship hulls, and coastal access points indefinitely. The Undertow does not advertise its services; clients find them through a specific sequence of knots tied in the rigging of ships at harbour, a code that changes monthly.",sigil:"🌊",clanHonor:66},{id:"SaltViperNetwork",name:"Salt Viper Network",element:"Water",description:"Salt Vipers are the intelligence service of the Water alignment — spies, counter-spies, and information brokers embedded throughout the port cities and trade routes of Aetheria. They are trained to assume any persona plausibly: merchant, sailor, dockworker, harbour official — their tradecraft is considered the finest in the known world. Salt Viper handlers operate through a dead-drop system using salt caches hidden in plain sight in salting houses and fish markets, locations so mundane that surveillance is impractical. Their most dangerous operatives are called the Brine-marked — agents who have been compromised, doubled, and then re-recruited so many times that no one, including sometimes themselves, is entirely certain where their loyalties have ended up.",sigil:"🐍",clanHonor:71},{id:"ShoalDragonFleet",name:"Shoal Dragon Fleet",element:"Water",description:"The Shoal Dragon Fleet navigates the treacherous shoal-waters of the coastal shallows — areas too shallow for large warships but rich with trade routes that conventional navies cannot protect. Their flat-hulled dragon-prowed vessels draw almost no water and can operate in environments where any conventional keel would run aground, giving them total naval dominance of a zone that covers hundreds of miles of economically vital coastline. The Fleet's shallow-water knowledge is encyclopaedic and jealously guarded — they have been known to re-lay sandbars and shift shallow-water markers to deliberately strand rival ships. Shoal Dragon pilots are licensed by the clan and are the only legal operators in the designated shallow zones — a monopoly enforced with polite letters to port authorities and sharp steel to anyone who ignores the letters.",sigil:"🐉",clanHonor:79},{id:"DriftwoodNomads",name:"Driftwood Nomads",element:"Water",description:"The Driftwood Nomads live entirely on the water — not in port cities or coastal settlements, but on great interconnected raft-cities that drift with the ocean currents on a regular annual circuit. The raft-cities are multi-generational structures, continuously expanded and repaired, some reaching over a mile in extent, home to thousands of people who consider any fixed address a form of imprisonment. Driftwood craftsmanship is exceptional by necessity — everything built on a raft-city must be light, strong, multi-functional, and repairable at sea. They trade with every coastal nation they pass, maintaining neutrality through mobility: if politics becomes uncomfortable, the raft-city simply drifts away.",sigil:"🪵",clanHonor:57},{id:"DeepwardenOrder",name:"Deepwarden Order",element:"Water",description:"The Deepwarden Order maintains the great underwater barriers — a system of enchanted coral walls and current-diverters that protects the Water alignment's inner reef territories from deep-ocean threats both military and ecological. Their mage-engineers live for months at a time in pressurised underwater facilities, monitoring the barriers and making adjustments that require both magical attunement and structural engineering expertise. Deepwarden initiates spend their first three years in underwater facilities exclusively, emerging changed: quieter, more deliberate, and slightly unsettling to those unaccustomed to the pressure-adapted stillness of someone who has spent years where fast movement kills you. They consider themselves guardians of the ocean itself, not of any political alignment, and will protect the barriers against Water alignment threats as readily as against external ones.",sigil:"🔱",clanHonor:87},{id:"TidecallerPriesthood",name:"Tidecaller Priesthood",element:"Water",description:"The Tidecallers are the spiritual heart of the Water alignment — the priests who commune with the ocean tides through ritual immersion, spending hours each day in the surf reading the water's intention. They believe the tides are a language spoken by the ocean-god Aqualeth, and that patient, trained listeners can extract from the tide's daily pattern information about the intentions of distant powers. Skeptics note that the Tidecallers' political forecasts are right about sixty percent of the time; Tidecallers respond that the other forty percent represents cases where the ocean changed its mind. They are the primary arbiters of calendar-setting in the Water territories — when the Tidecallers announce the season has turned, it has turned.",sigil:"🌊",clanHonor:64},{id:"RivenmoorCitadel",name:"Rivenmoor Citadel",element:"Water",description:"Rivenmoor is built where three rivers meet — an island fortress-city that controls the entire river trade of the central Aetherian heartland, a strategic position so valuable that it has been fought over forty-three times and changed hands only twice. The clan that holds it has taken the citadel's name as their own, and they defend it with the ferocity of people who understand exactly what they have. Rivenmoor engineers have spent two centuries improving the citadel's flood-gate system to the point where they can deliberately flood the approaches with twelve hours' warning, making conventional siege impossible. Their garrison soldiers have never needed to sally — Rivenmoor has never been breached, and the clan intends to keep that record intact.",sigil:"🏰",clanHonor:90},{id:"CoralshellArtisans",name:"Coralshell Artisans",element:"Water",description:"The Coralshell Artisans produce the Water alignment's finest armour — grown rather than forged, using cultivation technique
